kind: Telo.Library
metadata:
  name: NullableAccessFixture
  version: 1.0.0
---
kind: Telo.Import
metadata:
  name: Run
source: ../..
---
kind: Telo.Import
metadata:
  name: JavaScript
source: ../../../javascript
---
# error is nullable inside finally (null on the success path). Accessing
# error.code without a null-guard must be flagged → CEL_NULLABLE_ACCESS.
kind: Run.Sequence
metadata:
  name: UnguardedFinally
steps:
  - name: outer
    try:
      - name: work
        invoke:
          kind: JavaScript.Script
          code: |
            function main() { return 1 }
    finally:
      - name: cleanup
        throw:
          code: "${{ error.code }}"
          message: "done"
