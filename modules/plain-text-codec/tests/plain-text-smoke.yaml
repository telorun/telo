kind: Telo.Application
metadata:
  name: PlainTextCodecSmokeTest
  version: 1.0.0
  description: |
    Smoke test for plain-text-codec. Roundtrips a small AsyncIterable of delta
    records through PlainText.Encoder → PlainText.Decoder and asserts the final
    UTF-8 string. Self-contained: depends only on this codec module + Stream/Run/Assert.
imports:
  PlainText: ../
  Stream: ../../stream
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestRoundtrip
---
kind: Stream.Of
metadata: { name: Source }
items:
  - { delta: "h" }
  - { delta: "i" }
---
kind: PlainText.Encoder
metadata: { name: Encoder }
---
kind: PlainText.Decoder
metadata: { name: Decoder }
---
kind: Run.Sequence
metadata: { name: TestRoundtrip }
steps:
  - name: Source
    invoke: !ref Source
  - name: Encode
    inputs:
      input: "${{ steps.Source.result.output }}"
    invoke: !ref Encoder
  - name: Decode
    inputs:
      input: "${{ steps.Encode.result.output }}"
    invoke: !ref Decoder
  - name: Assert
    inputs:
      text: "${{ steps.Decode.result.text }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text: { const: "hi" }
        required: [ text ]
