kind: Telo.Application
metadata:
  name: HelloApiExample
  version: 1.0.0
  description: |
    Simplest possible HTTP API: a single `GET /v1/hello?name=…` route backed
    by a typed `Run.Value`. Shows how `Http.Server` mounts an `Http.Api`, how
    the request schema feeds a CEL expression on `inputs`, and how the
    handler's output flows into the response body via `result.*`.

    Run, then:
        curl 'http://localhost:8845/v1/hello?name=World'
imports:
  Http: std/http-server@0.19.1#sha256-MkMefY1OtI0KMFV4VwvTaHJntTcnS3qEm53uoqyU7R4
  Run: std/run@0.13.0#sha256-s5raonayIOI78D9YjhAG_TB_KV7wILexhfEOpygFauc
targets:
  - !ref ExampleServer
ports:
  http:
    env: PORT
    protocol: tcp
    default: 8845
---
kind: Http.Server
metadata:
  name: ExampleServer
port: !cel "ports.http"
logger: true
openapi:
  info:
    title: Hello server
    version: 1.0.0
mounts:
  - path: /v1
    mount: !ref HelloApi
---
kind: Http.Api
metadata:
  name: HelloApi
routes:
  - request:
      path: /hello
      method: GET
      schema:
        query:
          type: object
          properties:
            name:
              type: string
          required: [ "name" ]
    handler: !ref SayHello
    inputs:
      name: "${{ request.query.name }}" # CEL expression
    returns:
      - status: 200
        content:
          application/json:
            schema:
              type: object
              properties:
                greeting: { type: string }
                nice: { type: string }
              required: [ greeting, nice ]
              additionalProperties: false
            body:
              greeting: "${{ result.message }}!"
              nice: "WOW"
---
kind: Run.Value
metadata:
  name: SayHello
inputs:
  name: { type: string }
value:
  message: !cel "'Hello ' + inputs.name + '!'"
