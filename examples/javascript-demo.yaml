kind: Kernel.Module
metadata:
  name: JavaScriptDemo
  version: 1.0.0
  description: A demo module showcasing JavaScript scripts
targets:
  - RunScript
---
kind: Kernel.Import
metadata:
  name: Run
source: ../modules/run
---
kind: Kernel.Import
metadata:
  name: JavaScript
source: ../modules/javascript
---
kind: Kernel.Import
metadata:
  name: Console
source: ../modules/console
---
kind: JavaScript.Script
metadata:
  name: MultiplyBy2
code: |
  function main({ value }) {
    return { result: value * 2 }
  }
inputSchema:
  value:
    type: number
outputSchema:
  result:
    type: number
---
kind: Run.Sequence
metadata:
  name: RunScript
steps:
  - name: Step1
    inputs:
      value: 42
    invoke:
      kind: JavaScript.Script
      name: MultiplyBy2
  - name: PrintResult
    inputs:
      result: "${{ steps.Step1.result.result }}"
    invoke:
      kind: Console.WriteLine
      inputSchema:
        result:
          type: number
      output: |
        Evaluated JavaScript code.
        Result is: ${{ result }}
