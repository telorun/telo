kind: Telo.Application
metadata:
  name: FeedbackApiRepo
  version: 1.0.0
  description: |
    Feedback REST API using SqlRepository — no SQL beyond the schema migration.
imports:
  Http: oci://ghcr.io/telorun/http-server@0.19.1#sha256-ttYHRhb5HyTKVz7m9BetgWukGyknrpddBsWL_VRUXbM
  Sql: oci://ghcr.io/telorun/sql@0.13.0#sha256-ARE0QGUj8CtyNKTgIwiBFnHq1YbH-3B6nK4TLmvg_aE
  SqlSqlite: oci://ghcr.io/telorun/sql-sqlite@0.4.0#sha256-Tx6iWpzDfFNKkmAmlzK74dsP1w4CR9e_jkU_EITvjb4
  SqlRepository: oci://ghcr.io/telorun/sql-repository@0.7.0#sha256-y4BcHm_rVxb-dE6esEYlFsksHmH3d7f2DfCCz7opjzs
  Run: oci://ghcr.io/telorun/run@0.13.0#sha256-s5raonayIOI78D9YjhAG_TB_KV7wILexhfEOpygFauc
targets:
  - !ref SetupDb
  - !ref Server
ports:
  http:
    env: PORT
    default: 8844
---
kind: SqlSqlite.Connection
metadata:
  name: Db
file: ./tmp/feedback-repo.db
---
kind: SqlRepository.Create
metadata:
  name: InsertFeedback
connection: !ref Db
table: feedback
---
kind: SqlRepository.Read
metadata:
  name: ListFeedback
connection: !ref Db
table: feedback
---
kind: SqlRepository.Read
metadata:
  name: GetFeedback
connection: !ref Db
table: feedback
---
kind: Run.Sequence
metadata:
  name: SetupDb
steps:
  - name: CreateTable
    invoke:
      kind: Sql.Command
      connection: !ref Db
    inputs:
      sql: |
        CREATE TABLE IF NOT EXISTS feedback (
          id        INTEGER PRIMARY KEY AUTOINCREMENT,
          text      TEXT    NOT NULL,
          source    TEXT,
          score     INTEGER NOT NULL DEFAULT 0,
          created_at DATETIME DEFAULT CURRENT_TIMESTAMP
        )
---
kind: Http.Server
metadata:
  name: Server
port: !cel "ports.http"
logger: true
openapi:
  info:
    title: Feedback API (Repository)
    version: 1.0.0
mounts:
  - path: /v1
    mount: !ref FeedbackRoutes
---
kind: Http.Api
metadata:
  name: FeedbackRoutes
routes:
  # POST /v1/feedback — insert a new entry
  - request:
      path: /feedback
      method: POST
      schema:
        body:
          type: object
          properties:
            text:
              type: string
              minLength: 1
            source:
              type: string
          required: [ text ]
    handler: !ref InsertFeedback
    inputs:
      data:
        text: "${{ request.body.text }}"
        source: "${{ request.body.source }}"
        score: "${{ size(request.body.text) }}"
    returns:
      - status: 201
        content:
          application/json:
            body:
              ok: true
              message: Feedback received

  # GET /v1/feedback — list all entries
  - request:
      path: /feedback
      method: GET
    handler: !ref ListFeedback
    inputs:
      filters: {}
    returns:
      - status: 200
        content:
          application/json:
            body: "${{ result.rows }}"

  # GET /v1/feedback/{id} — fetch a single entry by id
  - request:
      path: /feedback/{id}
      method: GET
      schema:
        params:
          type: object
          properties:
            id:
              type: integer
          required: [ id ]
    handler: !ref GetFeedback
    inputs:
      filters:
        id: "${{ request.params.id }}"
    returns:
      - status: 200
        when: "${{ size(result.rows) > 0 }}"
        content:
          application/json:
            body: "${{ result.rows[0] }}"
      - status: 404
        content:
          application/json:
            body:
              ok: false
              message: Not found
