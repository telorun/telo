kind: Telo.Application
metadata:
  name: AgentToolErrorTest
  version: 1.0.0
imports:
  Ai: ../
  AiEcho: ./__fixtures__/ai-echo.yaml
  Js: ../../javascript
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestToolError
---
# Echo requests a tool that doesn't exist. With the default onToolError "feedback",
# the agent records the error and feeds it back to the model rather than aborting.
kind: AiEcho.EchoModel
metadata:
  name: Echo
emitToolCall:
  name: ghost
  arguments: {}
---
kind: Js.Script
metadata:
  name: Multiplier
code: |
  function main({ a, b }) { return { product: a * b }; }
---
kind: Ai.Tools
metadata:
  name: LocalTools
tools:
  - tool: !ref Multiplier
    name: multiply
    description: Multiply two numbers.
    parameters:
      type: object
      additionalProperties: false
      required: [ a, b ]
      properties:
        a: { type: number }
        b: { type: number }
---
kind: Ai.Agent
metadata:
  name: Assistant
model: !ref Echo
onToolError: feedback
toolProviders:
  - provider: !ref LocalTools
---
kind: Run.Sequence
metadata:
  name: TestToolError
steps:
  - name: Invoke
    inputs:
      prompt: "do something"
    invoke: !ref Assistant
  # The unknown-tool error is surfaced as the tool result (not swallowed), then echoed.
  - name: AssertText
    inputs:
      text: "${{ steps.Invoke.result.text }}"
      hadError: "${{ steps.Invoke.result.steps[0].toolResults[0].error }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text:
            type: string
            const: 'Error: no such tool "ghost".'
          hadError:
            type: boolean
            const: true
        required: [ text, hadError ]
