kind: Telo.Library
metadata:
  name: workflow
  namespace: std
  version: 0.2.0
  repository: https://github.com/telorun/telo
  license: LicenseRef-SustainableUse
  description: Workflow orchestration with pluggable backend providers
exports:
  kinds:
    - Backend
    - Graph
---
kind: Telo.Abstract
metadata:
  name: Backend
capability: Telo.Provider
---
kind: Telo.Definition
metadata:
  name: Graph
  description: Runs a graph of invocable nodes on a pluggable workflow backend.
capability: Telo.Runnable
schema:
  type: object
  properties:
    backend:
      title: Backend
      description: Reference to the workflow backend provider.
      x-telo-ref: "std/workflow#Backend"
    nodes:
      title: Nodes
      description: Workflow nodes to execute.
      type: array
      items:
        type: object
        properties:
          name:
            title: Name
            description: Unique node name.
            type: string
          invoke:
            title: Invoke
            description: Resource invoked by this node.
            x-telo-ref: "telo#Invocable"
          options:
            title: Options
            description: Backend-specific execution options for this node.
            x-telo-schema-from: "backend/$defs/NodeOptions"
        required:
          - name
          - invoke
  required:
    - backend
    - nodes
