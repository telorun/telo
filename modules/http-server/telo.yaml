kind: Telo.Library
metadata:
  name: "http-server"
  namespace: std
  version: "0.6.0"
exports:
  kinds:
    - Server
    - Api
---
# Single source of truth for the returns:/catches: schema. Both Server.notFoundHandler
# and Api.routes[] anchor at HttpDispatch.Outcomes/$defs/{Returns,Catches} so the
# shape, MIME negotiation rules, and buffer/stream oneOf live in exactly one place.
kind: Telo.Import
metadata:
  name: HttpDispatch
source: ../http-dispatch
---
kind: "Telo.Definition"
metadata:
  name: "Server"
capability: Telo.Service
controllers:
  - pkg:npm/@telorun/http-server@0.6.0?local_path=./nodejs#http-server
schema:
  type: "object"
  properties:
    host:
      title: Host
      description: Host interface for the HTTP server.
      type: "string"
      x-telo-eval: compile
      default: "0.0.0.0"
    port:
      title: Port
      description: TCP port used by the HTTP server.
      type: "integer"
      x-telo-eval: compile
      x-telo-type: TcpPort
      minimum: 1
      maximum: 65535
    baseUrl:
      title: Base URL
      description: External base URL used in generated links.
      type: "string"
      x-telo-eval: compile
    logger:
      title: Logger
      description: Enable or disable request logging.
      type: "boolean"
      x-telo-eval: compile
    openapi:
      title: OpenAPI
      description: OpenAPI document metadata for the server.
      type: "object"
      x-telo-eval: compile
      properties:
        info:
          title: Info
          description: OpenAPI info block.
          type: "object"
          properties:
            title:
              title: Title
              description: API title shown in OpenAPI documentation.
              type: "string"
            version:
              title: Version
              description: API version shown in OpenAPI documentation.
              type: "string"
          required: ["title", "version"]
      required: ["info"]
    mounts:
      title: Mounts
      description: Mount points attached to the HTTP server.
      type: "array"
      x-telo-eval: compile
      items:
        title: Mount
        description: Single mount configuration.
        type: "object"
        properties:
          path:
            title: Path
            description: URL prefix where the mount is attached.
            type: "string"
          type:
            title: Type
            description: Mount resource kind to attach.
            type: "string"
            x-telo-ref: "telo#Mount"
    contentTypeParsers:
      title: Content Type Parsers
      description: Custom parsers for specific content types.
      type: "array"
      x-telo-eval: compile
      items:
        title: Content Type Parser
        description: Parser mapping for one content type.
        type: "object"
        additionalProperties: false
        properties:
          contentType:
            title: Content Type
            description: HTTP content type matched by this parser.
            type: "string"
          parser:
            title: Parser
            description: Invocable or runnable parser resource for this content type.
            # Accept either capability: a controller may implement `invoke()`
            # (typical) or `run()` (e.g. a Run.Sequence dispatching to a parser
            # pipeline). The kernel calls whichever method exists.
            anyOf:
              - x-telo-ref: "telo#Invocable"
              - x-telo-ref: "telo#Runnable"
            oneOf:
              - title: Parser Reference
                description: String reference to an invocable parser.
                type: "string"
              - type: "object"
                title: Parser Object
                description: Object reference to an invocable parser.
                properties:
                  kind:
                    title: Kind
                    description: Kind of the parser resource.
                    type: "string"
                required: ["kind"]
                additionalProperties: true
        required: ["contentType"]
    cors:
      title: CORS
      description: Cross-origin resource sharing configuration.
      type: "object"
      x-telo-eval: compile
      additionalProperties: false
      properties:
        origin:
          title: Origin
          description: "Access-Control-Allow-Origin. '*', boolean, or array of strings."
          oneOf:
            - type: "string"
            - type: "boolean"
            - type: "array"
              items:
                title: Origin
                description: Allowed origin value.
                type: "string"
        methods:
          title: Methods
          description: "Access-Control-Allow-Methods. Comma-delimited string or array."
          oneOf:
            - type: "string"
            - type: "array"
              items:
                title: Method
                description: Allowed HTTP method.
                type: "string"
        allowedHeaders:
          title: Allowed Headers
          description: "Access-Control-Allow-Headers. Comma-delimited string or array."
          oneOf:
            - type: "string"
            - type: "array"
              items:
                title: Header
                description: Allowed request header name.
                type: "string"
        exposedHeaders:
          title: Exposed Headers
          description: "Access-Control-Expose-Headers. Comma-delimited string or array."
          oneOf:
            - type: "string"
            - type: "array"
              items:
                title: Header
                description: Exposed response header name.
                type: "string"
        credentials:
          title: Credentials
          type: "boolean"
          description: "Access-Control-Allow-Credentials."
        maxAge:
          title: Max Age
          type: "integer"
          description: "Access-Control-Max-Age in seconds."
        cacheControl:
          title: Cache Control
          description: "Cache-Control for preflight responses. Integer (max-age=N) or string."
          oneOf:
            - type: "integer"
            - type: "string"
        preflightContinue:
          title: Preflight Continue
          type: "boolean"
          description: "Pass preflight response to route handler. Default: false."
        optionsSuccessStatus:
          title: Options Success Status
          type: "integer"
          description: "Status code for successful OPTIONS requests. Default: 204."
        preflight:
          title: Preflight
          type: "boolean"
          description: "Enable preflight handling. Default: true."
        strictPreflight:
          title: Strict Preflight
          type: "boolean"
          description: "Enforce strict W3C CORS preflight headers. Default: true."
        hideOptionsRoute:
          title: Hide Options Route
          type: "boolean"
          description: "Hide OPTIONS route from Swagger docs. Default: true."
    notFoundHandler:
      title: Not Found Handler
      description: Fallback handler configuration when no route matches.
      type: "object"
      properties:
        invoke:
          title: Invoke
          description: Resource invoked (or run) to generate not-found response data.
          # Accept either capability so dual-mode kinds like Run.Sequence fit.
          anyOf:
            - x-telo-ref: "telo#Invocable"
            - x-telo-ref: "telo#Runnable"
          oneOf:
            - title: Invoke Reference
              description: String reference to an invocable fallback handler.
              type: "string"
            - type: "object"
              title: Invoke Object
              description: Object reference to an invocable fallback handler.
              properties:
                kind:
                  title: Kind
                  description: Kind of resource used for fallback invocation.
                  type: "string"
              required: ["kind"]
              additionalProperties: true
        inputs:
          title: Inputs
          type: "object"
          additionalProperties: true
          description: "CEL expressions evaluated against the request context; result is passed to the fallback handler's invoke()"
          x-telo-context:
            type: object
            additionalProperties: false
            properties:
              request:
                x-telo-context-from: "request/schema"
                type: object
                properties:
                  query: { type: object, additionalProperties: true }
                  body: { type: object, additionalProperties: true }
                  headers: { type: object, additionalProperties: true }
                  params: { type: object, additionalProperties: true }
                  path: { type: string }
                  method: { type: string }
        returns:
          x-telo-outcome-list: returns
          x-telo-schema-from: "HttpDispatch.Outcomes/$defs/Returns"
        catches:
          x-telo-outcome-list: catches
          x-telo-catches-for: invoke
          x-telo-schema-from: "HttpDispatch.Outcomes/$defs/Catches"
  required: ["port", "mounts"]
---
kind: "Telo.Definition"
metadata:
  name: "Api"
capability: Telo.Mount
topology: Router
controllers:
  - pkg:npm/@telorun/http-server@0.6.0?local_path=./nodejs#http-server-api
schema:
  type: "object"
  properties:
    routes:
      title: Routes
      description: HTTP route definitions.
      x-telo-topology-role: entries
      type: "array"
      items:
        title: Route
        description: Single route definition.
        type: "object"
        additionalProperties: false
        properties:
          request:
            x-telo-topology-role: matcher
            x-telo-schema-from: "HttpDispatch.Request/$defs/Matcher"
          inputs:
            title: Inputs
            type: "object"
            additionalProperties: true
            description: "CEL expressions evaluated against the request context; result is passed to handler.invoke()"
            x-telo-context:
              type: object
              additionalProperties: false
              properties:
                request:
                  x-telo-context-from: "request/schema"
                  type: object
                  properties:
                    query: { type: object, additionalProperties: true }
                    body: { type: object, additionalProperties: true }
                    headers: { type: object, additionalProperties: true }
                    params: { type: object, additionalProperties: true }
                    path: { type: string }
                    method: { type: string }
          handler:
            title: Handler
            description: Route handler — Invocable or Runnable.
            x-telo-topology-role: handler
            # Accept either capability. Run.Sequence (Telo.Runnable, but
            # whose controller also implements `invoke()`) is a real-world
            # consumer here — its `run()` and `invoke()` both produce the
            # response body, the kernel calls whichever is appropriate.
            anyOf:
              - x-telo-ref: "telo#Invocable"
              - x-telo-ref: "telo#Runnable"
            x-telo-context:
              type: object
              properties:
                inputs:
                  type: object
                  additionalProperties: true
                result:
                  type: object
                  additionalProperties: true
              additionalProperties: false
            oneOf:
              - title: Handler Reference
                description: String reference to a handler resource.
                type: "string"
              - type: "object"
                title: Handler Object
                description: Object reference to a handler resource.
                properties:
                  kind:
                    title: Kind
                    description: Kind of resource used as handler.
                    type: "string"
                  type:
                    title: Type
                    description: Optional handler type hint.
                    type: "string"
          returns:
            title: Returns
            description: Rendering rules for values the handler resolved with.
            type: "array"
            x-telo-outcome-list: returns
            x-telo-context:
              type: object
              additionalProperties: false
              properties:
                request:
                  x-telo-context-from: "request/schema"
                  type: object
                  properties:
                    path: { type: string }
                    method: { type: string }
                result:
                  x-telo-context-ref-from: "handler/outputType"
                  type: object
                  additionalProperties: true
            items:
              title: Return Entry
              description: Conditional rendering entry for a successful return.
              type: "object"
              additionalProperties: false
              properties:
                status:
                  title: Status
                  description: HTTP status code for this entry.
                  type: "integer"
                  minimum: 100
                  maximum: 599
                when:
                  title: When
                  type: "boolean"
                  description: "CEL expression; entry is selected if this evaluates to true. In stream mode, `result.*` is unavailable (the handler result is an unconsumed Stream); reference only `request.*`."
                mode:
                  title: Mode
                  type: "string"
                  enum: ["buffer", "stream"]
                  description: "buffer (default): CEL body expansion + schema validation per matched MIME. stream: pipe handler.result.output through content[mime].encoder, then bytes to the response."
                headers:
                  title: Headers
                  description: Entry-level response headers; merged with per-MIME content[mime].headers (per-MIME wins). Content-Type is forbidden — the matched content map key is the only Content-Type source.
                  type: "object"
                  additionalProperties:
                    type: "string"
                content:
                  title: Content
                  description: Per-MIME response shape. Map key is the canonical Content-Type — the server sets Content-Type from the matched key automatically, with Accept-header negotiation across keys when there are multiple. Required when the status carries a body; omit for 204/304-style empty responses.
                  type: "object"
                  additionalProperties:
                    type: "object"
                    additionalProperties: false
                    properties:
                      body:
                        title: Body
                        description: CEL expression or object mapping for response body (buffer mode).
                      schema:
                        title: Schema
                        description: JSON Schema used to validate the rendered body (buffer mode).
                        type: "object"
                      encoder:
                        title: Encoder
                        description: Encoder ref (any kind extending std/codec#Encoder) for stream mode. handler.result.output is piped through encoder.invoke({input}) and the encoder's result.output bytes flow to the response.
                        x-telo-ref: "std/codec#Encoder"
                        oneOf:
                          - title: Encoder Reference
                            type: "string"
                          - type: "object"
                            title: Encoder Object
                            properties:
                              kind: { title: Kind, type: "string" }
                              name: { title: Name, type: "string" }
                            required: ["kind"]
                            additionalProperties: true
                      headers:
                        title: Headers
                        description: Per-MIME header overrides (merge over entry-level headers; per-MIME wins). Content-Type is forbidden.
                        type: "object"
                        additionalProperties:
                          type: "string"
              required: ["status"]
              oneOf:
                - title: Buffer mode
                  description: "mode: buffer (or omitted). Each content[mime] uses `body` (with optional `schema`); `encoder` is forbidden."
                  anyOf:
                    - not: { required: ["mode"] }
                    - properties:
                        mode: { const: "buffer" }
                  properties:
                    content:
                      type: "object"
                      additionalProperties:
                        type: "object"
                        not: { required: ["encoder"] }
                - title: Stream mode
                  description: "mode: stream. Every content[mime] must declare `encoder`; `body` is forbidden. `content` map must be non-empty."
                  properties:
                    mode: { const: "stream" }
                    content:
                      type: "object"
                      minProperties: 1
                      additionalProperties:
                        type: "object"
                        required: ["encoder"]
                        not: { required: ["body"] }
                  required: ["mode", "content"]
          catches:
            title: Catches
            description: Rendering rules for structured (InvokeError) throws from the handler. Buffer-mode only — by the time a catch fires there is no upstream iterable to feed an encoder.
            type: "array"
            x-telo-outcome-list: catches
            x-telo-catches-for: handler
            x-telo-context:
              type: object
              additionalProperties: false
              properties:
                request:
                  x-telo-context-from: "request/schema"
                  type: object
                  properties:
                    path: { type: string }
                    method: { type: string }
                error:
                  type: object
                  additionalProperties: false
                  properties:
                    code: { type: string }
                    message: { type: string }
                    data: { type: object, additionalProperties: true }
            items:
              title: Catch Entry
              description: Conditional rendering entry for a thrown InvokeError.
              type: "object"
              additionalProperties: false
              properties:
                status:
                  title: Status
                  description: HTTP status code for this entry.
                  type: "integer"
                  minimum: 100
                  maximum: 599
                when:
                  title: When
                  type: "boolean"
                  description: "CEL expression; sees `error` and `request`"
                headers:
                  title: Headers
                  description: Entry-level response headers. Content-Type is forbidden — the matched content map key is the only Content-Type source.
                  type: "object"
                  additionalProperties:
                    type: "string"
                content:
                  title: Content
                  description: Per-MIME error-body shape. Buffer-mode only.
                  type: "object"
                  additionalProperties:
                    type: "object"
                    additionalProperties: false
                    properties:
                      body:
                        title: Body
                        description: CEL expression or object mapping for the error body.
                      schema:
                        title: Schema
                        description: JSON Schema used to validate the rendered body.
                        type: "object"
                      headers:
                        title: Headers
                        description: Per-MIME header overrides (merge over entry-level headers; per-MIME wins). Content-Type is forbidden.
                        type: "object"
                        additionalProperties:
                          type: "string"
              required: ["status"]
        required: ["request", "returns"]
  required: ["routes"]
