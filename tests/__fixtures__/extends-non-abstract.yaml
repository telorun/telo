kind: Telo.Application
metadata:
  name: ExtendsCapabilityMismatch
  version: 1.0.0
imports:
  AbstractLib: ./abstract-lib.yaml
---
# General single inheritance allows extending a concrete kind. What it forbids is
# changing the lifecycle role: `SecondHand` declares `capability: Telo.Provider`
# but extends `AbstractLib.Concrete` whose capability is `Telo.Invocable` — a
# hard EXTENDS_CAPABILITY_MISMATCH.
kind: Telo.Definition
metadata:
  name: SecondHand
  module: SecondHandLocal
capability: Telo.Provider
extends: AbstractLib.Concrete
schema:
  type: object
  properties: {}
