kind: Kernel.Module
metadata:
  name: Console
  version: 1.0.0
---
kind: Kernel.Definition
metadata:
  name: WriteLine
  module: Console
capabilities:
  - executable
controllers:
  - pkg:npm/@telorun/console@>=1.0.0?local_path=./nodejs#writeline
schema:
  type: object
  properties:
    output:
      type: string
  required: ["output"]
---
kind: Kernel.Definition
metadata:
  name: ReadLine
  module: Console
capabilities:
  - executable
controllers:
  - pkg:npm/@telorun/console@>=1.0.0?local_path=./nodejs#readline
schema:
  type: object
  properties:
    prompt:
      type: string
  required: ["prompt"]
