kind: Telo.Library
metadata:
  name: http-dispatch
  namespace: std
  version: 0.1.0
exports:
  kinds:
    - Outcomes
    - Request
---
# Pure schema carrier. Never instantiated as a resource. Publishes
# $defs/Matcher — the canonical HTTP request matcher value-shape — as a single
# source of truth that every HTTP-shaped transport (http-server, lambda, ...)
# anchors against via x-telo-schema-from. Consumers keep their own
# x-telo-topology-role / x-telo-context-from annotations on the field they
# declare; the carrier owns only the structural value-shape (method, path,
# query, body, headers).
kind: Telo.Definition
metadata:
  name: Request
capability: Telo.Type
schema:
  type: object
  $defs:
    Matcher:
      title: Matcher
      description: HTTP request matcher.
      type: object
      properties:
        path:
          title: Path
          description: Route path pattern.
          type: string
        method:
          title: Method
          description: HTTP method matched by the route.
          type: string
          enum: ["GET", "POST", "PUT", "DELETE", "PATCH", "HEAD", "OPTIONS"]
        query:
          title: Query
          description: Query parameter schema for request matching.
          type: object
        body:
          title: Body
          description: Request body schema for request matching.
          type: object
        headers:
          title: Headers
          description: Header schema for request matching. Values are matched as strings against the incoming header value.
          type: object
          additionalProperties:
            type: string
        schema:
          title: Schema
          description: |
            User-supplied JSON Schemas typing the CEL-visible parts of the
            incoming request. Read by the analyzer via
            `x-telo-context-from: "request/schema"` to populate the
            `request.{query,body,headers,params}` shape of CEL contexts
            inside `inputs:` / `returns:` / `catches:`. Distinct from the
            top-level `query`/`body`/`headers` fields above, which document
            the matcher value-shape itself.
          type: object
          additionalProperties: false
          properties:
            params:  { type: object }
            query:   { type: object }
            body:    { type: object }
            headers: { type: object }
      required: ["path", "method"]
---
# Pure schema carrier. Never instantiated as a resource. Its only job is to
# publish $defs/Returns and $defs/Catches as a single source of truth that
# every HTTP-shaped transport (http-server, lambda, ...) anchors against via
# x-telo-schema-from. Consumers keep their own x-telo-outcome-list /
# x-telo-catches-for / x-telo-context annotations on the field they declare;
# the carrier owns only the value-shape (status, when, mode, headers, content).
kind: Telo.Definition
metadata:
  name: Outcomes
capability: Telo.Type
schema:
  type: object
  $defs:
    Returns:
      title: Returns
      description: Rendering rules for values the handler resolved with.
      type: array
      items:
        title: Return Entry
        description: Conditional rendering entry for a successful return.
        type: object
        properties:
          status:
            title: Status
            description: HTTP status code for this entry.
            type: integer
            minimum: 100
            maximum: 599
          when:
            title: When
            description: CEL condition that selects this entry.
            type: boolean
          mode:
            title: Mode
            description: "buffer (default): CEL body expansion + schema validation. stream: pipe handler.result.output through content[mime].encoder, then bytes to the response."
            type: string
            enum: ["buffer", "stream"]
          headers:
            title: Headers
            description: Entry-level response headers; merged with per-MIME content[mime].headers (per-MIME wins). Content-Type is forbidden — the matched content map key is the only Content-Type source.
            type: object
            additionalProperties:
              type: string
          content:
            title: Content
            description: Per-MIME response shape. Map key is the canonical Content-Type. Required when status carries a body; omit for 204/304-style empty responses.
            type: object
            additionalProperties:
              type: object
              additionalProperties: false
              properties:
                body:
                  title: Body
                  description: CEL expression or object mapping for response body (buffer mode).
                schema:
                  title: Schema
                  description: JSON Schema used to validate the rendered body (buffer mode).
                  type: object
                encoder:
                  title: Encoder
                  description: Encoder ref (any kind extending std/codec#Encoder) for stream mode. handler.result.output is piped through encoder.invoke({input}) and the encoder's result.output bytes flow to the response.
                  x-telo-ref: "std/codec#Encoder"
                  oneOf:
                    - title: Encoder Reference
                      type: string
                    - type: object
                      title: Encoder Object
                      properties:
                        kind: { title: Kind, type: string }
                        name: { title: Name, type: string }
                      required: ["kind"]
                      additionalProperties: true
                headers:
                  title: Headers
                  description: Per-MIME header overrides (merge over entry-level headers; per-MIME wins). Content-Type is forbidden.
                  type: object
                  additionalProperties:
                    type: string
        required: ["status"]
        oneOf:
          - title: Buffer mode
            description: "mode: buffer (or omitted). Each content[mime] uses `body` (with optional `schema`); `encoder` is forbidden."
            anyOf:
              - not: { required: ["mode"] }
              - properties:
                  mode: { const: "buffer" }
            properties:
              content:
                type: object
                additionalProperties:
                  type: object
                  not: { required: ["encoder"] }
          - title: Stream mode
            description: "mode: stream. Every content[mime] must declare `encoder`; `body` is forbidden. `content` map must be non-empty."
            properties:
              mode: { const: "stream" }
              content:
                type: object
                minProperties: 1
                additionalProperties:
                  type: object
                  required: ["encoder"]
                  not: { required: ["body"] }
            required: ["mode", "content"]
    Catches:
      title: Catches
      description: Rendering rules for structured (InvokeError) throws from the handler. Buffer-mode only — by the time a catch fires there is no upstream iterable to feed an encoder.
      type: array
      items:
        title: Catch Entry
        description: Conditional rendering entry for a thrown InvokeError.
        type: object
        properties:
          status:
            title: Status
            description: HTTP status code for this entry.
            type: integer
            minimum: 100
            maximum: 599
          when:
            title: When
            description: CEL condition that selects this entry (sees `error` and `request`).
            type: boolean
          headers:
            title: Headers
            description: Entry-level response headers. Content-Type is forbidden — the matched content map key is the only Content-Type source.
            type: object
            additionalProperties:
              type: string
          content:
            title: Content
            description: Per-MIME error-body shape. Buffer-mode only.
            type: object
            additionalProperties:
              type: object
              additionalProperties: false
              properties:
                body:
                  title: Body
                  description: CEL expression or object mapping for the error body.
                schema:
                  title: Schema
                  description: JSON Schema used to validate the rendered body.
                  type: object
                headers:
                  title: Headers
                  description: Per-MIME header overrides (merge over entry-level headers; per-MIME wins). Content-Type is forbidden.
                  type: object
                  additionalProperties:
                    type: string
        required: ["status"]
