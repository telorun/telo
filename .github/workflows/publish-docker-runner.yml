name: Publish Docker Runner

on:
  push:
    branches: [main]
    paths:
      - "apps/docker-runner/**"
      - "cli/**"
      - "kernel/**"
      - "sdk/**"
      - "analyzer/**"
      - "yaml-cel-templating/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/publish-docker-runner.yml"
  workflow_dispatch:

concurrency:
  group: publish-docker-runner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push telorun/telo-runner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/docker-runner/Dockerfile
          push: true
          tags: |
            telorun/telo-runner:latest
            telorun/telo-runner:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
