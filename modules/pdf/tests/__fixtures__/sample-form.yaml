kind: Telo.Library
metadata:
  name: pdf-test-fixtures
  version: 0.1.0
  description: |
    Shared fixture for std/pdf tests — a hermetic two-page PDF (300×200 pt per
    page, generated once with pdf-lib: page 1 reads "First name:" / "Email:",
    page 2 reads "Subscribe to newsletter:"), embedded as base64 and decoded
    to a Uint8Array by a JS.Script.
imports:
  JS: ../../../javascript
exports:
  resources:
    - SampleFormPdf
---
kind: JS.Script
metadata:
  name: SampleFormPdf
code: |
  async function main() {
    const b64 = "";
    return { data: new Uint8Array(Buffer.from(b64, "base64")) };
  }
