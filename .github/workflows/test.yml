name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Static & release checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.2

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changeset status
        if: github.event_name == 'pull_request'
        run: pnpm changeset status --since=origin/${{ github.base_ref }}

      - name: Disallow major version bumps in changesets
        if: github.event_name == 'pull_request'
        run: |
          failed=0
          for f in .changeset/*.md; do
            [ -f "$f" ] || continue
            [ "$(basename "$f")" = "README.md" ] && continue
            if awk '/^---$/{c++; next} c==1' "$f" | grep -Eq "^['\"]?[^'\":]+['\"]?:[[:space:]]*major[[:space:]]*$"; then
              echo "::error file=$f::Major version bumps are not allowed in changesets."
              failed=1
            fi
          done
          exit $failed

      - name: Disallow major version bumps in changie fragments
        if: github.event_name == 'pull_request'
        run: node scripts/check-no-major-module-bump.mjs

      - name: Check changie config is in sync with modules
        run: |
          node scripts/gen-changie-config.mjs
          if [ -n "$(git status --porcelain .changie.yaml .changes)" ]; then
            echo "::error::.changie.yaml / .changes is out of date. Run 'node scripts/gen-changie-config.mjs' and commit the result."
            git status --porcelain .changie.yaml .changes
            git --no-pager diff -- .changie.yaml
            exit 1
          fi

      - name: Check module manifests
        run: pnpm run check modules/*/telo.yaml

      - name: Check example manifests
        run: pnpm run check examples/*.yaml

  bun:
    name: Run telo manifest tests (Bun)
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.2

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (bun)
        run: pnpm test

  unit:
    name: Run package unit tests
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.2

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The kernel's napi-loader test and several module tests run a real
      # `cargo build` of fixture crates. Persist the Rust target/ across runs
      # so cold builds don't dominate (and don't flake the 5s-ish tests).
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      # Package unit tests resolve sibling workspace packages to their built
      # dist/, so the build must run before vitest.
      - name: Build for Node.js
        run: pnpm -r run build

      - name: Run package unit tests
        run: pnpm -r test

  node:
    name: Run telo manifest tests (Node)
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.2

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Node.js
        run: pnpm -r run build

      - name: Run tests (node)
        run: pnpm run test:node

      # Smoke-test loading a manifest from an HTTP URL using the branch's
      # just-built CLI. Pulls the example over raw.githubusercontent.com at
      # the workflow's commit SHA, so the test exercises the https-anchored
      # install root path (~/.cache/telo/...) end-to-end. The manifest itself
      # imports `std/run` and `std/console` from the live registry, so this
      # also verifies the registry round-trip on top of HTTP-rooted
      # controller installs.
      - name: Run remote manifest over raw.githubusercontent.com
        run: |
          set -euo pipefail
          URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/examples/hello-world.yaml"
          # raw.githubusercontent.com's CDN lags behind the pushed commit, so
          # the SHA-pinned URL 404s for a short while. Poll until it serves.
          for attempt in $(seq 1 30); do
            if curl -fsSL "$URL" >/dev/null 2>&1; then
              break
            fi
            echo "URL not available yet (attempt $attempt), sleeping 10s..."
            sleep 10
          done
          set +e
          output=$(pnpm run telo "$URL" 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ "$status" -ne 0 ]; then
            echo "telo exited with status $status"
            exit "$status"
          fi
          echo "$output" | grep -q "Hello from Telo!"

  docker:
    name: Run telo manifest tests (Docker)
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.2

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Test setup (not a runtime-image concern): build only the module
      # controllers and their compile deps so the mounted suite's local_path
      # controllers resolve to built dist/. The image stays a pure runtime.
      - name: Build module controllers
        run: pnpm --filter "{./modules/**}..." run build

      - name: Build docker image
        run: docker build -f cli/nodejs/Dockerfile -t telo:ci .

      - name: Run tests (docker image)
        run: docker run --rm -v "$PWD":/workspace -v /workspace/.telo -w /workspace telo:ci ./test-suite.yaml
