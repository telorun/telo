kind: Telo.Library
metadata:
  name: provider-template-lib
  version: 1.0.0
imports:
  Run: ../../../../../../modules/run
---
kind: Telo.Definition
metadata:
  name: TokenProvider
capability: Telo.Provider
schema:
  type: object
  required: [ secret ]
  additionalProperties: true
  properties:
    secret: { type: string }
resources:
  - kind: Run.Value
    metadata:
      name: !cel "self.name + '-source'"
    value:
      raw: !cel "self.secret"
provide:
  kind: Run.Value
  name: !cel "self.name + '-source'"
result:
  token: !cel "'bearer ' + result.raw"
