kind: Telo.Application
metadata:
  name: WorkflowTemporalExample
  version: 1.0.0
  description: |
    Two-step durable workflow (fetch → transform) executed on a Temporal
    backend. Shows how `Workflow.Graph` declares activity nodes that
    dispatch to ordinary `JS.Script` resources, with per-node timeout and
    retry policy.

    Requires a running Temporal server at `localhost:7233`. The quickest
    way to bring one up locally is:
        docker run --rm -p 7233:7233 -p 8233:8233 \
          temporalio/auto-setup:latest
    Then run this manifest. The Temporal Web UI is available at
    http://localhost:8233 to inspect the workflow execution.
imports:
  Type: ../modules/type
  Workflow: ../modules/workflow
  Temporal: ../modules/workflow-temporal
  JS: ../modules/javascript
targets:
  - DataSyncWorkflow
---
kind: Temporal.Backend
metadata:
  name: TemporalProd
address: localhost:7233
namespace: default
---
kind: JS.Script
metadata:
  name: FetchData
code: |
  async function main({ url }) {
    const res = await fetch(url);
    return { data: await res.json() };
  }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      url: { type: string }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      data: { type: object }
---
kind: JS.Script
metadata:
  name: TransformData
code: |
  function main({ data }) {
    return { result: data.items.map(i => i.id) };
  }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      data: { type: object }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      result: { type: array }
---
kind: Workflow.Graph
metadata:
  name: DataSyncWorkflow
backend:
  kind: Temporal.Backend
  name: TemporalProd
nodes:
  - name: Fetch
    invoke:
      kind: JS.Script
      name: FetchData
    options:
      scheduleToCloseTimeout: 30s
      retryPolicy:
        maxAttempts: 3
  - name: Transform
    invoke:
      kind: JS.Script
      name: TransformData
    options:
      scheduleToCloseTimeout: 10s
