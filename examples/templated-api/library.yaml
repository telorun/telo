kind: Telo.Library
metadata:
  name: templated-server
  version: 1.0.0
  description: |
    Reusable Telo.Library that defines a single `HelloApi` (`Http.Api`) plus
    the `SayHello` handler it dispatches to. Importers receive `HelloApi`
    under their chosen alias and can mount it on any `Http.Server`. Paired
    with `telo.yaml`, which mounts the same library twice
    under `/v1` and `/v2` to show import + mount reuse.
imports:
  Http: std/http-server@0.15.1
  Run: std/run@0.11.1
exports:
  resources:
    - HelloApi
---
kind: Http.Api
metadata:
  name: HelloApi
routes:
  - request:
      path: /hello
      method: GET
      schema:
        query:
          type: object
          properties:
            name:
              type: string
          required: [ "name" ]
    handler: !ref SayHello
    inputs:
      name: "${{ request.query.name }}" # CEL expression
    returns:
      - status: 200
        content:
          application/json:
            schema:
              type: object
              properties:
                greeting: { type: string }
                nice: { type: string }
              required: [ greeting, nice ]
              additionalProperties: false
            body:
              greeting: "${{ result.message }}!"
              nice: "WOW"
---
kind: Run.Value
metadata:
  name: SayHello
inputs:
  name: { type: string }
value:
  message: !cel "'Hello ' + inputs.name + '!'"
---
