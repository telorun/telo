kind: Telo.Application
metadata:
  name: CanImportModuleWithAlias
  version: 1.0.0
targets:
  - VerifyTinyModuleContext
---
kind: Telo.Import
metadata:
  name: MyTiny
source: ./__fixtures__/tiny-module.yaml
variables:
  product:
    id: "123e4567-e89b-12d3-a456-426614174000"
    name: "Test Product"
    price: 19.99
    inStock: true
secrets:
  password: "supersecret"
---
kind: Telo.Import
metadata:
  name: MyAssert
source: ../modules/assert
---
kind: MyAssert.ModuleContext
metadata:
  name: VerifyTinyModuleContext
resources:
  MyTiny:
    variables:
      product:
        id: "123e4567-e89b-12d3-a456-426614174000"
        name: "Test Product"
        price: 19.99
        inStock: true
    secrets:
      password: "supersecret"
