kind: Telo.Application
metadata:
  name: ConsoleInputExample
  version: 1.0.0
  description: |
    Reads two lines from stdin (username, password) and echoes them back
    via Console.WriteLine. Demonstrates Console.ReadLine inside a
    Run.Sequence and how each step's result.value is wired into the next
    step's inputs via a steps.<step>.result.value CEL expression.
targets:
  - ConsoleInputFlow
---
kind: Telo.Import
metadata:
  name: Console
source: ../modules/console
---
kind: Telo.Import
metadata:
  name: Run
source: ../modules/run
---
kind: Run.Sequence
metadata:
  name: ConsoleInputFlow
steps:
  - name: ReadUsername
    invoke:
      kind: Console.ReadLine
      metadata:
        name: ReadUsername
    inputs:
      prompt: "Username: "
  - name: ReadPassword
    invoke:
      kind: Console.ReadLine
      metadata:
        name: ReadPassword
    inputs:
      prompt: "Password: "
  - name: WriteResult
    invoke:
      kind: Console.WriteLine
      metadata:
        name: Result
    inputs:
      output: "Username: ${{ steps.ReadUsername.result.value }}, Password: ${{ steps.ReadPassword.result.value }}"
