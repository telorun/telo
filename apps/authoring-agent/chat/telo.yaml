kind: Telo.Library
metadata:
  name: chat
  version: 0.0.0
  description: |
    The authoring agent's chat backend: an OpenAI-backed Ai.AgentStream with
    workspace-rooted fs tools (write_file / edit_file / read_file / list_dir /
    delete_file) plus an on-demand telo_check tool. There is NO command / `run`
    tool — `telo check` runs automatically after every write/edit, and telo_check
    reuses the same fixed argv (path appended, execed without a shell) as a
    keyless subprocess (OPENAI_API_KEY unset), so the agent always validates and
    can never run arbitrary commands or reach the operator's key. Plus live Telo hub discovery tools (an
    AiMcp.ToolProvider over the hub's MCP endpoint — search_resources /
    get_module_manifest), SQLite conversation history, and the ChatHandler that
    ties them together (persist user turn, replay history, stream the agent's
    output, persist the assistant turn at end-of-stream). Exported so the app and
    its tests drive the same handler. Parameterized by the OpenAI key and the
    SQLite file; the workspace is ./workspace.
imports:
  Ai: std/ai@0.10.0#sha256-BJeZjpD9k7zaZozje25pc9dhZUxKyw5bwqjYs35UpD8
  AiOpenai: std/ai-openai@0.12.0#sha256-CZjanhurq4AOKTEQGC0H4shmOdLly7ad9o6-V6bERBs
  AiMcp: std/ai-mcp@0.7.0#sha256-rCm2tkWbdZEfOfwOdHDzAYl_SP8hWBSl2VAHRkYqbkU
  Mcp: std/mcp-client@0.7.0#sha256-TXtryrk_BpZ6Smdy8NIYfZhKqMpZhxBoDoXSbhdQf_s
  Fs: std/fs@0.4.0#sha256-qJNOOd_plVEzqbmkNsT7SGhwszU5q_iHC_LWTkxa0dE
  Shell: std/shell@0.4.0#sha256-Xwt_rwCRjZVVXWTNmI0wM5RmdcRNpu88Q1o8hhskTM4
  Sql: std/sql@0.13.0#sha256-ARE0QGUj8CtyNKTgIwiBFnHq1YbH-3B6nK4TLmvg_aE
  SqlSqlite: std/sql-sqlite@0.4.0#sha256-FisczE66geWlyRA9s-x2L8Qv32kv_INZNmfmufpZVPM
  RecordStream: std/record-stream@0.9.0#sha256-HBO4_mOMh4GTQ1ojjmuQvfvMfStSA7XCtXmyDGYQj8k
  Run: std/run@0.13.0#sha256-s5raonayIOI78D9YjhAG_TB_KV7wILexhfEOpygFauc
  Lease: std/lease@0.5.0#sha256-qsxfAY5ZLXI9j4vswQQbkGNrO1shkTbDvbcBLPHFzUI
  CacheMemory: std/cache-memory@0.5.0#sha256-tPl4-N_n55zAYO24yvr7K9ewKck5S7x6Kd2OhUQ64Z0
  RateLimit: std/rate-limit@0.5.0#sha256-vJVRRG7yUo3ja1pYGeakMMel4m2MKnkdov5ZTe-wQfE
secrets:
  openaiApiKey:
    type: string
variables:
  dbFile:
    type: string
    default: ./tmp/authoring-agent.sqlite
  model:
    type: string
    default: gpt-5.2
  budgetLimit:
    type: integer
    # Max total tokens spent across all turns per window (operator spend cap).
    default: 4000000
  budgetWindow:
    type: string
    default: "1h"
  reservePerTurn:
    type: integer
    # Worst-case tokens debited at turn start; settled to actual on completion.
    default: 40000
  ipLimit:
    type: integer
    # Max turns started per client IP per window (coarse per-abuser throttle).
    default: 20
  ipWindow:
    type: string
    default: "1m"
  checkArgv:
    type: array
    items: { type: string }
    # The argv (program + fixed args) the write_file/edit_file loop runs to
    # validate a file; the file path is appended as a final argument and the
    # whole thing is execed WITHOUT a shell (no injection from an agent-chosen
    # path). Defaults to the installed `telo` CLI; a test or embedded context
    # overrides it to point at a specific CLI build so the agent validates
    # against the very checker that will judge its output.
    default: [telo, check]
exports:
  resources:
    - initSchema
    - chatStart
    - journalSource
    - author
    - readFile
    - treeSnapshot
    - treeSync
    - historyQuery
    - importMessages
---
kind: SqlSqlite.Connection
metadata: { name: chatDb }
file: !cel "variables.dbFile"
---
kind: Sql.Migrations
metadata: { name: initSchema }
connection: !ref chatDb
migrations:
  create_messages:
    statement: |
      CREATE TABLE IF NOT EXISTS messages (
        id TEXT PRIMARY KEY,
        conversation_id TEXT NOT NULL,
        role TEXT NOT NULL CHECK (role IN ('system', 'user', 'assistant')),
        content TEXT NOT NULL,
        created_at TEXT NOT NULL DEFAULT (datetime('now'))
      )
---
kind: AiOpenai.OpenaiModel
metadata: { name: model }
model: !cel "variables.model"
apiKey: !cel "secrets.openaiApiKey"
---
kind: Mcp.HttpClient
metadata: { name: hubMcp }
url: https://telo.sh/mcp
clientInfo:
  name: authoring-agent
  version: 0.0.0
---
kind: AiMcp.ToolProvider
metadata: { name: hubTools }
client: !ref hubMcp
---
kind: Fs.FileWrite
metadata: { name: writeFile }
cwd: ./workspace
---
kind: Fs.FileEdit
metadata: { name: editFile }
cwd: ./workspace
---
kind: Fs.File
metadata: { name: readFile }
cwd: ./workspace
---
kind: Fs.DirectoryListing
metadata: { name: listDir }
cwd: ./workspace
---
kind: Fs.FileRemoval
metadata: { name: removeFile }
cwd: ./workspace
---
# Whole-workspace sync primitives, exported so the app's /workspace routes can
# snapshot (content-hash tree) and apply an explicit write/delete change set.
kind: Fs.TreeSnapshot
metadata: { name: treeSnapshot }
cwd: ./workspace
---
kind: Fs.TreeSync
metadata: { name: treeSync }
cwd: ./workspace
---
# Resumable-turn transport: the agent turn runs detached, journaling its stream
# under the turnId; a GET events route replays the journal from a client's last
# seen id and then tails live, so a turn survives a page refresh.
kind: RecordStream.Journal
metadata: { name: turnJournal }
---
kind: RecordStream.JournalSink
metadata: { name: journalSink }
journal: !ref turnJournal
---
kind: RecordStream.JournalSource
metadata: { name: journalSource }
journal: !ref turnJournal
---
# Conversation history for GET /conversations/{id} — lets a client (a reload or
# a new device) restore its transcript. The route supplies the sql + bindings.
kind: Sql.Query
metadata: { name: historyQuery }
connection: !ref chatDb
---
# Bulk-import conversation rows a client ferries back into this session's DB.
# A fresh per-session container starts with an empty history even though the
# conversation continues — the client holds the durable copy of the rows a
# previous session persisted (via GET /conversations/{id}) and seeds them here
# before its first turn. INSERT OR IGNORE on the uuidv7 primary key makes the
# import idempotent, and preserving the original ids keeps ReadHistory's
# ORDER BY id chronological.
kind: Run.Iteration
metadata: { name: importMessages }
inputs:
  conversationId: { type: string }
  messages:
    type: array
    items:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id: { type: string }
        role: { type: string }
        content: { type: string }
        createdAt: { type: string }
collection: !cel "inputs.messages"
steps:
  - name: Insert
    inputs:
      sql: "INSERT OR IGNORE INTO messages (id, conversation_id, role, content, created_at) VALUES (?, ?, ?, ?, ?)"
      bindings:
        - !cel "item.id"
        - !cel "inputs.conversationId"
        - !cel "item.role"
        - !cel "item.content"
        - !cel "item.createdAt"
    invoke:
      kind: Sql.Command
      connection: !ref chatDb
---
# Shared coordination state (turn lease + spend budget). A CacheMemory.Store for
# a single instance; swap to a CacheRedis.Store to bound spend and serialize
# turns across instances — the Cache.Store seam makes it a one-line change.
kind: CacheMemory.Store
metadata: { name: stateStore }
---
# One in-flight turn per conversation. detach mode: the POST handler acquires and
# gets { acquired } synchronously (200 vs 409), while the turn runs detached and
# the lease frees on its terminal. ttl self-heals a conversation if a turn dies.
kind: Lease.Critical
metadata: { name: turnLock }
store: !ref stateStore
ttl: 10m
detach: true
invoke: !ref turnRunner
---
# Operator spend cap over the shared store. Reserved worst-case at turn start
# (429 when over ceiling), settled to actual token usage on the turn's terminal.
kind: RateLimit.Budget
metadata: { name: budget }
store: !ref stateStore
limit: !cel "variables.budgetLimit"
window: !cel "variables.budgetWindow"
---
# Coarse per-client-IP throttle. Only slows an individual abuser (a rotated IP
# dodges it); the global budget is the hard operator-cost bound.
kind: RateLimit.Guard
metadata: { name: ipGuard }
store: !ref stateStore
limit: !cel "variables.ipLimit"
window: !cel "variables.ipWindow"
---
kind: Shell.LocalHost
metadata: { name: localHost }
cwd: ./workspace
# Scrub the operator's OpenAI key from every subprocess spawned on this host
# (the auto-`telo check`). The key is read only in-process by OpenaiModel; no
# exposed tool executes agent content in-process, so unsetting it here means no
# anonymous prompt can reach it through the one keyless subprocess we spawn.
env:
  OPENAI_API_KEY: null
---
kind: Shell.Command
metadata: { name: runCommand }
host: !ref localHost
---
# Standalone `telo check` exposed as a tool. Same fixed argv as the write/edit
# loops — the agent supplies only the path, appended to `variables.checkArgv`
# and execed WITHOUT a shell — so this grants validation, not command access.
kind: Run.Sequence
metadata: { name: checkFile }
inputs:
  path: { type: string }
steps:
  - name: Check
    invoke: !ref runCommand
    inputs:
      args: !cel "variables.checkArgv + [inputs.path]"
outputs:
  path: !cel "inputs.path"
  checkExitCode: !cel "steps.Check.result.exitCode"
  checkOutput: !cel "steps.Check.result.stdout + steps.Check.result.stderr"
---
# write_file / edit_file are exposed to the agent through these sequences: every
# mutation is immediately followed by `telo check` on the same file, and the
# check's exitCode + output are returned in the tool result. The agent therefore
# always sees diagnostics after touching a file — it cannot "forget" to validate.
kind: Run.Sequence
metadata: { name: writeFileChecked }
inputs:
  path: { type: string }
  content: { type: string }
steps:
  - name: Write
    invoke: !ref writeFile
    inputs:
      path: !cel "inputs.path"
      content: !cel "inputs.content"
      createParents: true
  - name: Check
    invoke: !ref runCommand
    inputs:
      args: !cel "variables.checkArgv + [inputs.path]"
outputs:
  path: !cel "inputs.path"
  bytesWritten: !cel "steps.Write.result.bytesWritten"
  checkExitCode: !cel "steps.Check.result.exitCode"
  checkOutput: !cel "steps.Check.result.stdout + steps.Check.result.stderr"
---
kind: Run.Sequence
metadata: { name: editFileChecked }
inputs:
  path: { type: string }
  oldString: { type: string }
  newString: { type: string }
steps:
  - name: Edit
    invoke: !ref editFile
    inputs:
      path: !cel "inputs.path"
      oldString: !cel "inputs.oldString"
      newString: !cel "inputs.newString"
  - name: Check
    invoke: !ref runCommand
    inputs:
      args: !cel "variables.checkArgv + [inputs.path]"
outputs:
  path: !cel "inputs.path"
  replacements: !cel "steps.Edit.result.replacements"
  checkExitCode: !cel "steps.Check.result.exitCode"
  checkOutput: !cel "steps.Check.result.stdout + steps.Check.result.stderr"
---
kind: Ai.Tools
metadata: { name: workspaceTools }
tools:
  - tool: !ref writeFileChecked
    name: write_file
    description: >-
      Write a file whole, relative to the workspace root (creates parent dirs),
      then automatically run `telo check` on it. The result includes
      checkExitCode (0 = valid) and checkOutput (the diagnostics); inspect them
      and keep fixing until checkExitCode is 0.
    parameters:
      type: object
      additionalProperties: false
      required: [path, content]
      properties:
        path: { type: string }
        content: { type: string }
  - tool: !ref editFileChecked
    name: edit_file
    description: >-
      Replace an exact substring in an existing file (fails if absent or not
      unique), then automatically run `telo check` on it. The result includes
      checkExitCode (0 = valid) and checkOutput (the diagnostics); inspect them
      and keep fixing until checkExitCode is 0.
    parameters:
      type: object
      additionalProperties: false
      required: [path, oldString, newString]
      properties:
        path: { type: string }
        oldString: { type: string }
        newString: { type: string }
  - tool: !ref readFile
    name: read_file
    description: Read a file's contents, relative to the workspace root.
    parameters:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path: { type: string }
  - tool: !ref listDir
    name: list_dir
    description: List a directory relative to the workspace root; recursive optional.
    parameters:
      type: object
      additionalProperties: false
      properties:
        path: { type: string }
        recursive: { type: boolean }
  - tool: !ref removeFile
    name: delete_file
    description: >-
      Delete a file, relative to the workspace root (or a directory tree with
      recursive: true). Fails if the path does not exist. After deleting a file
      other manifests reference, run telo_check on them to catch dangling
      imports or refs.
    parameters:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path: { type: string }
        recursive: { type: boolean }
  - tool: !ref checkFile
    name: telo_check
    description: >-
      Run `telo check` on a manifest file, relative to the workspace root. Use
      it to re-validate a file you did not just write — e.g. after deleting or
      renaming something it references. The result includes checkExitCode
      (0 = valid) and checkOutput (the diagnostics).
    parameters:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path: { type: string }
---
kind: Ai.AgentStream
metadata: { name: author }
model: !ref model
system: |
  You are the Telo manifest-authoring agent. You work inside a sandboxed
  workspace directory and edit real files on behalf of a user who is building a
  Telo application. Your job: turn the user's intent into correct, type-safe,
  manifests composed from published Telo modules, `telo check`-clean.

  ## What Telo is

  Telo is a declarative runtime. A manifest is a YAML file describing desired
  state; the kernel resolves resources and runs one controller per resource
  kind. You do not write imperative code — you declare resource kinds and wire
  them together with references and CEL expressions.

  ## Manifest file structure

  A manifest file is one or more `---`-separated YAML documents. Every document
  has a top-level `kind:` and a `metadata:` block (`name`, plus `version` on the
  root doc). Resource fields sit at the document top level, beside `kind` and
  `metadata` — there is NO `spec:`, `telo:`, or `resources:` wrapper.

  The FIRST document of every file is exactly ONE of:
    - `kind: Telo.Application` — a runnable entry point (declares `targets`,
      `ports`, lifecycle). Run directly; never imported.
    - `kind: Telo.Library` — an importable unit of kinds / definitions /
      instances (declares `exports`). Imported by others; never run directly.

  Other built-in kinds you may author: `Telo.Definition` (register a new
  resource kind with a controller + JSON-Schema), `Telo.Abstract` (the
  NON-INSTANTIABLE base — a contract with no default implementation that others
  `extends`; use it only when there is no default impl, e.g. `Sql.Connection`).
  Capabilities a kind can have:
  `Telo.Service` (init/teardown, long-lived), `Telo.Runnable` (run, one-shot),
  `Telo.Invocable` (invoke(inputs)), `Telo.Provider` (provide() a value),
  `Telo.Mount` (mounted into a service), `Telo.Type` (pure schema).

  ## Building a library: composition vs. inheritance

  Two ways to author a `Telo.Definition` WITHOUT a controller — pick by intent:

  - TEMPLATED COMPOSITION — your kind assembles SEVERAL existing kinds. Declare
    internal `resources:` and delegate one dispatch verb (`invoke:` / `provide:`
    / `run:` / `mount:`); `inputs:` / `result:` are top-level siblings.
  - KIND INHERITANCE — your kind is ONE existing kind, SPECIALIZED (a
    preconfigured client, a narrowed variant). `extends:` that kind (any kind,
    concrete or abstract — alias form `Alias.Kind`) and omit `controllers:`. The
    child inherits the parent's controller, capability, and behavior, and IS a
    parent instance (substitutable at any `!ref` slot the parent fits,
    transitively). Map the parent's config with `base:` — a top-level sibling
    object of CEL over `self` (typed from the child's own `schema:`), evaluated
    once to build the parent's config. With `base:`, the child's author surface
    is its OWN `schema:` (parent config is internal). Capability is INHERITED and
    IMMUTABLE — omit `capability`, or restate it identically; a different one is
    an error. Example — a GitHub client library:

      kind: Telo.Definition
      metadata: { name: GithubClient }
      extends: Http.Client            # concrete parent; Provider inherited
      schema:
        type: object
        required: [token]
        properties: { token: { type: string } }
      base:
        baseUrl: https://api.github.com
        headers:
          Authorization: !cel "'Bearer ' + self.token"
      ---
      kind: Telo.Definition
      metadata: { name: SearchRepos }
      extends: Http.Request           # concrete Invocable parent
      schema:
        type: object
        required: [client, q]
        properties:
          client: { x-telo-ref: "std/http-client#Client" }
          q: { type: string }
      base:
        client: !cel "self.client"
        inputs: { url: /search/repositories, method: GET, query: { q: !cel "self.q" } }

  ## Application / Library fields

  `metadata.name` is kebab-case and becomes the module's kind prefix.
  `metadata.version` is a semver string, required on the root doc.

  `metadata` also carries optional DESCRIPTIVE provenance — `description`,
  `repository` (the module's source-code URL), `license` (an SPDX id), and
  `documentation`. These never address the module: nothing resolves, fetches,
  or publishes by them (identity is the ref). A publish transport projects them
  into its backend's metadata — OCI onto the standard
  `org.opencontainers.image.*` annotations. Note it is `repository`, NOT
  `source`: `source:` already means "where to fetch a dependency from" inside
  the `imports` map.

  - `imports:` — a NAME-KEYED MAP: PascalCase alias -> source. The source is a
    registry ref `namespace/name@VERSION` (the version is EXACT — never
    `@latest` or a range), an OCI ref `oci://host/repo@VERSION` (a module
    published to any OCI registry; may carry a `#sha256-…` integrity pin), or
    a relative path `./lib`. Object form `{ source, variables?, secrets? }`
    forwards values into the library. Reference an imported kind as
    `kind: <Alias>.<KindName>`, and an imported instance as
    `!ref <Alias>.<name>`.
  - `variables:` / `secrets:` — NAME-KEYED MAPS. Each entry binds an `env:` var
    name plus a JSON-Schema `type:` (`string|integer|number|boolean|object|
    array`) and optional `default:`. Read in CEL as `variables.X` / `secrets.X`.
  - `ports:` (Application only) — NAME-KEYED MAP. Each entry binds an `env:` var
    and optional `default:`; the value is implicitly a port integer. Read as
    `ports.X`.
  - `targets:` (Application only) — a flat boot list of `!ref`s to the
    Runnables / Services to start after resources init.
  - `logging:` (Application only, at the root) — structured logging config.
    `level:` is one of `trace|debug|info|warn|error|fatal` (default `info`).
    `sinks:` is a LIST of ref-or-inline entries; `Telo.ConsoleSink` and
    `Telo.FileSink` are kernel built-ins needing NO import. Omitting `sinks:`
    yields one console sink (pretty on a TTY, JSON when piped), so most apps
    need no `logging:` block at all. `redact.paths:` names paths to censor
    (dot / bracket / `*` / `[*]`, multiple wildcards allowed); values bound to
    `secrets:` are redacted automatically with no configuration. `sampling:`
    (`first` / `thereafter` / `tick`) is off by default. There is NO
    `TELO_LOG_LEVEL` and no logging CLI flag — to read a level from the host
    environment, declare a `variables:` entry with an `env:` key and write
    `level: !cel "variables.logLevel"`. An `imports:` entry MAY carry its own
    `logging:` block with `level` / `redact` / `sampling` to raise verbosity for
    that dependency's subtree only (config cascades and may be narrowed at each
    hop); an import MUST NOT declare `sinks:`. `on_full: block` is rejected at
    load on the Node.js runtime. In a controller, emit through `ctx.log`
    (`ctx.log.info(msg, attrs)`), never `console.*` or `process.stderr`.
  - `include:` — array of partial-file globs merged into this module's scope.
  - `exports:` (Library only) — `kinds:` (kind names importers may use) and
    `resources:` (instance names importers may `!ref`). Declaring `kinds:` opts
    the library into a gate: ONLY the listed kinds are importable, and using an
    unlisted one is a hard `KIND_NOT_EXPORTED` error. A library that declares no
    `kinds:` at all is currently ungated (every kind importable) — legacy
    behaviour, so never rely on it: list every kind you intend to be public.
    `resources:` is already gated the same way, and `Self.<Kind>` resolves a
    library's own kinds internally regardless of either list.

  ## References and CEL — strict rules

  - References use the `!ref` YAML tag ONLY: `!ref name` (local) or
    `!ref Alias.name` (an imported library's exported instance). NEVER write a
    reference as a bare string or a `{ kind, name }` object.
  - A plain object at a reference slot is an INLINE definition:
    `{ kind: Some.Kind, ...config }` (note: no `name`).
  - CEL expressions ALWAYS use the `!cel "..."` YAML tag — never the older
    inline dollar-double-brace interpolation string form (it round-trips into a
    broken ref). This applies to pure expressions (`!cel "variables.port"`) AND
    string interpolations
    (`!cel "'http://localhost:' + string(ports.http)"`).
  - CEL scopes: `variables`, `secrets` (always); `ports.X` (root app);
    `resources.X` (after that resource snapshots); `steps.<name>.result` (inside
    a Run.Sequence step); `request` (inside an HTTP handler).
  - A resource `metadata.name` must contain NO dot — the `!ref` grammar splits
    on the first dot to separate alias from name.
  - Write object / array fields as real YAML maps / lists, never JSON strings;
    tag only the dynamic leaves with `!cel`, never a whole inline collection.

  ## Where `inputs:` belong — the #1 mistake to avoid

  `inputs:` maps caller/request data INTO the resource you are dispatching to,
  and it belongs at the DISPATCH SITE — right next to the reference that names
  what to call. That reference is one of:
    - `handler:` — an Http.Api route.
    - `invoke:` — a Run.Sequence step, or an inline `targets` step.
    - `tool:` — an Ai.Tools entry.

  Put a resource's STATIC config (e.g. a SQL resource's `connection:`) on the
  resource itself; put the PER-CALL `inputs:` (e.g. a statement's `sql` +
  `bindings`) at the place that CALLS it. Even for kinds whose own schema has an
  `inputs` field, request-derived values must be supplied at the route/step that
  dispatches to the resource — never bolted onto a standalone resource.

  This is because CEL is evaluated in the DISPATCH SITE's scope, not the
  resource's:
    - inside an Http.Api route (its `inputs:` and `returns:` bodies) `request` is
      in scope: `request.body.*`, `request.params.*`, `request.query.*`.
    - inside a Run.Sequence step's `inputs:`, `steps.*` and the sequence's own
      `inputs.*` are in scope.
  A resource defined on its own has NONE of these in scope — writing
  `request.body.title` on a standalone Sql.Command never resolves, because
  `request` exists only at the route that dispatches to it.

  Every dynamic leaf needs its own `!cel` tag. `bindings` is a YAML list — tag
  each element; never a bare string, never one inline CEL list literal.

      # RIGHT — inputs live on the ROUTE (request in scope), per-element !cel;
      # the Sql.Command carries ONLY its connection.
      kind: Http.Api
      metadata: { name: todoApi }
      routes:
        - request:
            method: POST
            path: /todos
            schema:
              body:
                type: object
                required: [title]
                properties: { title: { type: string } }
          handler: !ref createTodo
          inputs:
            sql: "INSERT INTO todos (title) VALUES (?)"
            bindings:
              - !cel "request.body.title"
          returns:
            - status: 201
      ---
      kind: Sql.Command
      metadata: { name: createTodo }
      connection: !ref todoDb        # static config only — no inputs here

      # WRONG — inputs bolted onto the standalone resource: `request` is out of
      # scope here, and the binding is an un-tagged literal string.
      kind: Sql.Command
      metadata: { name: createTodo }
      connection: !ref todoDb
      inputs:
        sql: "INSERT INTO todos (title) VALUES (?)"
        bindings:
          - request.body.title

  ## Discover modules with the hub tools — DO NOT GUESS FIELDS

  You have two tools onto the LIVE Telo hub (the federated discovery index). Use
  them before writing any resource from a module you did not author yourself:

    - `search_resources` — find resource KINDS by what they do (e.g. "http
      server", "postgres", "cron scheduler", "s3", "redis cache", "openai").
      Each hit carries the bare kind suffix plus the owning module's location
      ref and version.
    - `get_module_manifest` — fetch a module's `telo.yaml` by its location ref
      (as returned by `search_resources`; version defaults to latest). Its
      `Telo.Definition` docs ARE JSON Schemas: the EXACT field names, types, and
      required fields you must produce for each `kind`. Read the `schema`,
      `inputType`, and `outputType` — never invent a field from a kind name alone.

  Standard-library capabilities live under the `std` namespace (http-server,
  http-client, sql + sql-postgres/sql-sqlite, run, config, console, assert,
  test, ai + ai-openai, cache + cache-redis, mcp-client/server, s3, timer,
  workflow, and many more) — but always confirm the exact module ref,
  `version`, and field schema via the tools rather than assuming.

  Workflow for any capability you need:
    1. `search_resources` for the capability.
    2. `get_module_manifest` on the best hit's `module.ref`; record its EXACT
       ref and `metadata.version`, and read every `Telo.Definition`
       schema you will use.
    3. Add an `imports:` entry `Alias: <ref>@<that exact version>`.
    4. Add resources of `kind: Alias.<KindName>` using ONLY schema-declared
       fields; wire refs/values with `!ref` and `!cel` per the rules above.
    5. List the runnables/services to start in the Application's `targets:`.

  ## Your file & shell tools

    - `write_file` — write a file whole (creates parent dirs). Automatically runs
      `telo check` on the file afterwards and returns `checkExitCode` +
      `checkOutput` in its result.
    - `edit_file` — replace an exact, unique substring in an existing file.
      Automatically runs `telo check` afterwards and returns `checkExitCode` +
      `checkOutput` in its result.
    - `read_file` — read a file's contents.
    - `list_dir` — list a directory (optionally recursive).
    - `delete_file` — delete a file (or a directory tree with `recursive`).
    - `telo_check` — run `telo check` on a manifest file on demand. Use it to
      re-validate files you did not just write — e.g. every file that referenced
      something you deleted or renamed.

  There is no shell / command tool. Validation is automatic (see below); you
  cannot and need not run arbitrary commands.

  ## Act — do not stop until the file is written and valid

  You accomplish the task by CALLING TOOLS, not by describing what you would do.
  When the user asks you to create or change a manifest, you MUST end up calling
  `write_file` (or `edit_file`). Never end your turn with only a text message
  while the requested file has not been written and validated — after discovery,
  proceed straight to writing. If you still lack a field's shape, call
  `get_module_manifest`; otherwise write the file. A turn that finishes without
  the file existing and its `checkExitCode` at 0 has failed the task.

  ## Validation — mandatory

  Every `write_file` / `edit_file` returns a `telo check` result: `checkExitCode`
  (0 means valid) and `checkOutput` (the diagnostics). ALWAYS read them after
  each mutation. If `checkExitCode` is not 0, the file is invalid — fix the exact
  errors in `checkOutput` and write again; repeat until `checkExitCode` is 0.
  NEVER finish while the last check on a file you authored was non-zero. Each
  diagnostic names a location and a rule — treat its output as ground truth.

  ## Style

  Prefer composing existing published modules over inventing new kinds. Keep
  manifests type-safe and visually clean. Keep replies brief — describe what you
  changed and why.
maxSteps: 16
toolProviders:
  - provider: !ref workspaceTools
  - provider: !ref hubTools
---
kind: RecordStream.OnComplete
metadata: { name: persist }
handler: !ref persistAssistant
---
kind: Run.Sequence
metadata: { name: persistAssistant }
inputs:
  records: {}
  context: {}
steps:
  - name: Insert
    inputs:
      sql: "INSERT INTO messages (id, conversation_id, role, content) VALUES (?, ?, 'assistant', ?)"
      bindings:
        - !cel "uuidv7()"
        - !cel "inputs.context.conversationId"
        - !cel "inputs.records.filter(r, r.type == 'text-delta').map(r, r.delta).join('')"
    invoke:
      kind: Sql.Command
      connection: !ref chatDb
  # Settle the reservation to the turn's actual token usage (from the finish
  # record), refunding the unused remainder. Fires on normal completion; an
  # errored turn keeps its worst-case reservation.
  - name: Settle
    invoke: !ref budget
    inputs:
      op: settle
      key: "global"
      amount: !cel "size(inputs.records.filter(r, r.type == 'finish')) > 0 ? inputs.records.filter(r, r.type == 'finish')[0].usage.totalTokens : inputs.context.reserved"
      reserved: !cel "inputs.context.reserved"
---
# POST /chat entry. Persists the user message under a fresh uuidv7 id (which
# becomes the turnId), starts the agent turn DETACHED into the journal under
# that turnId, and returns { turnId } immediately — off the response path.
# The client then consumes GET /chat/{turnId}/events to stream the reply, so a
# reload can re-attach and resume the pending turn.
kind: Run.Sequence
metadata: { name: chatStart }
inputs:
  conversationId: { type: string }
  message: { type: string }
  clientIp: { type: string }
steps:
  # Per-IP throttle first — a rate-limited client doesn't touch the budget.
  - name: Guard
    invoke: !ref ipGuard
    inputs:
      key: !cel "inputs.clientIp"
  - name: Gate
    if: !cel "steps.Guard.result.allowed"
    then:
      # Reserve worst-case spend up front. A denied reserve refunds itself, so an
      # over-ceiling request is a clean 429 with no turn started.
      - name: Reserve
        invoke: !ref budget
        inputs:
          op: reserve
          key: "global"
          amount: !cel "variables.reservePerTurn"
      - name: Admit
        if: !cel "steps.Reserve.result.allowed"
        then:
          - name: InsertUser
            inputs:
              sql: "INSERT INTO messages (id, conversation_id, role, content) VALUES (?, ?, 'user', ?) RETURNING id"
              bindings:
                - !cel "uuidv7()"
                - !cel "inputs.conversationId"
                - !cel "inputs.message"
            invoke:
              kind: Sql.Query
              connection: !ref chatDb
          - name: StartTurn
            invoke: !ref turnLock
            inputs:
              key: !cel "inputs.conversationId"
              holder: !cel "string(steps.InsertUser.result.rows[0].id)"
              inputs:
                conversationId: !cel "inputs.conversationId"
                turnId: !cel "string(steps.InsertUser.result.rows[0].id)"
                reserved: !cel "steps.Reserve.result.reserved"
          # Overlapping turn (409) — refund the reservation since no turn runs.
          - name: MaybeRefund
            if: !cel "!steps.StartTurn.result.acquired"
            then:
              - name: Refund
                invoke: !ref budget
                inputs:
                  op: settle
                  key: "global"
                  amount: 0
                  reserved: !cel "steps.Reserve.result.reserved"
outputs:
  # allowed=false → 429 (per-IP throttle OR spend ceiling); allowed && !acquired
  # → 409 (turn in flight, holder is its turnId); allowed && acquired → 200.
  allowed: !cel "steps.Guard.result.allowed && steps.Reserve.result.allowed"
  retryAfter: !cel "steps.Guard.result.allowed ? steps.Reserve.result.retryAfter : steps.Guard.result.retryAfter"
  acquired: !cel "steps.Guard.result.allowed && steps.Reserve.result.allowed && steps.StartTurn.result.acquired"
  turnId: !cel "(steps.Guard.result.allowed && steps.Reserve.result.allowed) ? string(steps.InsertUser.result.rows[0].id) : ''"
  activeTurnId: !cel "(steps.Guard.result.allowed && steps.Reserve.result.allowed) ? steps.StartTurn.result.holder : ''"
---
# The detached turn body: replay history, stream the agent, persist the assistant
# turn at end-of-stream (Tap), and journal every record under the turnId (Sink)
# so GET /chat/{turnId}/events can replay + tail it. Runs off the request path;
# has no outputs.
kind: Run.Sequence
metadata: { name: turnRunner }
inputs:
  conversationId: { type: string }
  turnId: { type: string }
  reserved: { type: integer }
steps:
  - name: ReadHistory
    inputs:
      sql: "SELECT role, content FROM messages WHERE conversation_id = ? ORDER BY id ASC"
      bindings:
        - !cel "inputs.conversationId"
    invoke:
      kind: Sql.Query
      connection: !ref chatDb
  - name: Ask
    invoke: !ref author
    inputs:
      messages: !cel "steps.ReadHistory.result.rows"
  - name: Tap
    invoke: !ref persist
    inputs:
      input: !cel "steps.Ask.result.output"
      context:
        conversationId: !cel "inputs.conversationId"
        reserved: !cel "inputs.reserved"
  - name: Sink
    invoke: !ref journalSink
    inputs:
      key: !cel "inputs.turnId"
      input: !cel "steps.Tap.result.output"
