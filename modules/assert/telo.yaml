kind: Telo.Library
metadata:
  name: assert
  namespace: std
  version: 1.5.1
  description: Assertion and value verification for testing
exports:
  kinds:
    - ModuleContext
    - Schema
    - Events
    - Manifest
    - Equals
    - Matches
    - Contains
---
kind: Telo.Definition
metadata:
  name: ModuleContext
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.5.1?local_path=./nodejs#module-context
schema:
  type: object
  properties:
    metadata:
      type: object
      properties:
        name:
          type: string
      required:
        - name
  required:
    - metadata
---
kind: Telo.Definition
metadata:
  name: Schema
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.5.1?local_path=./nodejs#schema
schema:
  type: object
  properties:
    metadata:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    schema:
      title: Schema
      description: Value to assert (can be any type or expression)
  required:
    - metadata
    - schema
---
kind: Telo.Definition
metadata:
  name: Events
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.5.1?local_path=./nodejs#events
schema:
  type: object
  properties:
    filter:
      title: Filter
      description: Event filters used before expectation checks.
      type: array
      items:
        type: object
        properties:
          type:
            title: Type
            description: Event type pattern to include.
            type: string
        required:
          - type
    expect:
      title: Expect
      type: array
      description: Ordered sequence of events to assert
      items:
        type: object
        properties:
          event:
            title: Event
            type: string
            description: Event name or wildcard pattern (e.g. "JavaScript.Script.*.Invoked")
          payload:
            title: Payload
            type: object
            description: Partial payload to match against (only declared fields are checked)
        required:
          - event
  required:
    - expect
---
kind: Telo.Definition
metadata:
  name: Manifest
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.5.1?local_path=./nodejs#manifest
schema:
  type: object
  properties:
    source:
      type: string
      description: Relative path to the manifest file to analyze
    expect:
      type: object
      properties:
        errors:
          type: array
          description: Expected analysis errors
          items:
            type: object
            properties:
              code:
                type: string
                description: Diagnostic code (e.g. CEL_UNKNOWN_FIELD)
              message:
                type: string
                description: Substring to match in the diagnostic message
        warnings:
          type: array
          description: Expected analysis warnings
          items:
            type: object
            properties:
              code:
                type: string
                description: Diagnostic code (e.g. CAPABILITY_SHADOWS_EXTENDS)
              message:
                type: string
                description: Substring to match in the diagnostic message
        loadError:
          type: string
          description: Substring to match in a manifest load error (asserts that loading fails)
  required: [source, expect]
---
# Deep-equality assertion. Compare via step inputs:
#   - name: Check
#     invoke: { kind: Assert.Equals }
#     inputs:
#       actual: "${{ steps.X.result.value }}"
#       expected: "hello"
# Replaces the verbose `Assert.Schema { properties: { x: { const: ... } } }`
# pattern for trivial value checks.
kind: Telo.Definition
metadata:
  name: Equals
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.5.1?local_path=./nodejs#equals
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      actual:
        title: Actual
        description: Value to check; typically a `${{ steps.X.result.y }}` reference.
      expected:
        title: Expected
        description: Value `actual` must deep-equal.
    required: [actual, expected]
schema:
  type: object
  additionalProperties: false
---
# Regex-match assertion for strings. Compare via step inputs:
#   - name: Check
#     invoke: { kind: Assert.Matches }
#     inputs:
#       actual: "${{ steps.X.result.text }}"
#       pattern: "^hello"
#       flags: i
# Replaces `Assert.Schema { properties: { x: { type: string, pattern: ... } } }`.
kind: Telo.Definition
metadata:
  name: Matches
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.5.1?local_path=./nodejs#matches
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      actual:
        title: Actual
        description: String to test against `pattern`.
        type: string
      pattern:
        title: Pattern
        description: JavaScript regular expression source (without delimiters).
        type: string
      flags:
        title: Flags
        description: Optional regex flags (`i`, `m`, `s`, `u`, …).
        type: string
    required: [actual, pattern]
schema:
  type: object
  additionalProperties: false
---
# Substring-or-membership assertion. When `actual` is a string, checks
# that it contains `value` as a substring. When `actual` is an array,
# checks that it contains `value` as an element (deep-equality). Compare
# via step inputs.
kind: Telo.Definition
metadata:
  name: Contains
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.5.1?local_path=./nodejs#contains
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      actual:
        title: Actual
        description: String (substring check) or array (membership check).
      value:
        title: Value
        description: Substring (when `actual` is string) or element (when `actual` is array).
    required: [actual, value]
schema:
  type: object
  additionalProperties: false
