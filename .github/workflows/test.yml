name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.2

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changeset status
        if: github.event_name == 'pull_request'
        run: pnpm changeset status --since=origin/${{ github.base_ref }}

      - name: Disallow major version bumps in changesets
        if: github.event_name == 'pull_request'
        run: |
          failed=0
          for f in .changeset/*.md; do
            [ -f "$f" ] || continue
            [ "$(basename "$f")" = "README.md" ] && continue
            if awk '/^---$/{c++; next} c==1' "$f" | grep -Eq "^['\"]?[^'\":]+['\"]?:[[:space:]]*major[[:space:]]*$"; then
              echo "::error file=$f::Major version bumps are not allowed in changesets."
              failed=1
            fi
          done
          exit $failed

      - name: Check module manifests
        run: pnpm run check modules/*/telo.yaml

      - name: Check example manifests
        run: pnpm run check examples/*.yaml

      - name: Run tests (bun)
        run: pnpm test

      - name: Build for Node.js
        run: pnpm -r run build

      - name: Run package unit tests
        run: pnpm -r test

      - name: Run tests (node)
        run: pnpm run test:node

      # Smoke-test loading a manifest from an HTTP URL using the branch's
      # just-built CLI. Serves the repo over a local HTTP server so the test
      # exercises the http(s)-anchored install root path (~/.cache/telo/...)
      # without depending on raw.githubusercontent.com propagation. The
      # manifest itself imports `std/run` and `std/console` from the live
      # registry, so this also verifies the registry round-trip on top of
      # HTTP-rooted controller installs.
      - name: Run remote manifest over local HTTP
        run: |
          set -euo pipefail
          python3 -m http.server 8123 --bind 127.0.0.1 --directory "$PWD" >/tmp/http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          # Wait for the server to be ready.
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8123/examples/hello-world.yaml" >/dev/null; then
              break
            fi
            sleep 0.5
          done
          output=$(pnpm run telo "http://127.0.0.1:8123/examples/hello-world.yaml" 2>&1)
          echo "$output"
          echo "$output" | grep -q "Hello from Telo!"

      - name: Build docker image
        run: docker build -f cli/nodejs/Dockerfile -t telo:ci .

      - name: Run tests (docker image)
        run: docker run --rm -v "$PWD":/workspace -v /workspace/.telo -w /workspace telo:ci ./test-suite.yaml
