kind: Telo.Application
metadata:
  name: EchoStreamContractTest
  version: 1.0.0
imports:
  Ai: ../
  AiEcho: ./__fixtures__/ai-echo.yaml
  Run: ../../run
  Assert: ../../assert
targets:
  - TestEchoStreamContract
---
kind: AiEcho.EchoModel
metadata: { name: Echo }
---
# AiEcho.StreamCollector (a test-support Invocable) takes the Echo model as an
# x-telo-ref so Phase 5 injection hands it the live instance. It then consumes
# echo.stream(...) and returns the collected StreamPart data we can assert on.
kind: AiEcho.StreamCollector
metadata: { name: Collector }
model:
  kind: AiEcho.EchoModel
  name: Echo
---
kind: Run.Sequence
metadata:
  name: TestEchoStreamContract
steps:
  - name: Collect
    inputs:
      prompt: "hi"
    invoke:
      kind: AiEcho.StreamCollector
      name: Collector
  - name: Assert
    inputs:
      deltas: "${{ steps.Collect.result.deltas }}"
      deltaCount: "${{ steps.Collect.result.deltaCount }}"
      finishReason: "${{ steps.Collect.result.finishReason }}"
      totalTokens: "${{ steps.Collect.result.usage.totalTokens }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          deltas: { const: "hi" }
          deltaCount: { const: 2 }
          finishReason: { const: stop }
          totalTokens: { const: 0 }
        required: [ deltas, deltaCount, finishReason, totalTokens ]
