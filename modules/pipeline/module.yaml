kind: Kernel.Module
metadata:
  name: pipeline
  namespace: std
  version: 0.2.0
  description: Orchestration framework using inline resource execution
---
kind: Kernel.Definition
metadata:
  name: Job
extends: Kernel.Runnable
controllers:
  - pkg:npm/@telorun/pipeline@>=1.1.0?local_path=./nodejs#job
schema:
  type: object
  properties:
    with:
      type: array
      description: Resources to create at pipeline start and teardown at pipeline end
      items:
        type: object
        properties:
          kind:
            type: string
            description: Resource kind (e.g., Http.Server, Database.Connect)
        required:
          - kind
    steps:
      type: array
      items:
        type: object
        properties:
          invoke:
            type: object
            properties:
              kind:
                type: string
                description: Resource kind (e.g., Logic.JavaScript, HttpClient.Request)
            required:
              - kind
  required:
    - steps
