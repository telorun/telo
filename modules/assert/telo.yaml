kind: Telo.Library
metadata:
  name: assert
  namespace: std
  version: 1.1.1
  description: Assertion and value verification for testing
exports:
  kinds:
    - ModuleContext
    - Schema
    - Events
    - Manifest
---
kind: Telo.Definition
metadata:
  name: ModuleContext
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.1.10?local_path=./nodejs#module-context
schema:
  type: object
  properties:
    metadata:
      type: object
      properties:
        name:
          type: string
      required:
        - name
  required:
    - metadata
---
kind: Telo.Definition
metadata:
  name: Schema
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.1.10?local_path=./nodejs#schema
schema:
  type: object
  properties:
    metadata:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    schema:
      title: Schema
      description: Value to assert (can be any type or expression)
  required:
    - metadata
    - schema
---
kind: Telo.Definition
metadata:
  name: Events
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.1.10?local_path=./nodejs#events
schema:
  type: object
  properties:
    filter:
      title: Filter
      description: Event filters used before expectation checks.
      type: array
      items:
        type: object
        properties:
          type:
            title: Type
            description: Event type pattern to include.
            type: string
        required:
          - type
    expect:
      title: Expect
      type: array
      description: Ordered sequence of events to assert
      items:
        type: object
        properties:
          event:
            title: Event
            type: string
            description: Event name or wildcard pattern (e.g. "JavaScript.Script.*.Invoked")
          payload:
            title: Payload
            type: object
            description: Partial payload to match against (only declared fields are checked)
        required:
          - event
  required:
    - expect
---
kind: Telo.Definition
metadata:
  name: Manifest
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/assert@0.1.10?local_path=./nodejs#manifest
schema:
  type: object
  properties:
    source:
      type: string
      description: Relative path to the manifest file to analyze
    expect:
      type: object
      properties:
        errors:
          type: array
          description: Expected analysis errors
          items:
            type: object
            properties:
              code:
                type: string
                description: Diagnostic code (e.g. CEL_UNKNOWN_FIELD)
              message:
                type: string
                description: Substring to match in the diagnostic message
        loadError:
          type: string
          description: Substring to match in a manifest load error (asserts that loading fails)
  required: [source, expect]
