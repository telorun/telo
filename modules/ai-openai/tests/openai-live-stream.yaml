kind: Telo.Application
metadata:
  name: OpenaiLiveStream
  version: 1.0.0
  description: |
    Live OpenAI streaming integration test. Skips silently when OPENAI_API_KEY
    is unset (locally: drop a .env.local in this directory; CI: secret on the
    workflow).
secrets:
  openaiApiKey: { env: OPENAI_API_KEY, type: string, default: "" }
imports:
  AiOpenai: ../
  AiEcho: ../../ai/tests/__fixtures__/ai-echo.yaml
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref LiveStream
---
# apiKey defaults to "" when OPENAI_API_KEY is unset so the resource passes
# schema validation. The model is constructed (just config — no API call until
# stream()), but never reached because the run-step is gated.
kind: AiOpenai.OpenaiModel
metadata: { name: Live }
model: gpt-4o-mini
apiKey: !cel "secrets.openaiApiKey"
options:
  temperature: 0
  maxTokens: 32
---
# Reuse the @telorun/ai test-support StreamCollector — feed it the live OpenaiModel,
# iterate stream(), and assert the contract shape (deltas concatenate to text,
# exactly one finish part, usage populated).
kind: AiEcho.StreamCollector
metadata: { name: Collector }
model: !ref Live
---
kind: Run.Sequence
metadata:
  name: LiveStream
steps:
  - name: GuardEnv
    if: !cel "secrets.openaiApiKey != ''"
    then:
      - name: Collect
        inputs:
          prompt: "Reply with exactly: hello"
        invoke: !ref Collector
      - name: Assert
        inputs:
          deltas: "${{ steps.Collect.result.deltas }}"
          deltaCount: "${{ steps.Collect.result.deltaCount }}"
          finishReason: "${{ steps.Collect.result.finishReason }}"
          promptTokens: "${{ steps.Collect.result.usage.promptTokens }}"
          completionTokens: "${{ steps.Collect.result.usage.completionTokens }}"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              deltas: { type: string, minLength: 1 }
              deltaCount: { type: integer, minimum: 1 }
              finishReason: { type: string, enum: [ stop, length, content-filter, error, other ] }
              promptTokens: { type: integer, minimum: 1 }
              completionTokens: { type: integer, minimum: 1 }
            required: [ deltas, deltaCount, finishReason, promptTokens, completionTokens ]
