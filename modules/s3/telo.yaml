kind: Kernel.Module
metadata:
  name: s3
  namespace: std
  version: 1.0.0
secrets:
  accessKeyId:
    type: string
    description: S3 access key ID
  secretAccessKey:
    type: string
    description: S3 secret access key
exports:
  kinds:
    - Bucket
    - List
    - Put
---
kind: Kernel.Definition
metadata:
  name: Bucket
capability: Kernel.Provider
controllers:
  - pkg:npm/@telorun/s3@1.0.3?local_path=./nodejs#s3-bucket
schema:
  type: object
  properties:
    bucketName:
      title: Bucket Name
      type: string
      description: Bucket name
    endpoint:
      title: Endpoint
      type: string
      description: S3-compatible endpoint URL (e.g. https://<accountId>.r2.cloudflarestorage.com)
    forcePathStyle:
      title: Force Path Style
      type: boolean
      description: Use path-style URLs (required for MinIO, RustFS, and other self-hosted S3)
  required:
    - bucketName
    - endpoint
---
kind: Kernel.Definition
metadata:
  name: List
capability: Kernel.Invocable
controllers:
  - pkg:npm/@telorun/s3@1.0.3?local_path=./nodejs#s3-list
schema:
  type: object
  properties:
    bucketRef:
      title: Bucket Reference
      type: object
      description: Reference to an S3.Bucket resource by name
      properties:
        name:
          title: Name
          description: Name of the referenced bucket resource.
          type: string
      required:
        - name
  required:
    - bucketRef
---
kind: Kernel.Definition
metadata:
  name: Put
capability: Kernel.Invocable
controllers:
  - pkg:npm/@telorun/s3@1.0.3?local_path=./nodejs#s3-put
schema:
  type: object
  properties:
    bucketRef:
      title: Bucket Reference
      type: object
      description: Reference to an S3.Bucket resource by name
      properties:
        name:
          title: Name
          description: Name of the referenced bucket resource.
          type: string
      required:
        - name
    inputs:
      title: Inputs
      description: Object key and content written to the bucket.
      type: object
      properties:
        key:
          title: Key
          description: Object key path inside the bucket.
          type: string
        body:
          title: Body
          description: Object content to upload.
          type: string
        contentType:
          title: Content Type
          description: MIME type set on the uploaded object.
          type: string
      required:
        - key
        - body
  required:
    - bucketRef
