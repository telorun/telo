kind: Telo.Library
metadata:
  name: provider-template-lib
  version: 1.0.0
imports:
  JS: ../../../../../../modules/javascript
---
kind: Telo.Definition
metadata:
  name: TokenProvider
capability: Telo.Provider
schema:
  type: object
  required: [ secret ]
  additionalProperties: true
  properties:
    secret: { type: string }
resources:
  - kind: JS.Script
    metadata:
      name: ${{ self.name }}-source
    inputType: { type: object, additionalProperties: true }
    outputType: { type: object, additionalProperties: true }
    code: |
      function main(input) { return { raw: input.value }; }
provide:
  kind: JS.Script
  name: ${{ self.name }}-source
inputs:
  value: ${{ self.secret }}
result:
  token: "bearer ${{ result.raw }}"
