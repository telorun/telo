kind: Telo.Application
metadata:
  name: StarlarkRuntimeRust
  version: 1.0.0
  description: Verifies that runtime:rust on the starlark Telo.Import resolves to the pkg:cargo controller and the rust controller's marker payload appears in the invoke output.
imports:
  Starlark:
    source: ../
    runtime: rust
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref RunScript
  - !ref VerifyRustMarker
---
kind: Starlark.Script
metadata:
  name: SimpleScript
code: |
  def run(input):
    return {"result": input["value"] * 2}
---
kind: Run.Sequence
metadata:
  name: RunScript
steps:
  - name: Invoke
    inputs:
      value: 21
    invoke: !ref SimpleScript
---
kind: Assert.Events
metadata:
  name: VerifyRustMarker
filter:
  - type: "*.Invoked"
expect:
  - event: "*.Invoked"
    payload:
      ref:
        kind: Starlark.Script
      outputs:
        controller: rust
        input:
          value: 21
