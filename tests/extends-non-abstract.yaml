kind: Telo.Application
metadata:
  name: ExtendsNonAbstractTest
  version: 1.0.0
imports:
  Assert: ../modules/assert
targets:
  - TestExtendsNonAbstract
---
# Asserts the analyzer emits EXTENDS_NON_ABSTRACT when `extends` targets a concrete definition.
kind: Assert.Manifest
metadata:
  name: TestExtendsNonAbstract
source: ./__fixtures__/extends-non-abstract.yaml
expect:
  errors:
    - code: EXTENDS_NON_ABSTRACT
