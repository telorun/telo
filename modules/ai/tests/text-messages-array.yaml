kind: Telo.Application
metadata:
  name: TextMessagesArrayTest
  version: 1.0.0
imports:
  Ai: ../
  AiEcho: ./__fixtures__/ai-echo.yaml
  Run: ../../run
  Assert: ../../assert
targets:
  - TestMessagesArray
---
kind: AiEcho.EchoModel
metadata: { name: Echo }
---
kind: Ai.Text
metadata: { name: C }
model:
  kind: AiEcho.EchoModel
  name: Echo
---
# Full `messages` array is passed through unchanged; Echo returns the last message's
# content. Verifies multi-turn shape without relying on prompt shorthand.
kind: Run.Sequence
metadata:
  name: TestMessagesArray
steps:
  - name: Invoke
    inputs:
      messages:
        - role: user
          content: "first"
        - role: assistant
          content: "ack"
        - role: user
          content: "second"
    invoke:
      kind: Ai.Text
      name: C
  - name: Assert
    inputs:
      text: "${{ steps.Invoke.result.text }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text: { type: string, const: "second" }
        required: [ text ]
