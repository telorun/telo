kind: Kernel.Module
metadata:
  name: JavaScriptDemo
  version: 1.0.0
  description: A demo module showcasing JavaScript scripts
---
kind: Kernel.Import
metadata:
  name: Flow
source: ../modules/flow
---
kind: Kernel.Import
metadata:
  name: JavaScript
source: ../modules/javascript
---
kind: Kernel.Import
metadata:
  name: Console
source: ../modules/console
---
kind: JavaScript.Script
metadata:
  name: MultiplyBy2
  module: JavaScriptDemo
code: |
  function main({ value }) {
    return { result: value * 2 }
  }
inputSchema:
  value:
    type: number
outputSchema:
  result:
    type: number
---
kind: Flow.Steps
metadata:
  name: RunScriptOnEvent
  module: JavaScriptDemo
trigger:
  event: Kernel.Started
  once: true
  filter: "true"
steps:
  - name: Step1
    inputs:
      value: 42
    invoke:
      kind: JavaScript.Script
      name: MultiplyBy2
  - inputs:
      result: ${{ outputs.MultiplyBy2.result }}
    invoke:
      kind: Console.WriteLine
      inputSchema:
        result:
          type: number
      output: |
        Evaluated JavaScript code.
        Result is: ${{ result }}
