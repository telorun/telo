kind: Telo.Application
metadata:
  name: AgentToolMappingTest
  version: 1.0.0
imports:
  Ai: ../
  AiEcho: ./__fixtures__/ai-echo.yaml
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestMapping
---
kind: AiEcho.EchoModel
metadata:
  name: Echo
emitToolCall:
  name: greet
  arguments: { who: "world" }
---
# Greeter's input shape ({ target }) diverges from the model-facing parameters
# ({ who }); the tool entry's `inputs:`/`result:` mappings bridge the gap.
kind: Run.Value
metadata:
  name: Greeter
inputs:
  target: { type: string }
value:
  greeting: "${{ 'Hello, ' + inputs.target + '!' }}"
---
kind: Ai.Tools
metadata:
  name: GreetTools
tools:
  - tool: !ref Greeter
    name: greet
    description: Greet someone by name.
    parameters:
      type: object
      additionalProperties: false
      required: [ who ]
      properties:
        who: { type: string }
    inputs:
      target: "${{ arguments.who }}"
    result: "${{ result.greeting }}"
---
kind: Ai.Agent
metadata:
  name: GreetAgent
model: !ref Echo
toolProviders:
  - provider: !ref GreetTools
---
kind: Run.Sequence
metadata:
  name: TestMapping
steps:
  - name: Invoke
    inputs:
      prompt: "greet the world"
    invoke: !ref GreetAgent
  # arguments.who="world" → inputs maps to {target:"world"} → Greeter →
  # {greeting:"Hello, world!"} → result maps to the bare string → fed back → echoed.
  - name: AssertText
    inputs:
      text: "${{ steps.Invoke.result.text }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text:
            type: string
            const: "Hello, world!"
        required: [ text ]
