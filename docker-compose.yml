name: telo

services:
  proxy:
    image: caddy
    ports:
      - "8060:8060"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - registry
  registry:
    image: telorun/registry:${DOCKER_TAG:-latest}
    build:
      context: .
      dockerfile: ./apps/registry/Dockerfile
      target: ${DOCKER_TARGET:-development}
    volumes:
      - .:/app
    working_dir: /app
    environment:
      DB_CONNECTION: "postgres://postgres:postgres@db/registry"
      S3_BUCKET_NAME: telo-registry
      S3_ENDPOINT: http://storage:9000
      S3_ACCESS_KEY_ID: rustfsadmin
      S3_SECRET_ACCESS_KEY: rustfsadmin
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      db:
        condition: service_healthy

  editor:
    image: node:24
    command: 'sh -c "corepack enable && exec pnpm run --filter telo-editor dev"'
    init: true
    volumes:
      - .:/telo
    working_dir: /telo
    environment:
      # Value is embedded into the Vite client bundle served to the USER'S
      # browser, which cannot resolve compose service names. The Caddy proxy
      # routes `*.telo.localhost:8060` to the matching compose service, and
      # any `*.localhost` hostname resolves to 127.0.0.1 in the browser.
      VITE_TELO_RUNNER_URL: http://runner.telo.localhost:8060
    depends_on:
      runner:
        condition: service_healthy

  runner:
    image: telorun/docker-runner:${DOCKER_TAG:-latest}
    build:
      context: .
      dockerfile: ./apps/docker-runner/Dockerfile
      target: ${DOCKER_TARGET:-development}
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-bundles:/bundles
    working_dir: /app
    environment:
      PORT: 8061
      BUNDLE_ROOT: /bundles
      BUNDLE_VOLUME: telo_runner-bundles
      RUNNER_CHILD_NETWORK: telo_default
    # No published port — the runner is reached via the Caddy proxy at
    # http://runner.telo.localhost:8060 (see Caddyfile).
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8061/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 2s
      retries: 3

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  storage:
    image: rustfs/rustfs
    volumes:
      - storage-data:/data

volumes:
  storage-data:
  db-data:
  runner-bundles: