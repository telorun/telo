kind: Run.Sequence
metadata:
  name: TestIncludeBasic
steps:
  - name: AddNumbers
    inputs:
      a: 10
      b: 20
    invoke:
      kind: JavaScript.Script
      code: |
        function main({ a, b }) {
          return { sum: a + b }
        }
  - name: VerifySum
    inputs:
      sum: "${{ steps.AddNumbers.result.sum }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          sum:
            type: number
            const: 30
        required:
          - sum
