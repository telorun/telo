kind: Telo.Library
metadata:
  name: ValidGlobalsAccess
  version: 1.0.0
variables:
  apiKey:
    type: string
---
kind: Telo.Import
metadata:
  name: Http
source: ../..
---
kind: Telo.Import
metadata:
  name: JavaScript
source: ../../../javascript
---
kind: Telo.Import
metadata:
  name: Type
source: ../../../type
---
kind: JavaScript.Script
metadata:
  name: Handler
code: |
  function main(input) { return { ok: true } }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      ok: { type: boolean }
---
kind: Http.Api
metadata:
  name: TestApi
routes:
  - request:
      path: /test
      method: GET
    handler:
      kind: JavaScript.Script
      name: Handler
    inputs:
      key: "${{ variables.apiKey }}"
    response:
      - status: 200
        body:
          ok: "${{ result.ok }}"
