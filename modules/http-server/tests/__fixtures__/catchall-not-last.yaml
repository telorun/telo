kind: Telo.Library
metadata:
  name: CatchAllNotLastFixture
  version: 1.0.0
---
kind: Telo.Import
metadata:
  name: Http
source: ../..
---
kind: Telo.Import
metadata:
  name: JavaScript
source: ../../../javascript
---
kind: JavaScript.Script
metadata:
  name: Handler
code: |
  function main(input) { return { ok: true } }
---
# A no-when returns: entry followed by a when:-qualified entry — the later
# entry is unreachable → CATCHALL_NOT_LAST.
kind: Http.Api
metadata:
  name: CatchAllApi
routes:
  - request:
      path: /x
      method: GET
    handler:
      kind: JavaScript.Script
      name: Handler
    returns:
      - status: 200
        body: { ok: true }
      - status: 201
        when: "${{ result.ok }}"
        body: { ok: true }
