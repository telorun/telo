name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.2

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changeset status
        if: github.event_name == 'pull_request'
        run: pnpm changeset status --since=origin/${{ github.base_ref }}

      - name: Check module manifests
        run: pnpm run check modules/*/telo.yaml

      - name: Check example manifests
        run: pnpm run check examples/*.yaml

      - name: Check apps manifests
        run: pnpm run check apps/*/telo.yaml

      - name: Run tests (bun)
        run: pnpm test

      - name: Build for Node.js
        run: pnpm -r run build

      - name: Run package unit tests
        run: pnpm -r test

      - name: Run tests (node)
        run: pnpm run test:node

      - name: Run tests (docker image)
        run: pnpm run test:docker
