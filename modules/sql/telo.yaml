kind: Telo.Library
metadata:
  name: sql
  namespace: std
  version: 0.9.0
  description: SQL database access — PostgreSQL and SQLite
---
# Sql.Connection — the abstract database handle every driver implements. A
# Telo.Provider: a configured connection to a backend, NOT an operation you
# invoke. Consumers (Sql.Query / Sql.Exec / Sql.Select / Sql.Migrations /
# Sql.Transaction) reference it via `x-telo-ref: "std/sql#Connection"` and a
# concrete implementation (Sql.PostgresConnection / Sql.SqliteConnection)
# satisfies the ref. Each implementation also fixes the driver-native bind
# placeholder style, so inline `${{ }}` parameters in queries are dialect-neutral.
kind: Telo.Abstract
metadata:
  name: Connection
capability: Telo.Provider
---
kind: Telo.Definition
metadata:
  name: PostgresConnection
capability: Telo.Provider
extends: Self.Connection
controllers:
  - pkg:npm/@telorun/sql@0.7.0?local_path=./nodejs#sql-postgres-connection
schema:
  type: object
  examples:
    - connectionString: postgres://user:password@localhost:5432/mydb?sslmode=require
    - connectionString: postgres://user:password@localhost:5432/mydb
      pool:
        min: 2
        max: 20
  required:
    - connectionString
  properties:
    connectionString:
      title: Connection String
      type: string
      description: >-
        PostgreSQL connection URL — `postgres://` or `postgresql://`. TLS is
        configured with the standard libpq `?sslmode=` query parameter
        (`disable`, `require`, `verify-ca`, `verify-full`).
    pool:
      title: Pool
      description: Database connection pool configuration.
      type: object
      properties:
        min:
          title: Min
          description: Minimum number of connections in the pool.
          type: integer
          default: 1
        max:
          title: Max
          description: Maximum number of connections in the pool.
          type: integer
          default: 10
        idleTimeoutMs:
          title: Idle Timeout Ms
          description: Milliseconds before idle connections are closed.
          type: integer
        connectionTimeoutMs:
          title: Connection Timeout Ms
          description: Milliseconds to wait for a new connection.
          type: integer
---
kind: Telo.Definition
metadata:
  name: SqliteConnection
capability: Telo.Provider
extends: Self.Connection
controllers:
  - pkg:npm/@telorun/sql@0.7.0?local_path=./nodejs#sql-sqlite-connection
schema:
  type: object
  examples:
    - file: ./data.db
    - file: ":memory:"
  properties:
    file:
      title: File
      type: string
      description: >-
        Path to the SQLite database file (e.g. `./data.db`). The parent
        directory is created if missing. Omit, or use `:memory:`, for an
        in-memory database.
---
kind: Telo.Definition
metadata:
  name: Query
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/sql@0.7.0?local_path=./nodejs#sql-query
schema:
  type: object
  description: >-
    Runs a SQL query and returns the result rows; `result.rowCount` is the
    number of rows returned. Use for `SELECT` (and PostgreSQL `… RETURNING`).
    For mutations with no row result, use `Sql.Exec`.
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    transaction:
      title: Transaction
      description: Reference to the SQL transaction resource.
      x-telo-ref: "std/sql#Transaction"
    inputs:
      title: Inputs
      description: Query parameters supplied at invocation time.
      type: object
      examples:
        - sql: SELECT id, name, age FROM users WHERE id = ?
          bindings:
            - !cel "request.params.id"
        - sql: !sql "SELECT id, name FROM users WHERE id = ${{ request.params.id }}"
      properties:
        sql:
          title: SQL
          type: string
          description: >-
            SQL query text. Inline CEL interpolations are bound as parameters,
            not spliced into the text — dialect-neutral and injection-safe (the
            connection emits its own native placeholder). Embed values, not
            whole statements: a `!sql` whose entire body is a single
            interpolation binds that value as one parameter, not as SQL. On
            SQLite exactly one statement is allowed (single prepared statement);
            PostgreSQL accepts multiple.
          contentMediaType: application/sql
          x-telo-widget: code
        bindings:
          title: Bindings
          type: array
          description: >-
            Escape hatch for hand-written placeholders — SQLite anonymous `?`,
            PostgreSQL numbered `$1`, `$2`, …. When set, `sql` is used verbatim
            and these values bind positionally. Prefer inline interpolation in
            `sql` instead (binds automatically, dialect-neutral); do not combine
            the two. This is a regular YAML array — write one element per
            placeholder, and tag each element that needs a dynamic value with
            its own scalar `!cel` leaf. Do NOT build the whole array as a single
            inline CEL list literal (`!cel "[a, b, c]"`); CEL requires list
            literals to be homogeneously typed, so a mixed list of a string and
            a number fails the type checker. Per-element `!cel` leaves sidestep
            that entirely. Each value is passed to the driver as-is; drivers
            accept only primitives (string, number, bigint, null, bytes).
            Serialize an object/array first, e.g. `!cel "json(request.body)"`,
            before storing it in a TEXT/JSON column.
          examples:
            - - !cel "request.body.email"
              - !cel "json(request.body.profile)"
              - !cel "request.body.age"
      required: [sql]
---
kind: Telo.Definition
metadata:
  name: Exec
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/sql@0.7.0?local_path=./nodejs#sql-exec
schema:
  type: object
  description: >-
    Executes a SQL statement and reports rows affected; `result.rowCount`
    comes from the driver's affected-row count and `result.rows` is empty
    unless the statement returns rows. Use for `INSERT` / `UPDATE` / `DELETE`
    without `RETURNING`. To read rows back, use `Sql.Query`.
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    transaction:
      title: Transaction
      description: Reference to the SQL transaction resource.
      x-telo-ref: "std/sql#Transaction"
    inputs:
      title: Inputs
      description: Statement parameters supplied at invocation time.
      type: object
      examples:
        - sql: INSERT INTO users (id, name, age) VALUES (?, ?, ?)
          bindings:
            - !cel "request.body.id"
            - !cel "request.body.name"
            - !cel "request.body.age"
        - sql: !sql "DELETE FROM users WHERE id = ${{ request.params.id }}"
      properties:
        sql:
          title: SQL
          type: string
          description: >-
            SQL statement text. Inline CEL interpolations are bound as
            parameters, not spliced into the text — dialect-neutral and
            injection-safe (the connection emits its own native placeholder).
            Embed values, not whole statements: a `!sql` whose entire body is a
            single interpolation binds that value as one parameter, not as SQL.
            On SQLite exactly one statement is allowed (single prepared
            statement); PostgreSQL accepts multiple.
          contentMediaType: application/sql
          x-telo-widget: code
        bindings:
          title: Bindings
          type: array
          description: >-
            Escape hatch for hand-written placeholders — SQLite anonymous `?`,
            PostgreSQL numbered `$1`, `$2`, …. When set, `sql` is used verbatim
            and these values bind positionally. Prefer inline interpolation in
            `sql` instead (binds automatically, dialect-neutral); do not combine
            the two. This is a regular YAML array — write one element per
            placeholder, and tag each element that needs a dynamic value with
            its own scalar `!cel` leaf. Do NOT build the whole array as a single
            inline CEL list literal (`!cel "[a, b, c]"`); CEL requires list
            literals to be homogeneously typed, so a mixed list of a string and
            a number fails the type checker. Per-element `!cel` leaves sidestep
            that entirely. Each value is passed to the driver as-is; drivers
            accept only primitives (string, number, bigint, null, bytes).
            Serialize an object/array first, e.g. `!cel "json(request.body)"`,
            before storing it in a TEXT/JSON column.
          examples:
            - - !cel "request.body.email"
              - !cel "json(request.body.profile)"
              - !cel "request.body.age"
      required: [sql]
---
kind: Telo.Definition
metadata:
  name: Transaction
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/sql@0.7.0?local_path=./nodejs#sql-transaction
schema:
  type: object
  required:
    - connection
    - steps
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    steps:
      title: Steps
      description: Invocable resource executed inside the transaction.
      x-telo-ref: "telo#Invocable"
    bindings:
      title: Bindings
      type: object
      description: Forwarded to the steps resource at invoke time; may contain CEL template expressions
---
kind: Telo.Definition
metadata:
  name: Select
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/sql@0.7.0?local_path=./nodejs#sql-select
schema:
  type: object
  required: [from]
  examples:
    - from: users
      columns: [id, name, email, created_at]
      where:
        - { column: deleted_at, op: is_null }
        - { column: status, op: eq, value: active }
      orderBy:
        - { column: created_at, direction: desc }
      limit: 50
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    transaction:
      title: Transaction
      description: Reference to the SQL transaction resource.
      x-telo-ref: "std/sql#Transaction"
    from:
      title: From
      description: Table name to select from.
      type: string
      x-telo-eval: compile
    columns:
      title: Columns
      description: Column names or expressions to select.
      type: array
      x-telo-eval: compile
    distinct:
      title: Distinct
      description: Whether to return only distinct rows.
      type: boolean
      x-telo-eval: compile
    distinctOn:
      title: Distinct On
      description: PostgreSQL DISTINCT ON column list.
      type: array
      items:
        title: Distinct On Column
        description: Column name used in DISTINCT ON.
        type: string
      x-telo-eval: compile
    where:
      title: Where
      description: Structured where clauses.
      type: array
      items:
        title: Where Clause
        description: Single where clause object.
        type: object
    groupBy:
      title: Group By
      description: Columns used for grouping.
      type: array
      items:
        title: Group By Column
        description: Column name used for grouping.
        type: string
      x-telo-eval: compile
    having:
      title: Having
      description: Structured having clauses.
      type: array
      items:
        title: Having Clause
        description: Single having clause object.
        type: object
    orderBy:
      title: Order By
      description: Ordering rules for selected rows.
      type: array
      x-telo-eval: compile
      items:
        title: Order By Entry
        description: Single ordering rule.
        type: object
        properties:
          column:
            title: Column
            description: Column name to order by.
            type: string
          direction:
            title: Direction
            description: Sort direction.
            type: string
            enum: [asc, desc]
    limit:
      title: Limit
      description: Maximum number of rows returned.
    offset:
      title: Offset
      description: Number of rows skipped before returning results.
    inputType:
      title: Input Type
      description: Named type reference or inline type definition for invocation inputs.
      x-telo-ref: "telo#Type"
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
    outputType:
      title: Output Type
      description: Named type reference or inline type definition for invocation outputs.
      x-telo-ref: "telo#Type"
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
---
kind: Telo.Definition
metadata:
  name: Migration
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/sql@0.7.0?local_path=./nodejs#sql-migration
schema:
  type: object
  required: [sql]
  deprecated: true
  description: >-
    [Deprecated] Use the keyed `migrations` map on `Sql.Migrations` instead —
    move this entry under `Sql.Migrations.migrations` with the `version` value
    as its key and the `sql` as its value (`{ "<version>": { sql: ... } }`). A
    standalone `Sql.Migration` is still discovered by any `Sql.Migrations` in
    the same module scope and merged into its set, so existing manifests keep
    working; new manifests should declare migrations inline.
  properties:
    version:
      title: Version
      type: string
      description: >-
        Durable ledger key written to the migrations tracking table. Must be
        unique across all migrations in the run and MUST NOT change after the
        migration has been applied anywhere — renaming it would cause the
        migration to re-run. Conventionally a timestamp-prefixed slug
        (e.g. `20260419100200_CreateTokens`). Distinct from `metadata.name`,
        which is the in-manifest resource handle. When omitted, the controller
        falls back to `metadata.name` for backwards compatibility.
    sql:
      title: SQL
      type: string
      description: >-
        SQL to execute for this migration. The body runs as a script, so it
        may contain multiple `;`-separated statements (any SQL).
      contentMediaType: application/sql
      x-telo-widget: code
---
kind: Telo.Definition
metadata:
  name: Migrations
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/sql@0.7.0?local_path=./nodejs#sql-migrations
schema:
  type: object
  required: [connection]
  examples:
    - connection:
        kind: Sql.SqliteConnection
        name: Db
      migrations:
        20260401_create_users:
          statements:
            - "CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT NOT NULL)"
            - "CREATE UNIQUE INDEX users_name ON users(name)"
        20260402_seed_admin:
          statement: "INSERT INTO users (id, name) VALUES (1, 'Alice')"
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    migrations:
      title: Migrations
      description: >-
        Ordered set of migrations keyed by their durable ledger id. Each key is
        written to the migrations tracking table, decides run order
        (lexicographic) and identifies the migration forever after — renaming a
        key makes the migrator treat it as a new migration and re-run it.
        Conventionally a timestamp-prefixed slug (e.g. `20260419100200_CreateTokens`).
      type: object
      x-telo-eval: compile
      propertyNames:
        pattern: "^[A-Za-z0-9_.-]+$"
      additionalProperties:
        title: Migration
        description: >-
          A migration is either a single `statement` or an ordered list of
          `statements` — exactly one. All statements run inside the single
          migration transaction, in order.
        type: object
        oneOf:
          - required: [statement]
          - required: [statements]
        properties:
          statement:
            title: Statement
            description: >-
              A single SQL statement to execute. May contain CEL template
              expressions, evaluated at compile time.
            type: string
            contentMediaType: application/sql
            x-telo-widget: code
          statements:
            title: Statements
            description: >-
              An ordered list of SQL statements, each executed in turn within
              the migration transaction. Each entry may contain CEL template
              expressions, evaluated at compile time.
            type: array
            minItems: 1
            items:
              type: string
              contentMediaType: application/sql
              x-telo-widget: code
