kind: Telo.Application
metadata:
  name: TraceContextApp
  version: 1.0.0
imports:
  Run: ../../../../../modules/run
variables:
  greeting:
    env: TRACE_CTX_GREETING
    type: string
    default: hello
secrets:
  apiKey:
    env: TRACE_CTX_API_KEY
    type: string
    default: super-secret-value
---
kind: Run.Value
metadata:
  name: Echo
inputs:
  value: { type: integer }
value:
  echoed: !cel "inputs.value"
