kind: Telo.Library
metadata:
  name: scope-lib
  version: 1.0.0
  description: |
    Test fixture: a library that defines an Http.Api whose route handlers use the
    library's OWN import alias (`Run`) — both an inline `kind:` handler and a
    `!ref` to a library-local resource. Importers mount the Api in their own
    Http.Server. These handlers are anonymous children / local references of THIS
    document and must resolve `Run` against THIS library's import map, not the
    consumer's (which never imports run under the alias `Run`).
imports:
  Http: ../../../
  Run: ../../../../run
exports:
  resources:
    - Api
---
kind: Run.Value
metadata: { name: LocalGreet }
value: { message: "ref handler in scope-lib" }
---
kind: Http.Api
metadata: { name: Api }
routes:
  # Inline `kind:` handler — an anonymous child declared in this library.
  - request:
      path: /inline
      method: GET
    handler:
      kind: Run.Value
      value: { message: "inline handler in scope-lib" }
    returns:
      - status: 200
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
              required: [ message ]
  # `!ref` to a library-local resource.
  - request:
      path: /ref
      method: GET
    handler: !ref LocalGreet
    returns:
      - status: 200
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
              required: [ message ]
