project: ai
kind: Fixed
body: Ai.Model is now a Telo.Provider (a configured LLM client referenced by the operations) instead of a Telo.Invocable. The completion contract (inputType/outputType) now lives on the Ai.Text and Ai.TextStream operations. Referenced models render as ambient dependencies in the visual editor rather than standalone graph nodes.
