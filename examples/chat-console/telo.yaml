kind: Telo.Application
metadata:
  name: ChatConsole
  description: |
    Interactive REPL chat with OpenAI streaming completions. Persists the
    conversation in sqlite so each turn sees prior history and the chat survives
    process restart. Delete the file to clear history. Type `/exit` (or
    send EOF) to leave.

    Run with the OpenAI key in a sibling `.env.local` file:
        OPENAI_API_KEY=sk-...
    The CLI loads `.env.local` from the manifest's directory automatically.
imports:
  AiOpenai: oci://ghcr.io/telorun/ai-openai@0.12.0#sha256-gFdHL9ia6eNS4lHutSyxI6GlTPr9_Qgl1mF2X7dkh7U
  Ai: oci://ghcr.io/telorun/ai@0.10.0#sha256-BJeZjpD9k7zaZozje25pc9dhZUxKyw5bwqjYs35UpD8
  RecordStream: oci://ghcr.io/telorun/record-stream@0.9.0#sha256-HBO4_mOMh4GTQ1ojjmuQvfvMfStSA7XCtXmyDGYQj8k
  PlainText: oci://ghcr.io/telorun/plain-text-codec@0.6.0#sha256-br9h8QxAyZeEg5L0rYwHXMEzYkKnjd9eXen9EWRulyg
  Console: oci://ghcr.io/telorun/console@0.12.0#sha256-Ac-5GQaSaOs5uH4jEELH1MLOACS5g0IFK0w21YeBmXY
  Run: oci://ghcr.io/telorun/run@0.13.0#sha256-s5raonayIOI78D9YjhAG_TB_KV7wILexhfEOpygFauc
  Sql: oci://ghcr.io/telorun/sql@0.13.0#sha256-ARE0QGUj8CtyNKTgIwiBFnHq1YbH-3B6nK4TLmvg_aE
  SqlSqlite: oci://ghcr.io/telorun/sql-sqlite@0.4.0#sha256-Tx6iWpzDfFNKkmAmlzK74dsP1w4CR9e_jkU_EITvjb4
targets:
  - !ref InitSchema
  - !ref ChatLoop
secrets:
  openaiApiKey:
    env: OPENAI_API_KEY
    type: string
---
# --- Persistence -----------------------------------------------------------
kind: SqlSqlite.Connection
metadata: { name: ChatDb }
file: ./tmp/chat-history.sqlite
---
kind: Sql.Migrations
metadata: { name: InitSchema }
connection: !ref ChatDb
migrations:
  20260501_create_messages:
    statement: |
      CREATE TABLE IF NOT EXISTS messages (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        role TEXT NOT NULL CHECK (role IN ('system', 'user', 'assistant')),
        content TEXT NOT NULL,
        created_at TEXT NOT NULL DEFAULT (datetime('now'))
      )
---
# --- AI provider -----------------------------------------------------------
kind: AiOpenai.OpenaiModel
metadata: { name: Gpt54Nano }
model: gpt-5.4-nano
apiKey: "${{ secrets.openaiApiKey }}"
---
kind: Ai.TextStream
metadata: { name: ChatStream }
model: !ref Gpt54Nano
system: "You are a helpful CLI assistant. Keep replies brief — one or two sentences."
---
# --- Stream pipeline -------------------------------------------------------
# Project StreamPart records to plain text-delta strings.
kind: RecordStream.ExtractText
metadata: { name: Deltas }
discriminator: type
records:
  text-delta: { do: emit, field: delta }
  finish: { do: drop }
  error: { do: throw, field: error }
---
# Fan the model's stream out: one branch prints to stdout, the other captures
# the assistant text for the history INSERT.
kind: RecordStream.Tee
metadata: { name: ModelTee }
---
kind: Console.WriteStream
metadata: { name: Stdout }
---
# Animated wait indicator: paints `ai  ›` with a braille spinner while the
# model is preparing the first token, clears the spinner cell on the first
# delta, then forwards every item unchanged.
kind: Console.StreamWait
metadata: { name: ChatSpinner }
prefix: "{magenta.bold ai}  › "
---
# Drain the captured branch of the tee into a single string for the
# assistant-row INSERT. PlainText.Decoder already accepts Stream<string>
# as a pass-through (treats each chunk as UTF-8) and concatenates into a
# single `{text}` — exactly the "drain a string stream" primitive we need.
kind: PlainText.Decoder
metadata: { name: AssistantText }
---
# --- REPL ------------------------------------------------------------------
kind: Run.Sequence
metadata: { name: ChatLoop }
steps:
  # do-while via shared step name `Read`: pre-loop initializes; the in-body
  # `Read` overwrites it each iteration. Pattern matches modules/run/tests/run-sequence-while.yaml.
  - name: Read
    invoke: !ref Console.readLine
    inputs:
      prompt: "{cyan.bold you} › "
  - name: Loop
    while: "${{ steps.Read.result.value != '/exit' }}"
    do:
      # Insert the user message FIRST, then SELECT — the SELECT now
      # returns the freshly-inserted user row as the last element, so
      # the messages array passed to Ai.TextStream is just the rows
      # verbatim. No client-side composition step needed.
      - name: InsertUser
        inputs:
          sql: "INSERT INTO messages (role, content) VALUES (?, ?)"
          bindings: [ "user", "${{ steps.Read.result.value }}" ]
        invoke:
          kind: Sql.Command
          connection: !ref ChatDb
      - name: ReadHistory
        inputs:
          sql: "SELECT role, content FROM messages ORDER BY id ASC"
        invoke:
          kind: Sql.Query
          connection: !ref ChatDb
      - name: Stream
        invoke: !ref ChatStream
        inputs:
          messages: "${{ steps.ReadHistory.result.rows }}"
      - name: Project
        invoke: !ref Deltas
        inputs:
          input: "${{ steps.Stream.result.output }}"
      - name: Tee
        invoke: !ref ModelTee
        inputs:
          input: "${{ steps.Project.result.output }}"
      - name: Spin
        invoke: !ref ChatSpinner
        inputs:
          input: "${{ steps.Tee.result.outputA }}"
      - name: Print
        invoke: !ref Stdout
        inputs:
          input: "${{ steps.Spin.result.output }}"
      - name: Collect
        invoke: !ref AssistantText
        inputs:
          input: "${{ steps.Tee.result.outputB }}"
      - name: InsertAssistant
        inputs:
          sql: "INSERT INTO messages (role, content) VALUES (?, ?)"
          bindings: [ "assistant", "${{ steps.Collect.result.text }}" ]
        invoke:
          kind: Sql.Command
          connection: !ref ChatDb
      # Move cursor to a fresh line so the next Read's TTY readline
      # interface doesn't refresh-erase the assistant's reply (readline
      # in TTY mode emits `\r\x1b[K` when re-prompting on a non-empty
      # current line — without this newline, the model's text gets wiped
      # the moment we ask for the next user input).
      - name: Newline
        invoke: !ref Console.writeLine
        inputs:
          output: ""
      - name: Read
        invoke: !ref Console.readLine
        inputs:
          prompt: "{cyan.bold you} › "
