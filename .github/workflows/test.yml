name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.2

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changeset status
        if: github.event_name == 'pull_request'
        run: pnpm changeset status --since=origin/${{ github.base_ref }}

      - name: Check module manifests
        run: pnpm run check modules/*/telo.yaml

      - name: Check example manifests
        run: pnpm run check examples/*.yaml

      - name: Check apps manifests
        run: pnpm run check apps/*/telo.yaml

      - name: Run tests (bun)
        run: pnpm test

      - name: Build for Node.js
        run: pnpm -r run build

      - name: Run package unit tests
        run: pnpm -r test

      - name: Run tests (node)
        run: pnpm run test:node

      - name: Build docker image
        run: docker build -f cli/nodejs/Dockerfile -t telo:ci .

      - name: Run tests (docker image)
        run: docker run --rm -v "$PWD":/workspace -v /workspace/.telo -w /workspace telo:ci ./test-suite.yaml

      # End-to-end registry tests: bring up the docker-compose stack (proxy,
      # registry, db, storage), wait for /health/readiness, and run the
      # apps/registry/test-suite-e2e.yaml suite against the live HTTP surface.
      # The publish token is generated per run and written to
      # apps/registry/.env.local — both the registry container (boot
      # `SeedRootPublishToken`) and the test runner (publish step in
      # mcp-tools.yaml) read it from there via the CLI's loadEnvFiles, the
      # same path local devs use. The file is removed on teardown so it
      # never leaks across jobs on a self-hosted runner.
      - name: Seed registry publish token
        run: |
          TOKEN=$(openssl rand -hex 32)
          {
            echo "TELO_PUBLISH_TOKEN=$TOKEN"
            echo "TELO_REGISTRY_TOKEN=$TOKEN"
          } > apps/registry/.env.local

      - name: Bring up registry stack
        # --wait blocks until every container with a healthcheck reports
        # "healthy" (the registry's healthcheck polls /health/readiness over
        # localhost:3000). --wait-timeout caps the wait so a wedged boot
        # fails fast instead of hanging the job. The healthcheck's own
        # retry budget (start_period + retries × interval) is set to fit
        # under this timeout — see docker-compose.yml.
        #
        # mkdir apps/registry/.telo: pre-create the anonymous-volume
        # mountpoint as the runner user so Docker doesn't create it as
        # root when resolving the overlay through the bind mount. See
        # the volume comment in docker-compose.yml.
        run: |
          mkdir -p apps/registry/.telo
          docker compose up -d --build --wait --wait-timeout 120 db storage registry proxy

      - name: Run registry e2e suite
        run: pnpm run test:e2e

      - name: Dump registry logs on failure
        # Placed after the e2e run so the same step covers both failure
        # modes — `if: failure()` matches when *any* prior step failed,
        # so it fires for bring-up failures and e2e failures alike.
        if: failure()
        run: docker compose logs registry

      - name: Stop registry stack
        if: always()
        run: |
          docker compose down -v
          rm -f apps/registry/.env.local
