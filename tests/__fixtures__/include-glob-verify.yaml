kind: Run.Sequence
metadata:
  name: TestIncludeGlob
steps:
  - name: Multiply
    inputs:
      x: 7
      y: 6
    invoke:
      kind: Run.Value
      inputs:
        x: { type: number }
        y: { type: number }
      value:
        product: !cel "inputs.x * inputs.y"
  - name: VerifyProduct
    inputs:
      product: "${{ steps.Multiply.result.product }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          product:
            type: number
            const: 42
        required:
          - product
