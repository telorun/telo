kind: Telo.Library
metadata:
  name: vector-store-memory
  namespace: std
  version: 0.3.0
  repository: https://github.com/telorun/telo
  license: LicenseRef-SustainableUse
  description: |
    VectorStoreMemory.Store — an in-process vector index for the VectorStore
    abstract. Cosine / dot / euclidean similarity over a Map; zero external
    dependencies. Ideal for development, tests, and small single-instance
    indexes.
imports:
  VectorStore: ../vector-store
exports:
  kinds:
    - Store
---
kind: Telo.Definition
metadata:
  name: Store
  description: Provides an in-process vector index with cosine/dot/euclidean similarity for the VectorStore abstract.
capability: Telo.Provider
extends: VectorStore.Store
controllers:
  - pkg:npm/@telorun/vector-store-memory@0.2.0?local_path=./nodejs#store
schema:
  type: object
  additionalProperties: false
  properties:
    metric:
      title: Metric
      type: string
      enum: [cosine, dot, euclidean]
      default: cosine
      description: Similarity metric used to rank matches.
    dimensions:
      title: Dimensions
      type: integer
      minimum: 1
      description: Expected vector length; inserts / queries of other lengths are rejected.
    maxEntries:
      title: Max Entries
      type: integer
      minimum: 1
      description: >-
        When exceeded, the oldest-written entry is evicted (FIFO). Unbounded
        when omitted.
  examples:
    - metric: cosine
      dimensions: 1536
