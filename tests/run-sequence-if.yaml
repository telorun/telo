kind: Telo.Application
metadata:
  name: RunSequenceIf
  version: 1.0.0
targets:
  - TestIfBranches
---
kind: Telo.Import
metadata:
  name: Run
source: ../modules/run
---
kind: Telo.Import
metadata:
  name: JavaScript
source: ../modules/javascript
---
kind: Telo.Import
metadata:
  name: Assert
source: ../modules/assert
---
kind: Run.Sequence
metadata:
  name: TestIfBranches
steps:
  # --- if/then: condition true, then branch executes ---
  - name: TrueCondition
    if: "${{ true }}"
    then:
      - name: ThenRan
        inputs:
          branch: "then"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              branch:
                const: "then"

  # Verify then branch produced a result (Assert.Schema returns true on pass).
  - name: VerifyThenRan
    inputs:
      result: "${{ steps.ThenRan.result }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          result:
            const: true

  # --- if/then/else: condition false, else branch executes ---
  - name: FalseCondition
    if: "${{ false }}"
    then:
      # If this ran, assertion would fail (1 != 0).
      - name: WrongBranch
        inputs:
          x: 1
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              x:
                const: 0
    else:
      - name: ElseRan
        inputs:
          branch: "else"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              branch:
                const: "else"

  - name: VerifyElseRan
    inputs:
      result: "${{ steps.ElseRan.result }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          result:
            const: true

  # --- data-driven condition: branch chosen by a prior step result ---
  - name: Setup
    invoke:
      kind: JavaScript.Script
      code: |
        function main() { return { value: 42 } }

  - name: DataDrivenIf
    if: "${{ steps.Setup.result.value == 42 }}"
    then:
      - name: CorrectBranch
        inputs:
          value: "${{ steps.Setup.result.value }}"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              value:
                const: 42
    else:
      # Would fail if reached.
      - name: WrongValueBranch
        inputs:
          x: 1
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              x:
                const: 0

  - name: VerifyDataBranch
    inputs:
      result: "${{ steps.CorrectBranch.result }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          result:
            const: true
