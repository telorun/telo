kind: Telo.Library
metadata:
  name: abstract-impl
  namespace: std
  version: 1.0.0
  description: Canonical concrete implementation of AbstractLib.Greeter.
imports:
  # Pull in the abstract via alias. Any `extends` below resolves through this alias.
  AbstractLib: ./abstract-lib.yaml
exports:
  kinds:
    - Shouter
---
# Canonical implementation: explicit lifecycle `capability` + `extends` to the abstract.
kind: Telo.Definition
metadata:
  name: Shouter
capability: Telo.Invocable
extends: AbstractLib.Greeter
schema:
  type: object
  properties:
    prefix:
      type: string
  additionalProperties: false
