name: telo

services:
  proxy:
    image: caddy
    ports:
      - "8060:8060"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - registry
    # Network aliases so containers on the compose network (e.g. runner-spawned
    # children) can resolve the same *.telo.localhost hostnames the browser
    # uses. Browser → OS `.localhost` rule → 127.0.0.1:8060 → proxy container.
    # Container → docker DNS alias → proxy container:8060. Same URL works for
    # both, Caddy routes by Host header.
    networks:
      default:
        aliases:
          - registry.telo.localhost
          - hub.telo.localhost
          - editor.telo.localhost
          - storage.telo.localhost
          - runner.telo.localhost
          - pages.telo.localhost
  registry:
    image: telorun/registry:${DOCKER_TAG:-latest}
    build:
      context: .
      dockerfile: ./apps/registry/Dockerfile
      target: ${DOCKER_TARGET:-development}
    volumes:
      - .:/app
      # Anonymous volume overlay: telo writes its install cache here at boot.
      # Without this, root-owned files leak into the host bind mount and break
      # subsequent non-docker steps (e.g. CI's bun-direct `test:e2e`).
      - /app/apps/registry/.telo
    working_dir: /app
    environment:
      DB_CONNECTION: "postgres://postgres:postgres@db/registry"
      S3_BUCKET_NAME: telo-registry
      S3_ENDPOINT: http://storage:9000
      S3_ACCESS_KEY_ID: telo-registry-access
      S3_SECRET_ACCESS_KEY: telo-registry-secret
      S3_FORCE_PATH_STYLE: "true"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health/readiness').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 2s
      # Budget: start_period 5s + retries 18 × interval 5s = 95s before
      # the container is declared unhealthy. Stays comfortably under the
      # workflow's `--wait-timeout 120s` so compose and the healthcheck
      # converge on the same failure point — no risk of compose timing
      # out while the healthcheck would still have passed.
      retries: 18
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy

  hub:
    image: telorun/hub:${DOCKER_TAG:-latest}
    build:
      context: .
      dockerfile: ./apps/hub/Dockerfile
      target: ${DOCKER_TARGET:-development}
    volumes:
      - .:/app
      # Anonymous volume overlay: telo writes its install cache here at boot
      # (same rationale as the registry service).
      - /app/apps/hub/.telo
    working_dir: /app
    ports:
      - "${HUB_PORT:-8040}:8040"
    environment:
      DB_CONNECTION: "postgres://postgres:postgres@db/hub"
      MANIFEST_BUCKET_NAME: telo-manifests
      MANIFEST_BUCKET_ENDPOINT: http://storage:9000
      MANIFEST_BUCKET_ACCESS_KEY_ID: telo-registry-access
      MANIFEST_BUCKET_SECRET_ACCESS_KEY: telo-registry-secret
      MANIFEST_BUCKET_FORCE_PATH_STYLE: "true"
      # Curated seed; the tracker enumerates these refs' versions on boot and
      # every TRACK_INTERVAL thereafter.
      SEED_REFS: '["std/console","std/timer"]'
      # The dev image runs from the mounted repo, so the tracker shells out to
      # the workspace CLI build (`pnpm --filter @telorun/cli build` first).
      TELO_BIN: /app/cli/nodejs/bin/telo.mjs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8040/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 2s
      retries: 18
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy

  editor:
    image: node:24
    command: 'sh -c "corepack enable && exec pnpm run --filter @telorun/editor dev"'
    init: true
    volumes:
      - .:/telo
    working_dir: /telo
    environment:
      # Value is embedded into the Vite client bundle served to the USER'S
      # browser, which cannot resolve compose service names. The Caddy proxy
      # routes `*.telo.localhost:8060` to the matching compose service, and
      # any `*.localhost` hostname resolves to 127.0.0.1 in the browser.
      VITE_TELO_RUNNER_URL: http://runner.telo.localhost:8060
    depends_on:
      runner:
        condition: service_healthy

  pages:
    image: node:24
    command: 'sh -c "rm -rf /telo/pages/.docusaurus /telo/pages/node_modules/.cache && cd pages && ./node_modules/.bin/docusaurus start --host 0.0.0.0 --port 3000 --poll 1000"'
    init: true
    user: ${UID:-1000}:${GID:-1000}
    volumes:
      - .:/telo
    working_dir: /telo

  runner:
    image: telorun/docker-runner:${DOCKER_TAG:-latest}
    build:
      context: .
      dockerfile: ./apps/docker-runner/Dockerfile
      target: ${DOCKER_TARGET:-development}
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-bundles:/bundles
    working_dir: /app
    environment:
      PORT: 8061
      BUNDLE_ROOT: /bundles
      BUNDLE_VOLUME: telo_runner-bundles
      RUNNER_CHILD_NETWORK: telo_default
      # Base URL of the Caddy proxy that fronts session containers. The runner
      # announces per-port URLs (http://<port>-<sessionId>.run.telo.localhost:8060)
      # so the editor links to the reachable app, not the runner host. The proxy
      # routes these to telo-run-<sessionId> on the shared network (see Caddyfile).
      RUNNER_PUBLIC_BASE_URL: http://run.telo.localhost:8060
      # Fallback registry URL injected into spawned containers when the
      # editor/client does not pass one in config.registryUrl.
      TELO_REGISTRY_URL: http://registry:3000
    # No published port — the runner is reached via the Caddy proxy at
    # http://runner.telo.localhost:8060 (see Caddyfile).
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8061/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 2s
      retries: 3

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql
      # First-init only: creates the hub's database beside the registry's (one
      # server, two databases — both apps own a `modules` table). On an existing
      # volume: docker compose exec db psql -U postgres -c 'CREATE DATABASE hub'
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  storage:
    image: rustfs/rustfs:1.0.0-beta.4
    environment:
      RUSTFS_ACCESS_KEY: telo-registry-access
      RUSTFS_SECRET_KEY: telo-registry-secret
    ports:
      - "${S3_PORT:-9000}:9000"
    volumes:
      - storage-data:/data

volumes:
  storage-data:
  db-data:
  runner-bundles: