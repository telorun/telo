kind: Kernel.Module
metadata:
  name: CanRunSimpleQuery
  version: 1.0.0
targets:
  - TestSimpleQuery
---
kind: Kernel.Import
metadata:
  name: Sql
source: ../
---
kind: Kernel.Import
metadata:
  name: Run
source: ../../run
---
kind: Kernel.Import
metadata:
  name: Assert
source: ../../assert
---
kind: Sql.Connection
metadata:
  name: Db
driver: sqlite
file: ":memory:"
---
kind: Run.Sequence
metadata:
  name: TestSimpleQuery
steps:
  - name: RunQuery
    inputs: {}
    invoke:
      kind: Sql.Query
      connection: Db
      inputs:
        sql: "SELECT 1 as result"

  - name: AssertResult
    inputs:
      rows: "${{ steps.RunQuery.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            minItems: 1
            items:
              type: object
              properties:
                result:
                  const: 1
