kind: Telo.Application
metadata:
  name: TextInputExclusivityTest
  version: 1.0.0
imports:
  Ai: ../
  AiEcho: ./__fixtures__/ai-echo.yaml
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestBothPromptAndMessagesRejected
  - !ref TestNeitherPromptNorMessagesRejected
---
kind: AiEcho.EchoModel
metadata: { name: Echo }
---
kind: Ai.Text
metadata: { name: C }
model: !ref Echo
---
# Both prompt AND messages → throws.
kind: Run.Sequence
metadata:
  name: TestBothPromptAndMessagesRejected
steps:
  - name: Try
    try:
      - name: Invoke
        inputs:
          prompt: "x"
          messages:
            - { role: user, content: "y" }
        invoke: !ref C
      - name: NotReached
        inputs: { note: "should not get here" }
        invoke:
          kind: Assert.Schema
          schema: { type: object, properties: { note: { const: "UNREACHABLE" } }, required: [ note ] }
    catch:
      - name: AssertCaught
        inputs:
          code: "${{ error.code }}"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              code: { const: ERR_INVALID_INPUT }
            required: [ code ]
---
# Neither prompt NOR messages → throws.
kind: Run.Sequence
metadata:
  name: TestNeitherPromptNorMessagesRejected
steps:
  - name: Try
    try:
      - name: Invoke
        inputs: {}
        invoke: !ref C
      - name: NotReached
        inputs: { note: "should not get here" }
        invoke:
          kind: Assert.Schema
          schema: { type: object, properties: { note: { const: "UNREACHABLE" } }, required: [ note ] }
    catch:
      - name: AssertCaught
        inputs:
          code: "${{ error.code }}"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              code: { const: ERR_INVALID_INPUT }
            required: [ code ]
