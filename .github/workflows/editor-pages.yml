name: Deploy Editor

on:
  push:
    branches: [main]
    paths:
      - 'pnpm-lock.yaml'
      - 'apps/telo-editor/**'
      - 'analyzer/**'
      - 'sdk/**'
      - 'templating/**'
      - 'packages/ide-support/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: editor-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build editor
        run: pnpm --filter "@telorun/editor..." build

      - name: SPA deep-link fallback
        run: cp apps/telo-editor/dist/index.html apps/telo-editor/dist/404.html

      - name: Deploy to telorun/editor
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.EDITOR_PAGES_TOKEN }}
          external_repository: telorun/editor
          publish_branch: gh-pages
          publish_dir: apps/telo-editor/dist
          cname: editor.telo.run
