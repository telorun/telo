kind: Telo.Application
metadata:
  name: ConfigurableHttpServer
  version: 1.0.0
  description: |
    HTTP server demonstrating how application-level `variables` (env-bound,
    non-secret) and `secrets` flow into a `JavaScript.Script` handler at
    runtime. The handler echoes the configured upstream URL and a masked
    hint of the secret so you can verify both values made it end-to-end.

    Set the inputs in a sibling `.env.local`:
        API_BASE_URL=https://api.example.com
        STRIPE_SECRET_KEY=sk_test_demo_value
    Run, then:
        curl -X POST http://localhost:4444/v1/charge
imports:
  Http: std/http-server@0.9.0
  JavaScript: std/javascript@0.4.1
targets:
  - PaymentServer
variables:
  apiBaseUrl:
    env: API_BASE_URL
    type: string
secrets:
  stripeSecretKey:
    env: STRIPE_SECRET_KEY
    type: string
---
kind: Http.Api
metadata:
  name: PaymentApi
routes:
  - request:
      path: /charge
      method: POST
    handler:
      kind: JavaScript.Script
      code: |
        function main({ apiKey, baseUrl }) {
          const keyHint = apiKey
            ? `${apiKey.slice(0, 4)}…${apiKey.slice(-4)}`
            : "(unset)";
          return { upstream: baseUrl ?? "(unset)", keyHint };
        }
    inputs:
      apiKey: "${{ secrets.stripeSecretKey }}"
      baseUrl: "${{ variables.apiBaseUrl }}"
    returns:
      - status: 200
        content:
          application/json:
            body:
              ok: true
              upstream: "${{ result.upstream }}"
              keyHint: "${{ result.keyHint }}"
---
kind: Http.Server
metadata:
  name: PaymentServer
openapi:
  info:
    title: Configurable HTTP server
    version: 1.0.0
port: 4444
mounts:
  - path: /v1
    type: Http.Api.PaymentApi
