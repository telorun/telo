kind: Telo.Library
metadata:
  name: "config"
  namespace: std
  version: "0.6.0"
  repository: https://github.com/telorun/telo
  license: LicenseRef-SustainableUse
  description: >-
    Environment and configuration providers. Deprecated in favour of
    application-level `variables:` / `secrets:` with `env:` bindings; retained
    for backwards compatibility.
exports:
  kinds:
    - EnvironmentVariableStore
    - Variables
    - Secrets
    - Env
---
kind: "Telo.Definition"
metadata:
  name: "EnvironmentVariableStore"
  description: Provides a schema-typed store of configuration values sourced from environment variables.
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/config@0.3.2?local_path=./nodejs#env-variable-store-controller
schema:
  type: "object"
  properties:
    schema:
      title: Schema
      description: Variable schema loaded from the environment variable store.
      type: "object"
      additionalProperties:
        type: "object"
  required: ["schema"]
  additionalProperties: true
---
kind: "Telo.Definition"
metadata:
  name: "Variables"
  description: Provides non-secret configuration values mapped from keys in a referenced environment variable store.
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/config@0.3.2?local_path=./nodejs#variables-controller
schema:
  type: "object"
  properties:
    storeRef:
      title: Store Reference
      description: Reference to the environment variable store resource.
      type: "object"
      properties:
        name:
          title: Name
          description: Name of the referenced store resource.
          type: "string"
      required: ["name"]
      additionalProperties: false
    keys:
      title: Keys
      description: Mapping of target variable names to source store keys.
      type: "object"
      additionalProperties:
        type: "string"
  required: ["storeRef", "keys"]
  additionalProperties: true
---
kind: "Telo.Definition"
metadata:
  name: "Secrets"
  description: Provides secret configuration values mapped from keys in a referenced environment variable store.
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/config@0.3.2?local_path=./nodejs#secrets-controller
schema:
  type: "object"
  properties:
    storeRef:
      title: Store Reference
      description: Reference to the environment variable store resource.
      type: "object"
      properties:
        name:
          title: Name
          description: Name of the referenced store resource.
          type: "string"
      required: ["name"]
      additionalProperties: false
    keys:
      title: Keys
      description: Mapping of target secret names to source store keys.
      type: "object"
      additionalProperties:
        type: "string"
  required: ["storeRef", "keys"]
  additionalProperties: true
---
kind: "Telo.Definition"
metadata:
  name: "Env"
  description: |
    [Deprecated] Prefer declaring `variables:` / `secrets:` directly on
    Telo.Application with per-field `env:` mappings. The Application-level
    contract lands the values in the root `variables.X` / `secrets.X` CEL
    scope without an intermediate resource. Config.Env continues to work for
    now.
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/config@0.3.2?local_path=./nodejs#env-controller
schema:
  type: object
  properties:
    variables:
      title: Variables
      description: Variables read from environment variables.
      type: object
      additionalProperties:
        type: object
        properties:
          env:
            title: Environment Variable
            description: Name of the environment variable to read.
            type: string
          type:
            title: Type
            description: Declared scalar type of the value.
            type: string
            enum: [string, integer, number, boolean]
          default:
            title: Default
            description: Default value when the environment variable is not set.
        required: [env, type]
        additionalProperties: true
    secrets:
      title: Secrets
      description: Secrets read from environment variables.
      type: object
      additionalProperties:
        type: object
        properties:
          env:
            title: Environment Variable
            description: Name of the environment variable to read.
            type: string
          type:
            title: Type
            description: Declared scalar type of the value.
            type: string
            enum: [string, integer, number, boolean]
          default:
            title: Default
            description: Default value when the environment variable is not set.
        required: [env, type]
        additionalProperties: true
  additionalProperties: true
