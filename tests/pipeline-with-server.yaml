kind: Telo.Application
metadata:
  name: PipelineWithServer
  version: 1.0.0
imports:
  Http: ../modules/http-server
  HttpClient: ../modules/http-client
  Run: ../modules/run
  Assert: ../modules/assert
---
kind: Run.Sequence
metadata:
  name: TestServerWithLifecycle
with:
  - kind: Run.Value
    metadata:
      name: GreetingHandler
    inputs:
      name: { type: string }
    value:
      greeting: !cel "'Hello ' + inputs.name + '!'"
  - kind: Http.Api
    metadata:
      name: TestApi
    routes:
      - request:
          path: /hello
          method: GET
          schema:
            query:
              type: object
              properties:
                name:
                  type: string
              required: [ "name" ]
        inputs:
          name: "${{ request.query.name }}"
        handler: !ref GreetingHandler
        returns:
          - status: 200
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message: { type: string }
                  required: [ message ]
                body:
                  message: "${{ result.greeting }}"
  - kind: Http.Server
    metadata:
      name: TestServer
    port: 8845
    baseUrl: http://localhost:8845
    logger: false
    openapi:
      info:
        title: Test Server
        version: 1.0.0
    mounts:
      - path: /api
        mount: !ref TestApi
steps:
  - name: FetchGreeting
    inputs: {}
    invoke:
      kind: HttpClient.Request
      url: http://localhost:8845/api/hello?name=World
      method: GET

  - name: VerifyResponse
    inputs:
      message: "${{ steps.FetchGreeting.result.body.message }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          message:
            type: string
            const: "Hello World!"
        required:
          - message
