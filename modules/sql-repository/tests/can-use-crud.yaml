kind: Telo.Application
metadata:
  name: CanUseCrud
  version: 1.0.0
imports:
  Sql: ../../sql
  SqlSqlite: ../../sql-sqlite
  SqlRepository: ../
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestCrud
---
kind: SqlSqlite.Connection
metadata:
  name: Db
file: ":memory:"
---
kind: SqlRepository.Create
metadata:
  name: InsertUser
connection: !ref Db
table: users
---
kind: SqlRepository.Read
metadata:
  name: GetUsers
connection: !ref Db
table: users
---
kind: SqlRepository.Delete
metadata:
  name: DeleteUser
connection: !ref Db
table: users
---
kind: Run.Sequence
metadata:
  name: TestCrud
steps:
  - name: Setup
    inputs:
      sql: "CREATE TABLE users (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL)"
    invoke:
      kind: Sql.Command
      connection: !ref Db

  - name: Insert
    inputs:
      data:
        name: Alice
    invoke: !ref InsertUser

  - name: Read
    inputs:
      filters: {}
    invoke: !ref GetUsers

  - name: AssertRead
    inputs:
      rows: "${{ steps.Read.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            minItems: 1
            items:
              type: object
              properties:
                name:
                  const: Alice

  - name: Delete
    inputs:
      filters:
        name: Alice
    invoke: !ref DeleteUser

  - name: ReadAfterDelete
    inputs:
      filters: {}
    invoke: !ref GetUsers

  - name: AssertEmpty
    inputs:
      rows: "${{ steps.ReadAfterDelete.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            maxItems: 0
