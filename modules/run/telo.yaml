kind: Telo.Library
metadata:
  name: run
  namespace: std
  version: 0.8.0
  description: Run sequence of invocable resources with if, while, switch, and try steps
exports:
  kinds:
    - Sequence
    - Value
---
kind: Telo.Definition
metadata:
  name: Sequence
capability: Telo.Runnable
topology: Sequence
controllers:
  - pkg:npm/@telorun/run@0.6.0?local_path=./nodejs#sequence
throws:
  inherit: true
schema:
  type: object
  $defs:
    step:
      title: Step
      description: Single executable step or control-flow block.
      type: object
      properties:
        name:
          title: Name
          description: Unique step name.
          type: string
      oneOf:
        - title: invoke
          description: Invokes an invocable or runnable resource.
          properties:
            invoke:
              title: Invoke
              description: Resource to invoke for this step.
              x-telo-topology-role: invoke
              # A reference is always an object (a `!ref` sentinel or its resolved
              # `{kind, name}`); requiring an object rejects a bare-string ref —
              # which `validateReferenceForms` cannot catch at this nested slot —
              # at `telo check` instead of as an obscure runtime failure.
              type: object
              anyOf:
                - title: Invocable
                  description: Reference to an invocable resource.
                  x-telo-ref: "telo#Invocable"
                - title: Runnable
                  description: Reference to a runnable resource.
                  x-telo-ref: "telo#Runnable"
            inputs:
              title: Inputs
              description: Inputs passed to the invoked resource.
              x-telo-topology-role: inputs
              type: object
              additionalProperties: true
            retry:
              title: Retry
              description: Retry policy for step invocation.
              type: object
              properties:
                attempts:
                  title: Attempts
                  description: Maximum retry attempts.
                  type: integer
                delay:
                  title: Delay
                  description: Delay between retries.
                  type: string
          required:
            - invoke

        - title: if/then/else
          description: Conditional branch; executes then or else based on a boolean expression.
          properties:
            if:
              title: If
              description: CEL boolean expression; true executes then, false executes else.
              x-telo-topology-role: predicate
              type: boolean
            elseif:
              title: Else If
              description: Additional condition-branch pairs evaluated when if is false.
              x-telo-topology-role: branch-list
              type: array
              items:
                type: object
                properties:
                  if:
                    title: If
                    description: CEL boolean expression for this else-if branch.
                    x-telo-topology-role: predicate
                    type: boolean
                  then:
                    title: Then
                    description: Steps executed when this else-if condition is true.
                    x-telo-topology-role: branch
                    type: array
                    items:
                      $ref: "#/$defs/step"
                required:
                  - if
                  - then
            then:
              title: Then
              description: Steps executed when if evaluates true.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/step"
            else:
              title: Else
              description: Steps executed when if (and all elseif conditions) evaluate false.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/step"
          required:
            - if
            - then

        - title: while/do
          description: Loop; executes do steps repeatedly while condition is true.
          properties:
            while:
              title: While
              description: CEL boolean expression; evaluated before each iteration.
              x-telo-topology-role: predicate
              type: boolean
            do:
              title: Do
              description: Steps executed on each iteration.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/step"
          required:
            - while
            - do

        - title: switch/cases/default
          description: Multi-branch dispatch; matches a value expression against case keys.
          properties:
            switch:
              title: Switch
              description: CEL expression; result matched against case keys.
              x-telo-topology-role: discriminator
              type: string
            cases:
              title: Cases
              description: Map of value to step list; executed when switch matches the key.
              x-telo-topology-role: case-map
              type: object
              additionalProperties:
                type: array
                items:
                  $ref: "#/$defs/step"
            default:
              title: Default
              description: Steps executed when no case matches.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/step"
          required:
            - switch
            - cases

        - title: try/catch/finally
          description: Error boundary; executes try steps and handles failure via catch and finally.
          properties:
            try:
              title: Try
              description: Steps executed; halts on first failure and jumps to catch.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/step"
            catch:
              title: Catch
              description: Steps executed when try fails; receives error context.
              x-telo-topology-role: branch
              x-telo-error-context:
                type: object
                description: The caught failure (always present inside catch).
                properties: &errorContextProps
                  code:
                    description: Structured error code; INTERNAL_ERROR for plain errors.
                    type: string
                  message:
                    description: Human-readable error message.
                    type: string
                  step:
                    description: Name of the step that threw.
                    type: string
                  data:
                    description: Structured payload from an InvokeError, else undefined.
                additionalProperties: false
              type: array
              items:
                $ref: "#/$defs/step"
            finally:
              title: Finally
              description: Steps always executed after try/catch regardless of outcome.
              x-telo-topology-role: branch
              # error is null on the success path and the caught failure when a
              # try/catch failure propagates (see executeTryStep). Typed nullable
              # so the analyzer flags unguarded field access (CEL_NULLABLE_ACCESS).
              x-telo-error-context:
                type: ["object", "null"]
                description: The caught failure, or null when try (and catch) succeeded.
                properties: *errorContextProps
                additionalProperties: false
              type: array
              items:
                $ref: "#/$defs/step"
          required:
            - try

        - title: throw
          description: >-
            Throws an InvokeError unconditionally. Works inside catch blocks via CEL
            (e.g. code set to `"${{ error.code }}"`).
          properties:
            throw:
              title: Throw
              description: InvokeError descriptor; code is required, message/data optional.
              type: object
              properties:
                code:
                  title: Code
                  description: Structured error code; uppercase SNAKE_CASE by convention.
                  type: string
                message:
                  title: Message
                  description: Human-readable error message. Defaults to `code` when omitted.
                  type: string
                data:
                  title: Data
                  description: Optional structured payload attached to the error.
              required:
                - code
          required:
            - throw
      required:
        - name

  properties:
    with:
      title: With
      # Visibility covers both `/steps` (where steps reference with-resources)
      # and `/targets` (the run-before-steps references), so a `!ref` in either
      # resolves against the scoped resources.
      x-telo-scope: [ "/steps", "/targets" ]
      description: Resources available during sequence execution; torn down when done
    targets:
      title: Targets
      type: array
      description: with-resources to run() before executing steps; torn down when done. Reference each with a `!ref <name>`.
      items:
        title: Target
        description: A with-resource to run before steps — write it as a `!ref`.
        anyOf:
          - type: string
            x-telo-ref: "telo#Runnable"
          - type: string
            x-telo-ref: "telo#Service"
          - $ref: "telo://manifest#/$defs/ResourceRef"
    inputs:
      title: Inputs
      type: object
      description: >-
        The sequence's input contract: a JSON Schema property map (name →
        schema), NOT values. Each key declares one input the sequence accepts;
        an empty schema `{}` declares an untyped (dyn) input. Callers supply
        actual values at invoke time (e.g. an `Http.Api` route's `inputs:`
        CEL map, or a parent step's `inputs:`), and steps read them as
        `!cel "inputs.<name>"`.
      additionalProperties: true
    outputs:
      title: Outputs
      type: object
      description: >-
        A CEL map (key → `!cel` expression) evaluated over `steps.*` and
        `inputs.*` after the steps run. Its value becomes the sequence's
        `result` — what a caller sees, e.g. an `Http.Api` route's `returns:`.
        Omit it to return the raw step-results map.
      additionalProperties: true
    steps:
      title: Steps
      description: Ordered sequence of steps to execute.
      x-telo-topology-role: steps
      type: array
      x-telo-step-context:
        invoke: invoke
        outputType: outputType
      items:
        $ref: "#/$defs/step"
  required:
    - steps
  examples:
    - inputs:
        userId: {}
        limit: { type: integer }
      steps:
        - name: fetchUser
          invoke: !ref GetUser
          inputs:
            bindings:
              - !cel "inputs.userId"
        - name: count
          invoke: !ref CountPosts
          inputs:
            bindings:
              - !cel "inputs.userId"
              - !cel "inputs.limit"
      outputs:
        name: !cel "steps.fetchUser.result.rows[0].name"
        postCount: !cel "steps.count.result.rows[0].n"
---
kind: Telo.Definition
metadata:
  name: Value
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/run@0.6.0?local_path=./nodejs#value
schema:
  type: object
  properties:
    inputs:
      title: Inputs
      description: >-
        The value's input contract: a JSON Schema property map (name → schema),
        NOT values. Each key declares one input the resource accepts; an empty
        schema `{}` declares an untyped (dyn) input. Callers supply actual
        values at invoke time (an `Ai.Tools` entry, a parent `Run.Sequence`
        step, an `Http.Api` route), and `value` reads them as `!cel "inputs.x"`.
      type: object
      additionalProperties: true
    value:
      title: Value
      description: >-
        A CEL expression — or a structure (map / array) with `!cel` leaves —
        evaluated at invoke time over `inputs`. Its result becomes the
        resource's invoke result and may be any shape (object, array, scalar).
        The declarative replacement for a `Js.Script` that only shapes a value
        (concat, field mapping, a constant literal) with no I/O or branching.
      x-telo-context:
        type: object
        properties:
          inputs:
            type: object
            x-telo-context-from: "inputs"
  required:
    - value
  examples:
    - inputs:
        a: { type: number }
        b: { type: number }
      value:
        product: !cel "inputs.a * inputs.b"
    - value:
        - { type: text, text: page rendered }
        - { type: image, data: aGVsbG8=, mediaType: image/png }
