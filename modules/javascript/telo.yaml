kind: Kernel.Library
metadata:
  name: "javascript"
  namespace: std
  version: "0.2.0"
---
kind: "Kernel.Definition"
metadata:
  name: "Script"
capability: Kernel.Invocable
controllers:
  - pkg:npm/@telorun/javascript@0.1.9?local_path=./nodejs#script
schema:
  type: "object"
  properties:
    code:
      title: Code
      description: JavaScript source code executed by this resource.
      type: "string"
    inputType:
      title: Input Type
      description: Named type reference or inline type definition for invocation inputs.
      x-telo-ref: "kernel#Type"
      oneOf:
        - type: "string"
        - type: "object"
          additionalProperties: true
    outputType:
      title: Output Type
      description: Named type reference or inline type definition for invocation outputs.
      x-telo-ref: "kernel#Type"
      oneOf:
        - type: "string"
        - type: "object"
          additionalProperties: true
  required: ["metadata", "code"]
  additionalProperties: false
