kind: Run.Sequence
metadata:
  name: TestIncludeBasic
steps:
  - name: AddNumbers
    inputs:
      a: 10
      b: 20
    invoke:
      kind: Run.Value
      inputs:
        a: { type: number }
        b: { type: number }
      value:
        sum: !cel "inputs.a + inputs.b"
  - name: VerifySum
    inputs:
      sum: "${{ steps.AddNumbers.result.sum }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          sum:
            type: number
            const: 30
        required:
          - sum
