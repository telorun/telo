kind: Telo.Application
metadata:
  name: RunSequenceBasic
  version: 1.0.0
imports:
  Run: ../
  Assert: ../../assert
targets:
  - !ref TestInvokeStep
---
kind: Run.Sequence
metadata:
  name: TestInvokeStep
steps:
  - name: AddNumbers
    inputs:
      a: 5
      b: 3
    invoke:
      kind: Run.Value
      inputs:
        a: { type: number }
        b: { type: number }
      value:
        sum: !cel "inputs.a + inputs.b"
  - name: VerifySum
    inputs:
      sum: "${{ steps.AddNumbers.result.sum }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          sum:
            type: number
            const: 8
---
kind: Assert.Events
metadata:
  name: ExpectEvents
filter:
  - type: "*"
expect:
  - event: "*.Invoked"
    payload:
      ref: { kind: Run.Value }
      outputs:
        sum: 8
  - event: "*.Invoked"
    payload:
      ref: { kind: Assert.Schema }
      outputs: true
