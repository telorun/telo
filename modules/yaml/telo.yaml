kind: Telo.Library
metadata:
  name: yaml
  namespace: std
  version: 0.2.0
  description: |
    YAML parsing for Telo manifests. Currently exposes `Yaml.Parse` — a batch
    parser that accepts a UTF-8 string and returns the parsed documents as plain
    JS values. Multi-document files are handled natively (`docs[]`); single-doc
    callers read `docs[0]`.
exports:
  kinds:
    - Parse
---
# Yaml.Parse — UTF-8 string → parsed YAML documents. Multi-doc-aware
# (`yaml.parseAllDocuments`); even single-doc input always lands in `docs[0]`.
kind: Telo.Definition
metadata:
  name: Parse
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/yaml@0.2.0?local_path=./nodejs#parse
throws:
  codes:
    ERR_PARSE_FAILED:
      description: Input was not valid YAML. The original parser error (with line/column when available) is preserved on `data`.
schema:
  type: object
  additionalProperties: false
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      text:
        type: string
        description: UTF-8 YAML source to parse.
    required: [text]
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      docs:
        type: array
        description: |
          Parsed documents in source order. Empty input yields an empty array.
          Each entry mirrors the source document's top-level value — typically
          an object, but YAML permits scalars and arrays at the document root,
          so `items: {}` (any value) is the honest schema.
        items: {}
    required: [docs]
    additionalProperties: false
