kind: Kernel.Module
metadata:
  name: CanImportModuleWithAlias
  version: 1.0.0
targets:
  - MyConsole
  - VerifyConfigurableConsoleEvents
  - VerifyConfigurableConsoleModuleContext
---
kind: Kernel.Import
metadata:
  name: MyAssert
  module: CanImportModuleWithAlias
source: ../modules/assert
---
kind: Kernel.Import
metadata:
  name: MyConsole
  module: CanImportModuleWithAlias
source: ../examples/configurable-console.yaml
variables:
  product:
    id: "123e4567-e89b-12d3-a456-426614174000"
    name: "Test Product"
    price: 19.99
    inStock: true
secrets:
  password: "supersecret"
---
kind: MyAssert.Events
metadata:
  name: VerifyConfigurableConsoleEvents
  module: CanImportModuleWithAlias
filter:
  - type: "*"
expect:
  - event: Console.WriteLine.*.Invoked
    payload: {}
---
kind: MyAssert.ModuleContext
metadata:
  name: VerifyConfigurableConsoleModuleContext
  module: CanImportModuleWithAlias
resources:
  MyConsole:
    variables:
      product:
        id: "123e4567-e89b-12d3-a456-426614174000"
        name: "Test Product"
        price: 19.99
        inStock: true
    secrets:
      password: "supersecret"
