kind: Telo.Application
metadata:
  name: JavaScriptDemo
  version: 1.0.0
  description: A demo showcasing a JavaScript script run from flat `targets`.
imports:
  Type: std/type@0.2.1
  JavaScript: std/javascript@0.4.1
  Console: std/console@0.8.0
targets:
  - name: Step1
    invoke: !ref MultiplyBy2
    inputs:
      value: 42
  - name: PrintResult
    invoke: !ref Console.writeLine
    inputs:
      output: |
        Evaluated JavaScript code.
        Result is: ${{ steps.Step1.result.result }}
---
kind: JavaScript.Script
metadata:
  name: MultiplyBy2
code: |
  function main({ value }) {
    return { result: value * 2 }
  }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      value: { type: number }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      result: { type: number }
