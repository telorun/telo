kind: Telo.Application
metadata:
  name: NapiEchoLoads
  version: 1.0.0
  description: Verifies the kernel's NapiControllerLoader can dispatch a pkg:cargo PURL end-to-end (cargo build, dylib rename, .node load).
imports:
  NapiTest: ./__fixtures__/napi-test/telo.yaml
  Assert: ../modules/assert
targets:
  - !ref VerifyKernelStarted
---
kind: NapiTest.Echo
metadata:
  name: TheEcho
---
kind: Assert.Events
metadata:
  name: VerifyKernelStarted
filter:
  - type: "Kernel.*"
expect:
  - event: Kernel.Initialized
