kind: Telo.Library
metadata:
  name: scope-lib
  version: 1.0.0
  description: |
    Test fixture: a library that defines an Http.Api whose route handlers use the
    library's OWN import alias (`JS`) — both an inline `kind:` handler and a
    `!ref` to a library-local resource. Importers mount the Api in their own
    Http.Server. These handlers are anonymous children / local references of THIS
    document and must resolve `JS` against THIS library's import map, not the
    consumer's (which never imports javascript under the alias `JS`).
imports:
  Http: ../../../
  JS: ../../../../javascript
  Type: ../../../../type
exports:
  resources:
    - Api
---
kind: JS.Script
metadata: { name: LocalGreet }
code: |
  async function main() {
    return { message: "ref handler in scope-lib" };
  }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      message: { type: string }
    required: [ message ]
---
kind: Http.Api
metadata: { name: Api }
routes:
  # Inline `kind:` handler — an anonymous child declared in this library.
  - request:
      path: /inline
      method: GET
    handler:
      kind: JS.Script
      code: |
        async function main() {
          return { message: "inline handler in scope-lib" };
        }
      outputType:
        kind: Type.JsonSchema
        schema:
          type: object
          properties:
            message: { type: string }
          required: [ message ]
    returns:
      - status: 200
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
              required: [ message ]
  # `!ref` to a library-local resource.
  - request:
      path: /ref
      method: GET
    handler: !ref LocalGreet
    returns:
      - status: 200
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
              required: [ message ]
