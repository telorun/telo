kind: Kernel.Application
metadata:
  name: TextApi
  version: 1.0.0
  description: Stateless text analysis and transformation API — no database.
targets:
  - Server
---
kind: Kernel.Import
metadata:
  name: Http
source: ../modules/http-server
---
kind: Kernel.Import
metadata:
  name: JavaScript
source: ../modules/javascript
---
kind: JavaScript.Script
metadata:
  name: Analyze
  module: TextApi
code: |
  function main({ text }) {
    const words = text.trim().split(/\s+/).filter(w => w.length > 0)
    const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0)
    const avgWordLength = words.length > 0
      ? Math.round(words.reduce((s, w) => s + w.length, 0) / words.length * 10) / 10
      : 0
    return {
      chars: text.length,
      words: words.length,
      sentences: sentences.length,
      avgWordLength,
      readingTimeSec: Math.round(words.length / 3.5),
    }
  }
---
kind: JavaScript.Script
metadata:
  name: Transform
  module: TextApi
code: |
  function main({ text, op }) {
    if (op === 'upper')   return { result: text.toUpperCase() }
    if (op === 'lower')   return { result: text.toLowerCase() }
    if (op === 'reverse') return { result: text.split('').reverse().join('') }
    if (op === 'slug')    return { result: text.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') }
    throw new Error('Unknown op: ' + op)
  }
---
kind: Http.Server
metadata:
  name: Server
  module: TextApi
baseUrl: http://localhost:8845
port: 8845
logger: false
mounts:
  - path: /v1
    type: Http.Api.Routes
---
kind: Http.Api
metadata:
  name: Routes
  module: TextApi
routes:
  - request:
      path: /ping
      method: GET
    response:
      - status: 200
        body:
          ok: true

  - request:
      path: /analyze
      method: POST
      schema:
        body:
          type: object
          required: [text]
          properties:
            text:
              type: string
    handler:
      kind: JavaScript.Script
      name: Analyze
      inputs:
        text: "${{ request.body.text }}"
    response:
      - status: 200
        body: "${{ result }}"

  - request:
      path: /transform
      method: POST
      schema:
        body:
          type: object
          required: [text, op]
          properties:
            text:
              type: string
            op:
              type: string
    handler:
      kind: JavaScript.Script
      name: Transform
      inputs:
        text: "${{ request.body.text }}"
        op: "${{ request.body.op }}"
    response:
      - status: 200
        body: "${{ result }}"
