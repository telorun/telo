kind: Kernel.Module
metadata:
  name: flow
  namespace: std
  version: 1.1.0
exports:
  kinds:
    - Steps
---
kind: Kernel.Definition
metadata:
  name: Steps
extends: Kernel.Runnable
controllers:
  - pkg:npm/@telorun/flow@>=1.1.0?local_path=./nodejs#flow
schema:
  type: object
  properties:
    inputs:
      type: object
      description: Declared input schema for this flow (JSON Schema property definitions)
      additionalProperties:
        type: object
    steps:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          when:
            type: string
            description: CEL expression; step is skipped when falsy
          invoke:
            type: object
            properties:
              kind:
                type: string
                description: Resource kind to invoke (e.g., D1.ReadOne, R2.Put)
        required:
          - name
          - invoke
    output:
      type: object
      description: CEL mapping producing the flow result (status, headers, body)
      additionalProperties: true
  required:
    - steps
