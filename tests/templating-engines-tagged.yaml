kind: Telo.Application
metadata:
  name: TemplatingEnginesTagged
  version: 1.0.0
imports:
  Run: ../modules/run
  Assert: ../modules/assert
targets:
  - !ref TestTagged
---
# Mixed templating engines on the same field type. Each step exercises one
# delivery mode and asserts the value the Run.Value controller actually
# received — !cel evaluates the expression, !literal keeps the string
# verbatim (the literal `${{...}}` text is passed through, not interpolated),
# and untagged ${{ ... }} interpolates as before.
kind: Run.Sequence
metadata:
  name: TestTagged
steps:
  # !cel — entire scalar is one CEL expression, no ${{ }} wrapping.
  - name: CelTaggedSum
    inputs:
      a: !cel "1.0 + 2.0"
      b: !cel "10.0 * 4.0"
    invoke:
      kind: Run.Value
      inputs:
        a: { type: number }
        b: { type: number }
      value:
        value: !cel "inputs.a + inputs.b"
  - name: AssertCelSum
    inputs:
      value: "${{ steps.CelTaggedSum.result.value }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          value:
            type: number
            const: 43
        required: [ value ]

  # !literal — the controller must receive the raw string, including the
  # literal `${{ }}` braces. No interpolation, no compile.
  - name: LiteralTagged
    inputs:
      raw: !literal "Hello ${{ this is not interpolated }}"
    invoke:
      kind: Run.Value
      inputs:
        raw: { type: string }
      value:
        passthrough: !cel "inputs.raw"
  - name: AssertLiteralPassthrough
    inputs:
      passthrough: "${{ steps.LiteralTagged.result.passthrough }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          passthrough:
            type: string
            const: !literal "Hello ${{ this is not interpolated }}"
        required: [ passthrough ]

  # Mixing tagged + untagged on the same field. Untagged ${{ }} still
  # interpolates; tagged !cel still evaluates as a single expression.
  - name: MixedField
    inputs:
      interpolated: "answer is ${{ 42 }}"
      celField: !cel "100.0 - 58.0"
    invoke:
      kind: Run.Value
      inputs:
        interpolated: { type: string }
        celField: { type: number }
      value:
        interpolated: !cel "inputs.interpolated"
        celField: !cel "inputs.celField"
  - name: AssertMixed
    inputs:
      interpolated: "${{ steps.MixedField.result.interpolated }}"
      celField: "${{ steps.MixedField.result.celField }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          interpolated:
            type: string
            const: "answer is 42"
          celField:
            type: number
            const: 42
        required: [ interpolated, celField ]
