kind: Kernel.Module
metadata:
  name: StarlarkDemo
  version: 1.0.0
  description: A demo module showcasing Starlark scripts
targets:
  - RunScriptOnEvent
---
kind: Kernel.Import
metadata:
  name: Run
source: ../modules/run
---
kind: Kernel.Import
metadata:
  name: Starlark
source: ../modules/starlark
---
kind: Kernel.Import
metadata:
  name: Console
source: ../modules/console
---
kind: Starlark.Script
metadata:
  name: ExampleStarlarkScript
code: |
  def run(input):
    result = input["value"] * 2
    return {"result": result}
inputSchema:
  type: object
  properties:
    value:
      type: number
  required: [value]
outputSchema:
  type: object
  properties:
    result:
      type: number
  required: [result]
---
kind: Console.WriteLine
metadata:
  name: WriteResult
inputSchema:
  type: object
  properties:
    result:
      type: number
  required: [result]
output: |
  Evaluated starlark code.
  Result is: ${{ result }}
---
kind: Run.Sequence
metadata:
  name: RunScriptOnEvent
steps:
  - name: Step1
    inputs:
      value: 42
    invoke:
      kind: Starlark.Script
      name: ExampleStarlarkScript
  - name: Step2
    inputs:
      result: "${{ steps.Step1.result.result }}"
    invoke:
      kind: Console.WriteLine
      name: WriteResult
