kind: Telo.Library
metadata:
  name: console
  namespace: std
  version: 0.11.0
  description: >-
    Console I/O over stdin and stdout. `Console.WriteLine` and `Console.ReadLine`
    handle line text with `{style}` markup; `Console.WriteStream` and
    `Console.StreamWait` drain and animate streaming output.
exports:
  kinds:
    - WriteLine
    - ReadLine
    - WriteStream
    - StreamWait
  resources:
    - writeLine
    - readLine
---
kind: Telo.Definition
metadata:
  name: WriteLine
  description: >-
    Print a line of text to standard output. Inline markup tags of the form
    `{style content}` (e.g. `{green world}`) render as ANSI colour and style
    escapes when stdout is a TTY and are stripped to plain text otherwise, so
    the same manifest stays readable in piped or captured logs. Takes no
    configuration — importers usually reference the shared `Console.writeLine`
    instance instead of declaring their own.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/console@0.9.0?local_path=./nodejs#writeline
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    examples:
      - output: "Hello {green world}"
    properties:
      output:
        title: Output
        description: |
          Text content written to standard output. Markup tags `{style content}`
          are rendered to ANSI on a TTY and stripped to plain text otherwise.
        type: string
    required: [output]
    additionalProperties: false
schema:
  type: object
  additionalProperties: false
---
kind: Telo.Definition
metadata:
  name: ReadLine
  description: >-
    Prompt the user and read one line of interactive input from standard input,
    returning the entered text. The prompt is written to stdout
    character-for-character with no auto-appended `: ` suffix, and its
    `{style content}` markup renders to ANSI on a TTY and is stripped to plain
    text otherwise. Config-free — importers typically use the shared
    `Console.readLine` instance.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/console@0.9.0?local_path=./nodejs#readline
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    examples:
      - prompt: "Name: "
    properties:
      prompt:
        title: Prompt
        description: |
          Prompt text written to stdout before reading input. Rendered
          character-for-character — no auto-appended `: ` suffix. Markup
          tags `{style content}` are rendered to ANSI on a TTY and stripped
          to plain text otherwise.
        type: string
    required: [prompt]
    additionalProperties: false
schema:
  type: object
  additionalProperties: false
---
# Drain a `Stream<string | Uint8Array>` to stdout. Strings use Node's native
# UTF-8 path; Uint8Array chunks pass through unchanged. No newline policy —
# producers control framing.
kind: Telo.Definition
metadata:
  name: WriteStream
  description: >-
    Drain a `Stream<string | Uint8Array>` to standard output, writing each chunk
    as it arrives instead of buffering the whole value — the sink for streaming
    producers such as Shell.CommandStream or an AI model's token stream. Strings
    go through Node's native UTF-8 path and byte chunks pass through unchanged;
    there is no newline policy, so the producer controls framing.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/console@0.9.0?local_path=./nodejs#writestream
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      input:
        x-telo-stream: true
        description: Async iterable of strings or Uint8Array chunks to write to stdout.
    required: [input]
    additionalProperties: false
schema:
  type: object
  additionalProperties: false
---
# Animate a single-cell frame sequence on stdout while waiting for the
# first item from an input stream, then clear the cell and forward every
# item unchanged. Bytes flow through the output stream — the only resource
# that writes to stdout is the downstream sink (typically Console.WriteStream).
kind: Telo.Definition
metadata:
  name: StreamWait
  description: >-
    Show a spinner / loading indicator while waiting for a slow stream to
    produce its first item, then clear it and forward every item unchanged.
    Sits between a streaming producer and a sink: the prefix text, reserved
    animation cell, cycling single-character frames, and clear sequence are
    embedded in the head of the forwarded output stream, so this resource never
    writes to stdout itself — the downstream sink (typically
    Console.WriteStream) does.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/console@0.9.0?local_path=./nodejs#streamwait
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      input:
        x-telo-stream: true
        description: Async iterable to forward; the animation runs until the first item arrives.
    required: [input]
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      output:
        x-telo-stream: true
        description: |
          Forwarded stream. The head of the stream carries the prefix, the
          reserved-cell setup, animation frames, and a clear sequence; after
          the first input item is observed, every input item is forwarded
          verbatim.
    required: [output]
    additionalProperties: false
schema:
  type: object
  properties:
    prefix:
      title: Prefix
      description: |
        Text written once at the start, before the animation cell. Markup
        tags `{style content}` render to ANSI on a TTY and strip to plain
        text otherwise. Must not contain `\n`, `\r`, `\b`, or `\x1b`.
      type: string
      default: ""
    frames:
      title: Frames
      description: |
        Animation frames cycled at `intervalMs`. Each frame must be a
        single-character string (`length === 1`). Default: braille
        spinner cycle.
      type: array
      minItems: 1
      items:
        type: string
        minLength: 1
        maxLength: 1
      default: ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"]
    intervalMs:
      title: Interval (ms)
      description: Tick period in milliseconds. Minimum 16.
      type: integer
      minimum: 16
      default: 80
  additionalProperties: false
---
# Ready-made singleton instances exported via `exports.resources`. Consumers reference
# them directly (`!ref Console.writeLine`) instead of declaring their own — `WriteLine`
# and `ReadLine` are config-free, so a single shared instance per import is all that's
# needed. Declared with `Self.<Kind>` (the library's own module alias).
kind: Self.WriteLine
metadata:
  name: writeLine
  description: >-
    Ready-made shared instance for printing lines to stdout, referenced by
    importers as `!ref Console.writeLine` in boot targets, step `invoke:` slots,
    and any Invocable ref slot. Exists because Console.WriteLine is config-free,
    so one shared singleton per import is all anyone needs — no declaration
    boilerplate in consumer manifests.
---
kind: Self.ReadLine
metadata:
  name: readLine
  description: >-
    Ready-made shared instance for prompting and reading a line of user input,
    referenced by importers as `!ref Console.readLine`. Exists because
    Console.ReadLine takes no configuration, so a single shared singleton per
    import suffices and consumers skip declaring their own.
