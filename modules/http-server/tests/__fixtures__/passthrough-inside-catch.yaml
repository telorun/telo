kind: Telo.Library
metadata:
  name: PassthroughInsideCatchFixture
  version: 1.0.0
---
kind: Telo.Import
metadata:
  name: Http
source: ../..
---
kind: Telo.Import
metadata:
  name: Run
source: ../../../run
---
# try block throws A or B; catch logs (doesn't affect throws) then re-raises
# via Run.Throw with `${{ error.code }}`. Resolver must see that the sequence's
# propagated union equals the try block's {A, B}.
kind: Run.Sequence
metadata:
  name: CatchAndRethrow
steps:
  - name: outer
    try:
      - name: branch
        if: "${{ true }}"
        then:
          - name: throwA
            invoke: { kind: Run.Throw }
            inputs: { code: "A", message: "a" }
        else:
          - name: throwB
            invoke: { kind: Run.Throw }
            inputs: { code: "B", message: "b" }
    catch:
      - name: rethrow
        invoke: { kind: Run.Throw }
        inputs:
          code: "${{ error.code }}"
          message: "${{ error.message }}"
---
# Route covers both A and B explicitly — zero analyzer errors.
kind: Http.Api
metadata:
  name: CatchRethrowApi
routes:
  - request:
      path: /x
      method: GET
    handler:
      kind: Run.Sequence
      name: CatchAndRethrow
    returns:
      - status: 200
        body: { ok: true }
    catches:
      - when: "${{ error.code in ['A', 'B'] }}"
        status: 400
        body: { error: "${{ error.message }}" }
