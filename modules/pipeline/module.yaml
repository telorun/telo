kind: Kernel.Module
metadata:
  name: pipeline
  namespace: std
  version: 0.2.0
  description: Orchestration framework using inline resource execution
---
kind: Kernel.Definition
metadata:
  name: Job
capability: Kernel.Runnable
controllers:
  - pkg:npm/@telorun/pipeline@>=1.1.0?local_path=./nodejs#job
schema:
  type: object
  properties:
    with:
      x-telo-scope: /steps
      description: Resources available during pipeline execution; torn down when done
    steps:
      type: array
      items:
        type: object
        properties:
          invoke:
            anyOf:
              - x-telo-ref: "kernel#Invocable"
              - x-telo-ref: "kernel#Runnable"
  required:
    - steps
