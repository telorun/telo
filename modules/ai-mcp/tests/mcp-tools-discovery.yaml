kind: Telo.Application
metadata:
  name: AiMcpDiscoveryTest
  version: 1.0.0
imports:
  Ai: ../../ai
  AiMcp: ../
  AiEcho: ../../ai/tests/__fixtures__/ai-echo.yaml
  Stub: ./__fixtures__/stub-mcp.yaml
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestMcpAgent
---
# A stub MCP server advertising one tool (echo_text).
kind: Stub.StubClient
metadata:
  name: McpServer
---
# The bridge: turns the Mcp.Client into an Ai.ToolProvider the agent can discover.
kind: AiMcp.ToolProvider
metadata:
  name: ServerTools
client: !ref McpServer
---
# Echo discovers the tool (echo_text) and requests it on the first turn.
kind: AiEcho.EchoModel
metadata:
  name: Echo
emitToolCall:
  name: echo_text
  arguments: { text: "hi" }
---
kind: Ai.Agent
metadata:
  name: Assistant
model: !ref Echo
toolProviders:
  - provider: !ref ServerTools
---
kind: Run.Sequence
metadata:
  name: TestMcpAgent
steps:
  - name: Invoke
    inputs:
      prompt: "echo hi please"
    invoke: !ref Assistant
  # Discovery → tools/list → echo_text. Echo calls it → tools/call → content echoed
  # back. The MCP `content` array is itself content parts, so the agent carries the
  # text part through and the (text) model flattens it to "echoed: hi".
  - name: AssertText
    inputs:
      text: "${{ steps.Invoke.result.text }}"
      toolName: "${{ steps.Invoke.result.steps[0].toolCalls[0].name }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text:
            type: string
            const: 'echoed: hi'
          toolName:
            type: string
            const: echo_text
        required: [ text, toolName ]
