kind: Telo.Application
metadata:
  name: AiMcpMixedToolsTest
  version: 1.0.0
imports:
  Ai: ../../ai
  AiMcp: ../
  AiEcho: ../../ai/tests/__fixtures__/ai-echo.yaml
  Js: ../../javascript
  Stub: ./__fixtures__/stub-mcp.yaml
  Run: ../../run
  Assert: ../../assert
targets:
  - TestMixed
---
# Mixed providers in one agent: a static Ai.Tools list AND an MCP server. This is the
# headline scenario from the example, and it guards the analyzer fix — referencing
# Ai.Tools (extends: Self.ToolProvider) while ai-mcp also implements Ai.ToolProvider must
# resolve cleanly (both are valid Ai.ToolProvider implementations).
kind: Stub.StubClient
metadata:
  name: McpServer
---
kind: AiMcp.ToolProvider
metadata:
  name: ServerTools
client:
  kind: Stub.StubClient
  name: McpServer
---
kind: Js.Script
metadata:
  name: Multiplier
code: |
  function main({ a, b }) { return { product: a * b }; }
---
kind: Ai.Tools
metadata:
  name: LocalTools
tools:
  - tool: { kind: Js.Script, name: Multiplier }
    name: multiply
    description: Multiply two numbers.
    parameters:
      type: object
      additionalProperties: false
      required: [ a, b ]
      properties:
        a: { type: number }
        b: { type: number }
---
# Echo calls the static `multiply` tool (the MCP `echo_text` tool is also discovered and
# advertised, exercising tool assembly across both providers).
kind: AiEcho.EchoModel
metadata:
  name: Echo
emitToolCall:
  name: multiply
  arguments: { a: 6, b: 7 }
---
kind: Ai.Agent
metadata:
  name: Assistant
model:
  kind: AiEcho.EchoModel
  name: Echo
toolProviders:
  - provider: { kind: Ai.Tools, name: LocalTools }
  - provider: { kind: AiMcp.ToolProvider, name: ServerTools }
---
kind: Run.Sequence
metadata:
  name: TestMixed
steps:
  - name: Invoke
    inputs:
      prompt: "multiply 6 and 7"
    invoke:
      kind: Ai.Agent
      name: Assistant
  - name: AssertText
    inputs:
      text: "${{ steps.Invoke.result.text }}"
      toolName: "${{ steps.Invoke.result.steps[0].toolCalls[0].name }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text: { type: string, const: '{"product":42}' }
          toolName: { type: string, const: multiply }
        required: [ text, toolName ]
