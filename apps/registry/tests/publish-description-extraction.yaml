kind: Telo.Application
metadata:
  name: PublishDescriptionExtractionTest
  version: 1.0.0
  description: |
    Validates the type-guarded optional-access CEL expression used by the
    registry's PublishHandler to extract `metadata.description` from a parsed
    manifest. Covers the five shapes the publisher might submit: full manifest
    with a string description, manifest without description, manifest without
    metadata, an empty docs array, and a description that is mistakenly a YAML
    mapping rather than a string (the type-guard branch). The full publish
    flow (S3 + postgres) is tested via the docker-compose stack — this test
    isolates the CEL chain so future changes can't silently break the
    description-indexing path.
targets:
  - WithDescription
  - WithoutDescription
  - WithoutMetadata
  - EmptyDocs
  - NonStringDescription
---
kind: Telo.Import
metadata: { name: Yaml }
source: ../../../modules/yaml
---
kind: Telo.Import
metadata: { name: Run }
source: ../../../modules/run
---
kind: Telo.Import
metadata: { name: Assert }
source: ../../../modules/assert
---
kind: Run.Sequence
metadata: { name: WithDescription }
steps:
  - name: parse
    invoke: { kind: Yaml.Parse }
    inputs:
      text: |
        kind: Telo.Library
        metadata:
          name: example
          description: A useful module.
  - name: assert
    invoke: { kind: Assert.Equals }
    inputs:
      actual: "${{ type(steps.parse.result.docs[?0].?metadata.?description.orValue('')) == string ? steps.parse.result.docs[?0].?metadata.?description.orValue(null) : null }}"
      expected: A useful module.
---
kind: Run.Sequence
metadata: { name: WithoutDescription }
steps:
  - name: parse
    invoke: { kind: Yaml.Parse }
    inputs:
      text: |
        kind: Telo.Library
        metadata:
          name: example
  - name: assert
    invoke: { kind: Assert.Equals }
    inputs:
      actual: "${{ type(steps.parse.result.docs[?0].?metadata.?description.orValue('')) == string ? steps.parse.result.docs[?0].?metadata.?description.orValue(null) : null }}"
      expected: null
---
kind: Run.Sequence
metadata: { name: WithoutMetadata }
steps:
  - name: parse
    invoke: { kind: Yaml.Parse }
    inputs:
      text: |
        kind: Telo.Library
  - name: assert
    invoke: { kind: Assert.Equals }
    inputs:
      actual: "${{ type(steps.parse.result.docs[?0].?metadata.?description.orValue('')) == string ? steps.parse.result.docs[?0].?metadata.?description.orValue(null) : null }}"
      expected: null
---
# Empty docs (e.g. publisher submitted only `---` separators with no content).
# `[?0]` returns optional.none() which propagates through the chain to null —
# but in practice validateRootDoc rejects this case before extraction runs.
kind: Run.Sequence
metadata: { name: EmptyDocs }
steps:
  - name: parse
    invoke: { kind: Yaml.Parse }
    inputs:
      text: ""
  - name: assert
    invoke: { kind: Assert.Equals }
    inputs:
      actual: "${{ type(steps.parse.result.docs[?0].?metadata.?description.orValue('')) == string ? steps.parse.result.docs[?0].?metadata.?description.orValue(null) : null }}"
      expected: null
---
# Publisher mistake: description is a YAML mapping rather than a string. The
# raw optional chain would leak the map into the SQL bind and corrupt the row;
# the `type(...) == string` guard converts that to NULL so the publish either
# succeeds with no description (acceptable) or the publisher fixes their YAML
# and republishes.
kind: Run.Sequence
metadata: { name: NonStringDescription }
steps:
  - name: parse
    invoke: { kind: Yaml.Parse }
    inputs:
      text: |
        kind: Telo.Library
        metadata:
          name: example
          description:
            nested: oops
  - name: assert
    invoke: { kind: Assert.Equals }
    inputs:
      actual: "${{ type(steps.parse.result.docs[?0].?metadata.?description.orValue('')) == string ? steps.parse.result.docs[?0].?metadata.?description.orValue(null) : null }}"
      expected: null
