kind: Kernel.Module
metadata:
  name: tracing
  namespace: std
  version: 1.0.0
---
kind: "Kernel.Definition"
metadata:
  name: "Provider"
capability: Kernel.Provider
controllers:
  - pkg:npm/@telorun/tracing@>=1.0.0?local_path=./nodejs#provider
schema:
  type: "object"
  properties:
    metadata:
      type: "object"
      properties:
        name:
          type: "string"
      required: ["name"]
    exporters:
      type: "array"
      description: 'List of exporter resource references (e.g., "Tracing.FileExporter.myExporter")'
      items:
        type: "string"
    events:
      type: "array"
      description: 'Event patterns to trace. Use "*" for all events, "Kernel.*" for all Runtime events, etc.'
      items:
        type: "string"
      default: ["*"]
    filters:
      type: "object"
      description: "Optional filtering configuration"
      properties:
        minLevel:
          type: "string"
          enum: ["debug", "info", "error"]
          default: "debug"
    buffer:
      type: "object"
      description: "Event buffer configuration for retry logic"
      properties:
        maxSize:
          type: "integer"
          description: "Maximum number of events to buffer"
          default: 1000
          minimum: 1
        retryAttempts:
          type: "integer"
          description: "Number of retry attempts for failed exports"
          default: 3
          minimum: 0
        retryDelay:
          type: "integer"
          description: "Delay in milliseconds between retry attempts"
          default: 1000
          minimum: 0
  required: ["metadata", "exporters"]
---
kind: "Kernel.Definition"
metadata:
  name: "FileExporter"
capability: Kernel.Provider
controllers:
  - pkg:npm/@telorun/tracing@>=1.0.0?local_path=./nodejs#file-exporter
schema:
  type: "object"
  properties:
    metadata:
      type: "object"
      properties:
        name:
          type: "string"
      required: ["name"]
    path:
      type: "string"
      description: "Output file path for trace events"
    format:
      type: "string"
      description: "Output format for trace events"
      enum: ["json", "ndjson", "text"]
      default: "ndjson"
    mode:
      type: "string"
      description: "File write mode"
      enum: ["append", "overwrite"]
      default: "append"
    pretty:
      type: "boolean"
      description: "Pretty-print JSON output (only applies to json format)"
      default: false
  required: ["metadata", "path"]
