kind: "Kernel.Definition"
metadata:
  name: "Api"
  module: "Http"
capabilities:
  - handler
controllers:
  - pkg:npm/@telorun/http-server@>=0.1.0?local_path=./nodejs#http-server-api
schema:
  type: "object"
  properties:
    routes:
      type: "array"
      items:
        type: "object"
        additionalProperties: false
        properties:
          request:
            type: "object"
            properties:
              path:
                type: "string"
              method:
                type: "string"
                enum: ["GET", "POST", "PUT", "DELETE", "PATCH", "HEAD", "OPTIONS"]
              query:
                type: "object"
              body:
                type: "object"
              headers:
                type: "object"
            required: ["path", "method"]
          handler:
            oneOf:
              - type: "string"
              - type: "object"
                properties:
                  kind:
                    type: "string"
                  type:
                    type: "string"
          response:
            type: "array"
            items:
              type: "object"
              additionalProperties: false
              properties:
                status:
                  type: "integer"
                  minimum: 100
                  maximum: 599
                when:
                  type: "string"
                  description: "CEL expression; entry is selected if this evaluates to true"
                mode:
                  type: "string"
                  enum: ["buffer", "stream"]
                  description: "buffer (default): CEL body expansion + schema validation. stream: pipe result directly, skipping both"
                schema:
                  type: "object"
                headers:
                  type: "object"
                  additionalProperties:
                    type: "string"
                body:
                  description: "CEL expression or object mapping for response body"
              required: ["status"]
  required: ["routes"]
