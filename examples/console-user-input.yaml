kind: Kernel.Module
metadata:
  name: ConsoleConfigExample
targets:
  - ConsoleConfigExampleFlow
---
kind: Kernel.Import
metadata:
  name: Config
source: ../modules/config
---
kind: Kernel.Import
metadata:
  name: Console
source: ../modules/console
---
kind: Kernel.Import
metadata:
  name: Flow
source: ../modules/flow
---
kind: Flow.Steps
metadata:
  name: ConsoleConfigExampleFlow
  module: ConsoleConfigExample
steps:
  - invoke:
      kind: Console.ReadLine
      metadata:
        name: ReadUsername
      prompt: Username
  - invoke:
      kind: Console.ReadLine
      metadata:
        name: ReadPassword
      prompt: Password
  - invoke:
      kind: Console.WriteLine
      metadata:
        name: Result
      output: "Username: ${{ resources.ReadUsername.value }}, Password: ${{ resources.ReadPassword.value }}"
