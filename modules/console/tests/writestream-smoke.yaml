kind: Telo.Application
metadata:
  name: ConsoleWriteStreamSmoke
  version: 1.0.0
  description: |
    Smoke tests for Console.WriteStream. Verifies it accepts string streams,
    Uint8Array streams, and rejects invalid item shapes.
imports:
  Console: ../
  JS: ../../javascript
  Stream: ../../stream
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestStringStream
  - !ref TestBytesStream
  - !ref TestInvalidInput
---
kind: Stream.Of
metadata: { name: StringSource }
items:
  - "hi "
  - "there"
  - "\n"
---
kind: JS.Script
metadata: { name: BytesSource }
code: |
  async function main() {
    async function* gen() {
      yield Buffer.from("by", "utf8");
      yield Buffer.from("tes", "utf8");
      yield Buffer.from("\n", "utf8");
    }
    return { output: new Stream(gen()) };
  }
---
kind: Stream.Of
metadata: { name: BadSource }
items:
  - 42
---
kind: Console.WriteStream
metadata: { name: Stdout }
---
kind: Run.Sequence
metadata: { name: TestStringStream }
steps:
  - name: StringSrc
    invoke: !ref StringSource
  - name: StringWrite
    inputs:
      input: "${{ steps.StringSrc.result.output }}"
    invoke: !ref Stdout
  - name: AssertStringReached
    inputs:
      reached: true
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties: { reached: { const: true } }
        required: [ reached ]
---
kind: Run.Sequence
metadata: { name: TestBytesStream }
steps:
  - name: BytesSrc
    invoke: !ref BytesSource
  - name: BytesWrite
    inputs:
      input: "${{ steps.BytesSrc.result.output }}"
    invoke: !ref Stdout
  - name: AssertBytesReached
    inputs:
      reached: true
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties: { reached: { const: true } }
        required: [ reached ]
---
kind: Run.Sequence
metadata: { name: TestInvalidInput }
steps:
  - name: BadSrc
    invoke: !ref BadSource
  - name: BadTried
    try:
      - name: BadWrite
        inputs:
          input: "${{ steps.BadSrc.result.output }}"
        invoke: !ref Stdout
    catch:
      - name: AssertBadCaught
        inputs:
          code: "${{ error.code }}"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties: { code: { const: "ERR_INVALID_INPUT" } }
            required: [ code ]
