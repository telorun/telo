kind: Telo.Library
metadata:
  name: InheritCycleFixture
  version: 1.0.0
imports:
  Http: ../..
  Run: ../../../run
---
# Two sequences invoke each other transitively. The resolver must detect this
# without infinite recursion and still produce a clean diagnostic set.
kind: Run.Sequence
metadata:
  name: CyclicA
steps:
  - name: callB
    invoke: !ref CyclicB
---
kind: Run.Sequence
metadata:
  name: CyclicB
steps:
  - name: callA
    invoke: !ref CyclicA
---
kind: Http.Api
metadata:
  name: CycleApi
routes:
  - request:
      path: /x
      method: GET
    handler: !ref CyclicA
    returns:
      - status: 200
        content:
          application/json:
            body: { ok: true }
