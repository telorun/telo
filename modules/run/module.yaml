kind: Kernel.Module
metadata:
  name: run
  namespace: std
  version: 0.1.0
  description: Run sequence of invocable resources with if, while, switch, and try steps
exports:
  kinds:
    - Sequence
---
kind: Kernel.Definition
metadata:
  name: Sequence
capability: Kernel.Runnable
controllers:
  - pkg:npm/@telorun/run@0.1.1?local_path=./nodejs#sequence
schema:
  type: object
  properties:
    with:
      x-telo-scope: /steps
      description: Resources available during sequence execution; torn down when done
    targets:
      type: array
      items:
        type: string
      description: Names of with-resources to run() before executing steps; torn down when done
    inputs:
      type: object
      description: Input values passed to the sequence when invoked
      additionalProperties: true
    outputs:
      type: object
      description: CEL mapping producing the sequence result
      additionalProperties: true
    steps:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          when:
            type: boolean
            description: CEL boolean guard; step skipped when falsy
          invoke:
            anyOf:
              - x-telo-ref: "kernel#Invocable"
              - x-telo-ref: "kernel#Runnable"
          inputs:
            type: object
            additionalProperties: true
          retry:
            type: object
            properties:
              attempts: { type: integer }
              delay: { type: string }
          if:
            type: boolean
          then:
            type: array
            items: &nested_step
              type: object
              properties:
                name: { type: string }
                when: { type: boolean }
                invoke:
                  anyOf:
                    - x-telo-ref: "kernel#Invocable"
                    - x-telo-ref: "kernel#Runnable"
                inputs: { type: object, additionalProperties: true }
                retry:
                  type: object
                  properties:
                    attempts: { type: integer }
                    delay: { type: string }
                if: { type: boolean }
                then: { type: array }
                else: { type: array }
                while: { type: boolean }
                do: { type: array }
                switch: { type: string }
                cases: { type: object }
                default: { type: array }
                try: { type: array }
                catch: { type: array }
                finally: { type: array }
              required:
                - name
          else:
            type: array
            items: *nested_step
          while:
            type: boolean
          do:
            type: array
            items: *nested_step
          switch:
            type: string
          cases:
            type: object
            additionalProperties:
              type: array
              items: *nested_step
          default:
            type: array
            items: *nested_step
          try:
            type: array
            items: *nested_step
          catch:
            type: array
            items: *nested_step
          finally:
            type: array
            items: *nested_step
        required:
          - name
  required:
    - steps
