kind: Telo.Application
metadata:
  name: ApplicationEnvVariablesTest
  version: 1.0.0
imports:
  Run: ../../../modules/run
  Assert: ../../../modules/assert
variables:
  port:
    env: APP_PORT
    type: integer
    minimum: 1024
  logLevel:
    env: APP_LOG_LEVEL
    type: string
    default: info
    enum: [ debug, info, warn, error ]
secrets:
  databaseUrl:
    env: APP_DATABASE_URL
    type: string
targets:
  - !ref TestApplicationEnv
---
kind: Run.Sequence
metadata:
  name: TestApplicationEnv
steps:
  - name: AssertPort
    inputs:
      port: !cel "variables.port"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          port:
            type: integer
            const: 1234
        required: [ port ]
  - name: AssertLogLevel
    inputs:
      logLevel: !cel "variables.logLevel"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          logLevel:
            type: string
            const: info
        required: [ logLevel ]
  - name: AssertDatabaseUrl
    inputs:
      url: !cel "secrets.databaseUrl"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          url:
            type: string
            const: postgres://test
        required: [ url ]
