# Lambda.Direct example — synchronous SDK invokes, Step Functions tasks,
# EventBridge Scheduler events, or any catch-all use case.
#
# Drive it locally:
#   telo install ./direct.yaml
#   cp node_modules/@telorun/lambda/managed.mjs ./index.mjs
#   # then via RIE or `aws lambda invoke`
kind: Telo.Application
metadata:
  name: lambda-direct-example
  version: 1.0.0
  description: |
    `Lambda.Direct` example: a synchronous AWS Lambda that receives a raw
    event payload, maps it via CEL into a JS handler, and returns the
    handler's result. Use this shape for SDK invokes, Step Functions
    tasks, EventBridge Scheduler events, or any catch-all trigger that
    isn't HTTP API or SQS. See `examples/aws/lambda/README.md` for the
    full packaging + deploy walkthrough.
imports:
  Lambda: aws/lambda@0.3.0
  JS: std/javascript@0.3.2
  Type: std/type@0.1.0
targets:
  - !ref Main
---
# User handler: greets the caller by name and counts the times invoked.
kind: JS.Script
metadata: { name: Greet }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    required: [ name ]
    properties:
      name: { type: string }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    required: [ message ]
    properties:
      message: { type: string }
code: |
  function main({ name }) {
    return { message: `Hello, ${name}!` };
  }
---
# Lambda.Direct catches the raw AWS event, maps it into the handler's
# inputs via CEL, and returns the handler's result.
kind: Lambda.Direct
metadata: { name: GreetDirect }
handler: !ref Greet
inputs:
  name: !cel "event.name"
---
kind: Lambda.Function
metadata: { name: Main }
handlers:
  - !ref GreetDirect
