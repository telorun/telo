kind: Telo.Application
metadata:
  name: RefTagSmoke
  version: 1.0.0
targets:
  # `!ref` works in `Telo.Application.targets` (which is itself an
  # `x-telo-ref: telo#Runnable` slot) just as in any other ref slot.
  - !ref TestRefTag
---
kind: Telo.Import
metadata:
  name: Run
source: ../modules/run
---
kind: Telo.Import
metadata:
  name: JavaScript
source: ../modules/javascript
---
kind: Telo.Import
metadata:
  name: Assert
source: ../modules/assert
---
# JavaScript.Script declared at the top level under a stable name. The
# Run.Sequence step below references it with the `!ref` YAML tag — the
# bare resource name carries the reference, no kind/name object form
# needed at the slot.
kind: JavaScript.Script
metadata:
  name: ComputeSum
code: |
  function main({ a, b }) {
    return { value: a + b };
  }
---
kind: Run.Sequence
metadata:
  name: TestRefTag
steps:
  - name: CallByRef
    inputs:
      a: !cel "5.0"
      b: !cel "7.0"
    invoke: !ref ComputeSum
  - name: AssertResult
    inputs:
      value: "${{ steps.CallByRef.result.value }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          value:
            type: number
            const: 12
        required: [value]
