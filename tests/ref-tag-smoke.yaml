kind: Telo.Application
metadata:
  name: RefTagSmoke
  version: 1.0.0
imports:
  Run: ../modules/run
  Assert: ../modules/assert
targets:
  # `!ref` works in `Telo.Application.targets` (which is itself an
  # `x-telo-ref: telo#Runnable` slot) just as in any other ref slot.
  - !ref TestRefTag
---
# Run.Value declared at the top level under a stable name. The
# Run.Sequence step below references it with the `!ref` YAML tag — the
# bare resource name carries the reference, no kind/name object form
# needed at the slot.
kind: Run.Value
metadata:
  name: ComputeSum
inputs:
  a: { type: number }
  b: { type: number }
value:
  value: !cel "inputs.a + inputs.b"
---
kind: Run.Sequence
metadata:
  name: TestRefTag
steps:
  - name: CallByRef
    inputs:
      a: !cel "5.0"
      b: !cel "7.0"
    invoke: !ref ComputeSum
  - name: AssertResult
    inputs:
      value: "${{ steps.CallByRef.result.value }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          value:
            type: number
            const: 12
        required: [ value ]
