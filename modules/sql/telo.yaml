kind: Telo.Library
metadata:
  name: sql
  namespace: std
  version: 0.1.2
  description: SQL database access — PostgreSQL and SQLite
---
kind: Telo.Definition
metadata:
  name: Connection
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/sql@0.1.5?local_path=./nodejs#sql-connection
schema:
  type: object
  required:
    - driver
  properties:
    driver:
      title: Driver
      type: string
      enum: [postgres, sqlite]
      description: Database driver
    connectionString:
      title: Connection String
      type: string
      description: PostgreSQL connection URL (e.g. postgres://user:pass@host/db)
    host:
      title: Host
      type: string
      description: PostgreSQL host
    port:
      title: Port
      type: integer
      default: 5432
      description: PostgreSQL port
    database:
      title: Database
      type: string
      description: PostgreSQL database name
    user:
      title: User
      type: string
      description: PostgreSQL user
    password:
      title: Password
      type: string
      description: PostgreSQL password
    ssl:
      title: SSL
      type: boolean
      default: false
      description: Enable SSL for PostgreSQL
    file:
      title: File
      type: string
      description: SQLite file path or ':memory:'
    pool:
      title: Pool
      description: Database connection pool configuration.
      type: object
      properties:
        min:
          title: Min
          description: Minimum number of connections in the pool.
          type: integer
          default: 1
        max:
          title: Max
          description: Maximum number of connections in the pool.
          type: integer
          default: 10
        idleTimeoutMs:
          title: Idle Timeout Ms
          description: Milliseconds before idle connections are closed.
          type: integer
        connectionTimeoutMs:
          title: Connection Timeout Ms
          description: Milliseconds to wait for a new connection.
          type: integer
---
kind: Telo.Definition
metadata:
  name: Query
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/sql@0.1.5?local_path=./nodejs#sql-query
schema:
  type: object
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    transaction:
      title: Transaction
      description: Reference to the SQL transaction resource.
      x-telo-ref: "std/sql#Transaction"
    inputs:
      title: Inputs
      description: Query parameters supplied at invocation time.
      type: object
      properties:
        sql:
          title: SQL
          type: string
          description: SQL query text; may contain CEL template expressions
        bindings:
          title: Bindings
          type: array
          description: Positional parameters bound to ? placeholders in the SQL string
      required: [sql]
---
kind: Telo.Definition
metadata:
  name: Exec
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/sql@0.1.5?local_path=./nodejs#sql-exec
schema:
  type: object
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    transaction:
      title: Transaction
      description: Reference to the SQL transaction resource.
      x-telo-ref: "std/sql#Transaction"
    inputs:
      title: Inputs
      description: Statement parameters supplied at invocation time.
      type: object
      properties:
        sql:
          title: SQL
          type: string
          description: SQL statement text; may contain CEL template expressions
        bindings:
          title: Bindings
          type: array
          description: Positional parameters bound to ? placeholders in the SQL string
      required: [sql]
---
kind: Telo.Definition
metadata:
  name: Transaction
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/sql@0.1.5?local_path=./nodejs#sql-transaction
schema:
  type: object
  required:
    - connection
    - steps
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    steps:
      title: Steps
      description: Invocable resource executed inside the transaction.
      x-telo-ref: "telo#Invocable"
    bindings:
      title: Bindings
      type: object
      description: Forwarded to the steps resource at invoke time; may contain CEL template expressions
---
kind: Telo.Definition
metadata:
  name: Select
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/sql@0.1.5?local_path=./nodejs#sql-select
schema:
  type: object
  required: [from]
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    transaction:
      title: Transaction
      description: Reference to the SQL transaction resource.
      x-telo-ref: "std/sql#Transaction"
    from:
      title: From
      description: Table name to select from.
      type: string
      x-telo-eval: compile
    columns:
      title: Columns
      description: Column names or expressions to select.
      type: array
      x-telo-eval: compile
    distinct:
      title: Distinct
      description: Whether to return only distinct rows.
      type: boolean
      x-telo-eval: compile
    distinctOn:
      title: Distinct On
      description: PostgreSQL DISTINCT ON column list.
      type: array
      items:
        title: Distinct On Column
        description: Column name used in DISTINCT ON.
        type: string
      x-telo-eval: compile
    where:
      title: Where
      description: Structured where clauses.
      type: array
      items:
        title: Where Clause
        description: Single where clause object.
        type: object
    groupBy:
      title: Group By
      description: Columns used for grouping.
      type: array
      items:
        title: Group By Column
        description: Column name used for grouping.
        type: string
      x-telo-eval: compile
    having:
      title: Having
      description: Structured having clauses.
      type: array
      items:
        title: Having Clause
        description: Single having clause object.
        type: object
    orderBy:
      title: Order By
      description: Ordering rules for selected rows.
      type: array
      x-telo-eval: compile
      items:
        title: Order By Entry
        description: Single ordering rule.
        type: object
        properties:
          column:
            title: Column
            description: Column name to order by.
            type: string
          direction:
            title: Direction
            description: Sort direction.
            type: string
            enum: [asc, desc]
    limit:
      title: Limit
      description: Maximum number of rows returned.
    offset:
      title: Offset
      description: Number of rows skipped before returning results.
    inputType:
      title: Input Type
      description: Named type reference or inline type definition for invocation inputs.
      x-telo-ref: "telo#Type"
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
    outputType:
      title: Output Type
      description: Named type reference or inline type definition for invocation outputs.
      x-telo-ref: "telo#Type"
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
---
kind: Telo.Definition
metadata:
  name: Migration
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/sql@0.1.5?local_path=./nodejs#sql-migration
schema:
  type: object
  required: [sql]
  properties:
    version:
      title: Version
      type: string
      description: >-
        Durable ledger key written to the migrations tracking table. Must be
        unique across all migrations in the run and MUST NOT change after the
        migration has been applied anywhere — renaming it would cause the
        migration to re-run. Conventionally a timestamp-prefixed slug
        (e.g. `20260419100200_CreateTokens`). Distinct from `metadata.name`,
        which is the in-manifest resource handle. When omitted, the controller
        falls back to `metadata.name` for backwards compatibility.
    sql:
      title: SQL
      type: string
      description: SQL statement(s) to execute for this migration
---
kind: Telo.Definition
metadata:
  name: Migrations
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/sql@0.1.5?local_path=./nodejs#sql-migrations
schema:
  type: object
  required: [connection]
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
