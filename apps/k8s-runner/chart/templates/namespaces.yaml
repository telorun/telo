{{- if .Values.createNamespaces }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.runnerNamespace }}
  labels:
    {{- include "telo-k8s-runner.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.sessionNamespace }}
  labels:
    {{- include "telo-k8s-runner.labels" . | nindent 4 }}
    # Restricted PodSecurity: session pods use only emptyDir volumes and set
    # non-root / read-only-rootfs / drop-all-caps / no-SA-token / seccomp
    # RuntimeDefault, so they satisfy the restricted standard. If the future
    # trusted content-addressed build introduces a hostPath cache, relax to
    # baseline (hostPath is disallowed under restricted).
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
{{- end }}
