kind: Telo.Application
metadata:
  name: RunSequenceWhile
  version: 1.0.0
imports:
  Run: ../
  Assert: ../../assert
targets:
  - !ref TestWhileLoop
---
kind: Run.Sequence
metadata:
  name: TestWhileLoop
steps:
  # --- while: basic counter loop ---
  # Pre-initialize Counter at n=0. The while loop overwrites it each iteration.
  - name: Counter
    inputs:
      n: 0
    invoke:
      kind: Run.Value
      inputs:
        n: { type: number }
      value:
        n: !cel "inputs.n"

  - name: Increment
    while: "${{ steps.Counter.result.n < 3 }}"
    do:
      - name: Counter
        inputs:
          n: "${{ steps.Counter.result.n }}"
        invoke:
          kind: Run.Value
          inputs:
            n: { type: number }
          value:
            n: !cel "inputs.n + 1.0"

  - name: AssertThreeIterations
    inputs:
      n: "${{ steps.Counter.result.n }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          n:
            type: number
            const: 3

  # --- while: loop body can reference outer steps ---
  - name: Multiplier
    invoke:
      kind: Run.Value
      value:
        factor: 2

  - name: Accumulator
    inputs:
      total: 0
    invoke:
      kind: Run.Value
      inputs:
        total: { type: number }
      value:
        total: !cel "inputs.total"

  - name: Multiply
    while: "${{ steps.Accumulator.result.total < 8 }}"
    do:
      - name: Accumulator
        inputs:
          total: "${{ steps.Accumulator.result.total }}"
          factor: "${{ steps.Multiplier.result.factor }}"
        invoke:
          kind: Run.Value
          inputs:
            total: { type: number }
            factor: { type: number }
          value:
            total: !cel "inputs.total + inputs.factor"

  - name: AssertAccumulated
    inputs:
      total: "${{ steps.Accumulator.result.total }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          total:
            type: number
            const: 8

  # --- while: condition false from the start, body never runs ---
  - name: NeverRuns
    while: "${{ false }}"
    do:
      # Would fail if this ran.
      - name: ShouldNotExecute
        inputs:
          x: 1
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              x:
                const: 0
