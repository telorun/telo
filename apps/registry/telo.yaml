# Telo Module Registry

kind: Telo.Application
metadata:
  name: telo-registry
  version: 1.0.0
targets:
  - Migrations
  - SeedRootPublishToken
  - RegistryServer
---
# ── Imports ──────────────────────────────────────────────────────────────────

kind: Telo.Import
metadata:
  name: Type
source: ../../modules/type
---
kind: Telo.Import
metadata:
  name: Http
source: ../../modules/http-server
---
kind: Telo.Import
metadata:
  name: HttpClient
source: ../../modules/http-client

---
kind: Telo.Import
metadata:
  name: Config
source: ../../modules/config

---
kind: Telo.Import
metadata:
  name: S3
source: ../../modules/s3
secrets:
  accessKeyId: "${{ resources.AppConfig.accessKeyId }}"
  secretAccessKey: "${{ resources.AppConfig.secretAccessKey }}"
---
kind: Telo.Import
metadata:
  name: Sql
source: ../../modules/sql
---
kind: Telo.Import
metadata:
  name: Run
source: ../../modules/run
---
kind: Telo.Import
metadata:
  name: Octet
source: ../../modules/octet-codec
---
kind: Telo.Import
metadata:
  name: PlainText
source: ../../modules/plain-text-codec
---
kind: Telo.Import
metadata:
  name: Yaml
source: ../../modules/yaml
---
kind: Telo.Import
metadata:
  name: Mcp
source: ../../modules/mcp-server
---
# ── Configuration ─────────────────────────────────────────────────────────────

kind: Config.Env
metadata:
  name: AppConfig
variables:
  port:
    env: PORT
    type: integer
    default: 3000
  bucketName:
    env: S3_BUCKET_NAME
    type: string
  s3Endpoint:
    env: S3_ENDPOINT
    type: string
  s3ForcePathStyle:
    env: S3_FORCE_PATH_STYLE
    type: boolean
    default: false
  dbConnection:
    env: DB_CONNECTION
    type: string
secrets:
  accessKeyId:
    env: S3_ACCESS_KEY_ID
    type: string
  secretAccessKey:
    env: S3_SECRET_ACCESS_KEY
    type: string
  publishToken:
    env: TELO_PUBLISH_TOKEN
    type: string

---
# ── Storage ───────────────────────────────────────────────────────────────────

kind: S3.Bucket
metadata:
  name: ModuleStore
bucketName: "${{ resources.AppConfig.bucketName }}"
endpoint: "${{ resources.AppConfig.s3Endpoint }}"
forcePathStyle: "${{ resources.AppConfig.s3ForcePathStyle }}"
accessKeyId: "${{ resources.AppConfig.accessKeyId }}"
secretAccessKey: "${{ resources.AppConfig.secretAccessKey }}"
createIfMissing: true
publicRead: true
---
# ── Database ──────────────────────────────────────────────────────────────────

kind: Sql.Connection
metadata:
  name: Db
driver: postgres
connectionString: "${{ resources.AppConfig.dbConnection }}"
---
kind: Sql.Migrations
metadata:
  name: Migrations
connection:
  kind: Sql.Connection
  name: Db
---
kind: Sql.Migration
metadata:
  name: Migration_20260331143022_CreateModules
version: 20260331143022_CreateModules
sql: |
  CREATE TABLE modules (
    namespace    TEXT NOT NULL,
    name         TEXT NOT NULL,
    version      TEXT NOT NULL,
    file_key     TEXT NOT NULL,
    description  TEXT,
    published_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
    PRIMARY KEY (namespace, name, version)
  )
---
kind: Sql.Migration
metadata:
  name: Migration_20260419100000_CreateUsers
version: 20260419100000_CreateUsers
sql: |
  CREATE TABLE users (
    id         UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
    username   TEXT        UNIQUE NOT NULL,
    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
  )
---
kind: Sql.Migration
metadata:
  name: Migration_20260419100100_CreateNamespaces
version: 20260419100100_CreateNamespaces
sql: |
  CREATE TABLE namespaces (
    name       TEXT        PRIMARY KEY,
    owner_id   UUID        NOT NULL REFERENCES users(id) ON DELETE RESTRICT,
    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
  )
---
kind: Sql.Migration
metadata:
  name: Migration_20260419100200_CreateTokens
version: 20260419100200_CreateTokens
sql: |
  CREATE TABLE tokens (
    id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id       UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
    token_hash    TEXT        UNIQUE NOT NULL,
    label         TEXT,
    created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
    last_used_at  TIMESTAMPTZ,
    expires_at    TIMESTAMPTZ,
    UNIQUE (user_id, label)
  )
---
kind: Sql.Migration
metadata:
  name: Migration_20260419100300_SeedRootUserAndStdNamespace
version: 20260419100300_SeedRootUserAndStdNamespace
sql: |
  INSERT INTO users (username) VALUES ('root') ON CONFLICT (username) DO NOTHING;
  INSERT INTO namespaces (name, owner_id)
    SELECT 'std', id FROM users WHERE username = 'root'
    ON CONFLICT (name) DO NOTHING
---
# Boot-time token seed. Single atomic UPSERT keyed on (user_id, label): on
# rotation the existing 'root-publish-token' row has its token_hash overwritten
# in place. Atomicity matters — a delete-then-insert pair could leave the
# registry with zero valid tokens if the insert fails between steps. Wrapped in
# a Run.Sequence so it can be an Application target (Sql.Exec is Invocable only).
kind: Run.Sequence
metadata:
  name: SeedRootPublishToken
steps:
  - name: upsert
    invoke:
      kind: Sql.Exec
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      sql: >-
        INSERT INTO tokens (user_id, token_hash, label)
        SELECT id, $1, 'root-publish-token' FROM users WHERE username = 'root'
        ON CONFLICT (user_id, label) DO UPDATE SET token_hash = EXCLUDED.token_hash
      bindings:
        - "${{ sha256(resources.AppConfig.publishToken) }}"

---
kind: Http.Server
metadata:
  name: RegistryServer
host: "0.0.0.0"
port: "${{ resources.AppConfig.port }}"
logger: true
contentTypeParsers:
  - contentType: text/yaml
baseUrl: http://registry.telo.localhost:8060
cors:
  origin: "*"
  methods: "GET,PUT,POST,DELETE,OPTIONS"
  allowedHeaders: "Content-Type, Authorization"
openapi:
  info:
    title: Telo Module Registry
    version: 1.0.0
    description: |
      Resolve and browse Telo Kernel modules.
      Compatible with the Telo CLI and kind: Telo.Import source resolution.
mounts:
  - path: /mcp
    type: Mcp.HttpEndpoint.McpHttp
  - path: /
    type: Http.Api.PublicApi
  - path: /health
    type: Http.Api.Health
notFoundHandler:
  invoke:
    kind: HttpClient.Request
    metadata:
      name: NotFoundHandler
      module: telo-registry
    mode: stream
    inputs:
      method: "${{ request.method }}"
      url: "${{ resources.AppConfig.s3Endpoint + '/' + resources.AppConfig.bucketName + request.path }}"
  returns:
    - status: 200
      mode: stream
      content:
        application/octet-stream:
          encoder: { kind: Octet.Encoder }

---
kind: Sql.Select
metadata:
  name: SearchModules
connection:
  kind: Sql.Connection
  name: Db
from: modules
distinctOn: [namespace, name]
columns:
  - namespace
  - name
  - version
  - description
  - { column: published_at, as: publishedAt }
  - { expr: "namespace || '/' || name || '@' || version", as: id }
where:
  - when: "${{ inputs.q != '' }}"
    or:
      - { column: name, op: ilike, value: "${{ '%' + inputs.q + '%' }}" }
      - { column: namespace, op: ilike, value: "${{ '%' + inputs.q + '%' }}" }
      - { column: description, op: ilike, value: "${{ '%' + inputs.q + '%' }}" }
  - when: "${{ inputs.id != '' }}"
    sql: "(namespace || '/' || name || '@' || version) ILIKE $1"
    bindings: ["${{ '%' + inputs.id + '%' }}"]
orderBy:
  - { column: namespace }
  - { column: name }
  - { column: published_at, direction: desc }
limit: "${{ inputs.limit }}"
offset: "${{ inputs.offset }}"
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      q: { type: string, default: "" }
      id: { type: string, default: "" }
      limit: { type: integer, default: 20 }
      offset: { type: integer, default: 0 }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      rows: { type: array }
      rowCount: { type: integer }

---
# Publish handler — extracted as a top-level Run.Sequence so its CEL context is
# not constrained by the route's handler:-field x-telo-context (which would hide
# `error` inside catch blocks).
kind: Run.Sequence
metadata:
  name: PublishHandler
steps:
  - name: checkHeader
    if: "${{ !inputs.authorization.startsWith('Bearer ') }}"
    then:
      - name: rejectHeader
        throw:
          code: UNAUTHORIZED
          message: Missing or malformed Authorization header

  - name: verifyToken
    invoke:
      kind: Sql.Query
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      # Data-modifying CTE: match the token, touch last_used_at, and return the
      # owning user in a single atomic statement. No match → matched is empty →
      # update is a no-op → zero rows returned → checkToken rejects.
      sql: >-
        WITH matched AS (
          SELECT t.id AS token_id, u.id AS user_id, u.username
          FROM tokens t
          JOIN users u ON u.id = t.user_id
          JOIN namespaces n ON n.owner_id = u.id
          WHERE t.token_hash = $1 AND n.name = $2
            AND (t.expires_at IS NULL OR t.expires_at > NOW())
          LIMIT 1
        ), touched AS (
          UPDATE tokens SET last_used_at = NOW()
          WHERE id IN (SELECT token_id FROM matched)
        )
        SELECT user_id, username FROM matched
      bindings:
        - "${{ sha256(inputs.authorization.substring(7)) }}"
        - "${{ inputs.namespace }}"

  - name: checkToken
    if: "${{ steps.verifyToken.result.rows.size() == 0 }}"
    then:
      - name: rejectToken
        throw:
          code: UNAUTHORIZED
          message: Invalid token or namespace not owned

  # Parse the YAML body so we can index `metadata.description` server-side
  # (npm-style: the registry reads metadata from the manifest, the publisher
  # doesn't ship it out-of-band). Caught errors map to MANIFEST_PARSE_FAILED.
  - name: tryParse
    try:
      - name: parseManifest
        invoke: { kind: Yaml.Parse }
        inputs:
          text: "${{ inputs.body }}"
    catch:
      - name: rethrowParse
        throw:
          code: MANIFEST_PARSE_FAILED
          message: "${{ error.message }}"

  # Per CLAUDE.md, every module file MUST start with exactly one Telo.Library or
  # Telo.Application doc. Reject anything else up front so the index never holds
  # rows for malformed manifests. Optional access (`[?0].?kind`) keeps the check
  # safe against empty docs / missing kind without throwing a different error.
  - name: validateRootDoc
    if: "${{ !(steps.parseManifest.result.docs[?0].?kind.orValue('') in ['Telo.Library', 'Telo.Application']) }}"
    then:
      - name: rejectRootDoc
        throw:
          code: INVALID_MANIFEST
          message: First document must be a Telo.Library or Telo.Application

  - name: upload
    try:
      - name: doUpload
        invoke:
          kind: S3.Put
          bucketRef:
            name: ModuleStore
        inputs:
          key: "${{ inputs.fileKey }}"
          body: "${{ inputs.body }}"
          contentType: "text/yaml"
    catch:
      - name: rethrowUpload
        throw:
          code: UPLOAD_FAILED
          message: "${{ error.message }}"

  - name: record
    try:
      - name: doRecord
        invoke:
          kind: Sql.Exec
          connection:
            kind: Sql.Connection
            name: Db
        inputs:
          # CEL's optional access (`[?0]`, `.?field`) safely traverses missing
          # intermediates; `.orValue(null)` lands on SQL NULL when any segment
          # is absent. NULL (not '') keeps "no description" distinct from "empty
          # string" and matches the column's existing semantics for legacy rows.
          # The `type(...) == string` guard catches publishers who accidentally
          # supply a non-string description (e.g. a YAML mapping) — those bind
          # as NULL rather than corrupting the row with a JSON-stringified blob.
          sql: >-
            INSERT INTO modules (namespace, name, version, file_key, description)
            VALUES ($1, $2, $3, $4, $5)
            ON CONFLICT (namespace, name, version) DO UPDATE
              SET file_key = EXCLUDED.file_key,
                  description = EXCLUDED.description
          bindings:
            - "${{ inputs.namespace }}"
            - "${{ inputs.name }}"
            - "${{ inputs.version }}"
            - "${{ inputs.fileKey }}"
            - "${{ type(steps.parseManifest.result.docs[?0].?metadata.?description.orValue('')) == string ? steps.parseManifest.result.docs[?0].?metadata.?description.orValue(null) : null }}"
    catch:
      - name: rethrowRecord
        throw:
          code: RECORD_FAILED
          message: "${{ error.message }}"
outputs:
  published: "${{ inputs.published }}"
---
kind: Http.Api
metadata:
  name: Health
routes:
  - request:
      path: /readiness
      method: GET
    returns:
      - status: 200
        content:
          application/json:
            body:
              status: "ok"
  - request:
      path: /liveness
      method: GET
    returns:
      - status: 200
        content:
          application/json:
            body:
              status: "ok"
---
# Public API — unauthenticated.
# GET /search                       full-text search across modules.
# GET /{namespace}/{name}           module overview with latest version.
# GET /{namespace}/{name}/versions  lists all versions from the SQL index.
# GET /{namespace}/{name}/{version} returns module metadata from the SQL index.
# GET /{namespace}/{name}/{version}/telo.yaml streams the telo.yaml from S3.
# PUT /{namespace}/{name}/{version} publishes a telo.yaml (body) to S3 and records it in SQL.
# Everything else falls through to the server fallback (ForwardToR2).
kind: Http.Api
metadata:
  name: PublicApi
routes:
  - request:
      path: /search
      method: GET
      schema:
        query:
          type: object
          properties:
            q:
              type: string
              default: ""
              description: "Search query for name, namespace, and description."
            id:
              type: string
              default: ""
              description: "Filter by module id (e.g. 'namespace/name@version')."
            limit: { type: integer, default: 20, description: "Number of results to return." }
            offset:
              type: integer
              default: 0
              description: "Number of results to skip for pagination."
    handler:
      kind: Sql.Select
      name: SearchModules
    inputs:
      q: "${{ request.query.q }}"
      id: "${{ request.query.id }}"
      limit: "${{ request.query.limit }}"
      offset: "${{ request.query.offset }}"
    returns:
      - status: 200
        content:
          application/json:
            body:
              results: "${{ result.rows }}"
              count: "${{ result.rowCount }}"

  - request:
      path: /{namespace}/{name}
      method: GET
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
          required: ["namespace", "name"]
    handler:
      kind: Sql.Query
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      sql: >-
        SELECT version, published_at FROM modules
        WHERE namespace = $1 AND name = $2
        ORDER BY published_at ASC
      bindings:
        - "${{ request.params.namespace }}"
        - "${{ request.params.name }}"
    returns:
      - status: 200
        when: "${{ result.rows.size() > 0 }}"
        content:
          application/json:
            body:
              name: "${{ request.params.namespace + '/' + request.params.name }}"
              version: "${{ result.rows[result.rows.size() - 1].version }}"
              versions: "${{ result.rows.map(r, r.version) }}"
      - status: 404
        content:
          application/json:
            body:
              error: "Module not found"

  - request:
      path: /{namespace}/{name}/versions
      method: GET
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
          required: ["namespace", "name"]
    handler:
      kind: Sql.Query
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      sql: >-
        SELECT version, published_at as publishedAt FROM modules
        WHERE namespace = $1 AND name = $2
        ORDER BY published_at DESC
      bindings:
        - "${{ request.params.namespace }}"
        - "${{ request.params.name }}"
    returns:
      - status: 200
        when: "${{ result.rows.size() > 0 }}"
        content:
          application/json:
            body:
              items: "${{ result.rows }}"
      - status: 404
        content:
          application/json:
            body:
              error: "Module not found"

  - request:
      path: /{namespace}/{name}/{version}
      method: GET
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
            version: { type: string }
          required: ["namespace", "name", "version"]
    handler:
      kind: Sql.Query
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      sql: >-
        SELECT namespace, name, version, description, published_at FROM modules
        WHERE namespace = $1 AND name = $2 AND version = $3
      bindings:
        - "${{ request.params.namespace }}"
        - "${{ request.params.name }}"
        - "${{ request.params.version }}"
    returns:
      - status: 200
        when: "${{ result.rows.size() > 0 }}"
        content:
          application/json:
            body:
              id: "${{ result.rows[0].namespace + '/' + result.rows[0].name + '@' + result.rows[0].version }}"
              namespace: "${{ result.rows[0].namespace }}"
              name: "${{ result.rows[0].name }}"
              version: "${{ result.rows[0].version }}"
              description: "${{ result.rows[0].description }}"
              publishedAt: "${{ result.rows[0].published_at }}"
      - status: 404
        content:
          application/json:
            body:
              error: "Module not found"

  - request:
      path: /{namespace}/{name}/{version}/telo.yaml
      method: GET
      schema:
        params:
          type: object
          properties:
            namespace: { type: string, default: "std" }
            name: { type: string, default: "http-server" }
            version: { type: string, default: "1.1.0" }
          required: ["namespace", "name", "version"]
    handler:
      kind: S3.Get
      bucketRef:
        name: ModuleStore
    inputs:
      key: "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/telo.yaml' }}"
    returns:
      - status: 200
        mode: stream
        content:
          text/yaml:
            encoder: { kind: Octet.Encoder }
    catches:
      - when: "${{ error.code == 'ERR_NOT_FOUND' }}"
        status: 404
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
      - when: "${{ error.code == 'ERR_INVALID_REFERENCE' || error.code == 'ERR_INVALID_RESPONSE' }}"
        status: 500
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"

  - request:
      path: /{namespace}/{name}/{version}
      method: PUT
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
            version: { type: string }
          required: ["namespace", "name", "version"]
        body:
          type: string
    handler:
      kind: Run.Sequence
      name: PublishHandler
    inputs:
      authorization: "${{ has(request.headers.authorization) ? request.headers.authorization : '' }}"
      namespace: "${{ request.params.namespace }}"
      name: "${{ request.params.name }}"
      version: "${{ request.params.version }}"
      body: "${{ request.body }}"
      fileKey: "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/telo.yaml' }}"
      published: "${{ request.params.namespace + '/' + request.params.name + '@' + request.params.version }}"
    returns:
      - status: 201
        content:
          application/json:
            body:
              published: "${{ result.published }}"
    catches:
      - when: "${{ error.code == 'UNAUTHORIZED' }}"
        status: 401
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
      - when: "${{ error.code == 'MANIFEST_PARSE_FAILED' || error.code == 'INVALID_MANIFEST' }}"
        status: 400
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
      - when: "${{ error.code == 'UPLOAD_FAILED' || error.code == 'RECORD_FAILED' }}"
        status: 500
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
---
# ── MCP Server ────────────────────────────────────────────────────────────────
# Exposes the registry over MCP (Model Context Protocol) at /mcp on the same
# Http.Server. AI agents discover available modules and pull their manifests
# without needing to know the registry's REST surface.

# get_module_manifest handler — fetches the YAML bytes from S3 and drains the
# byte stream into a single UTF-8 string so the MCP tool can return it as a
# `text` content block. PlainText.Decoder accepts the stream-typed S3 output
# directly (`steps.fetch.result.output` is the stream-marked property; only
# member access *past* it is forbidden by the analyzer).
kind: Run.Sequence
metadata:
  name: GetModuleManifest
steps:
  - name: fetch
    invoke:
      kind: S3.Get
      bucketRef:
        name: ModuleStore
    inputs:
      key: "${{ inputs.namespace + '/' + inputs.name + '/' + inputs.version + '/telo.yaml' }}"
  - name: decode
    invoke: { kind: PlainText.Decoder }
    inputs:
      input: "${{ steps.fetch.result.output }}"
outputs:
  text: "${{ steps.decode.result.text }}"
---
kind: Mcp.Tools
metadata:
  name: RegistryTools
entries:
  # search_modules — wraps SearchModules' Sql.Select with empty filters and a
  # high cap to expose the whole catalog. Filter / pagination args land when
  # the catalog scales; until then the tool is argument-free.
  - name: search_modules
    description: |
      List modules in the registry. Each result includes `id`, `namespace`,
      `name`, `version`, `description`, and `publishedAt`. Pick one and call
      `get_module_manifest` to read its `telo.yaml`.
    argumentsSchema:
      type: object
      properties: {}
      additionalProperties: false
    handler:
      kind: Sql.Select
      name: SearchModules
    inputs:
      q: ""
      id: ""
      limit: 1000
      offset: 0
    result:
      content:
        - type: text
          text: !cel "json({'results': result.rows, 'count': result.rowCount})"

  # get_module_manifest — returns the raw `telo.yaml` for a specific version
  # so the LLM can read its `Telo.Definition` schemas to compose a manifest
  # against it.
  - name: get_module_manifest
    description: |
      Fetch the raw `telo.yaml` for a specific module version. The response
      contains `Telo.Library`, `Telo.Definition`, and (optionally) `Telo.Import`
      docs that fully describe the module's public surface (kinds, schemas,
      capabilities). Discover candidates with `search_modules` first.
    argumentsSchema:
      type: object
      properties:
        namespace: { type: string }
        name: { type: string }
        version: { type: string }
      required: [namespace, name, version]
      additionalProperties: false
    handler:
      kind: Run.Sequence
      name: GetModuleManifest
    inputs:
      namespace: "${{ request.arguments.namespace }}"
      name: "${{ request.arguments.name }}"
      version: "${{ request.arguments.version }}"
    result:
      content:
        - type: text
          text: "${{ result.text }}"
    catches:
      - when: "${{ error.code == 'ERR_NOT_FOUND' }}"
        error:
          code: -32004
          message: "Module not found"
      - when: "${{ error.code == 'ERR_INVALID_REFERENCE' || error.code == 'ERR_INVALID_RESPONSE' }}"
        error:
          code: -32603
          message: "${{ error.message }}"
---
kind: Mcp.HttpEndpoint
metadata:
  name: McpHttp
serverInfo:
  name: telo-registry
  version: 1.0.0
# Telo primer surfaced to the client on `initialize`. Compatible MCP clients
# pass this to their LLM as system context, so a model with no prior Telo
# knowledge knows what these tools mean and how to compose a manifest from
# what they return.
instructions: !literal |
  This MCP server exposes the **Telo module registry**. Telo is a declarative
  runtime: YAML manifests describe desired state, the kernel resolves resource
  dependencies via a multi-pass init loop, and controllers implement each
  resource kind. CEL expressions are written as `!cel "..."` YAML tags.

  ## Built-in kinds (do not need importing)

  These kinds are part of the kernel itself, not published modules — they
  cannot be discovered via `search_modules` and the model must know them:

  - `Telo.Application` — the runnable root of every Telo file. Required
    fields: `metadata.name` (kebab-case), `metadata.version`. Optional:
    `targets` (resources to run on boot — services that should auto-start are
    omitted). Forbidden in applications: `variables`, `secrets`, `exports`
    (those belong on `Telo.Library`).
  - `Telo.Library` — importable unit of kinds / definitions. Same metadata
    shape; adds optional `variables` (JSON Schema map declaring the
    contract importers must supply), `secrets` (same shape), `exports.kinds`
    (which kinds importers may reference). Cannot be run directly — only
    imported.
  - `Telo.Import` — declares a dependency on a `Telo.Library`. Required:
    `metadata.name` (PascalCase alias used as the kind prefix), `source`
    (a registry id like `std/http-server@1.0.0`, a relative path, or a URL).
    Optional `variables` / `secrets` pass values into the imported library.
  - `Telo.Definition` — declares a new resource kind inside a Library. Read
    these via `get_module_manifest` to discover a module's surface; do not
    write your own.

  ## CEL templates

  Pass dynamic values between resources by writing a CEL expression as a YAML
  tag. Examples:

  - `!cel "request.params.name"` — read a route param.
  - `!cel "steps.parse.result.text"` — read the result of a previous step
    inside a `Run.Sequence`.
  - `!cel "resources.AppConfig.port"` — read another resource's snapshot.
  - `!cel "steps.x.result.docs[?0].?metadata.?description.orValue('')"` —
    optional access; safely handles missing intermediates.

  ## Comprehensive example

  A complete `Telo.Application` that imports two modules and wires them
  together. Note the document separators (`---`), the alias prefixes on
  resource kinds (`Http.Server`, `JS.Script`), and the `!cel`-tagged
  expressions:

  ```yaml
  kind: Telo.Application
  metadata:
    name: hello-app
    version: 1.0.0
  targets:
    - Server
  ---
  kind: Telo.Import
  metadata: { name: Http }
  source: std/http-server@1.0.0
  ---
  kind: Telo.Import
  metadata: { name: JS }
  source: std/javascript@0.3.0
  ---
  kind: Telo.Import
  metadata: { name: Type }
  source: std/type@0.2.0
  ---
  kind: Http.Server
  metadata: { name: Server }
  host: 0.0.0.0
  port: 8080
  mounts:
    - path: /
      type: Http.Api.HelloApi
  ---
  kind: Http.Api
  metadata: { name: HelloApi }
  routes:
    - request:
        path: /hello/:name
        method: GET
      handler:
        kind: JS.Script
        name: HelloHandler
      inputs:
        name: !cel "request.params.name"
      returns:
        - status: 200
          content:
            application/json:
              body:
                greeting: !cel "result.text"
  ---
  kind: JS.Script
  metadata: { name: HelloHandler }
  inputType:
    kind: Type.JsonSchema
    schema:
      type: object
      properties: { name: { type: string } }
      required: [name]
  outputType:
    kind: Type.JsonSchema
    schema:
      type: object
      properties: { text: { type: string } }
      required: [text]
  code: |
    function main({ name }) { return { text: "Hello, " + name + "!" }; }
  ```

  ## Workflow when composing a new application

  1. Use `search_modules` to find candidate modules by their descriptions.
  2. For each promising module, call `get_module_manifest` to read its
     `Telo.Definition` documents — those JSON Schemas are the EXACT field
     shapes you must produce. Do not guess from kind names alone.
  3. Write a `Telo.Application` with the modules you need declared as
     `Telo.Import` docs, then instantiate resources of the form
     `kind: <Alias>.<KindName>` using the schemas you read.
