kind: Telo.Application
metadata:
  name: OpenaiLiveTextStream
  version: 1.0.0
  description: |
    Layer 2 live OpenAI streaming smoke test — exercises the full
    Ai.TextStream → Ndjson.Encoder → PlainText.Decoder pipeline against the
    real provider. Skips silently when OPENAI_API_KEY is unset (locally: drop
    a .env.local in this directory; CI: secret on the workflow). NDJSON is
    the only format exercised live; format encoding is covered hermetically
    in the Layer 1 streaming-contract test.
secrets:
  openaiApiKey: { env: OPENAI_API_KEY, type: string, default: "" }
imports:
  Ai: ../../ai
  AiOpenai: ../
  Ndjson: ../../ndjson-codec
  PlainText: ../../plain-text-codec
  JS: ../../javascript
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref LiveTextStream
---
# apiKey defaults to "" when OPENAI_API_KEY is unset so the resource passes
# schema validation. The model is just config — no API call until stream() —
# and the run-step is gated on the key being present.
kind: AiOpenai.OpenaiModel
metadata: { name: Live }
model: gpt-4o-mini
apiKey: !cel "secrets.openaiApiKey"
options:
  temperature: 0
  maxTokens: 32
---
kind: Ai.TextStream
metadata: { name: ChatStream }
model: !ref Live
---
kind: Ndjson.Encoder
metadata: { name: NdjsonEnc }
---
kind: PlainText.Decoder
metadata: { name: TextDec }
---
# Inspect the assembled NDJSON wire output: extract the last line, parse it as
# JSON, and surface usage/finishReason/deltaCount fields the live assertion
# verifies. Done in JS so we don't pull a JSON-line-decoder dependency just for
# the live test.
kind: JS.Script
metadata: { name: AnalyzeNdjson }
code: |
  async function main({ ndjson }) {
    const lines = ndjson.split("\n").filter(l => l.length > 0);
    if (lines.length === 0) {
      throw new Error("Empty NDJSON output from Ai.TextStream live run");
    }
    const parsed = lines.map((l) => JSON.parse(l));
    const finish = parsed.find((p) => p.type === "finish");
    if (!finish) {
      throw new Error("No finish part in NDJSON output: " + ndjson);
    }
    const deltas = parsed.filter((p) => p.type === "text-delta");
    const text = deltas.map((d) => d.delta).join("");
    return {
      lineCount: lines.length,
      deltaCount: deltas.length,
      text,
      finishReason: finish.finishReason,
      totalTokens: finish.usage.totalTokens,
    };
  }
---
kind: Run.Sequence
metadata: { name: LiveTextStream }
steps:
  - name: GuardEnv
    if: !cel "secrets.openaiApiKey != ''"
    then:
      - name: Stream
        inputs:
          prompt: "Reply with exactly: hello"
        invoke: !ref ChatStream
      - name: Encode
        inputs:
          input: "${{ steps.Stream.result.output }}"
        invoke: !ref NdjsonEnc
      - name: Decode
        inputs:
          input: "${{ steps.Encode.result.output }}"
        invoke: !ref TextDec
      - name: Analyze
        inputs:
          ndjson: "${{ steps.Decode.result.text }}"
        invoke: !ref AnalyzeNdjson
      - name: Assert
        inputs:
          lineCount: "${{ steps.Analyze.result.lineCount }}"
          deltaCount: "${{ steps.Analyze.result.deltaCount }}"
          text: "${{ steps.Analyze.result.text }}"
          finishReason: "${{ steps.Analyze.result.finishReason }}"
          totalTokens: "${{ steps.Analyze.result.totalTokens }}"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              lineCount: { type: integer, minimum: 2 }
              deltaCount: { type: integer, minimum: 1 }
              text: { type: string, minLength: 1 }
              finishReason: { type: string, enum: [ stop, length, content-filter, error, other ] }
              totalTokens: { type: integer, minimum: 1 }
            required: [ lineCount, deltaCount, text, finishReason, totalTokens ]
