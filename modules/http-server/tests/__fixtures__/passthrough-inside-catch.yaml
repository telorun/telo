kind: Telo.Library
metadata:
  name: PassthroughInsideCatchFixture
  version: 1.0.0
---
kind: Telo.Import
metadata:
  name: Http
source: ../..
---
kind: Telo.Import
metadata:
  name: Run
source: ../../../run
---
# try block throws A or B; catch re-raises via `throw: {code: "${{ error.code }}"}`.
# Resolver must see that the sequence's propagated union equals the try block's {A, B}.
kind: Run.Sequence
metadata:
  name: CatchAndRethrow
steps:
  - name: outer
    try:
      - name: branch
        if: "${{ true }}"
        then:
          - name: throwA
            throw: { code: "A", message: "a" }
        else:
          - name: throwB
            throw: { code: "B", message: "b" }
    catch:
      - name: rethrow
        throw:
          code: "${{ error.code }}"
          message: "${{ error.message }}"
---
# Route covers both A and B explicitly — zero analyzer errors.
kind: Http.Api
metadata:
  name: CatchRethrowApi
routes:
  - request:
      path: /x
      method: GET
    handler:
      kind: Run.Sequence
      name: CatchAndRethrow
    returns:
      - status: 200
        content:
          application/json:
            body: { ok: true }
    catches:
      - when: "${{ error.code in ['A', 'B'] }}"
        status: 400
        content:
          application/json:
            body: { error: "${{ error.message }}" }
