kind: Kernel.Module
metadata:
  name: TestStarlarkBasic
  version: 1.0.0
  description: Test for starlark-basic example
---
kind: Kernel.Import
metadata:
  name: StarlarkDemo
source: ../examples/starlark-basic.yaml
---
kind: Kernel.Import
metadata:
  name: Assert
source: ../modules/assert
---
kind: Assert.Events
metadata:
  module: TestStarlarkBasic
  name: VerifyStarlarkBasicEvents
filter:
  - type: "*"
expect:
  - event: StarlarkDemo.Starlark.Script.*.Invoked
    payload:
      outputs:
        result: 84
  - event: StarlarkDemo.Console.WriteLine.*.Invoked
    payload: {}
