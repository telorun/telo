kind: Telo.Application
metadata:
  name: JavaScriptDemo
  version: 1.0.0
  description: A demo module showcasing JavaScript scripts
targets:
  - RunScript
---
kind: Telo.Import
metadata:
  name: Type
source: ../modules/type
---
kind: Telo.Import
metadata:
  name: Run
source: ../modules/run
---
kind: Telo.Import
metadata:
  name: JavaScript
source: ../modules/javascript
---
kind: Telo.Import
metadata:
  name: Console
source: ../modules/console
---
kind: JavaScript.Script
metadata:
  name: MultiplyBy2
code: |
  function main({ value }) {
    return { result: value * 2 }
  }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      value: { type: number }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      result: { type: number }
---
kind: Run.Sequence
metadata:
  name: RunScript
steps:
  - name: Step1
    inputs:
      value: 42
    invoke:
      kind: JavaScript.Script
      name: MultiplyBy2
  - name: PrintResult
    inputs:
      result: "${{ steps.Step1.result.result }}"
    invoke:
      kind: Console.WriteLine
      inputType:
        kind: Type.JsonSchema
        schema:
          type: object
          properties:
            result: { type: number }
      output: |
        Evaluated JavaScript code.
        Result is: ${{ result }}
