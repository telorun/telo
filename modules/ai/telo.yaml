kind: Telo.Library
metadata:
  name: ai
  namespace: std
  version: 0.10.0
  repository: https://github.com/telorun/telo
  license: LicenseRef-SustainableUse
  description: LLM completion primitives with pluggable provider models, plus a tool-use agent
exports:
  kinds:
    - Model
    - Text
    - TextStream
    - ToolProvider
    - Tools
    - Agent
    - AgentStream
---
# Ai.Model — the abstract LLM client every provider implements. Like Sql.Connection
# or Http.Client, it is a Telo.Provider: a configured handle to a backend (model id,
# API key, options), NOT an operation you invoke directly. The operation lives in the
# consumers — Ai.Text / Ai.TextStream / Ai.Agent — which hold a reference to a model
# and drive it through two documented runtime methods (the same convention
# Ai.ToolProvider uses for listTools/callTool):
#   invoke({ messages, options?, tools? }): CompletionResult
#       — { text, usage, finishReason, toolCalls? }
#   stream({ messages, options? }): AsyncIterable<StreamPart>
#       — text-delta | finish | error parts
# The messages-in / completion-out contract is owned by the operations (Ai.Text and
# Ai.TextStream declare their own inputType/outputType); the model abstract carries
# only the config schema each provider extends.
#
# Tool support (`tools` in, `toolCalls` out, the `tool` message role, the
# `tool-calls` finishReason) is additive — only Ai.Agent passes `tools`; Ai.Text
# and Ai.TextStream never do, so they are unaffected.
kind: Telo.Abstract
metadata:
  name: Model
capability: Telo.Provider
---
kind: Telo.Definition
metadata:
  name: Text
  description: Generate a buffered text completion from a prompt or messages using any Ai.Model.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/ai@0.7.1?local_path=./nodejs#text
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      prompt: { type: string }
      messages:
        type: array
        items:
          type: object
          properties:
            role: { type: string, enum: [system, user, assistant] }
            content:
              oneOf:
                - type: string
                - type: array
                  minItems: 1
                  items:
                    oneOf:
                      - type: object
                        additionalProperties: false
                        required: [type, text]
                        properties:
                          type: { type: string, const: text }
                          text: { type: string }
                      - type: object
                        additionalProperties: false
                        required: [type, data, mediaType]
                        properties:
                          type: { type: string, const: image }
                          data:
                            description: Base64-encoded image bytes (manifest-authored) or raw bytes (runtime tool results).
                          mediaType: { type: string }
          required: [role, content]
          additionalProperties: false
      system: { type: string }
      options: { type: object, additionalProperties: true }
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      text: { type: string }
      usage:
        type: object
        properties:
          promptTokens: { type: integer, minimum: 0 }
          completionTokens: { type: integer, minimum: 0 }
          totalTokens: { type: integer, minimum: 0 }
        required: [promptTokens, completionTokens, totalTokens]
        additionalProperties: false
      finishReason:
        type: string
        enum: [stop, length, content-filter, error, other]
    required: [text, usage, finishReason]
    additionalProperties: false
schema:
  type: object
  properties:
    model:
      title: Model
      description: Reference to any Ai.Model implementation (Ai.OpenaiModel, Ai.AnthropicModel, Ai.OllamaModel, or a third-party provider).
      x-telo-ref: "std/ai#Model"
    system:
      title: System prompt
      description: Default system message. Runtime inputs.system takes precedence when set.
      type: string
      contentMediaType: text/markdown
      x-telo-widget: code
    options:
      title: Options
      description: Completion-level option overrides. Shallow-merged between the model's options and runtime inputs.options; downstream wins.
      type: object
      additionalProperties: true
  required: [model]
  additionalProperties: false
  examples:
    - model: !ref Gpt4oMini
      system: |
        You are a concise assistant. Answer in one sentence.
      options:
        temperature: 0.2
        maxTokens: 256
---
# Streaming consumer. Drives Ai.Model.stream() and forwards the StreamPart
# iterable on `result.output` per the streaming-Invocable convention. Encoding
# (NDJSON / SSE / plain text / raw bytes) is the consumer's responsibility —
# pipe through a format-codec encoder (Ndjson.Encoder from @telorun/ndjson-codec,
# Sse.Encoder from @telorun/sse-codec, PlainText.Encoder from @telorun/plain-text-codec,
# Octet.Encoder from @telorun/octet-codec), or iterate `result.output` directly
# in a JS.Script step.
kind: Telo.Definition
metadata:
  name: TextStream
  description: Stream an LLM text completion token-by-token as StreamPart records from any Ai.Model.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/ai@0.7.1?local_path=./nodejs#text-stream
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      prompt: { type: string }
      messages:
        type: array
        items:
          type: object
          properties:
            role: { type: string, enum: [system, user, assistant] }
            content:
              oneOf:
                - type: string
                - type: array
                  minItems: 1
                  items:
                    oneOf:
                      - type: object
                        additionalProperties: false
                        required: [type, text]
                        properties:
                          type: { type: string, const: text }
                          text: { type: string }
                      - type: object
                        additionalProperties: false
                        required: [type, data, mediaType]
                        properties:
                          type: { type: string, const: image }
                          data:
                            description: Base64-encoded image bytes (manifest-authored) or raw bytes (runtime tool results).
                          mediaType: { type: string }
          required: [role, content]
          additionalProperties: false
      system: { type: string }
      options: { type: object, additionalProperties: true }
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      output:
        x-telo-stream: true
        description: Async iterable of StreamPart records (text-delta | finish | error).
    required: [output]
    additionalProperties: false
schema:
  type: object
  properties:
    model:
      title: Model
      description: Reference to any Ai.Model implementation.
      x-telo-ref: "std/ai#Model"
    system:
      title: System prompt
      description: Default system message. Runtime inputs.system takes precedence when set.
      type: string
      contentMediaType: text/markdown
      x-telo-widget: code
    options:
      title: Options
      description: Per-resource option overrides. Shallow-merged with the model's options and runtime inputs.options; downstream wins.
      type: object
      additionalProperties: true
  required: [model]
  additionalProperties: false
  examples:
    - model: !ref Gpt4oMini
      system: |
        You are a concise assistant. Answer in one sentence.
      options:
        temperature: 0.7
---
# Ai.ToolProvider — abstract source of callable tools, mounted into an Ai.Agent the
# same way an Http.Api mounts into an Http.Server. Implementations expose a runtime
# instance with two methods (documented convention, like Ai.Model's invoke/stream):
#   listTools(): ToolDescriptor[]   — what to advertise to the model
#   callTool(name, arguments): any  — dispatch a model-requested call
# `Ai.Tools` (static list, here) and `AiMcp.ToolProvider` (MCP discovery, in
# @telorun/ai-mcp) both implement it; the agent never learns which.
kind: Telo.Abstract
metadata:
  name: ToolProvider
capability: Telo.Mount
---
# Ai.Tools — a static list of tools, each wrapping any Telo.Invocable. The built-in
# Ai.ToolProvider implementation.
kind: Telo.Definition
metadata:
  name: Tools
  description: Expose a static list of Telo.Invocables as callable tools for an Ai.Agent.
capability: Telo.Mount
extends: Self.ToolProvider
controllers:
  - pkg:npm/@telorun/ai@0.7.1?local_path=./nodejs#tools
schema:
  type: object
  properties:
    tools:
      title: Tools
      description: The tools this provider exposes.
      type: array
      items:
        type: object
        properties:
          tool:
            title: Tool
            description: |
              Reference to any Telo.Invocable or Telo.Runnable to expose as a tool.
              A Run.Sequence (a Runnable with callable inputs/outputs) can wrap a
              multi-step pipeline as a single tool.
            anyOf:
              - x-telo-ref: "telo#Invocable"
              - x-telo-ref: "telo#Runnable"
          name:
            title: Name
            description: Tool name the model sees. Defaults to the referenced resource name.
            type: string
          description:
            title: Description
            description: Human/model-facing description of what the tool does.
            type: string
          parameters:
            title: Parameters
            description: JSON Schema for the arguments the model must produce. Required.
            type: object
            additionalProperties: true
          inputs:
            title: Inputs mapping
            description: |
              Optional CEL mapping from the model's `arguments` into the invocable's
              input. Omit to forward `arguments` verbatim.
            type: object
            additionalProperties: true
            x-telo-context:
              type: object
              properties:
                arguments:
                  x-telo-context-from: "parameters/properties"
          result:
            title: Result mapping
            description: |
              Optional CEL expression shaping the invocable's `result` into the string
              fed back to the model. Omit to JSON-stringify the output.
            type: string
            x-telo-context:
              type: object
              properties:
                result:
                  x-telo-context-ref-from: "tool/outputType"
        required: [tool, parameters]
        additionalProperties: false
  required: [tools]
  additionalProperties: false
  examples:
    - tools:
        - tool: !ref GetWeather
          name: get_weather
          description: Get the current weather at a latitude/longitude (open-meteo).
          parameters:
            type: object
            additionalProperties: false
            required: [latitude, longitude]
            properties:
              latitude: { type: number, description: "Latitude in decimal degrees." }
              longitude: { type: number, description: "Longitude in decimal degrees." }
          inputs:
            url: /v1/forecast
            method: GET
            query:
              latitude: "${{ arguments.latitude }}"
              longitude: "${{ arguments.longitude }}"
              current_weather: "true"
          result: "${{ result.body }}"
---
# Ai.Agent — a tool-use loop. Invoked like Ai.Text (prompt xor messages, plus
# system/options); calls the model with the merged tool set, executes any requested
# tools via their providers, replays results, and loops until the model finishes or
# maxSteps is hit. Buffered only (no streaming agent in v1).
kind: Telo.Definition
metadata:
  name: Agent
  description: "Run a tool-use loop: call the model, execute requested tools, and replay results until it finishes."
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/ai@0.7.1?local_path=./nodejs#agent
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      prompt: { type: string }
      messages:
        type: array
        items:
          type: object
          properties:
            role: { type: string, enum: [system, user, assistant, tool] }
            content:
              oneOf:
                - type: string
                - type: array
                  minItems: 1
                  items:
                    oneOf:
                      - type: object
                        additionalProperties: false
                        required: [type, text]
                        properties:
                          type: { type: string, const: text }
                          text: { type: string }
                      - type: object
                        additionalProperties: false
                        required: [type, data, mediaType]
                        properties:
                          type: { type: string, const: image }
                          data:
                            description: Base64-encoded image bytes (manifest-authored) or raw bytes (runtime tool results).
                          mediaType: { type: string }
          required: [role, content]
          additionalProperties: false
      system: { type: string }
      options: { type: object, additionalProperties: true }
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      text: { type: string }
      usage:
        type: object
        properties:
          promptTokens: { type: integer, minimum: 0 }
          completionTokens: { type: integer, minimum: 0 }
          totalTokens: { type: integer, minimum: 0 }
        required: [promptTokens, completionTokens, totalTokens]
        additionalProperties: false
      finishReason:
        type: string
        enum: [stop, length, content-filter, error, tool-calls, other]
      steps:
        type: array
        items:
          type: object
          additionalProperties: true
    required: [text, usage, finishReason, steps]
    additionalProperties: false
schema:
  type: object
  properties:
    model:
      title: Model
      description: Reference to any Ai.Model implementation.
      x-telo-ref: "std/ai#Model"
    system:
      title: System prompt
      description: Default system message. Runtime inputs.system takes precedence when set.
      type: string
      contentMediaType: text/markdown
      x-telo-widget: code
    options:
      title: Options
      description: Completion-level option overrides passed to the model each turn.
      type: object
      additionalProperties: true
    maxSteps:
      title: Max steps
      description: Maximum model turns before the loop is bounded.
      type: integer
      minimum: 1
      default: 8
    onMaxSteps:
      title: On max steps
      description: throw → raise ERR_AGENT_MAX_STEPS; return → hand back the last turn's text.
      type: string
      enum: [throw, return]
      default: throw
    onToolError:
      title: On tool error
      description: feedback → record the error and return it to the model; throw → abort the invoke.
      type: string
      enum: [feedback, throw]
      default: feedback
    toolProviders:
      title: Tool providers
      description: Tool sources mounted into the agent — static lists (Ai.Tools) or runtime discovery (e.g. AiMcp.ToolProvider).
      type: array
      items:
        type: object
        properties:
          provider:
            title: Provider
            description: Reference to any Ai.ToolProvider implementation.
            x-telo-ref: "std/ai#ToolProvider"
          prefix:
            title: Prefix
            description: Namespaces this provider's tool names to avoid collisions.
            type: string
          include:
            title: Include
            description: Optional allowlist matched against the provider's bare tool names (before any prefix is applied).
            type: array
            items: { type: string }
          exclude:
            title: Exclude
            description: Optional denylist matched against the provider's bare tool names (before any prefix is applied).
            type: array
            items: { type: string }
        required: [provider]
        additionalProperties: false
  required: [model]
  additionalProperties: false
  examples:
    - model: !ref Gpt4oMini
      system: |
        You are a helpful CLI assistant. Use the available tools when they help
        answer; don't guess at facts you can look up. Keep replies brief.
      maxSteps: 6
      toolProviders:
        - provider: !ref WeatherTools
        - provider: !ref RegistryTools
          prefix: "registry_"
---
# Ai.AgentStream — the streaming tool-use agent. Same loop and config as Ai.Agent,
# but it forwards the run as a Stream on `result.output` (per the streaming-Invocable
# convention) instead of a buffered object: the assistant's text streams token-by-token
# and every tool call surfaces the moment it happens. Pipe `result.output` through a
# format-codec encoder (Sse.Encoder / Ndjson.Encoder) in an Http.Api `mode: stream`
# route to serve it over SSE. The stream carries a discriminated union of records:
# `text-delta` | `tool-call` | `tool-result` | `finish` | `error`.
kind: Telo.Definition
metadata:
  name: AgentStream
  description: Run a streaming tool-use loop, emitting text deltas, tool calls, and results as a Stream.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/ai@0.7.1?local_path=./nodejs#agent-stream
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      prompt: { type: string }
      messages:
        type: array
        items:
          type: object
          properties:
            role: { type: string, enum: [system, user, assistant, tool] }
            content:
              oneOf:
                - type: string
                - type: array
                  minItems: 1
                  items:
                    oneOf:
                      - type: object
                        additionalProperties: false
                        required: [type, text]
                        properties:
                          type: { type: string, const: text }
                          text: { type: string }
                      - type: object
                        additionalProperties: false
                        required: [type, data, mediaType]
                        properties:
                          type: { type: string, const: image }
                          data:
                            description: Base64-encoded image bytes (manifest-authored) or raw bytes (runtime tool results).
                          mediaType: { type: string }
          required: [role, content]
          additionalProperties: false
      system: { type: string }
      options: { type: object, additionalProperties: true }
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      output:
        x-telo-stream: true
        description: >-
          Async iterable of AgentStreamPart records: `text-delta` (assistant text),
          `tool-call` (a tool the model requested), `tool-result` (its execution
          result: `{toolCallId, name, content, error?}`), then a terminal `finish`
          (accumulated usage + finishReason) or `error`.
    required: [output]
    additionalProperties: false
schema:
  type: object
  properties:
    model:
      title: Model
      description: Reference to any Ai.Model implementation.
      x-telo-ref: "std/ai#Model"
    system:
      title: System prompt
      description: Default system message. Runtime inputs.system takes precedence when set.
      type: string
      contentMediaType: text/markdown
      x-telo-widget: code
    options:
      title: Options
      description: Completion-level option overrides passed to the model each turn.
      type: object
      additionalProperties: true
    maxSteps:
      title: Max steps
      description: Maximum model turns before the loop is bounded.
      type: integer
      minimum: 1
      default: 8
    onMaxSteps:
      title: On max steps
      description: throw → emit a terminal error part (ERR_AGENT_MAX_STEPS); return → emit a terminal finish with the last turn's finishReason.
      type: string
      enum: [throw, return]
      default: throw
    onToolError:
      title: On tool error
      description: feedback → emit a tool-result with error:true and continue; throw → emit a terminal error part and end the stream.
      type: string
      enum: [feedback, throw]
      default: feedback
    toolProviders:
      title: Tool providers
      description: Tool sources mounted into the agent — static lists (Ai.Tools) or runtime discovery (e.g. AiMcp.ToolProvider).
      type: array
      items:
        type: object
        properties:
          provider:
            title: Provider
            description: Reference to any Ai.ToolProvider implementation.
            x-telo-ref: "std/ai#ToolProvider"
          prefix:
            title: Prefix
            description: Namespaces this provider's tool names to avoid collisions.
            type: string
          include:
            title: Include
            description: Optional allowlist matched against the provider's bare tool names (before any prefix is applied).
            type: array
            items: { type: string }
          exclude:
            title: Exclude
            description: Optional denylist matched against the provider's bare tool names (before any prefix is applied).
            type: array
            items: { type: string }
        required: [provider]
        additionalProperties: false
  required: [model]
  additionalProperties: false
  examples:
    - model: !ref Gpt4oMini
      system: |
        You author Telo manifests. Use the tools to edit files and validate with
        `telo check`. Keep replies brief.
      maxSteps: 12
      toolProviders:
        - provider: !ref WorkspaceTools
