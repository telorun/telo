kind: Kernel.Module
metadata:
  name: ConfigExample
---
kind: Kernel.Import
metadata:
  name: Config
source: ../modules/config
---
kind: Kernel.Import
metadata:
  name: Http
source: ../modules/http-server
---
# Declare an optional variable
kind: Config.Env
metadata:
  name: Config
variables:
  apiBaseUrl:
    type: string
    value: ${{ env.API_BASE_URL }}
  stripeSecretKey:
    type: string
    value: ${{ env.STRIPE_SECRET_KEY }}
---
# Consume in another resource
kind: Http.Api
metadata:
  name: PaymentApi
routes:
  - request:
      path: /charge
      method: POST
    handler:
      kind: JavaScript.Script
      script: |
        function main({ apiKey, baseUrl }) {
          return {
            success: true,
          }
        }
    inputs:
      apiKey: "${{ resources.Config.stripeSecretKey }}"
      baseUrl: "${{ resources.Config.apiBaseUrl }}"
    response:
      - status: 200
        body:
          message: Payment accepted
---
kind: Http.Server
metadata:
  name: PaymentServer
openapi:
  info:
    title: Payment gateway
    version: 1.0.0
port: 4444
mounts:
  - path: /v1
    type: Http.Api.PaymentApi
