kind: Telo.Library
metadata:
  name: templated-server
  version: 1.0.0
  description: |
    Reusable Telo.Library that defines a single `HelloApi` (`Http.Api`) plus
    the `SayHello` script it dispatches to. Importers receive `HelloApi`
    under their chosen alias and can mount it on any `Http.Server`. Paired
    with `telo.yaml`, which mounts the same library twice
    under `/v1` and `/v2` to show import + mount reuse.
imports:
  Type: std/type@0.5.0
  Http: std/http-server@0.15.1
  JavaScript: std/javascript@0.5.0
exports:
  resources:
    - HelloApi
---
kind: Http.Api
metadata:
  name: HelloApi
routes:
  - request:
      path: /hello
      method: GET
      schema:
        query:
          type: object
          properties:
            name:
              type: string
          required: [ "name" ]
    handler: !ref SayHello
    inputs:
      name: "${{ request.query.name }}" # CEL expression
    returns:
      - status: 200
        content:
          application/json:
            schema:
              type: object
              properties:
                greeting: { type: string }
                nice: { type: string }
              required: [ greeting, nice ]
              additionalProperties: false
            body:
              greeting: "${{ result.message }}!"
              nice: "WOW"
---
kind: JavaScript.Script
metadata:
  name: SayHello
code: |
  function main({ name }) {
    return {
      message: `Hello ${name}!`,
    }
  };
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      name: { type: string }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      message: { type: string }
---
