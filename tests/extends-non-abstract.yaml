kind: Telo.Application
metadata:
  name: ExtendsCapabilityMismatchTest
  version: 1.0.0
imports:
  Assert: ../modules/assert
targets:
  - !ref TestExtendsCapabilityMismatch
---
# Extending a concrete kind is now valid (general single inheritance). What stays
# forbidden is changing the lifecycle role — asserts the analyzer emits
# EXTENDS_CAPABILITY_MISMATCH when `capability` differs from the inherited one.
kind: Assert.Manifest
metadata:
  name: TestExtendsCapabilityMismatch
source: ./__fixtures__/extends-non-abstract.yaml
expect:
  errors:
    - code: EXTENDS_CAPABILITY_MISMATCH
