kind: Telo.Application
metadata:
  name: CanRunSimpleQuery
  version: 1.0.0
imports:
  Sql: ../
  SqlSqlite: ../../sql-sqlite
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestSimpleQuery
---
kind: SqlSqlite.Connection
metadata:
  name: Db
file: ":memory:"
---
kind: Run.Sequence
metadata:
  name: TestSimpleQuery
steps:
  - name: RunQuery
    inputs:
      sql: "SELECT 1 as result"
    invoke:
      kind: Sql.Query
      connection: !ref Db

  - name: AssertResult
    inputs:
      rows: "${{ steps.RunQuery.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            minItems: 1
            items:
              type: object
              properties:
                result:
                  const: 1
