kind: Telo.Library
metadata:
  name: templated-server
  version: 1.0.0
exports:
  kinds:
    - HelloApi
---
kind: Telo.Import
metadata:
  name: Type
source: ../modules/type
---
kind: Telo.Import
metadata:
  name: Http
source: ../modules/http-server
---
kind: Telo.Import
metadata:
  name: JavaScript
source: ../modules/javascript
---
kind: Http.Api
metadata:
  name: HelloApi
routes:
  - request:
      path: /hello
      method: GET
      schema:
        query:
          type: object
          properties:
            name:
              type: string
          required: ["name"]
    handler:
      kind: JavaScript.Script
      name: SayHello
    inputs:
      name: "${{ request.query.name }}" # CEL expression
    returns:
      - status: 200
        schema:
          body:
            type: object
            properties:
              greeting:
                type: string
              nice:
                type: string
            required: ["greeting", "nice"]
            additionalProperties: false
        headers:
          Content-Type: application/json
        body:
          greeting: "${{ result.message }}!"
          nice: "WOW"
---
kind: JavaScript.Script
metadata:
  name: SayHello
code: |
  function main({ name }) {
    return {
      message: `Hello ${name}!`,
    }
  };
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      name: { type: string }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      message: { type: string }
---
