kind: Telo.Library
metadata:
  name: invoke-result-lib
  version: 1.0.0
exports:
  kinds:
    - GreetWrapper
imports:
  JS: ../../../../../../modules/javascript
---
kind: Telo.Definition
metadata:
  name: GreetWrapper
  description: >-
    Test fixture: an invocable template that dispatches to a JS.Script and
    reshapes its output through a top-level `result:` mapping.
capability: Telo.Invocable
schema:
  type: object
  required: [ prefix ]
  additionalProperties: true
  properties:
    prefix: { type: string }
resources:
  - kind: JS.Script
    metadata:
      name: ${{ self.name }}-echo
    inputType: { type: object, additionalProperties: true }
    outputType: { type: object, additionalProperties: true }
    code: |
      function main(input) { return { greeting: input.text }; }
invoke:
  kind: JS.Script
  name: ${{ self.name }}-echo
inputs:
  text: "${{ self.prefix }} ${{ inputs.who }}"
result:
  shouted: "${{ result.greeting }}!"
