kind: Telo.Library
metadata:
  name: ValidGlobalsAccess
  version: 1.0.0
imports:
  Http: ../..
  Run: ../../../run
variables:
  apiKey:
    type: string
---
kind: Run.Value
metadata:
  name: Handler
inputs:
  key: { type: string }
value: { ok: true }
---
kind: Http.Api
metadata:
  name: TestApi
routes:
  - request:
      path: /test
      method: GET
    handler: !ref Handler
    inputs:
      key: "${{ variables.apiKey }}"
    returns:
      - status: 200
        content:
          application/json:
            body:
              ok: "${{ result.ok }}"
