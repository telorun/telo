kind: Kernel.Module
metadata:
  name: PipelineBasic
  version: 1.0.0
imports:
  - ../modules/pipeline
  - ../modules/javascript
  - ../modules/assert
---
kind: Pipeline.Job
metadata:
  name: TestBasicAddition
  description: Test basic JavaScript addition
  module: PipelineBasic
steps:
  - name: AddTwoNumbers
    invoke:
      kind: JavaScript.Script
      code: |
        function main({ a, b }) {
          return {
            sum: a + b
          }
        }
      outputSchema:
        sum:
          type: number
    inputs:
      a: 5
      b: 3

  - name: VerifyResult
    inputs:
      sum: "${{ AddTwoNumbers.outputs.sum }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          sum:
            type: number
            const: 8
---
kind: Assert.Events
metadata:
  module: PipelineBasic
  name: ExpectEvents
filter:
  - type: "*"
expect:
  - event: PipelineBasic.JavaScript.Script.*.Invoked
    payload:
      outputs:
        sum: 8
  - event: PipelineBasic.Assert.Schema.*.Invoked
    payload:
      outputs: true
