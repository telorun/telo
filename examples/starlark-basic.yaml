kind: Telo.Application
metadata:
  name: StarlarkDemo
  version: 1.0.0
  description: A demo showcasing a Starlark script run from flat `targets`.
targets:
  - name: Step1
    invoke: !ref ExampleStarlarkScript
    inputs:
      value: 42
  - name: Step2
    invoke: !ref Print
    inputs:
      output: |
        Evaluated starlark code.
        Result is: ${{ steps.Step1.result.result }}
---
kind: Telo.Import
metadata:
  name: Type
source: ../modules/type
---
kind: Telo.Import
metadata:
  name: Starlark
source: ../modules/starlark
---
kind: Telo.Import
metadata:
  name: Console
source: ../modules/console
---
kind: Starlark.Script
metadata:
  name: ExampleStarlarkScript
code: |
  def run(input):
    result = input["value"] * 2
    return {"result": result}
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      value: { type: number }
    required: [value]
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      result: { type: number }
    required: [result]
---
kind: Console.WriteLine
metadata:
  name: Print
