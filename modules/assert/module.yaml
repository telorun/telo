kind: Kernel.Module
metadata:
  name: Assert
  version: 1.1.0
  description: Assertion and value verification for testing
exports:
  kinds:
    - ModuleContext
    - Schema
    - Events
---
kind: Kernel.Definition
metadata:
  name: ModuleContext
  module: Assert
capabilities:
  - executable
controllers:
  - pkg:npm/@telorun/assert@1.1.0?local_path=./nodejs#module-context
schema:
  type: object
  properties:
    metadata:
      type: object
      properties:
        name:
          type: string
      required:
        - name
  required:
    - metadata
---
kind: Kernel.Definition
metadata:
  name: Schema
  module: Assert
capabilities:
  - executable
controllers:
  - pkg:npm/@telorun/assert@1.0.0?local_path=./nodejs#schema
schema:
  type: object
  properties:
    metadata:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    schema:
      description: Value to assert (can be any type or expression)
  required:
    - metadata
    - assertions
---
kind: Kernel.Definition
metadata:
  name: Events
  module: Assert
capabilities:
  - executable
controllers:
  - pkg:npm/@telorun/assert@1.0.0?local_path=./nodejs#events
schema:
  type: object
  properties:
    filter:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
        required:
          - type
    expect:
      type: array
      description: Ordered sequence of events to assert
      items:
        type: object
        properties:
          event:
            type: string
            description: Event name or wildcard pattern (e.g. "JavaScript.Script.*.Invoked")
          payload:
            type: object
            description: Partial payload to match against (only declared fields are checked)
        required:
          - event
  required:
    - expect
