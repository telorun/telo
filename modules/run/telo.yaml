kind: Telo.Library
metadata:
  name: run
  namespace: std
  version: 0.13.0
  repository: https://github.com/telorun/telo
  license: LicenseRef-SustainableUse
  description: Run sequence of invocable resources with if, while, switch, and try steps
exports:
  kinds:
    - Sequence
    - Value
    - Loop
    - Iteration
    - Projection
    - Detach
---
kind: Telo.Definition
metadata:
  name: Sequence
  description: Runs an ordered list of steps — invoke, if, while, switch, try, throw — over a typed inputs/outputs contract.
capability: Telo.Runnable
topology: Sequence
controllers:
  - pkg:npm/@telorun/run@0.9.1?local_path=./nodejs#sequence
throws:
  inherit: true
schema:
  type: object
  $defs:
    step:
      title: Step
      description: Single executable step or control-flow block.
      type: object
      properties:
        name:
          title: Name
          description: Unique step name.
          type: string
      oneOf:
        - title: invoke
          description: Invokes an invocable or runnable resource.
          properties:
            invoke:
              title: Invoke
              description: Resource to invoke for this step.
              x-telo-topology-role: invoke
              # A reference is always an object (a `!ref` sentinel or its resolved
              # `{kind, name}`); requiring an object rejects a bare-string ref —
              # which `validateReferenceForms` cannot catch at this nested slot —
              # at `telo check` instead of as an obscure runtime failure.
              type: object
              anyOf:
                - title: Invocable
                  description: Reference to an invocable resource.
                  x-telo-ref: "telo#Invocable"
                - title: Runnable
                  description: Reference to a runnable resource.
                  x-telo-ref: "telo#Runnable"
            inputs:
              title: Inputs
              description: Inputs passed to the invoked resource.
              x-telo-topology-role: inputs
              type: object
              additionalProperties: true
            retry:
              title: Retry
              description: Retry policy for step invocation.
              type: object
              properties:
                attempts:
                  title: Attempts
                  description: Maximum retry attempts.
                  type: integer
                delay:
                  title: Delay
                  description: Delay between retries.
                  type: string
          required:
            - invoke

        - title: if/then/else
          description: Conditional branch; executes then or else based on a boolean expression.
          properties:
            if:
              title: If
              description: CEL boolean expression; true executes then, false executes else.
              x-telo-topology-role: predicate
              type: boolean
            elseif:
              title: Else If
              description: Additional condition-branch pairs evaluated when if is false.
              x-telo-topology-role: branch-list
              type: array
              items:
                type: object
                properties:
                  if:
                    title: If
                    description: CEL boolean expression for this else-if branch.
                    x-telo-topology-role: predicate
                    type: boolean
                  then:
                    title: Then
                    description: Steps executed when this else-if condition is true.
                    x-telo-topology-role: branch
                    type: array
                    items:
                      $ref: "#/$defs/step"
                required:
                  - if
                  - then
            then:
              title: Then
              description: Steps executed when if evaluates true.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/step"
            else:
              title: Else
              description: Steps executed when if (and all elseif conditions) evaluate false.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/step"
          required:
            - if
            - then

        - title: while/do
          description: Loop; executes do steps repeatedly while condition is true.
          properties:
            while:
              title: While
              description: CEL boolean expression; evaluated before each iteration.
              x-telo-topology-role: predicate
              type: boolean
            do:
              title: Do
              description: Steps executed on each iteration.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/step"
          required:
            - while
            - do

        - title: switch/cases/default
          description: Multi-branch dispatch; matches a value expression against case keys.
          properties:
            switch:
              title: Switch
              description: CEL expression; result matched against case keys.
              x-telo-topology-role: discriminator
              type: string
            cases:
              title: Cases
              description: Map of value to step list; executed when switch matches the key.
              x-telo-topology-role: case-map
              type: object
              additionalProperties:
                type: array
                items:
                  $ref: "#/$defs/step"
            default:
              title: Default
              description: Steps executed when no case matches.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/step"
          required:
            - switch
            - cases

        - title: try/catch/finally
          description: Error boundary; executes try steps and handles failure via catch and finally.
          properties:
            try:
              title: Try
              description: Steps executed; halts on first failure and jumps to catch.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/step"
            catch:
              title: Catch
              description: Steps executed when try fails; receives error context.
              x-telo-topology-role: branch
              x-telo-error-context:
                type: object
                description: The caught failure (always present inside catch).
                properties: &errorContextProps
                  code:
                    description: Structured error code; INTERNAL_ERROR for plain errors.
                    type: string
                  message:
                    description: Human-readable error message.
                    type: string
                  step:
                    description: Name of the step that threw.
                    type: string
                  data:
                    description: Structured payload from an InvokeError, else undefined.
                additionalProperties: false
              type: array
              items:
                $ref: "#/$defs/step"
            finally:
              title: Finally
              description: Steps always executed after try/catch regardless of outcome.
              x-telo-topology-role: branch
              # error is null on the success path and the caught failure when a
              # try/catch failure propagates (see executeTryStep). Typed nullable
              # so the analyzer flags unguarded field access (CEL_NULLABLE_ACCESS).
              x-telo-error-context:
                type: ["object", "null"]
                description: The caught failure, or null when try (and catch) succeeded.
                properties: *errorContextProps
                additionalProperties: false
              type: array
              items:
                $ref: "#/$defs/step"
          required:
            - try

        - title: throw
          description: >-
            Throws an InvokeError unconditionally. Works inside catch blocks via CEL
            (e.g. code set to `!cel "error.code"`).
          properties:
            throw:
              title: Throw
              description: InvokeError descriptor; code is required, message/data optional.
              type: object
              properties:
                code:
                  title: Code
                  description: Structured error code; uppercase SNAKE_CASE by convention.
                  type: string
                message:
                  title: Message
                  description: Human-readable error message. Defaults to `code` when omitted.
                  type: string
                data:
                  title: Data
                  description: Optional structured payload attached to the error.
              required:
                - code
          required:
            - throw
      required:
        - name

  properties:
    with:
      title: With
      # Visibility covers both `/steps` (where steps reference with-resources)
      # and `/targets` (the run-before-steps references), so a `!ref` in either
      # resolves against the scoped resources.
      x-telo-scope: [ "/steps", "/targets" ]
      description: Resources available during sequence execution; torn down when done
    targets:
      title: Targets
      type: array
      description: with-resources to run() before executing steps; torn down when done. Reference each with a `!ref <name>`.
      items:
        title: Target
        description: A with-resource to run before steps — write it as a `!ref`.
        anyOf:
          - type: string
            x-telo-ref: "telo#Runnable"
          - type: string
            x-telo-ref: "telo#Service"
          - $ref: "telo://manifest#/$defs/ResourceRef"
    inputs:
      title: Inputs
      type: object
      description: >-
        The sequence's input contract: a JSON Schema property map (name →
        schema), NOT values. Each key declares one input the sequence accepts;
        an empty schema `{}` declares an untyped (dyn) input. Callers supply
        actual values at invoke time (e.g. an `Http.Api` route's `inputs:`
        CEL map, or a parent step's `inputs:`), and steps read them as
        `!cel "inputs.<name>"`.
      additionalProperties: true
    outputs:
      title: Outputs
      type: object
      description: >-
        A CEL map (key → `!cel` expression) evaluated over `steps.*` and
        `inputs.*` after the steps run. Its value becomes the sequence's
        `result` — what a caller sees, e.g. an `Http.Api` route's `returns:`.
        Omit it to return the raw step-results map.
      additionalProperties: true
      x-telo-context:
        type: object
        properties:
          inputs: {}
    steps:
      title: Steps
      description: Ordered sequence of steps to execute.
      x-telo-topology-role: steps
      type: array
      x-telo-step-context:
        invoke: invoke
        outputType: outputType
      items:
        $ref: "#/$defs/step"
  required:
    - steps
  examples:
    - inputs:
        userId: {}
        limit: { type: integer }
      steps:
        - name: fetchUser
          invoke: !ref GetUser
          inputs:
            bindings:
              - !cel "inputs.userId"
        - name: count
          invoke: !ref CountPosts
          inputs:
            bindings:
              - !cel "inputs.userId"
              - !cel "inputs.limit"
      outputs:
        name: !cel "steps.fetchUser.result.rows[0].name"
        postCount: !cel "steps.count.result.rows[0].n"
---
kind: Telo.Definition
metadata:
  name: Value
  description: Evaluates a CEL expression over typed inputs and returns the shaped value — a declarative value-only script.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/run@0.9.1?local_path=./nodejs#value
schema:
  type: object
  properties:
    inputs:
      title: Inputs
      description: >-
        The value's input contract: a JSON Schema property map (name → schema),
        NOT values. Each key declares one input the resource accepts; an empty
        schema `{}` declares an untyped (dyn) input. Callers supply actual
        values at invoke time (an `Ai.Tools` entry, a parent `Run.Sequence`
        step, an `Http.Api` route), and `value` reads them as `!cel "inputs.x"`.
      type: object
      additionalProperties: true
    value:
      title: Value
      description: >-
        A CEL expression — or a structure (map / array) with `!cel` leaves —
        evaluated at invoke time over `inputs`. Its result becomes the
        resource's invoke result and may be any shape (object, array, scalar).
        The declarative replacement for a `Js.Script` that only shapes a value
        (concat, field mapping, a constant literal) with no I/O or branching.
      x-telo-context:
        type: object
        properties:
          inputs:
            type: object
            x-telo-context-from: "inputs"
  required:
    - value
  examples:
    - inputs:
        a: { type: number }
        b: { type: number }
      value:
        product: !cel "inputs.a * inputs.b"
    - value:
        - { type: text, text: page rendered }
        - { type: image, data: aGVsbG8=, mediaType: image/png }
---
kind: Telo.Definition
metadata:
  name: Iteration
  description: Runs a step body once per collection element with configurable concurrency and whole-operation error catches.
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/run@0.9.1?local_path=./nodejs#iteration
throws:
  inherit: true
schema:
  type: object
  $defs:
    bodyStep:
      title: Step
      description: Single executable step or control-flow block. No while block — the kind is itself the loop.
      type: object
      properties:
        name:
          title: Name
          description: Unique step name.
          type: string
      oneOf:
        - title: invoke
          description: Invokes an invocable or runnable resource.
          properties:
            invoke:
              title: Invoke
              description: Resource to invoke for this step.
              x-telo-topology-role: invoke
              type: object
              anyOf:
                - title: Invocable
                  description: Reference to an invocable resource.
                  x-telo-ref: "telo#Invocable"
                - title: Runnable
                  description: Reference to a runnable resource.
                  x-telo-ref: "telo#Runnable"
            inputs:
              title: Inputs
              description: Inputs passed to the invoked resource.
              x-telo-topology-role: inputs
              type: object
              additionalProperties: true
            retry:
              title: Retry
              description: Retry policy for step invocation.
              type: object
              properties:
                attempts:
                  title: Attempts
                  description: Maximum retry attempts.
                  type: integer
                delay:
                  title: Delay
                  description: Delay between retries.
                  type: string
          required:
            - invoke
        - title: if/then/else
          description: Conditional branch; executes then or else based on a boolean expression.
          properties:
            if:
              title: If
              description: CEL boolean expression; true executes then, false executes else.
              x-telo-topology-role: predicate
              type: boolean
            elseif:
              title: Else If
              description: Additional condition-branch pairs evaluated when if is false.
              x-telo-topology-role: branch-list
              type: array
              items:
                type: object
                properties:
                  if:
                    title: If
                    description: CEL boolean expression for this else-if branch.
                    x-telo-topology-role: predicate
                    type: boolean
                  then:
                    title: Then
                    description: Steps executed when this else-if condition is true.
                    x-telo-topology-role: branch
                    type: array
                    items:
                      $ref: "#/$defs/bodyStep"
                required:
                  - if
                  - then
            then:
              title: Then
              description: Steps executed when if evaluates true.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/bodyStep"
            else:
              title: Else
              description: Steps executed when if (and all elseif conditions) evaluate false.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/bodyStep"
          required:
            - if
            - then
        - title: switch/cases/default
          description: Multi-branch dispatch; matches a value expression against case keys.
          properties:
            switch:
              title: Switch
              description: CEL expression; result matched against case keys.
              x-telo-topology-role: discriminator
              type: string
            cases:
              title: Cases
              description: Map of value to step list; executed when switch matches the key.
              x-telo-topology-role: case-map
              type: object
              additionalProperties:
                type: array
                items:
                  $ref: "#/$defs/bodyStep"
            default:
              title: Default
              description: Steps executed when no case matches.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/bodyStep"
          required:
            - switch
            - cases
        - title: try/catch/finally
          description: Error boundary; executes try steps and handles failure via catch and finally.
          properties:
            try:
              title: Try
              description: Steps executed; halts on first failure and jumps to catch.
              x-telo-topology-role: branch
              type: array
              items:
                $ref: "#/$defs/bodyStep"
            catch:
              title: Catch
              description: Steps executed when try fails; receives error context.
              x-telo-topology-role: branch
              x-telo-error-context:
                type: object
                description: The caught failure (always present inside catch).
                properties: &iterationErrorProps
                  code:
                    description: Structured error code; INTERNAL_ERROR for plain errors.
                    type: string
                  message:
                    description: Human-readable error message.
                    type: string
                  step:
                    description: Name of the step that threw.
                    type: string
                  data:
                    description: Structured payload from an InvokeError, else undefined.
                additionalProperties: false
              type: array
              items:
                $ref: "#/$defs/bodyStep"
            finally:
              title: Finally
              description: Steps always executed after try/catch regardless of outcome.
              x-telo-topology-role: branch
              x-telo-error-context:
                type: ["object", "null"]
                description: The caught failure, or null when try (and catch) succeeded.
                properties: *iterationErrorProps
                additionalProperties: false
              type: array
              items:
                $ref: "#/$defs/bodyStep"
          required:
            - try
        - title: throw
          description: Throws an InvokeError unconditionally.
          properties:
            throw:
              title: Throw
              description: InvokeError descriptor; code is required, message/data optional.
              type: object
              properties:
                code:
                  title: Code
                  description: Structured error code; uppercase SNAKE_CASE by convention.
                  type: string
                message:
                  title: Message
                  description: Human-readable error message. Defaults to code when omitted.
                  type: string
                data:
                  title: Data
                  description: Optional structured payload attached to the error.
              required:
                - code
          required:
            - throw
      required:
        - name
  properties:
    inputs:
      title: Inputs
      description: >-
        The iteration's input contract: a JSON Schema property map (name →
        schema), NOT values. Callers supply values at invoke time; the body
        reads them as `!cel "inputs.<name>"`.
      type: object
      additionalProperties: true
    collection:
      title: Collection
      description: CEL expression resolving to the array iterated over.
      type: array
      x-telo-context:
        type: object
        properties:
          inputs: {}
    concurrency:
      title: Concurrency
      description: >-
        CEL integer resolving to the maximum number of elements processed at once;
        1 (default) runs strictly ordered. Sees inputs.
      type: integer
      minimum: 1
      default: 1
      x-telo-context:
        type: object
        properties:
          inputs: {}
    catches:
      title: Catches
      description: >-
        Whole-operation error contract. Maps a throw that escapes the entire
        iteration to a fallback result; an unmatched throw propagates (fail-fast).
      x-telo-error-context:
        type: object
        description: The escaped failure (sees error and inputs).
        properties: *iterationErrorProps
        additionalProperties: false
      x-telo-context:
        type: object
        properties:
          inputs: {}
      type: array
      items:
        title: Catch Entry
        type: object
        properties:
          when:
            title: When
            description: CEL condition selecting this entry (sees error and inputs).
            type: boolean
          value:
            title: Value
            description: Fallback result returned when this entry matches.
    steps:
      title: Steps
      description: Body run once per element of collection. Sees item, index, items.
      x-telo-topology-role: steps
      x-telo-step-context:
        invoke: invoke
        outputType: outputType
      x-telo-context:
        type: object
        properties:
          inputs: {}
          item: { x-telo-context-element-from: "collection" }
          index: { type: integer }
          items: { type: array }
      type: array
      items:
        $ref: "#/$defs/bodyStep"
  required:
    - collection
    - steps
  examples:
    - collection: !cel "inputs.users"
      concurrency: 5
      steps:
        - name: send
          invoke: !ref SendEmail
          inputs:
            to: !cel "item.email"
---
