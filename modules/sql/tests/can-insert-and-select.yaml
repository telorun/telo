kind: Kernel.Module
metadata:
  name: CanInsertAndSelect
  version: 1.0.0
targets:
  - TestInsertAndSelect
---
kind: Kernel.Import
metadata:
  name: Sql
source: ../
---
kind: Kernel.Import
metadata:
  name: Run
source: ../../run
---
kind: Kernel.Import
metadata:
  name: Assert
source: ../../assert
---
kind: Sql.Connection
metadata:
  name: Db
driver: sqlite
file: ":memory:"
---
kind: Run.Sequence
metadata:
  name: TestInsertAndSelect
steps:
  - name: CreateTable
    inputs: {}
    invoke:
      kind: Sql.Exec
      connection:
        kind: Sql.Connection
        name: Db
      inputs:
        sql: "CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT NOT NULL, age INTEGER NOT NULL)"

  - name: InsertRow
    inputs: {}
    invoke:
      kind: Sql.Exec
      connection:
        kind: Sql.Connection
        name: Db
      inputs:
        sql: "INSERT INTO users (id, name, age) VALUES (1, 'Alice', 30)"

  - name: SelectRow
    inputs: {}
    invoke:
      kind: Sql.Query
      connection:
        kind: Sql.Connection
        name: Db
      inputs:
        sql: "SELECT id, name, age FROM users WHERE id = 1"

  - name: AssertResult
    inputs:
      rows: "${{ steps.SelectRow.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            minItems: 1
            maxItems: 1
            items:
              type: object
              properties:
                id:
                  const: 1
                name:
                  const: Alice
                age:
                  const: 30
