kind: Telo.Library
metadata:
  name: sql-repository
  namespace: std
  version: 0.5.0
  description: Named CRUD handlers that generate SQL from domain operations
exports:
  kinds:
    - Read
    - Create
    - Update
    - Delete
imports:
  Sql: ../sql
---
kind: Telo.Definition
metadata:
  name: Read
  description: >-
    Fetches rows from a database table by generating a `SELECT * FROM <table>`
    query, appending a `WHERE col = ?` clause joined with AND for each entry in
    the invocation's `filters` map (no filters means every row). Runs the query
    over a referenced SQL connection with the filter values passed as positional
    bindings, and returns the matching rows.
capability: Telo.Invocable
schema:
  type: object
  required: [connection, table]
  examples:
    - connection:
        kind: SqlSqlite.Connection
        name: Db
      table: users
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    table:
      title: Table
      description: Database table name.
      type: string
resources:
  - kind: Sql.Query
    metadata:
      name: "${{ self.name }}-query"
    connection: "${{ self.connection }}"
inputs:
  sql: "${{ 'SELECT * FROM ' + self.table + (keys(inputs.filters).size() > 0 ? ' WHERE ' + join(keys(inputs.filters).map(k, k + ' = ?'), ' AND ') : '') }}"
  bindings: "${{ keys(inputs.filters).map(k, inputs.filters[k]) }}"
invoke:
  kind: Sql.Query
  name: "${{ self.name }}-query"

---
kind: Telo.Definition
metadata:
  name: Create
  description: >-
    Inserts a new row into a database table by generating an
    `INSERT INTO <table> (cols) VALUES (?, ?, …)` statement from the keys of the
    invocation's `data` object, so a domain object maps straight to a column
    list. Executes the statement over a referenced SQL connection with the
    object's values passed as positional bindings.
capability: Telo.Invocable
schema:
  type: object
  required: [connection, table]
  examples:
    - connection:
        kind: SqlSqlite.Connection
        name: Db
      table: users
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    table:
      title: Table
      description: Database table name.
      type: string
resources:
  - kind: Sql.Command
    metadata:
      name: "${{ self.name }}-exec"
    connection: "${{ self.connection }}"
invoke: "${{ self.name }}-exec"
inputs:
  sql: "${{ 'INSERT INTO ' + self.table + ' (' + join(keys(inputs.data), ', ') + ') VALUES (' + join(keys(inputs.data).map(k, '?'), ', ') + ')' }}"
  bindings: "${{ keys(inputs.data).map(k, inputs.data[k]) }}"

---
kind: Telo.Definition
metadata:
  name: Delete
  description: >-
    Removes rows from a database table by generating a
    `DELETE FROM <table> WHERE col = ? AND …` statement from the invocation's
    `filters` map, executed over a referenced SQL connection with the filter
    values as positional bindings. A WHERE clause is always emitted, so at least
    one filter is required to target the rows to delete.
capability: Telo.Invocable
schema:
  type: object
  required: [connection, table]
  examples:
    - connection:
        kind: SqlSqlite.Connection
        name: Db
      table: users
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    table:
      title: Table
      description: Database table name.
      type: string
resources:
  - kind: Sql.Command
    metadata:
      name: "${{ self.name }}-exec"
    connection: "${{ self.connection }}"
invoke: "${{ self.name }}-exec"
inputs:
  sql: "${{ 'DELETE FROM ' + self.table + ' WHERE ' + join(keys(inputs.filters).map(k, k + ' = ?'), ' AND ') }}"
  bindings: "${{ keys(inputs.filters).map(k, inputs.filters[k]) }}"

---
kind: Telo.Definition
metadata:
  name: Update
  description: >-
    Modifies existing rows in a database table by generating an
    `UPDATE <table> SET col = ? … WHERE col = ? AND …` statement, taking the
    assigned columns from the invocation's `data` object and the row selection
    from its `filters` map. Executes over a referenced SQL connection with the
    data values followed by the filter values as positional bindings.
capability: Telo.Invocable
schema:
  type: object
  required: [connection, table]
  examples:
    - connection:
        kind: SqlSqlite.Connection
        name: Db
      table: users
  properties:
    connection:
      title: Connection
      description: Reference to the SQL connection resource.
      x-telo-ref: "std/sql#Connection"
    table:
      title: Table
      description: Database table name.
      type: string
resources:
  - kind: Sql.Command
    metadata:
      name: "${{ self.name }}-exec"
    connection: "${{ self.connection }}"
invoke: "${{ self.name }}-exec"
inputs:
  sql: "${{ 'UPDATE ' + self.table + ' SET ' + join(keys(inputs.data).map(k, k + ' = ?'), ', ') + ' WHERE ' + join(keys(inputs.filters).map(k, k + ' = ?'), ' AND ') }}"
  bindings: "${{ keys(inputs.data).map(k, inputs.data[k]) + keys(inputs.filters).map(k, inputs.filters[k]) }}"
