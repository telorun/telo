kind: Telo.Library
metadata:
  name: record-stream
  namespace: std
  version: 0.7.0
  description: |
    Stream operations on structured records. Generic, format-neutral
    transformers / sources / sinks that operate on `Stream<record>`.
    Inhabitants: `RecordStream.ExtractText` projects a discriminated stream
    of records down to a `Stream<string>` using a per-variant action map;
    `RecordStream.Tee` fans one input stream out to two consumers.
exports:
  kinds:
    - ExtractText
    - Tee
    - OnComplete
    - Journal
    - JournalSink
    - JournalSource
---
# Project a discriminated stream of records to a `Stream<string>`.
#
# Each item in `input` is matched on `record[discriminator]` against the
# `records` map. The matched entry's `do` action selects behaviour:
#
#   - `do: emit` — yield `record[field]` (which must be a string) downstream
#   - `do: drop` — silently skip the record
#   - `do: throw` — throw using `record[field]?.message ?? String(record[field])`
#
# Records whose discriminator value isn't listed throw `ERR_UNKNOWN_RECORD`.
kind: Telo.Definition
metadata:
  name: ExtractText
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/record-stream@0.7.0?local_path=./nodejs#extract-text
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      input:
        x-telo-stream: true
        description: Async iterable of records to project.
    required: [input]
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      output:
        x-telo-stream: true
        description: Async iterable of strings produced by the configured projection.
    required: [output]
    additionalProperties: false
schema:
  type: object
  properties:
    discriminator:
      title: Discriminator
      description: |
        Field name in each record whose value selects the action via the
        `records` map. Defaults to `type` (the universal JSON tagged-union
        convention).
      type: string
      default: type
    records:
      title: Records
      description: |
        Map from discriminator value to the action that handles it. Every
        record observed in the stream must have its discriminator value listed
        here, or the encoder throws `ERR_UNKNOWN_RECORD`.
      type: object
      additionalProperties:
        type: object
        properties:
          do:
            title: Action
            description: |
              `emit` extracts `record[field]` (must be a string) downstream.
              `drop` silently skips. `throw` raises with `record[field]?.message
              ?? String(record[field])`.
            type: string
            enum: [emit, drop, throw]
          field:
            title: Field
            description: |
              Record-key whose value is extracted by `emit` or referenced by
              `throw`. Required for those actions; ignored for `drop`.
            type: string
        required: [do]
        additionalProperties: false
  required: [records]
  additionalProperties: false
---
# Fan one input stream out to two consumers. Each output sees every item.
# When one consumer iterates ahead of the other, items are buffered in memory
# for the lagging consumer; bounded by the input stream's length.
kind: Telo.Definition
metadata:
  name: Tee
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/record-stream@0.7.0?local_path=./nodejs#tee
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      input:
        x-telo-stream: true
        description: Async iterable to fan out.
    required: [input]
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      outputA:
        x-telo-stream: true
        description: First fan-out branch — every item from `input` in order.
      outputB:
        x-telo-stream: true
        description: Second fan-out branch — every item from `input` in order.
    required: [outputA, outputB]
    additionalProperties: false
schema:
  type: object
  additionalProperties: false
---
# Passthrough that fires a side effect once the input completes. Every item forwards
# to `output` in order as it arrives (the consumer streams live); when `input` runs to
# its end, the `handler` Invocable is called once with `{ records, context }` — records
# is the full list observed, context is the opaque caller data from the `context` input.
# The canonical use is persist-while-streaming: stream an AI/agent response to a client
# via `output` and, at end-of-stream, `handler` writes the turn to a store. Projection
# from records to the store's shape lives in `handler` (typically a Run.Sequence) — this
# kind does no CEL and knows nothing of the store. `handler` is not called if the input
# errors or the consumer cancels early. Records are buffered in memory, bounded by the
# input stream's length.
kind: Telo.Definition
metadata:
  name: OnComplete
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/record-stream@0.7.0?local_path=./nodejs#on-complete
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      input:
        x-telo-stream: true
        description: Async iterable to forward and observe.
      context:
        description: Opaque caller data forwarded to the completion handler as `context`.
    required: [input]
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      output:
        x-telo-stream: true
        description: Every item from `input`, in order.
    required: [output]
    additionalProperties: false
schema:
  type: object
  properties:
    handler:
      title: Handler
      description: >-
        Invocable or Runnable (e.g. a Run.Sequence) called once, after `input`
        completes normally, with `{ records, context }`. Not called if the input
        errors or the consumer cancels early.
      anyOf:
        - x-telo-ref: "telo#Invocable"
        - x-telo-ref: "telo#Runnable"
  required: [handler]
  additionalProperties: false
---
# RecordStream.Journal — an in-memory, keyed, offset-addressable replay buffer.
# A producer streams records into it under a key (each getting a monotonic id)
# via JournalSink; a consumer reads a resumable stream from it via JournalSource,
# starting at any id and then tailing live until the key is finished. This is
# what makes a DETACHED stream resumable: a client that drops and reconnects
# re-reads from its last seen id (e.g. an SSE Last-Event-ID), replaying exactly
# what it missed and then continuing live. Process-local; buffers are retained
# until explicitly discarded.
kind: Telo.Definition
metadata:
  name: Journal
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/record-stream@0.7.0?local_path=./nodejs#journal
schema:
  type: object
  additionalProperties: false
---
# Drain a stream into a Journal under `key`. Each record is appended (monotonic
# id); on normal completion the key is finished, on error it is failed (the error
# is recorded for readers, then rethrown — never swallowed). Invoke it WITHOUT
# awaiting to run a turn detached: return the `key` to the client immediately and
# let the stream fill the journal in the background.
kind: Telo.Definition
metadata:
  name: JournalSink
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/record-stream@0.7.0?local_path=./nodejs#journal-sink
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    additionalProperties: false
    required: [key, input]
    properties:
      key:
        type: string
        description: Buffer key to append under (e.g. a turn id).
      input:
        x-telo-stream: true
        description: Async iterable of records to journal.
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    additionalProperties: false
    required: [key, count]
    properties:
      key: { type: string }
      count:
        type: integer
        description: Number of records appended before the stream completed.
schema:
  type: object
  additionalProperties: false
  required: [journal]
  properties:
    journal:
      title: Journal
      description: Reference to the RecordStream.Journal to write into.
      x-telo-ref: "std/record-stream#Journal"
---
# Read a resumable stream from a Journal. Yields `{ id, data }` entries with id
# greater than `fromId` (0 replays from the start), then tails live until the key
# is finished or failed. A reconnecting client passes its last seen id as
# `fromId` so it replays exactly what it missed and then continues live.
kind: Telo.Definition
metadata:
  name: JournalSource
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/record-stream@0.7.0?local_path=./nodejs#journal-source
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    additionalProperties: false
    required: [key]
    properties:
      key:
        type: string
        description: Buffer key to read.
      fromId:
        type: integer
        minimum: 0
        default: 0
        description: Yield entries with id greater than this (0 = from the start).
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    additionalProperties: false
    required: [output]
    properties:
      output:
        x-telo-stream: true
        description: Async iterable of `{ id, data }` entries, then live tail until done.
schema:
  type: object
  additionalProperties: false
  required: [journal]
  properties:
    journal:
      title: Journal
      description: Reference to the RecordStream.Journal to read from.
      x-telo-ref: "std/record-stream#Journal"
