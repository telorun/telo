kind: Telo.Application
metadata:
  name: ExtendsUnknownAccess
  version: 1.0.0
imports:
  Type: ../..
  Run: ../../../run
  JavaScript: ../../../javascript
targets:
  - !ref T
---
kind: Type.JsonSchema
metadata:
  name: Base
schema:
  type: object
  required: [ id ]
  properties:
    id: { type: string }
---
kind: Type.JsonSchema
metadata:
  name: Child
extends: Base
schema:
  type: object
  required: [ name ]
  additionalProperties: false
  properties:
    name: { type: string }
---
kind: JavaScript.Script
metadata:
  name: Make
outputType: !ref Child
code: |
  function main() { return { id: "x", name: "y" } }
---
# Accessing a field neither own nor inherited must still be caught — merging
# `extends` must not turn the strict child into an open object.
kind: Run.Sequence
metadata:
  name: T
steps:
  - name: M
    invoke: !ref Make
  - name: Use
    inputs:
      a: !cel "steps.M.result.bogus"
    invoke:
      kind: JavaScript.Script
      code: |
        function main(input) { return input }
