kind: Telo.Application
metadata:
  name: XTeloEvalCompile
  version: 1.0.0
imports:
  Http: ../modules/http-server
  HttpClient: ../modules/http-client
  Run: ../modules/run
  Assert: ../modules/assert
---
# Http.Server declares x-telo-eval: compile on port, host, baseUrl, etc.
# Using a CEL expression for port verifies compile expansion runs before the
# controller's create() — without it, Fastify would receive a CompiledValue
# object instead of a number and fail to start on the right port.
kind: Run.Sequence
metadata:
  name: TestCompileEval
with:
  - kind: Http.Api
    metadata:
      name: TestApi
    routes:
      - request:
          path: /ping
          method: GET
        returns:
          - status: 200
            content:
              application/json:
                body:
                  pong: true
  - kind: Http.Server
    metadata:
      name: TestServer
    port: "${{ 8857 }}"
    baseUrl: "${{ 'http://localhost:8857' }}"
    host: "${{ 'localhost' }}"
    logger: false
    mounts:
      - path: /api
        mount: !ref TestApi
targets:
  - !ref TestServer
steps:
  - name: Ping
    invoke:
      kind: HttpClient.Request
      url: http://localhost:8857/api/ping
      method: GET

  - name: AssertPong
    inputs:
      pong: "${{ steps.Ping.result.body.pong }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          pong:
            type: boolean
            const: true
        required:
          - pong
