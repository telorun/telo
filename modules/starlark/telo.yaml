kind: Telo.Library
metadata:
  version: 0.3.2
  name: starlark
  namespace: std
  description: Execute Starlark code within workflows
---
kind: Telo.Definition
metadata:
  name: Script
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/starlark@0.2.2?local_path=./nodejs#script
  - pkg:cargo/telorun-starlark?local_path=./rust
schema:
  type: object
  properties:
    metadata:
      type: object
      properties:
        name:
          type: string
      required: [name]
    code:
      title: Code
      description: Starlark source code to execute.
      type: string
      x-telo-widget: code
    inputType:
      title: Input Type
      description: Named type reference or inline type definition for script inputs.
      x-telo-ref: "telo#Type"
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
    outputType:
      title: Output Type
      description: Named type reference or inline type definition for script outputs.
      x-telo-ref: "telo#Type"
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
  required: [metadata, code]
