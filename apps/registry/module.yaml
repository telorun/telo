# Telo Module Registry

kind: Kernel.Module
metadata:
  name: telo-registry
  version: 1.0.0
targets:
  - Migrations
  - RegistryServer
---
# ── Imports ──────────────────────────────────────────────────────────────────

kind: Kernel.Import
metadata:
  name: Http
source: ../../modules/http-server
---
kind: Kernel.Import
metadata:
  name: HttpClient
source: ../../modules/http-client

---
kind: Kernel.Import
metadata:
  name: Config
source: ../../modules/config

---
kind: Kernel.Import
metadata:
  name: S3
source: ../../modules/s3
secrets:
  accessKeyId: "${{ resources.AppConfig.accessKeyId }}"
  secretAccessKey: "${{ resources.AppConfig.secretAccessKey }}"
---
kind: Kernel.Import
metadata:
  name: Sql
source: ../../modules/sql
---
kind: Kernel.Import
metadata:
  name: Run
source: ../../modules/run

---
# ── Configuration ─────────────────────────────────────────────────────────────

kind: Config.Env
metadata:
  name: AppConfig
variables:
  port:
    value: "${{ env.PORT }}"
    type: integer
    default: 3000
  bucketName:
    value: "${{ env.S3_BUCKET_NAME }}"
    type: string
  s3Endpoint:
    value: "${{ env.S3_ENDPOINT }}"
    type: string
  s3ForcePathStyle:
    value: "${{ env.S3_FORCE_PATH_STYLE }}"
    type: boolean
    default: false
  dbConnection:
    value: "${{ env.DB_CONNECTION }}"
    type: string
secrets:
  accessKeyId:
    value: "${{ env.S3_ACCESS_KEY_ID }}"
    type: string
  secretAccessKey:
    value: "${{ env.S3_SECRET_ACCESS_KEY }}"
    type: string

---
# ── Storage ───────────────────────────────────────────────────────────────────

kind: S3.Bucket
metadata:
  name: ModuleStore
bucketName: "${{ resources.AppConfig.bucketName }}"
endpoint: "${{ resources.AppConfig.s3Endpoint }}"
forcePathStyle: "${{ resources.AppConfig.s3ForcePathStyle }}"
accessKeyId: "${{ resources.AppConfig.accessKeyId }}"
secretAccessKey: "${{ resources.AppConfig.secretAccessKey }}"

---
# ── Database ──────────────────────────────────────────────────────────────────

kind: Sql.Connection
metadata:
  name: Db
driver: postgres
connectionString: "${{ resources.AppConfig.dbConnection }}"
---
kind: Sql.Migrations
metadata:
  name: Migrations
connection:
  kind: Sql.Connection
  name: Db
---
kind: Sql.Migration
metadata:
  name: 20260331143022_CreateModules
sql: |
  CREATE TABLE modules (
    namespace    TEXT NOT NULL,
    name         TEXT NOT NULL,
    version      TEXT NOT NULL,
    file_key     TEXT NOT NULL,
    description  TEXT,
    published_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
    PRIMARY KEY (namespace, name, version)
  )

---
kind: Http.Server
metadata:
  name: RegistryServer
host: "0.0.0.0"
port: "${{ resources.AppConfig.port }}"
logger: true
contentTypeParsers:
  - contentType: text/yaml
baseUrl: http://registry.telo.localhost:8060
openapi:
  info:
    title: Telo Module Registry
    version: 1.0.0
    description: |
      Resolve and browse Telo Kernel modules.
      Compatible with the Telo CLI and kind: Kernel.Import source resolution.
mounts:
  - path: /
    type: Http.Api.PublicApi
notFoundHandler:
  invoke:
    kind: HttpClient.Request
    metadata:
      name: NotFoundHandler
      module: telo-registry
    mode: stream
    inputs:
      method: "${{ request.method }}"
      url: "${{ resources.AppConfig.s3Endpoint }}/${{ request.path }}"
  response:
    - status: 200
      mode: stream

---
kind: Sql.Select
metadata:
  name: SearchModules
connection:
  kind: Sql.Connection
  name: Db
from: modules
distinctOn: [namespace, name]
columns: [namespace, name, version, description, published_at]
where:
  - when: "${{ inputs.q != '' }}"
    or:
      - { column: name, op: ilike, value: "${{ '%' + inputs.q + '%' }}" }
      - { column: namespace, op: ilike, value: "${{ '%' + inputs.q + '%' }}" }
      - { column: description, op: ilike, value: "${{ '%' + inputs.q + '%' }}" }
orderBy:
  - { column: namespace }
  - { column: name }
  - { column: published_at, direction: desc }
limit: "${{ inputs.limit }}"
offset: "${{ inputs.offset }}"
inputSchema:
  q:
    type: string
    default: ""
  limit:
    type: integer
    default: 20
  offset:
    type: integer
    default: 0
outputSchema:
  type: object
  properties:
    rows: { type: array }
    rowCount: { type: integer }

---
# Public API — unauthenticated.
# GET /search                       full-text search across modules.
# GET /{namespace}/{name}           lists all versions from the SQL index.
# PUT /{namespace}/{name}/{version} publishes a module.yaml (body) to S3 and records it in SQL.
# Everything else falls through to the server fallback (ForwardToR2).

kind: Http.Api
metadata:
  name: PublicApi
routes:
  - request:
      path: /search
      method: GET
      schema:
        query:
          type: object
          properties:
            q:
              type: string
              default: ""
              description: "Search query for name, namespace, and description."
            limit: { type: integer, default: 20, description: "Number of results to return." }
            offset:
              type: integer
              default: 0
              description: "Number of results to skip for pagination."
    handler:
      kind: Sql.Select
      name: SearchModules
    inputs:
      q: "${{ request.query.q }}"
      limit: "${{ request.query.limit }}"
      offset: "${{ request.query.offset }}"
    response:
      - status: 200
        body:
          results: "${{ result.rows }}"
          count: "${{ result.rowCount }}"

  - request:
      path: /{namespace}/{name}
      method: GET
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
          required: ["namespace", "name"]
    handler:
      kind: Sql.Query
      connection:
        kind: Sql.Connection
        name: Db
      inputs:
        sql: >-
          SELECT version, published_at FROM modules
          WHERE namespace = ? AND name = ?
          ORDER BY published_at ASC
        bindings:
          - "${{ request.params.namespace }}"
          - "${{ request.params.name }}"
    response:
      - status: 200
        when: "${{ result.rows.size() > 0 }}"
        body:
          name: "${{ request.params.namespace + '/' + request.params.name }}"
          version: "${{ result.rows[result.rows.size() - 1].version }}"
          versions: "${{ result.rows.map(r, r.version) }}"
      - status: 404
        body:
          error: "Module not found"

  - request:
      path: /{namespace}/{name}/{version}
      method: PUT
    handler:
      kind: Run.Sequence
      steps:
        - name: upload
          invoke:
            kind: S3.Put
            bucketRef:
              name: ModuleStore
          inputs:
            namespace: "${{ request.params.namespace }}"
            key: "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/module.yaml' }}"
            body: "${{ request.body }}"
            contentType: "text/yaml"
        - name: record
          invoke:
            kind: Sql.Exec
            connection:
              kind: Sql.Connection
              name: Db
          inputs:
            sql: >-
              INSERT INTO modules (namespace, name, version, file_key)
              VALUES ($1, $2, $3, $4)
              ON CONFLICT (namespace, name, version) DO UPDATE SET file_key = EXCLUDED.file_key
            bindings:
              - "${{ request.params.namespace }}"
              - "${{ request.params.name }}"
              - "${{ request.params.version }}"
              - "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/module.yaml' }}"
      outputs:
        published: "${{ request.params.namespace + '/' + request.params.name + '@' + request.params.version }}"
    response:
      - status: 201
        body:
          published: "${{ result.published }}"
      - status: 500
        body:
          error: "Publish failed"
