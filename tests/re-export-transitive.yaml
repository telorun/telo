# Transitive re-export of a runnable (Migrate) and a provider (Db) across three
# import boundaries: app -> gateway -> api -> domain. The app imports ONLY gateway,
# yet targets the migration owned by domain and queries domain's single Db instance
# through the re-exported connection — proving re-export resolves to the one owning
# instance regardless of depth. See plans/transitive-re-export.md.
kind: Telo.Application
metadata:
  name: ReExportTransitive
  version: 1.0.0
imports:
  Gw: ./__fixtures__/re-export/gateway
  Sql: ../modules/sql
  Assert: ../modules/assert
  Run: ../modules/run
targets:
  - !ref Gw.Migrate
  - !ref Verify
---
kind: Run.Sequence
metadata:
  name: Verify
steps:
  - name: Select
    inputs:
      sql: "SELECT name FROM users WHERE id = 1"
    invoke:
      kind: Sql.Query
      connection: !ref Gw.Db
  - name: AssertSeeded
    inputs:
      rows: "${{ steps.Select.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            minItems: 1
            maxItems: 1
            items:
              type: object
              properties:
                name:
                  const: Alice
