kind: Telo.Application
metadata:
  name: JavaScriptDemo
  version: 1.0.0
  description: A demo showcasing a JavaScript script run from flat `targets`.
targets:
  - name: Step1
    invoke: !ref MultiplyBy2
    inputs:
      value: 42
  - name: PrintResult
    invoke: !ref Print
    inputs:
      output: |
        Evaluated JavaScript code.
        Result is: ${{ steps.Step1.result.result }}
---
kind: Telo.Import
metadata:
  name: Type
source: ../modules/type
---
kind: Telo.Import
metadata:
  name: JavaScript
source: ../modules/javascript
---
kind: Telo.Import
metadata:
  name: Console
source: ../modules/console
---
kind: JavaScript.Script
metadata:
  name: MultiplyBy2
code: |
  function main({ value }) {
    return { result: value * 2 }
  }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      value: { type: number }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      result: { type: number }
---
kind: Console.WriteLine
metadata:
  name: Print
