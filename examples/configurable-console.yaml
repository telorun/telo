kind: Kernel.Module
metadata:
  name: ExampleConsole
  version: 1.0.0
variables:
  product:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      price:
        type: number
      inStock:
        type: boolean
    required: ["id", "name", "price", "inStock"]
secrets:
  password:
    type: string
targets:
  - Main
---
kind: Kernel.Import
metadata:
  name: Run
  module: ExampleConsole
source: ../modules/run
---
kind: Kernel.Import
metadata:
  name: Console
  module: ExampleConsole
source: ../modules/console
---
kind: Run.Sequence
metadata:
  name: Main
  module: ExampleConsole
steps:
  - name: WriteProductInfo
    invoke:
      kind: Console.WriteLine
      metadata:
        name: Result
        module: ExampleConsole
      output: "Product name: ${{ variables.product.name }}, Password: ${{ secrets.password }}"
