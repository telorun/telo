kind: Telo.Application
metadata:
  name: templated-api-usage
  version: 1.0.0
  description: |
    Imports `library.yaml` as a `Telo.Library` and mounts its
    `HelloApi` twice on the same `Http.Server` — under `/v1` and `/v2`.
    Shows that a single library-defined kind can be reused across multiple
    mount points without duplicating the route definition.

    Run, then:
        curl 'http://localhost:8845/v1/hello?name=World'
        curl 'http://localhost:8845/v2/hello?name=World'
imports:
  Http: std/http-server@0.16.1
  Templated: ./library.yaml
ports:
  http:
    env: PORT
    protocol: tcp
    default: 8845
targets:
  - !ref TemplatedApiServer
---
kind: Http.Server
metadata:
  name: TemplatedApiServer
port: !cel "ports.http"
logger: true
openapi:
  info:
    title: "Templated API Example"
    version: "1.0.0"
mounts:
  - path: /v1
    mount: !ref Templated.HelloApi
  - path: /v2
    mount: !ref Templated.HelloApi
