kind: Telo.Library
metadata:
  name: ai-openai
  namespace: std
  version: 0.5.0
  description: OpenAI-compatible provider for Ai.Model (direct /chat/completions HTTP API, no vendor SDK).
imports:
  Ai: ../ai
exports:
  kinds:
    - OpenaiModel
---
kind: Telo.Definition
metadata:
  name: OpenaiModel
capability: Telo.Provider
extends: Ai.Model
controllers:
  - pkg:npm/@telorun/ai-openai@0.5.0?local_path=./nodejs#openai-model
schema:
  type: object
  properties:
    model:
      title: Model ID
      description: OpenAI model identifier passed to the API (e.g. gpt-4o, gpt-4o-mini).
      type: string
    apiKey:
      title: API Key
      description: Secret reference; typically `${{ secrets.OPENAI_API_KEY }}`.
      type: string
      x-telo-eval: compile
    baseUrl:
      title: Base URL
      description: Optional override for the OpenAI API base URL (Azure OpenAI, OpenAI-compatible gateways).
      type: string
      x-telo-eval: compile
    options:
      title: Options
      description: Model-level defaults as camelCase OpenAI request params (temperature, maxTokens, topP, …), normalized to snake_case and merged into the request body. Merged beneath Ai.Text.options / Ai.TextStream.options and per-call inputs.options; downstream wins.
      type: object
      additionalProperties: true
  required: [ model, apiKey ]
  additionalProperties: false
