kind: Telo.Library
metadata:
  name: unexported-kind-lib
  namespace: std
  version: 1.0.0
  description: >-
    Test fixture: declares two kinds but exports only one, so a consumer
    referencing the unexported kind must be rejected by the exports.kinds gate.
exports:
  kinds:
    - Public
---
kind: Telo.Definition
metadata:
  name: Public
  description: Listed in exports.kinds — importers may reference it.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/javascript@0.9.0?local_path=../../modules/javascript/nodejs#script
schema:
  type: object
  additionalProperties: false
---
# Deliberately absent from `exports.kinds` — importers must not be able to reference it.
kind: Telo.Definition
metadata:
  name: Private
  description: Absent from exports.kinds — referencing it must raise KIND_NOT_EXPORTED.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/javascript@0.9.0?local_path=../../modules/javascript/nodejs#script
schema:
  type: object
  additionalProperties: false
