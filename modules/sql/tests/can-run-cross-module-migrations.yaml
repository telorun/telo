kind: Telo.Application
metadata:
  name: CanRunCrossModuleMigrations
  version: 1.0.0
imports:
  Sql: ../
  Lib: ./__fixtures__/migration-lib
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref Lib.Migrate
  - !ref VerifyCrossModule
---
# Regression: an imported library's `Sql.Migrations` holds `connection: !ref Db`
# to a sibling resource in its own scope. The library's `!ref` must be resolved
# (normalized to {kind, name}) when the import-controller registers it, or the
# migration's controller receives a raw ref sentinel and throws
# "Sql: invalid connection reference". Verifying through the exported connection
# also exercises the cross-module `!ref Lib.Db` value resolution.
kind: Run.Sequence
metadata:
  name: VerifyCrossModule
steps:
  - name: SelectSeeded
    inputs:
      sql: "SELECT name FROM users WHERE id = 1"
    invoke:
      kind: Sql.Query
      connection: !ref Lib.Db

  - name: AssertSeeded
    inputs:
      rows: "${{ steps.SelectSeeded.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            minItems: 1
            maxItems: 1
            items:
              type: object
              properties:
                name:
                  const: Alice
