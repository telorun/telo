kind: Kernel.Module
metadata:
  version: 1.0.0
  name: TracingDemo
  description: Example demonstrating the Tracing module with file exporter
---
kind: Kernel.Import
metadata:
  name: Tracing
source: ../../modules/tracing
---
kind: Kernel.Import
metadata:
  name: Http
source: ../../modules/http-server
---
kind: Kernel.Import
metadata:
  name: Logic
source: ../../modules/javascript
---
kind: Http.Server
metadata:
  name: TracingExample
port: 8845
mounts:
  - path: /v1
    type: Http.Api.ExampleApi
---
kind: Tracing.FileExporter
metadata:
  name: Traces
path: ./.telo-debug/traces.ndjson
format: ndjson
mode: overwrite
---
kind: Tracing.Provider
metadata:
  name: main
exporters:
  - Tracing.FileExporter.Traces
events:
  - Kernel.*
  - Http.Server.*
filters:
  minLevel: debug
buffer:
  maxSize: 1000
  retryAttempts: 3
  retryDelay: 1000
---
kind: Http.Api
metadata:
  name: ExampleApi
routes:
  - request:
      path: /hello
      method: GET
    handler:
      name: Logic.InlineFunction.HelloHandler
    response:
      - status: 200
        headers:
          Content-Type: application/json
---
kind: Logic.Script
metadata:
  name: HelloHandler
code: |
  function main() {
    return {
      greeting: "Hello from Tracing Example!",
      timestamp: new Date().toISOString()
    };
  }
