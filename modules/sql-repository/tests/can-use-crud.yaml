kind: Kernel.Module
metadata:
  name: CanUseCrud
  version: 1.0.0
targets:
  - TestCrud
---
kind: Kernel.Import
metadata:
  name: Sql
source: ../../sql
---
kind: Kernel.Import
metadata:
  name: SqlRepository
source: ../
---
kind: Kernel.Import
metadata:
  name: Run
source: ../../run
---
kind: Kernel.Import
metadata:
  name: Assert
source: ../../assert
---
kind: Sql.Connection
metadata:
  name: Db
driver: sqlite
file: ":memory:"
---
kind: SqlRepository.Create
metadata:
  name: InsertUser
connection:
  kind: Sql.Connection
  name: Db
table: users
---
kind: SqlRepository.Read
metadata:
  name: GetUsers
connection:
  kind: Sql.Connection
  name: Db
table: users
---
kind: SqlRepository.Delete
metadata:
  name: DeleteUser
connection:
  kind: Sql.Connection
  name: Db
table: users
---
kind: Run.Sequence
metadata:
  name: TestCrud
steps:
  - name: Setup
    inputs: {}
    invoke:
      kind: Sql.Exec
      connection:
        kind: Sql.Connection
        name: Db
      inputs:
        sql: "CREATE TABLE users (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL)"

  - name: Insert
    inputs:
      data:
        name: Alice
    invoke:
      kind: SqlRepository.Create
      name: InsertUser

  - name: Read
    inputs:
      filters: {}
    invoke:
      kind: SqlRepository.Read
      name: GetUsers

  - name: AssertRead
    inputs:
      rows: "${{ steps.Read.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            minItems: 1
            items:
              type: object
              properties:
                name:
                  const: Alice

  - name: Delete
    inputs:
      filters:
        name: Alice
    invoke:
      kind: SqlRepository.Delete
      name: DeleteUser

  - name: ReadAfterDelete
    inputs:
      filters: {}
    invoke:
      kind: SqlRepository.Read
      name: GetUsers

  - name: AssertEmpty
    inputs:
      rows: "${{ steps.ReadAfterDelete.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            maxItems: 0
