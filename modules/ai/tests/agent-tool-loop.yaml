kind: Telo.Application
metadata:
  name: AgentToolLoopTest
  version: 1.0.0
targets:
  - TestAgentLoop
---
kind: Telo.Import
metadata:
  name: Ai
source: ../
---
kind: Telo.Import
metadata:
  name: AiEcho
source: ./__fixtures__/ai-echo.yaml
---
kind: Telo.Import
metadata:
  name: Js
source: ../../javascript
---
kind: Telo.Import
metadata:
  name: Run
source: ../../run
---
kind: Telo.Import
metadata:
  name: Assert
source: ../../assert
---
# Echo emits one deterministic tool call (multiply 6×7) on the first turn when tools
# are present, then echoes the tool result on the second turn — driving a full agent
# loop without a live model.
kind: AiEcho.EchoModel
metadata:
  name: Echo
emitToolCall:
  name: multiply
  arguments: { a: 6, b: 7 }
---
kind: Js.Script
metadata:
  name: Multiplier
code: |
  function main({ a, b }) { return { product: a * b }; }
---
kind: Ai.Tools
metadata:
  name: LocalTools
tools:
  - tool: { kind: Js.Script, name: Multiplier }
    name: multiply
    description: Multiply two numbers.
    parameters:
      type: object
      additionalProperties: false
      required: [a, b]
      properties:
        a: { type: number }
        b: { type: number }
---
kind: Ai.Agent
metadata:
  name: Assistant
model:
  kind: AiEcho.EchoModel
  name: Echo
system: "Use tools when needed."
toolProviders:
  - provider: { kind: Ai.Tools, name: LocalTools }
---
kind: Run.Sequence
metadata:
  name: TestAgentLoop
steps:
  - name: Invoke
    inputs:
      prompt: "multiply 6 and 7"
    invoke:
      kind: Ai.Agent
      name: Assistant
  # Turn 1 → tool call multiply(6,7) → Multiplier returns {product:42} → tool message
  # content is the JSON-stringified output. Turn 2 → Echo echoes that content as the
  # final answer.
  - name: AssertText
    inputs:
      text: "${{ steps.Invoke.result.text }}"
      finishReason: "${{ steps.Invoke.result.finishReason }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text:
            type: string
            const: '{"product":42}'
          finishReason:
            type: string
            const: stop
        required: [text, finishReason]
  - name: AssertTrace
    inputs:
      toolName: "${{ steps.Invoke.result.steps[0].toolCalls[0].name }}"
      toolResult: "${{ steps.Invoke.result.steps[0].toolResults[0].content }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          toolName:
            type: string
            const: multiply
          toolResult:
            type: string
            const: '{"product":42}'
        required: [toolName, toolResult]
