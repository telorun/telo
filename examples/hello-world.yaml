kind: Telo.Application
metadata:
  name: HelloConsole
  version: 1.0.0
  description: |
    Smallest possible runnable Telo application: imports the `std/run` and
    `std/console` modules and prints a single line via `Run.Sequence`. Useful
    as a "does my setup work?" smoke test and as a starting skeleton for
    larger script-style manifests.
targets:
  - Main
---
kind: Telo.Import
metadata:
  name: Run
source: std/run@0.3.0
---
kind: Telo.Import
metadata:
  name: Console
source: std/console@0.6.0
---
kind: Run.Sequence
metadata:
  name: Main
steps:
  - name: SayHello
    invoke:
      kind: Console.WriteLine
    inputs:
      output: "Hello from Telo!"
