body: Document CEL time functions (nowIso(tz)/today(tz)/nowMillis/nowSeconds) and uuidv1/3/4/5/6/7, the absence of ?? (use optional access / orValue), local bindings via cel.bind (CEL has no assignment), and that numeric JSON fields must be numbers not quoted strings. Mention `telo cel functions` / `telo cel eval`.
