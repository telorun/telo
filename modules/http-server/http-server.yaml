kind: "Kernel.Definition"
metadata:
  name: "Server"
extends: Kernel.Service
controllers:
  - pkg:npm/@telorun/http-server@>=0.1.0?local_path=./nodejs#http-server
schema:
  type: "object"
  properties:
    host:
      type: "string"
      default: "localhost"
    port:
      type: "integer"
      minimum: 1
      maximum: 65535
    mounts:
      type: "array"
      items:
        type: "object"
        properties:
          path:
            type: "string"
          type:
            type: "string"
    notFoundHandler:
      type: "object"
      properties:
        invoke:
          type: "object"
          properties:
            kind:
              type: "string"
          required: ["kind"]
          additionalProperties: true
        response:
          type: "array"
          items:
            type: "object"
            properties:
              status:
                type: "integer"
                minimum: 100
                maximum: 599
              when:
                type: "string"
              mode:
                type: "string"
                enum: ["buffer", "stream"]
              headers:
                type: "object"
                additionalProperties:
                  type: "string"
              body:
                description: "CEL expression or object mapping for response body"
            required: ["status"]
      required: ["invoke"]
  required: ["port", "mounts"]
