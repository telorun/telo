kind: Telo.Library
metadata:
  name: ai
  namespace: std
  version: 1.1.1
  description: LLM completion primitives with pluggable provider models
exports:
  kinds:
    - Model
    - Text
    - TextStream
---
# The abstract contract every LLM provider implements. Carries the input/output
# schemas so the typed-abstracts plan (see kernel/nodejs/plans/typed-abstracts.md)
# can enforce them once it ships — meanwhile Ai.Text validates output shape at
# runtime, and Ai.TextStream enforces the StreamPart contract on the wire.
kind: Telo.Abstract
metadata:
  name: Model
capability: Telo.Invocable
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      messages:
        type: array
        minItems: 1
        items:
          type: object
          properties:
            role:
              type: string
              enum: [system, user, assistant]
            content:
              type: string
          required: [role, content]
          additionalProperties: false
      options:
        type: object
        additionalProperties: true
    required: [messages]
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      text:
        type: string
      usage:
        type: object
        properties:
          promptTokens: { type: integer, minimum: 0 }
          completionTokens: { type: integer, minimum: 0 }
          totalTokens: { type: integer, minimum: 0 }
        required: [promptTokens, completionTokens, totalTokens]
        additionalProperties: false
      finishReason:
        type: string
        enum: [stop, length, content-filter, error, other]
    required: [text, usage, finishReason]
    additionalProperties: false
---
kind: Telo.Definition
metadata:
  name: Text
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/ai@1.1.1?local_path=./nodejs#text
schema:
  type: object
  properties:
    model:
      title: Model
      description: Reference to any Ai.Model implementation (Ai.OpenaiModel, Ai.AnthropicModel, Ai.OllamaModel, or a third-party provider).
      x-telo-ref: "std/ai#Model"
    system:
      title: System prompt
      description: Default system message. Runtime inputs.system takes precedence when set.
      type: string
    options:
      title: Options
      description: Completion-level option overrides. Shallow-merged between the model's options and runtime inputs.options; downstream wins.
      type: object
      additionalProperties: true
  required: [model]
  additionalProperties: false
---
# Streaming consumer. Drives Ai.Model.stream() and forwards the StreamPart
# iterable on `result.output` per the streaming-Invocable convention. Encoding
# (NDJSON / SSE / plain text / raw bytes) is the consumer's responsibility —
# pipe through a format-codec encoder (Ndjson.Encoder from @telorun/ndjson-codec,
# Sse.Encoder from @telorun/sse-codec, PlainText.Encoder from @telorun/plain-text-codec,
# Octet.Encoder from @telorun/octet-codec), or iterate `result.output` directly
# in a JS.Script step.
kind: Telo.Definition
metadata:
  name: TextStream
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/ai@1.1.1?local_path=./nodejs#text-stream
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      output:
        x-telo-stream: true
        description: Async iterable of StreamPart records (text-delta | finish | error).
    required: [output]
    additionalProperties: false
schema:
  type: object
  properties:
    model:
      title: Model
      description: Reference to any Ai.Model implementation.
      x-telo-ref: "std/ai#Model"
    system:
      title: System prompt
      description: Default system message. Runtime inputs.system takes precedence when set.
      type: string
    options:
      title: Options
      description: Per-resource option overrides. Shallow-merged with the model's options and runtime inputs.options; downstream wins.
      type: object
      additionalProperties: true
  required: [model]
  additionalProperties: false
