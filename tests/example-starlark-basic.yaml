kind: Telo.Application
metadata:
  name: TestStarlarkBasic
  version: 1.0.0
  description: Test for starlark-basic example
targets:
  - RunScriptOnEvent
  - VerifyStarlarkBasicEvents
---
kind: Telo.Import
metadata:
  name: Type
source: ../modules/type
---
kind: Telo.Import
metadata:
  name: Run
source: ../modules/run
---
kind: Telo.Import
metadata:
  name: Starlark
source: ../modules/starlark
---
kind: Telo.Import
metadata:
  name: Console
source: ../modules/console
---
kind: Telo.Import
metadata:
  name: Assert
source: ../modules/assert
---
kind: Type.JsonSchema
metadata:
  name: ScriptInput
schema:
  type: object
  properties:
    value:
      type: number
  required: [value]
---
kind: Type.JsonSchema
metadata:
  name: ScriptOutput
schema:
  type: object
  properties:
    result:
      type: number
  required: [result]
---
kind: Starlark.Script
metadata:
  name: ExampleStarlarkScript
code: |
  def run(input):
    result = input["value"] * 2
    return {"result": result}
inputType: ScriptInput
outputType: ScriptOutput
---
kind: Console.WriteLine
metadata:
  name: WriteResult
inputType: ScriptOutput
output: |
  Evaluated starlark code.
  Result is: ${{ result }}
---
kind: Run.Sequence
metadata:
  name: RunScriptOnEvent
steps:
  - name: Step1
    inputs:
      value: 42
    invoke:
      kind: Starlark.Script
      name: ExampleStarlarkScript
  - name: Step2
    inputs:
      result: "${{ steps.Step1.result.result }}"
    invoke:
      kind: Console.WriteLine
      name: WriteResult
---
kind: Assert.Events
metadata:
  name: VerifyStarlarkBasicEvents
filter:
  - type: "*"
expect:
  - event: Starlark.Script.*.Invoked
    payload:
      outputs:
        result: 84
  - event: Console.WriteLine.*.Invoked
    payload: {}
