services:
  registry:
    image: node:24
    command: 'sh -c "corepack enable && exec pnpm run telo ./apps/registry"'
    init: true
    volumes:
      - .:/telo
    working_dir: /telo
    env_file:
      - ./apps/registry/.env.local
    ports:
      - "3000:3000"
    environment:
      DB_FILE: "/tmp/registry.db"