kind: Telo.Library
metadata:
  name: console
  namespace: std
  version: 1.1.4
---
kind: Telo.Definition
metadata:
  name: WriteLine
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/console@0.1.11?local_path=./nodejs#writeline
schema:
  type: object
  properties:
    output:
      title: Output
      description: Text content written to standard output.
      type: string
  required: ["output"]
---
kind: Telo.Definition
metadata:
  name: ReadLine
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/console@0.1.11?local_path=./nodejs#readline
schema:
  type: object
  properties:
    prompt:
      title: Prompt
      description: Prompt text shown before reading input.
      type: string
  required: ["prompt"]
