kind: Telo.Application
metadata:
  name: RunSequenceBasic
  version: 1.0.0
imports:
  Run: ../
  JavaScript: ../../javascript
  Assert: ../../assert
targets:
  - !ref TestInvokeStep
---
kind: Run.Sequence
metadata:
  name: TestInvokeStep
steps:
  - name: AddNumbers
    inputs:
      a: 5
      b: 3
    invoke:
      kind: JavaScript.Script
      code: |
        function main({ a, b }) {
          return { sum: a + b }
        }
  - name: VerifySum
    inputs:
      sum: "${{ steps.AddNumbers.result.sum }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          sum:
            type: number
            const: 8
---
kind: Assert.Events
metadata:
  name: ExpectEvents
filter:
  - type: "*"
expect:
  - event: "*.Invoked"
    payload:
      ref: { kind: JavaScript.Script }
      outputs:
        sum: 8
  - event: "*.Invoked"
    payload:
      ref: { kind: Assert.Schema }
      outputs: true
