kind: Telo.Application
metadata:
  name: TypeStaticAnalysisTest
  version: 1.0.0
imports:
  Assert: ../../assert
targets:
  - !ref TestBadFieldAccess
  - !ref TestValidFieldAccess
  - !ref TestUntypedStepAccess
  - !ref TestBadCelOverload
  - !ref TestExtendsInheritedAccess
  - !ref TestExtendsUnknownAccess
---
# Bad field access on typed output — should produce CEL_UNKNOWN_FIELD
kind: Assert.Manifest
metadata:
  name: TestBadFieldAccess
source: ./__fixtures__/bad-type-access.yaml
expect:
  errors:
    - code: CEL_UNKNOWN_FIELD
      message: nonExistent
---
# Valid field access on typed output — should produce zero errors
kind: Assert.Manifest
metadata:
  name: TestValidFieldAccess
source: ./__fixtures__/valid-type-access.yaml
expect:
  errors: []
---
# Untyped step result — any access allowed, no false positives
kind: Assert.Manifest
metadata:
  name: TestUntypedStepAccess
source: ./__fixtures__/untyped-step-access.yaml
expect:
  errors: []
---
# Invalid CEL method overload (`.slice(int)` instead of `.substring(int)`) —
# env.check() rejects the expression itself. The analyzer must surface this as
# SCHEMA_VIOLATION with the type-checker's message.
kind: Assert.Manifest
metadata:
  name: TestBadCelOverload
source: ./__fixtures__/bad-cel-overload.yaml
expect:
  # Two loose substring expectations instead of an exact upstream phrasing —
  # @marcbachmann/cel-js wording may change between versions, but both "CEL
  # type error" (our prefix) and "slice" (the offending method) should remain.
  errors:
    - code: SCHEMA_VIOLATION
      message: "CEL type error"
    - code: SCHEMA_VIOLATION
      message: "slice"
---
# Field access on a type's INHERITED (`extends`) property — the analyzer must
# merge parent schemas exactly like the runtime, so an inherited field is known
# and produces zero errors (regression: previously a false CEL_UNKNOWN_FIELD).
kind: Assert.Manifest
metadata:
  name: TestExtendsInheritedAccess
source: ./__fixtures__/extends-inherited-access.yaml
expect:
  errors: []
---
# Merging `extends` must not turn a strict child into an open object — a field
# that is neither own nor inherited is still caught.
kind: Assert.Manifest
metadata:
  name: TestExtendsUnknownAccess
source: ./__fixtures__/extends-unknown-access.yaml
expect:
  errors:
    - code: CEL_UNKNOWN_FIELD
      message: bogus
