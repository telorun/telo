{{- if .Values.registry.dockerconfigjson }}
# Registry auth, created in both namespaces because dockerconfigjson Secrets are
# namespace-scoped: the push copy lives where Kaniko runs (build.namespace), the
# pull copy where session pods run (sessionNamespace) for the kubelet to pull.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "telo-k8s-runner.name" . }}-registry-push
  namespace: {{ .Values.build.namespace }}
  labels:
    {{- include "telo-k8s-runner.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ .Values.registry.dockerconfigjson | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "telo-k8s-runner.name" . }}-registry-pull
  namespace: {{ .Values.sessionNamespace }}
  labels:
    {{- include "telo-k8s-runner.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ .Values.registry.dockerconfigjson | quote }}
{{- end }}
