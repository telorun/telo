kind: Kernel.Application
metadata:
  name: PipelineWithResourcesBasic
  version: 1.0.0
---
kind: Kernel.Import
metadata:
  name: Type
source: ../modules/type
---
kind: Kernel.Import
metadata:
  name: JavaScript
source: ../modules/javascript
---
kind: Kernel.Import
metadata:
  name: Run
source: ../modules/run
---
kind: Kernel.Import
metadata:
  name: Assert
source: ../modules/assert
---
kind: Run.Sequence
metadata:
  name: TestWithResources
with:
  - kind: JavaScript.Script
    metadata:
      name: SharedHelper
    code: |
      function main({ value }) {
        return {
          doubled: value * 2
        }
      };
    inputType:
      kind: Type.JsonSchema
      schema:
        type: object
        properties:
          value: { type: number }
    outputType:
      kind: Type.JsonSchema
      schema:
        type: object
        properties:
          doubled: { type: number }
steps:
  - name: UseHelper
    inputs:
      value: 5
    invoke:
      kind: JavaScript.Script
      name: SharedHelper

  - name: VerifyResult
    inputs:
      doubled: "${{ steps.UseHelper.result.doubled }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          doubled:
            type: number
            const: 10
        required:
          - doubled
