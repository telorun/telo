kind: Kernel.Module
metadata:
  name: StarlarkDemo
  version: 1.0.0
  description: A demo module showcasing Starlark scripts
imports:
  - ../modules/flow
  - ../modules/starlark
  - ../modules/console
---
kind: Starlark.Script
metadata:
  name: ExampleStarlarkScript
  module: StarlarkDemo
code: |
  def run(input):
    result = input["value"] * 2
    return {"result": result}
inputSchema:
  type: object
  properties:
    value:
      type: number
  required: [value]
outputSchema:
  type: object
  properties:
    result:
      type: number
  required: [result]
---
kind: Console.WriteLine
metadata:
  name: WriteResult
  module: StarlarkDemo
inputSchema:
  type: object
  properties:
    result:
      type: number
  required: [result]
output: |
  Evaluated starlark code.
  Result is: ${{ result }}
---
kind: Flow.Steps
metadata:
  name: RunScriptOnEvent
  module: StarlarkDemo
trigger:
  event: Kernel.Started
  once: true
  filter: "true"
steps:
  - name: Step1
    inputs:
      value: 42
    invoke:
      kind: Starlark.Script
      name: ExampleStarlarkScript
  - inputs:
      result: ${{ Step1.outputs.result }}
    invoke:
      kind: Console.WriteLine
      name: WriteResult
