kind: Telo.Application
metadata:
  name: todo-app
  version: 1.0.0
  description: |
    A complete app served as one unit: the REST todo API and the vanilla HTML/JS
    frontend that consumes it (Http.Static), on a single port. The whole REST
    surface is one declarative Crud.Resource — list / read / create / update /
    delete over the `todos` table — mounted alongside the static frontend.
imports:
  Http: std/http-server@0.15.0
  Sql: std/sql@0.10.0
  SqlSqlite: std/sql-sqlite@0.2.0
  Crud: std/crud@0.1.0
targets:
  - !ref Migrate
  - !ref Server
# Ship the frontend into the published module artifact so `Http.Static root:
# ./public` resolves after `telo publish` / install, not just locally.
files:
  - public/**
ports:
  http:
    env: PORT
    protocol: tcp
    default: 8077
---
kind: SqlSqlite.Connection
metadata:
  name: Db
file: ./todo.db
---
kind: Sql.Migrations
metadata:
  name: Migrate
connection: !ref Db
migrations:
  0001_create_todos:
    statement: |
      CREATE TABLE IF NOT EXISTS todos (
        id         INTEGER PRIMARY KEY AUTOINCREMENT,
        text       TEXT    NOT NULL,
        done       INTEGER NOT NULL DEFAULT 0,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      )
---
# The entire REST API: CRUD over the `todos` table. Mounted at /api/todos, it
# serves GET / (list), GET /{id}, POST /, PUT /{id}, DELETE /{id}.
kind: Crud.Resource
metadata:
  name: Todos
connection: !ref Db
table: todos
---
kind: Http.Server
metadata:
  name: Server
host: 127.0.0.1
port: !cel "ports.http"
logger: true
openapi:
  info:
    title: Todo API
    version: 1.0.0
mounts:
  - path: /api/todos
    mount: !ref Todos
  - path: /
    mount: !ref Ui
---
kind: Http.Static
metadata:
  name: Ui
root: ./public
