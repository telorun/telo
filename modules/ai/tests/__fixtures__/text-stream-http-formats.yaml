kind: Telo.Application
metadata:
  name: TextStreamHttpFormatsTest
  version: 1.0.0
  description: |
    End-to-end test for Ai.TextStream + Http.Api `mode: stream`. Module-level
    resources (Api, three Ai.TextStream instances per format, the echo model,
    the fetch helper) are mounted onto a scoped Http.Server inside the test
    sequence. The Server lives in `with:` and is listed under `targets:` so
    its run() fires before steps and scope teardown releases the hold afterwards.
    Each step fetches a route, drains the body, and asserts byte-exact wire output.
targets:
  - TestAllFormats
---
kind: Telo.Import
metadata: { name: Ai }
source: ../
---
kind: Telo.Import
metadata: { name: AiEcho }
source: ./__fixtures__/ai-echo.yaml
---
kind: Telo.Import
metadata: { name: Http }
source: ../../http-server
---
kind: Telo.Import
metadata: { name: JS }
source: ../../javascript
---
kind: Telo.Import
metadata: { name: Type }
source: ../../type
---
kind: Telo.Import
metadata: { name: Run }
source: ../../run
---
kind: Telo.Import
metadata: { name: Assert }
source: ../../assert
---
# Fixture model: echoes the last message verbatim, one text-delta per character.
kind: AiEcho.EchoModel
metadata: { name: Echo }
---
# Three streams sharing the same model — only `format` differs.
kind: Ai.TextStream
metadata: { name: StreamText }
model:
  kind: AiEcho.EchoModel
  name: Echo
format: text
---
kind: Ai.TextStream
metadata: { name: StreamNdjson }
model:
  kind: AiEcho.EchoModel
  name: Echo
format: ndjson
---
kind: Ai.TextStream
metadata: { name: StreamSse }
model:
  kind: AiEcho.EchoModel
  name: Echo
format: sse
---
# Helper: POST to a URL with {prompt}, drain the body, return {status, contentType, body}.
# Uses Node's global fetch so the test exercises the wire bytes — not just the
# Readable in process. Buffer is a Node global available inside `new Function`.
kind: JS.Script
metadata: { name: FetchAndDrain }
code: |
  async function main({ url, prompt }) {
    const r = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt }),
    });
    const chunks = [];
    for await (const chunk of r.body) chunks.push(Buffer.from(chunk));
    return {
      status: r.status,
      contentType: r.headers.get("content-type") || "",
      body: Buffer.concat(chunks).toString("utf8"),
    };
  }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      url: { type: string }
      prompt: { type: string }
    required: [url, prompt]
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      status: { type: integer }
      contentType: { type: string }
      body: { type: string }
    required: [status, contentType, body]
---
kind: Http.Api
metadata: { name: Api }
routes:
  - request:
      path: /text
      method: POST
      schema:
        body:
          type: object
          properties:
            prompt: { type: string }
          required: [prompt]
    handler:
      kind: Ai.TextStream
      name: StreamText
    inputs:
      prompt: "${{ request.body.prompt }}"
    returns:
      - status: 200
        mode: stream
        headers:
          Content-Type: "text/plain; charset=utf-8"
  - request:
      path: /ndjson
      method: POST
      schema:
        body:
          type: object
          properties:
            prompt: { type: string }
          required: [prompt]
    handler:
      kind: Ai.TextStream
      name: StreamNdjson
    inputs:
      prompt: "${{ request.body.prompt }}"
    returns:
      - status: 200
        mode: stream
        headers:
          Content-Type: "application/x-ndjson"
  - request:
      path: /sse
      method: POST
      schema:
        body:
          type: object
          properties:
            prompt: { type: string }
          required: [prompt]
    handler:
      kind: Ai.TextStream
      name: StreamSse
    inputs:
      prompt: "${{ request.body.prompt }}"
    returns:
      - status: 200
        mode: stream
        headers:
          Content-Type: "text/event-stream"
---
kind: Run.Sequence
metadata: { name: TestAllFormats }
with:
  # Server lives in the sequence scope so its teardown releases the kernel hold
  # when the sequence finishes. mounts.type references the module-level Api
  # (Http.Server.setupRoutes looks resources up via the module context).
  - kind: Http.Server
    metadata: { name: Server }
    host: 127.0.0.1
    port: 8946
    baseUrl: http://127.0.0.1:8946
    logger: false
    openapi:
      info:
        title: Ai.TextStream HTTP Test
        version: 1.0.0
    mounts:
      - path: /
        type: TextStreamHttpFormatsTest.Api
targets:
  - Server
steps:
  # `format: text` — body is the raw echoed string ("hi"), nothing else on the wire.
  - name: HitText
    inputs:
      url: http://127.0.0.1:8946/text
      prompt: "hi"
    invoke:
      kind: JS.Script
      name: FetchAndDrain
  - name: AssertText
    inputs:
      status: "${{ steps.HitText.result.status }}"
      contentType: "${{ steps.HitText.result.contentType }}"
      body: "${{ steps.HitText.result.body }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          status: { const: 200 }
          contentType: { const: "text/plain; charset=utf-8" }
          body: { const: "hi" }
        required: [status, contentType, body]

  # `format: ndjson` — three lines: two text-delta parts ("h", "i") and one
  # finish part with usage/finishReason from the echo fixture (zeros, "stop").
  - name: HitNdjson
    inputs:
      url: http://127.0.0.1:8946/ndjson
      prompt: "hi"
    invoke:
      kind: JS.Script
      name: FetchAndDrain
  - name: AssertNdjson
    inputs:
      status: "${{ steps.HitNdjson.result.status }}"
      contentType: "${{ steps.HitNdjson.result.contentType }}"
      body: "${{ steps.HitNdjson.result.body }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          status: { const: 200 }
          contentType: { const: "application/x-ndjson" }
          body:
            const: |
              {"type":"text-delta","delta":"h"}
              {"type":"text-delta","delta":"i"}
              {"type":"finish","usage":{"promptTokens":0,"completionTokens":0,"totalTokens":0},"finishReason":"stop"}
        required: [status, contentType, body]

  # `format: sse` — same parts, framed as Server-Sent Events.
  - name: HitSse
    inputs:
      url: http://127.0.0.1:8946/sse
      prompt: "hi"
    invoke:
      kind: JS.Script
      name: FetchAndDrain
  - name: AssertSse
    inputs:
      status: "${{ steps.HitSse.result.status }}"
      contentType: "${{ steps.HitSse.result.contentType }}"
      body: "${{ steps.HitSse.result.body }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          status: { const: 200 }
          contentType: { const: "text/event-stream" }
          body:
            # |+ keeps the trailing \n\n that closes the final SSE frame.
            const: |+
              event: text-delta
              data: {"delta":"h"}

              event: text-delta
              data: {"delta":"i"}

              event: finish
              data: {"usage":{"promptTokens":0,"completionTokens":0,"totalTokens":0},"finishReason":"stop"}

        required: [status, contentType, body]
