# Telo Hub — federated discovery
#
# Umbrella metadata index over Telo modules hosted on any transport (HTTP
# registry, OCI). Registered module refs are tracked through the generic
# `telo module versions|digest|manifest` CLI verbs, each version's `telo.yaml`
# is cached to the static manifest bucket (the editor's browser-safe OCI read
# path), and every `Telo.Definition` is indexed one row per
# `(module-version, resource-kind)` for per-resource search. The hub stores
# only derived metadata — never artifact payloads — so it can vanish and every
# install still works (resolution is origin-direct).

kind: Telo.Application
metadata:
  name: telo-hub
  version: 0.3.0
  description: >-
    Federated discovery hub: tracks registered module refs across transports,
    caches manifests, and serves per-resource search over HTTP and MCP.
imports:
  Type: std/type@0.7.0#sha256-xGX7ctFBeRAB3aa1z5mfUieYXH3x5MRudLg5yRBfN9s
  Http: std/http-server@0.17.1#sha256-BbK7mO7_pYq0_rqpvZ7AXBHwdWoq6xidxKVluFP-5pc
  Sql: std/sql@0.11.0#sha256-OhANIkwsCaZcj1tvLpy0w4AFYyd8uBZzZFwYfgKPCDk
  Postgres: std/sql-postgres@0.3.0#sha256-yuuAbypA0t8uw0XFvw983G5qqoAzKCd0KNq84nsx4xM
  Run: std/run@0.12.0#sha256-xjiQMxMfMg5oFDgOR-lrYFwS5qt9_NZugcNXEJ86-Rs
  Shell: std/shell@0.2.0#sha256--F0327IRm6L0AqRkmdzDOcpDLKrSDaKKkm2g9u_lT60
  S3: std/s3@0.7.0#sha256-mqSd2QAj1R8-bhQpNc9Pyk4etFx_zbSmKIOAVFfc_V4
  Yaml: std/yaml@0.5.0#sha256-LUXSSLP5MtF2843obH4fqWZCwUphVG1duY-1CsdKRQs
  Mcp: std/mcp-server@0.8.0#sha256-x8FGd3kBbAa0gM4p0c1kZrYS05CjT_rWf0cBQKQzdg4
  Timer: std/timer@0.3.0#sha256-UAwPBaRpZuc_KQ3vCriE3OB0QTO1Y-s9GdqKyLdGOtk
  PlainText: std/plain-text-codec@0.5.0#sha256-EK_prnLDL9o1vFBrRdZ3tRaz3LvhZqqZYnPjrvYHDo0
  Console: std/console@0.10.0#sha256-CsYNZz6f6rvh0sSsn0HiKOGuMk35mysQj4QNFLptCzs
  # Interim relative paths: the queryPrompt / passagePrompt contract on
  # Embedding.Model is unpublished. A registry pin resolves to the published
  # 0.2.0 (no prompt fields) and version-hoisting drags embedding-openai's own
  # `../embedding` onto that same copy, so both must be local or neither is.
  # Flip both back to `std/…@<version>` once released.
  Embedding: std/embedding@0.4.0#sha256-tBxGzetE0gK47qgrAwGN2Upg9PFP5kQb6UCH57zz28A
  EmbeddingOpenai: std/embedding-openai@0.4.0#sha256-592Fssi_AyP2SClkTBT3rBV0Faoe_1DUvNLEwB3wcbI
  # cache-memory's local source is ahead of the registry (0.4.0 unpublished);
  # pin the published 0.3.0 so the Docker `telo install` build resolves.
  CacheMemory: std/cache-memory@0.3.0#sha256-kjfC-xNJpVHfjZdkoSCowqnDzo1fBbG4Cqxg10No2Y8
  RateLimit: std/rate-limit@0.4.0#sha256--e73JbrMjywf2Ow75NPqQLRNaSZ8495PYZ99JUl1kTk
  VectorStore: std/vector-store@0.3.0#sha256-1OArLbplEmCowSLjuCNK4EelXjfG80AEQVKi5RZXKEg
  # Interim relative path: vector-store-pgvector@0.1.0 is not yet published to
  # the registry. Flip to `std/vector-store-pgvector@0.1.0` once it ships (the
  # changeset/changie fragments drive that release); the registry-resolved
  # form is what the Docker `telo install` build expects.
  VectorStorePgvector: std/vector-store-pgvector@0.2.0#sha256-7H895C_KNKpRBiwKqHjOSxRbZ1vbR5lTeh1bapSzBHY
ports:
  http:
    env: PORT
    default: 8040
variables:
  dbConnection:
    env: DB_CONNECTION
    type: string
  bucketName:
    env: MANIFEST_BUCKET_NAME
    type: string
  bucketEndpoint:
    env: MANIFEST_BUCKET_ENDPOINT
    type: string
  bucketForcePathStyle:
    env: MANIFEST_BUCKET_FORCE_PATH_STYLE
    type: boolean
    default: false
  # Curated first-party ref list, JSON array (e.g. '["std/console","oci://ghcr.io/acme/telo-s3"]').
  # Registered idempotently on boot; public registration is a later phase.
  seedRefs:
    env: SEED_REFS
    type: array
    default: []
  trackInterval:
    env: TRACK_INTERVAL
    type: string
    default: 15m
  # Disable the periodic tracker (tests / one-shot ingest drive TrackAll directly).
  trackLoop:
    env: TRACK_LOOP
    type: boolean
    default: true
  # Path of the telo CLI the tracker shells out to (`telo` on PATH by default).
  teloBin:
    env: TELO_BIN
    type: string
    default: telo
  # Self-hosted embeddinggemma-300m server, OpenAI-compatible /embeddings API.
  # The `/v1` base URL the embedding controller appends `/embeddings` to.
  embedderBaseUrl:
    env: EMBEDDER_BASE_URL
    type: string
  # Per-IP budget for the open /register verb. Registration is unauthenticated
  # and does real work (subprocess + remote reads + an embedding call), so it is
  # the one endpoint that must not be free to hammer.
  registerRateLimit:
    env: REGISTER_RATE_LIMIT
    type: integer
    default: 5
  registerRateWindow:
    env: REGISTER_RATE_WINDOW
    type: string
    default: 10m
secrets:
  bucketAccessKeyId:
    env: MANIFEST_BUCKET_ACCESS_KEY_ID
    type: string
  bucketSecretAccessKey:
    env: MANIFEST_BUCKET_SECRET_ACCESS_KEY
    type: string
targets:
  - !ref Migrations
  - !ref SeedModules
  - !ref HubServer
  - ref: !ref TrackLoop
    when: !cel "variables.trackLoop"
---
# ── Storage ───────────────────────────────────────────────────────────────────
# The static manifest cache (manifests.telo.sh in production): an S3-compatible
# bucket (Cloudflare R2 / MinIO) the tracker writes each version's telo.yaml
# into at the deterministic `<transport>/<host>/<path…>/<version>/telo.yaml`
# key — the key the `telo` CLI computes with the analyzer's shared helper, so
# the write key and the editor's read key never drift. Never artifact payloads.

kind: S3.Bucket
metadata:
  name: ManifestStore
bucketName: !cel "variables.bucketName"
endpoint: !cel "variables.bucketEndpoint"
forcePathStyle: !cel "variables.bucketForcePathStyle"
accessKeyId: !cel "secrets.bucketAccessKeyId"
secretAccessKey: !cel "secrets.bucketSecretAccessKey"
createIfMissing: true
# The manifest cache is the public, cookieless read plane — the editor fetches
# cached telo.yaml with anonymous CORS GETs. On R2 public access comes from the
# domain binding instead; this covers S3-compatible local/dev backends.
publicRead: true
---
kind: S3.Put
metadata:
  name: PutManifest
bucketRef: !ref ManifestStore
---
kind: S3.Get
metadata:
  name: GetManifest
bucketRef: !ref ManifestStore
---
# ── Database ──────────────────────────────────────────────────────────────────

kind: Postgres.Connection
metadata:
  name: Db
connectionString: !cel "variables.dbConnection"
---
kind: Sql.Query
metadata:
  name: Query
connection: !ref Db
---
kind: Sql.Command
metadata:
  name: Exec
connection: !ref Db
---
kind: Sql.Migrations
metadata:
  name: Migrations
connection: !ref Db
migrations:
  "20260716120000_CreateDiscoverySchema":
    statements:
      - |
        CREATE TABLE modules (
          id              BIGSERIAL PRIMARY KEY,
          ref             TEXT NOT NULL UNIQUE,
          transport       TEXT NOT NULL,
          latest_version  TEXT,
          registered_at   TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          last_tracked_at TIMESTAMPTZ,
          last_error      TEXT
        )
      - |
        CREATE TABLE module_versions (
          module_id    BIGINT NOT NULL REFERENCES modules(id) ON DELETE CASCADE,
          version      TEXT NOT NULL,
          digest       TEXT NOT NULL,
          module_name  TEXT NOT NULL DEFAULT '',
          description  TEXT NOT NULL DEFAULT '',
          repository   TEXT NOT NULL DEFAULT '',
          license      TEXT NOT NULL DEFAULT '',
          manifest_key TEXT NOT NULL,
          tracked_at   TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          PRIMARY KEY (module_id, version)
        )
      - |
        CREATE TABLE resource_kinds (
          id          BIGSERIAL PRIMARY KEY,
          module_id   BIGINT NOT NULL,
          version     TEXT NOT NULL,
          name        TEXT NOT NULL,
          capability  TEXT NOT NULL DEFAULT '',
          abstract    BOOLEAN NOT NULL DEFAULT FALSE,
          exported    BOOLEAN NOT NULL DEFAULT FALSE,
          description TEXT NOT NULL DEFAULT '',
          search      TSVECTOR GENERATED ALWAYS AS
                        (to_tsvector('english', name || ' ' || description)) STORED,
          UNIQUE (module_id, version, name),
          FOREIGN KEY (module_id, version)
            REFERENCES module_versions(module_id, version) ON DELETE CASCADE
        )
      - CREATE EXTENSION IF NOT EXISTS pg_trgm
      - CREATE INDEX resource_kinds_search_idx ON resource_kinds USING GIN (search)
      - CREATE INDEX modules_ref_trgm_idx ON modules USING GIN (ref gin_trgm_ops)
      - |
        CREATE TABLE module_resources (
          id        BIGSERIAL PRIMARY KEY,
          module_id BIGINT NOT NULL,
          version   TEXT NOT NULL,
          -- The importable name: the segment after the last dot, since a
          -- re-export (`Alias.name`) is referenced by the importer as `name`.
          name      TEXT NOT NULL,
          -- The entry verbatim, so a re-export's origin alias isn't lost.
          declared  TEXT NOT NULL,
          UNIQUE (module_id, version, name),
          FOREIGN KEY (module_id, version)
            REFERENCES module_versions(module_id, version) ON DELETE CASCADE
        )
---
# ── Semantic search: embedding model + pgvector index ────────────────────────
# The embedder is a self-hosted embeddinggemma-300m sidecar (OpenAI-compatible);
# the vector index is a pgvector table the backend owns, living in the same
# database as the relational rows. The RRF search query never touches that
# table — it only fuses the ids VectorStore.Match returns (see Search).

kind: EmbeddingOpenai.Model
metadata:
  name: Embedder
# Pinned to the stored vectors: embeddinggemma-300m → 768 dims. A model change
# is a re-embed, never an in-place swap. apiKey is a placeholder — the
# self-hosted server needs none.
model: embeddinggemma-300m
apiKey: unused
baseUrl: !cel "variables.embedderBaseUrl"
# embeddinggemma is prompt-tuned: it expects these exact wrappers, and without
# them the similarity spread collapses (every kind lands in a narrow band and
# the ranking degenerates into orthographic noise — "Schema" outranking a real
# scheduling match for the query "schedule"). Changing either wrapper is a
# re-embed of the whole index, exactly like changing the model.
queryPrompt: "task: search result | query: {text}"
passagePrompt: "title: none | text: {text}"
---
kind: Embedding.Passage
metadata:
  name: EmbedPassage
model: !ref Embedder
---
kind: Embedding.Query
metadata:
  name: EmbedQuery
model: !ref Embedder
---
# The vectors table (`resource_vectors`) is provisioned by this Store on init —
# CREATE EXTENSION vector + table + HNSW index. 768 dims is fixed at creation.
kind: VectorStorePgvector.Store
metadata:
  name: VectorIndex
connection: !ref Db
dimensions: 768
metric: cosine
table: resource_vectors
---
kind: VectorStore.Record
metadata:
  name: VectorUpsert
store: !ref VectorIndex
---
kind: VectorStore.Match
metadata:
  name: VectorMatch
store: !ref VectorIndex
topK: 50
---
kind: VectorStore.Removal
metadata:
  name: VectorRemove
store: !ref VectorIndex
---
# ── Rate limiting (open /register verb) ──────────────────────────────────────
# Counters live in an in-process memory store: the hub is a single instance, and
# a limiter that resets on restart is the right trade here (a Cache.Redis store
# is a drop-in swap if the hub is ever replicated). The guard is non-throwing —
# it returns a verdict and the caller maps it to a 429.

kind: CacheMemory.Store
metadata:
  name: RateLimitCounters
---
kind: RateLimit.Guard
metadata:
  name: RegisterRateLimit
store: !ref RateLimitCounters
limit: !cel "variables.registerRateLimit"
window: !cel "variables.registerRateWindow"
---
# ── Local shell (tracker → telo CLI) ─────────────────────────────────────────
# Every transport-specific read goes through the generic `telo module …` CLI
# verbs — the tracker never speaks OCI or the registry protocol directly.

kind: Shell.LocalHost
metadata:
  name: LocalShell
---
kind: Shell.Command
metadata:
  name: TeloCli
host: !ref LocalShell
---
kind: Yaml.Parse
metadata:
  name: ParseYaml
---
kind: Timer.Delay
metadata:
  name: Sleep
---
kind: Console.WriteLine
metadata:
  name: LogLine
---
# Concrete versions (drops the `latest` alias), newest-first. The single home of
# the "exclude latest" rule, reused across the tracker's version steps.
kind: Run.Value
metadata:
  name: VersionedRef
inputs:
  ref: { type: string }
  version: { type: string }
# How a ref pins to one version, in one place. A direct `https://` ref addresses
# a single file at a fixed location and takes NO `@version` suffix — appending
# one produces a 404. Registry and OCI refs pin with `@<version>`.
value: !cel "inputs.ref.startsWith('https://') ? inputs.ref : inputs.ref + '@' + inputs.version"
---
kind: Run.Value
metadata:
  name: ConcreteVersions
inputs:
  versions: { type: array }
value: !cel "inputs.versions.filter(v, v != 'latest')"
---
# ── Registration (curated seed) ──────────────────────────────────────────────

kind: Run.Iteration
metadata:
  name: SeedModules
collection: !cel "variables.seedRefs"
steps:
  - name: register
    invoke: !ref RegisterModule
    inputs:
      ref: !cel "string(item)"
---
kind: Run.Sequence
metadata:
  name: RegisterModule
inputs:
  ref: { type: string }
steps:
  - name: upsert
    invoke: !ref Exec
    inputs:
      sql: >-
        INSERT INTO modules (ref, transport) VALUES ($1, $2)
        ON CONFLICT (ref) DO NOTHING
      bindings:
        - !cel "inputs.ref"
        # Transport is part of the record's identity — an explicit scheme can't
        # be inferred from host/path alone. `url` is a single manifest at a fixed
        # https location (no version list of its own; see the README).
        - !cel "inputs.ref.startsWith('oci://') ? 'oci' : (inputs.ref.startsWith('https://') ? 'url' : 'registry')"
---
# ── Public registration (POST /register) ─────────────────────────────────────
# Validate a submitted module ref resolves to a real Telo module, insert it, and
# index it inline (one immediate TrackModule pass) so a successful response means
# the module is actually searchable — no waiting for the periodic loop, which
# stays on as the reconciler (re-pushed digests, new versions, retry of a failed
# first track). Open + unauthenticated — ref validation plus the transport-egress
# guard is the anti-abuse / anti-SSRF boundary; the hub never vouches for content.
# The row is inserted *before* the inline track, so even if that track throws the
# module is registered and the next reconcile pass retries it. A validation
# failure resolves with { ok: false, error } → 400; a track failure throws → the
# route's catch surfaces the real code/message.
kind: Run.Sequence
metadata:
  name: RegisterAndValidate
inputs:
  ref: { type: string }
  clientIp: { type: string }
steps:
  # Per-IP budget, checked before anything else — this endpoint is open and does
  # real work, so it must not be free to hammer. Non-throwing: the verdict maps
  # to a 429. An empty key fails closed (denied) rather than sharing one bucket.
  - name: limit
    invoke: !ref RegisterRateLimit
    inputs:
      key: !cel "inputs.clientIp"
  # Shape gate — the FIRST thing that touches the submitted ref, before any
  # subprocess. Only a remote module ref is accepted: an optional `oci://` or
  # `https://` scheme, then host/path segments of safe characters, with at least
  # one `/`. Plaintext `http://` is deliberately absent — the hub serves cached
  # third-party manifests onward, so it never ingests over an unauthenticated
  # channel. The character classes exclude `@` inside segments, so a userinfo
  # authority (`https://evil.com@internal/…`) cannot match either.
  #
  # This is a security boundary, not a convenience check. The CLI's ref
  # resolution treats a path-like or cwd-resolvable ref as a LOCAL manifest and
  # reads it straight off disk — short-circuiting before any egress guard — so
  # an ungated `/etc/passwd` would turn this open endpoint into a filesystem
  # existence oracle. The pattern also rejects a leading `-`, so a submitted
  # `--help` can't be read as a CLI flag (argument injection) instead of a
  # positional. The transport-egress guard only covers refs that actually reach
  # the network; this gate is what keeps local refs from getting that far.
  - name: accepted
    if: !cel "steps.limit.result.allowed && inputs.ref.matches('^(oci://|https://)?[A-Za-z0-9][A-Za-z0-9._-]*(/[A-Za-z0-9._-]+)+(@[A-Za-z0-9][A-Za-z0-9._+-]*)?$')"
    then:
      # `versions` proves the transport resolves the ref to a module repo — a
      # bare registry ref is enumerated with a placeholder version internally,
      # so the submitter supplies no version.
      - name: versionsCmd
        invoke: !ref TeloCli
        inputs:
          args:
            - !cel "variables.teloBin"
            - module
            - versions
            - !cel "inputs.ref"
            - --json
          timeoutMs: 120000
      - name: resolved
        if: !cel "steps.versionsCmd.result.exitCode == 0"
        then:
          - name: versions
            invoke: !ref ParseYaml
            inputs:
              text: !cel "steps.versionsCmd.result.stdout"
          - name: concrete
            invoke: !ref ConcreteVersions
            inputs:
              versions: !cel "steps.versions.result.docs[0]"
          # Reading the latest version's telo.yaml confirms the ref actually
          # serves a Telo manifest (a non-module OCI artifact fails here).
          - name: hasVersions
            if: !cel "size(steps.concrete.result) > 0"
            then:
              - name: pinned
                invoke: !ref VersionedRef
                inputs:
                  ref: !cel "inputs.ref"
                  version: !cel "steps.concrete.result[0]"
              - name: manifestCmd
                invoke: !ref TeloCli
                inputs:
                  args:
                    - !cel "variables.teloBin"
                    - module
                    - manifest
                    - !cel "steps.pinned.result"
                    - --json
                  timeoutMs: 120000
          # Only a Telo.Library is registerable. An Application is a runnable
          # root that cannot be imported at all, so it defines no importable
          # kinds — registering one would create a module row that indexes zero
          # resource kinds and never surfaces in search. Reject it up front with
          # a reason instead of silently storing an empty record.
          - name: inspected
            if: !cel "'manifestCmd' in steps && steps.manifestCmd.result.exitCode == 0"
            then:
              - name: manifestJson
                invoke: !ref ParseYaml
                inputs:
                  text: !cel "steps.manifestCmd.result.stdout"
              - name: docs
                invoke: !ref ParseYaml
                inputs:
                  text: !cel "steps.manifestJson.result.docs[0].manifest"
          # Valid library → insert the row, then index it inline.
          - name: register
            if: !cel "'docs' in steps && steps.docs.result.docs[0].kind == 'Telo.Library'"
            then:
              - name: insert
                invoke: !ref RegisterModule
                inputs:
                  ref: !cel "inputs.ref"
              # Resolve the row id (just-inserted or pre-existing on
              # re-registration) to drive the track — the join key is that id.
              - name: lookup
                invoke: !ref Query
                inputs:
                  sql: SELECT id FROM modules WHERE ref = $1
                  bindings:
                    - !cel "inputs.ref"
              # Index the LATEST version only, inline — bounded, constant work
              # (one digest + one manifest read + one embed) no matter how many
              # versions the module has. Tracking every version here would make
              # an anonymous request cost ~2N subprocess spawns and N remote
              # reads; the periodic loop backfills the older versions on its
              # next pass, and only the latest is embedded/searched anyway, so
              # "200 ⇒ searchable" still holds. `concrete` is reused from
              # validation, so the ref's versions are enumerated once per call.
              - name: guarded
                try:
                  - name: track
                    invoke: !ref SyncVersion
                    inputs:
                      moduleId: !cel "steps.lookup.result.rows[0].id"
                      ref: !cel "inputs.ref"
                      version: !cel "steps.concrete.result[0]"
                      latestVersion: !cel "steps.concrete.result[0]"
                  - name: markLatest
                    invoke: !ref Exec
                    inputs:
                      sql: >-
                        UPDATE modules
                        SET latest_version = $2, last_tracked_at = NOW(), last_error = NULL
                        WHERE id = $1
                      bindings:
                        - !cel "steps.lookup.result.rows[0].id"
                        - !cel "steps.concrete.result[0]"
                catch:
                  # Logged here (with the real cause) and re-thrown — the client
                  # only ever sees the error code, never the message. Never
                  # swallowed: the row is already inserted, so the periodic loop
                  # retries and records `last_error` on it.
                  - name: log
                    invoke: !ref LogLine
                    inputs:
                      output: !cel "'{red /register inline index failed} ' + inputs.ref + ' — ' + error.code + ': ' + error.message"
                  - name: rethrow
                    throw:
                      code: !cel "error.code"
                      message: !cel "error.message"
outputs:
  ref: !cel "inputs.ref"
  # Reaching here means validation passed AND the inline index succeeded (a
  # failure throws before outputs render). So `track` present ≡ actually indexed.
  ok: !cel "'track' in steps"
  rateLimited: !cel "!steps.limit.result.allowed"
  retryAfter: !cel "steps.limit.result.retryAfter"
  # Each branch is reachable only once the step it reads has run — CEL ternaries
  # short-circuit, so an absent step is never dereferenced. `versionsCmd` absent
  # means the rate limit or the shape gate stopped the call before any
  # subprocess ran.
  error: !cel >-
    !steps.limit.result.allowed
      ? 'too many registrations from this address — retry in ' + string(steps.limit.result.retryAfter) + 's'
      : (!('versionsCmd' in steps)
          ? 'invalid module ref — expected <namespace>/<name>, oci://<host>/<path>, or https://<host>/<path>'
          : (steps.versionsCmd.result.exitCode != 0
              ? 'cannot resolve module ref: ' + steps.versionsCmd.result.stderr
              : (!('manifestCmd' in steps)
                  ? 'no published versions for ' + inputs.ref
                  : (steps.manifestCmd.result.exitCode != 0
                      ? 'not a readable Telo module: ' + steps.manifestCmd.result.stderr
                      : (steps.docs.result.docs[0].kind != 'Telo.Library'
                          ? 'only a Telo.Library can be registered — ' + inputs.ref + ' is a ' + steps.docs.result.docs[0].kind + ', which cannot be imported'
                          : '')))))
---
# ── Ingest tracker ────────────────────────────────────────────────────────────
# One pass: enumerate every registered module's versions, digest-reconcile each
# version, ingest new/moved content. Version content immutability is a
# convention no transport enforces — a tag can be re-pushed — so each version's
# resolved digest is recorded and re-checked on every track; a steady-state
# track is digest-compare-only.

kind: Run.Loop
metadata:
  name: TrackLoop
condition: !cel "true"
steps:
  # A pass-level failure (a transient Postgres hiccup on the module SELECT,
  # say) must not kill the loop — the tracker would never re-track again. It
  # is logged, never swallowed, and the next interval retries; per-module
  # failures are already recorded on their own rows inside TrackAll.
  - name: guard
    try:
      - name: track
        invoke: !ref TrackAll
    catch:
      - name: log
        invoke: !ref LogLine
        inputs:
          output: !cel "'{red tracking pass failed} ' + error.code + ': ' + error.message"
  - name: sleep
    invoke: !ref Sleep
    inputs:
      duration: !cel "variables.trackInterval"
---
kind: Run.Sequence
metadata:
  name: TrackAll
steps:
  - name: modules
    invoke: !ref Query
    inputs:
      sql: SELECT id, ref FROM modules ORDER BY id
  - name: each
    invoke: !ref TrackEachModule
    inputs:
      modules: !cel "steps.modules.result.rows"
outputs:
  tracked: !cel "steps.modules.result.rows.size()"
---
kind: Run.Iteration
metadata:
  name: TrackEachModule
inputs:
  modules: { type: array }
collection: !cel "inputs.modules"
concurrency: 2
steps:
  # A broken module must not abort the whole track — the failure is recorded
  # on its row (surfaced via /refs and the module tables), never swallowed.
  - name: guard
    try:
      - name: track
        invoke: !ref TrackModule
        inputs:
          moduleId: !cel "item.id"
          ref: !cel "item.ref"
    catch:
      - name: record-failure
        invoke: !ref Exec
        inputs:
          sql: UPDATE modules SET last_error = $2, last_tracked_at = NOW() WHERE id = $1
          bindings:
            - !cel "item.id"
            - !cel "error.code + ': ' + error.message"
---
kind: Run.Sequence
metadata:
  name: TrackModule
inputs:
  moduleId: { type: integer }
  ref: { type: string }
steps:
  - name: versionsCmd
    invoke: !ref TeloCli
    inputs:
      args:
        - !cel "variables.teloBin"
        - module
        - versions
        - !cel "inputs.ref"
        - --json
      timeoutMs: 120000
  - name: versionsGate
    if: !cel "steps.versionsCmd.result.exitCode != 0"
    then:
      - name: fail
        throw:
          code: TRACK_VERSIONS_FAILED
          message: !cel "'telo module versions ' + inputs.ref + ' failed: ' + steps.versionsCmd.result.stderr"
  - name: versions
    invoke: !ref ParseYaml
    inputs:
      text: !cel "steps.versionsCmd.result.stdout"
  # Concrete versions, newest-first — the "exclude latest alias" rule lives here
  # once (an OCI repo's `latest` tag is an alias, not a version, never ingested).
  - name: concrete
    invoke: !ref ConcreteVersions
    inputs:
      versions: !cel "steps.versions.result.docs[0]"
  - name: eachVersion
    invoke: !ref TrackEachVersion
    inputs:
      moduleId: !cel "inputs.moduleId"
      ref: !cel "inputs.ref"
      versions: !cel "steps.concrete.result"
      # [0] is the latest — the only version we embed. Empty when the module has
      # no concrete versions (the iteration is then a no-op).
      latestVersion: !cel "size(steps.concrete.result) > 0 ? steps.concrete.result[0] : ''"
  - name: updateLatest
    if: !cel "size(steps.concrete.result) > 0"
    then:
      - name: set
        invoke: !ref Exec
        inputs:
          sql: >-
            UPDATE modules
            SET latest_version = $2, last_tracked_at = NOW(), last_error = NULL
            WHERE id = $1
          bindings:
            - !cel "inputs.moduleId"
            - !cel "steps.concrete.result[0]"
---
kind: Run.Iteration
metadata:
  name: TrackEachVersion
inputs:
  moduleId: { type: integer }
  ref: { type: string }
  versions: { type: array }
  latestVersion: { type: string }
collection: !cel "inputs.versions"
steps:
  - name: sync
    invoke: !ref SyncVersion
    inputs:
      moduleId: !cel "inputs.moduleId"
      ref: !cel "inputs.ref"
      version: !cel "string(item)"
      latestVersion: !cel "inputs.latestVersion"
---
# Digest-reconcile one version: an unchanged digest is skipped (cheap read, no
# re-download); a new or moved digest re-ingests — re-read telo.yaml, re-cache
# to the same bucket key, re-extract its resource kinds.
kind: Run.Sequence
metadata:
  name: SyncVersion
inputs:
  moduleId: { type: integer }
  ref: { type: string }
  version: { type: string }
  latestVersion: { type: string }
steps:
  - name: pinned
    invoke: !ref VersionedRef
    inputs:
      ref: !cel "inputs.ref"
      version: !cel "inputs.version"
  - name: digestCmd
    invoke: !ref TeloCli
    inputs:
      args:
        - !cel "variables.teloBin"
        - module
        - digest
        - !cel "steps.pinned.result"
        - --json
      timeoutMs: 60000
  - name: digestGate
    if: !cel "steps.digestCmd.result.exitCode != 0"
    then:
      - name: fail
        throw:
          code: TRACK_DIGEST_FAILED
          message: !cel "'telo module digest ' + inputs.ref + '@' + inputs.version + ' failed: ' + steps.digestCmd.result.stderr"
  - name: digest
    invoke: !ref ParseYaml
    inputs:
      text: !cel "steps.digestCmd.result.stdout"
  - name: existing
    invoke: !ref Query
    inputs:
      sql: SELECT digest FROM module_versions WHERE module_id = $1 AND version = $2
      bindings:
        - !cel "inputs.moduleId"
        - !cel "inputs.version"
  - name: ingest
    if: !cel "steps.existing.result.rows.size() == 0 || steps.existing.result.rows[0].digest != steps.digest.result.docs[0].digest"
    then:
      - name: manifestCmd
        invoke: !ref TeloCli
        inputs:
          args:
            - !cel "variables.teloBin"
            - module
            - manifest
            - !cel "steps.pinned.result"
            - --json
          timeoutMs: 120000
      - name: manifestGate
        if: !cel "steps.manifestCmd.result.exitCode != 0"
        then:
          - name: fail
            throw:
              code: TRACK_MANIFEST_FAILED
              message: !cel "'telo module manifest ' + inputs.ref + '@' + inputs.version + ' failed: ' + steps.manifestCmd.result.stderr"
      - name: manifestJson
        invoke: !ref ParseYaml
        inputs:
          text: !cel "steps.manifestCmd.result.stdout"
      - name: cache
        invoke: !ref PutManifest
        inputs:
          key: !cel "steps.manifestJson.result.docs[0].cacheKey"
          body: !cel "steps.manifestJson.result.docs[0].manifest"
          contentType: text/yaml
      - name: docs
        invoke: !ref ParseYaml
        inputs:
          text: !cel "steps.manifestJson.result.docs[0].manifest"
      - name: upsertVersion
        invoke: !ref Exec
        inputs:
          sql: >-
            INSERT INTO module_versions
              (module_id, version, digest, module_name, description, repository, license, manifest_key)
            VALUES ($1, $2, $3, $4, $5, $6, $7, $8)
            ON CONFLICT (module_id, version) DO UPDATE SET
              digest = EXCLUDED.digest,
              module_name = EXCLUDED.module_name,
              description = EXCLUDED.description,
              repository = EXCLUDED.repository,
              license = EXCLUDED.license,
              manifest_key = EXCLUDED.manifest_key,
              tracked_at = NOW()
          bindings:
            - !cel "inputs.moduleId"
            - !cel "inputs.version"
            - !cel "steps.digest.result.docs[0].digest"
            - !cel "steps.docs.result.docs[0].metadata.name"
            - !cel "steps.docs.result.docs[0].metadata.?description.orValue('')"
            - !cel "steps.docs.result.docs[0].metadata.?repository.orValue('')"
            - !cel "steps.docs.result.docs[0].metadata.?license.orValue('')"
            - !cel "steps.manifestJson.result.docs[0].cacheKey"
      - name: clearKinds
        invoke: !ref Exec
        inputs:
          sql: DELETE FROM resource_kinds WHERE module_id = $1 AND version = $2
          bindings:
            - !cel "inputs.moduleId"
            - !cel "inputs.version"
      - name: insertKinds
        invoke: !ref InsertKinds
        inputs:
          moduleId: !cel "inputs.moduleId"
          version: !cel "inputs.version"
          docs: !cel "steps.docs.result.docs"
      - name: clearResources
        invoke: !ref Exec
        inputs:
          sql: DELETE FROM module_resources WHERE module_id = $1 AND version = $2
          bindings:
            - !cel "inputs.moduleId"
            - !cel "inputs.version"
      - name: insertResources
        invoke: !ref InsertResources
        inputs:
          moduleId: !cel "inputs.moduleId"
          version: !cel "inputs.version"
          docs: !cel "steps.docs.result.docs"
      # Embed only the module's latest version, superseding any prior vectors so
      # the vector table holds exactly one vector per (module, resource-kind).
      # Older versions keep their relational rows (pinned reads, history) but no
      # vector, keeping near-identical versions out of the ANN top-K.
      - name: embedLatest
        if: !cel "inputs.version == inputs.latestVersion"
        then:
          # Read back the just-inserted rows for their ids — the vector id is the
          # resource_kinds row id, the join key the RRF search fuses on.
          - name: kindRows
            invoke: !ref Query
            inputs:
              sql: >-
                SELECT id, name, capability, description
                FROM resource_kinds WHERE module_id = $1 AND version = $2 ORDER BY id
              bindings:
                - !cel "inputs.moduleId"
                - !cel "inputs.version"
          # Drop every existing vector for this module first: a re-ingest
          # reassigns resource_kinds ids, so superseding by (module, version)
          # is insufficient — purge all, then re-upsert the latest.
          - name: purge
            invoke: !ref VectorRemove
            inputs:
              metadataFilter:
                module_id: !cel "inputs.moduleId"
          - name: embed
            if: !cel "steps.kindRows.result.rows.size() > 0"
            then:
              # Composed passage: kind name + capability + curated description,
              # framed by the owning module's name + description. The curated
              # line is the primary signal (schema-derived enrichment is a
              # follow-up — see plans/federated-discovery.md).
              - name: passages
                invoke: !ref EmbedPassage
                inputs:
                  input: !cel >-
                    steps.kindRows.result.rows.map(r,
                      r.name + ' (' + r.capability + '). ' + r.description +
                      ' — from module ' + steps.docs.result.docs[0].metadata.name + ': ' +
                      steps.docs.result.docs[0].metadata.?description.orValue(''))
              - name: upsert
                invoke: !ref VectorUpsert
                inputs:
                  items: !cel >-
                    enumerate(steps.kindRows.result.rows).map(e, {
                      'id': string(e.value.id),
                      'vector': steps.passages.result.embeddings[e.index],
                      'metadata': {'module_id': inputs.moduleId, 'version': inputs.version, 'name': e.value.name}
                    })
---
# One relational row per (module-version, resource-kind). A kind's identity is
# (location ref + suffix) — the prefix in a manifest's `kind:` field is the
# importer's own alias, so only the suffix is stored.
kind: Run.Iteration
metadata:
  name: InsertKinds
inputs:
  moduleId: { type: integer }
  version: { type: string }
  docs: { type: array }
collection: !cel "inputs.docs.filter(d, d.kind == 'Telo.Definition' || d.kind == 'Telo.Abstract')"
steps:
  - name: insert
    invoke: !ref Exec
    inputs:
      sql: >-
        INSERT INTO resource_kinds
          (module_id, version, name, capability, abstract, exported, description)
        VALUES ($1, $2, $3, $4, $5, $6, $7)
        ON CONFLICT (module_id, version, name) DO UPDATE SET
          capability = EXCLUDED.capability,
          abstract = EXCLUDED.abstract,
          exported = EXCLUDED.exported,
          description = EXCLUDED.description
      bindings:
        - !cel "inputs.moduleId"
        - !cel "inputs.version"
        - !cel "item.metadata.name"
        - !cel "item.?capability.orValue('')"
        - !cel "item.kind == 'Telo.Abstract'"
        # Mirrors the kernel's gate (module-context `registerImport`): a
        # missing `exports.kinds` list means no restriction — every kind is
        # importable; a declared list gates to the listed names.
        # Re-exported entries (`Alias.Kind`) name another module's kind, never
        # a local definition, so they don't mark local rows (see README).
        - !cel "'exports' in inputs.docs[0] && 'kinds' in inputs.docs[0].exports ? inputs.docs[0].exports.kinds.exists(k, k == item.metadata.name) : true"
        - !cel "item.metadata.?description.orValue('')"
---
# A library's exported singleton INSTANCES (`exports.resources`) — the other
# half of its public surface. An importer references one as
# `!ref <Alias>.<name>`, so what matters is the name, not a kind: a library can
# export an instance of a kind it deliberately does NOT export (singleton
# enforcement), and std/console exports only instances, no kinds at all.
kind: Run.Iteration
metadata:
  name: InsertResources
inputs:
  moduleId: { type: integer }
  version: { type: string }
  docs: { type: array }
collection: !cel >-
  'exports' in inputs.docs[0] && 'resources' in inputs.docs[0].exports
    ? inputs.docs[0].exports.resources : []
steps:
  - name: insert
    invoke: !ref Exec
    inputs:
      sql: >-
        INSERT INTO module_resources (module_id, version, name, declared)
        VALUES ($1, $2, $3, $4)
        ON CONFLICT (module_id, version, name) DO UPDATE SET
          declared = EXCLUDED.declared
      bindings:
        - !cel "inputs.moduleId"
        - !cel "inputs.version"
        # A re-export is declared `Alias.name` but imported as `name`, so the
        # importable identity is the segment after the last dot.
        - !cel "string(item).split('.')[size(string(item).split('.')) - 1]"
        - !cel "string(item)"
---
# ── Search (hybrid: lexical + semantic RRF) ──────────────────────────────────
# Two arms fused by Reciprocal Rank Fusion. The vector arm embeds the query and
# asks VectorStore.Match for the nearest resource-kind ids — the ANN stays
# inside the vector-store abstraction. The lexical arm is Postgres full-text
# over kind name/description. A single Sql.Query takes the matched ids as a
# bound JSON param, RRF-fuses their rank with the lexical rank, and joins the
# relational rows — the vectors table is never touched here. Empty query → the
# vector arm is skipped and results degrade to lexical-only.

kind: Run.Sequence
metadata:
  name: SearchResources
inputs:
  q: { type: string }
steps:
  - name: vector
    if: !cel "inputs.q != ''"
    then:
      - name: embed
        invoke: !ref EmbedQuery
        inputs:
          input: !cel "inputs.q"
      - name: match
        invoke: !ref VectorMatch
        inputs:
          vector: !cel "steps.embed.result.embeddings[0]"
  - name: query
    invoke: !ref Query
    inputs:
      # $1 = query text, $2 = the vector arm's matches as JSON (ordered best-first,
      # so ORDINALITY is the vector rank); '[]' when the arm was skipped.
      sql: >-
        WITH q AS (
          SELECT plainto_tsquery('english', $1) AS andq,
                 CASE WHEN plainto_tsquery('english', $1)::text = '' THEN NULL
                      ELSE to_tsquery('english', replace(plainto_tsquery('english', $1)::text, '&', '|')) END AS orq
        ),
        vec AS (
          SELECT (elem->>'id')::bigint AS id, ord::int AS rank
          FROM jsonb_array_elements($2::jsonb) WITH ORDINALITY AS t(elem, ord)
        ),
        lex AS (
          SELECT rk.id,
                 ROW_NUMBER() OVER (
                   ORDER BY (COALESCE(ts_rank(v.vec, q.orq), 0.0)
                             + CASE WHEN v.vec @@ q.andq THEN 0.5 ELSE 0.0 END
                             + CASE WHEN rk.name ILIKE '%' || $1 || '%' THEN 1.0 ELSE 0.0 END) DESC, rk.name
                 ) AS rank
          FROM resource_kinds rk
          JOIN modules m ON m.id = rk.module_id AND m.latest_version = rk.version
          LEFT JOIN module_versions mv ON mv.module_id = rk.module_id AND mv.version = rk.version
          CROSS JOIN q
          CROSS JOIN LATERAL (
            SELECT rk.search || to_tsvector('english', COALESCE(mv.description, '')) AS vec
          ) v
          WHERE rk.exported
            AND ((q.orq IS NOT NULL AND v.vec @@ q.orq) OR rk.name ILIKE '%' || $1 || '%')
          ORDER BY rank
          LIMIT 100
        ),
        fused AS (
          SELECT id, SUM(1.0 / (60 + rank)) AS score
          FROM (SELECT id, rank FROM vec UNION ALL SELECT id, rank FROM lex) s
          GROUP BY id
        )
        SELECT rk.name AS kind, rk.capability, rk.description,
               m.ref, rk.version, COALESCE(mv.description, '') AS module_description,
               COALESCE(mv.repository, '') AS module_repository,
               COALESCE(mv.license, '') AS module_license,
               f.score::float8 AS score
        FROM fused f
        JOIN resource_kinds rk ON rk.id = f.id AND rk.exported
        JOIN modules m ON m.id = rk.module_id AND m.latest_version = rk.version
        LEFT JOIN module_versions mv ON mv.module_id = rk.module_id AND mv.version = rk.version
        ORDER BY f.score DESC, rk.name
        LIMIT 20
      bindings:
        - !cel "inputs.q"
        - !cel "'match' in steps ? json(steps.match.result.matches) : '[]'"
outputs:
  hits: !cel "steps.query.result.rows.map(r, {'kind': r.kind, 'capability': r.capability, 'description': r.description, 'module': {'ref': r.ref, 'version': r.version, 'description': r.module_description, 'repository': r.module_repository, 'license': r.module_license}, 'score': r.score})"
---
# Module-first projection: the same fused hits grouped by owning module, with
# every exported kind included so a module card needs no second manifest fetch.
kind: Run.Sequence
metadata:
  name: SearchModules
inputs:
  q: { type: string }
steps:
  - name: vector
    if: !cel "inputs.q != ''"
    then:
      - name: embed
        invoke: !ref EmbedQuery
        inputs:
          input: !cel "inputs.q"
      - name: match
        invoke: !ref VectorMatch
        inputs:
          vector: !cel "steps.embed.result.embeddings[0]"
  - name: query
    invoke: !ref Query
    inputs:
      sql: >-
        WITH q AS (
          SELECT plainto_tsquery('english', $1) AS andq,
                 CASE WHEN plainto_tsquery('english', $1)::text = '' THEN NULL
                      ELSE to_tsquery('english', replace(plainto_tsquery('english', $1)::text, '&', '|')) END AS orq
        ),
        vec AS (
          SELECT (elem->>'id')::bigint AS id, ord::int AS rank
          FROM jsonb_array_elements($2::jsonb) WITH ORDINALITY AS t(elem, ord)
        ),
        lex AS (
          SELECT rk.id,
                 ROW_NUMBER() OVER (
                   ORDER BY (COALESCE(ts_rank(v.vec, q.orq), 0.0)
                             + CASE WHEN v.vec @@ q.andq THEN 0.5 ELSE 0.0 END
                             + CASE WHEN rk.name ILIKE '%' || $1 || '%' THEN 1.0 ELSE 0.0 END) DESC, rk.name
                 ) AS rank
          FROM resource_kinds rk
          JOIN modules m ON m.id = rk.module_id AND m.latest_version = rk.version
          LEFT JOIN module_versions mv ON mv.module_id = rk.module_id AND mv.version = rk.version
          CROSS JOIN q
          CROSS JOIN LATERAL (
            SELECT rk.search || to_tsvector('english', COALESCE(mv.description, '')) AS vec
          ) v
          WHERE rk.exported
            AND ((q.orq IS NOT NULL AND v.vec @@ q.orq) OR rk.name ILIKE '%' || $1 || '%')
          ORDER BY rank
          LIMIT 100
        ),
        fused AS (
          SELECT id, SUM(1.0 / (60 + rank)) AS score
          FROM (SELECT id, rank FROM vec UNION ALL SELECT id, rank FROM lex) s
          GROUP BY id
        ),
        hits AS (
          SELECT rk.module_id, rk.version, rk.name, rk.capability, rk.description,
                 m.ref, COALESCE(mv.description, '') AS module_description,
                 COALESCE(mv.repository, '') AS module_repository,
                 COALESCE(mv.license, '') AS module_license, f.score
          FROM fused f
          JOIN resource_kinds rk ON rk.id = f.id AND rk.exported
          JOIN modules m ON m.id = rk.module_id AND m.latest_version = rk.version
          LEFT JOIN module_versions mv ON mv.module_id = rk.module_id AND mv.version = rk.version
        )
        SELECT h.ref, h.version, h.module_description,
               h.module_repository, h.module_license,
               MAX(h.score)::float8 AS score,
               json_agg(json_build_object('kind', h.name, 'capability', h.capability,
                                          'description', h.description, 'score', h.score)
                        ORDER BY h.score DESC) AS matched_kinds,
               (SELECT COALESCE(json_agg(rk2.name ORDER BY rk2.name), '[]'::json)
                FROM resource_kinds rk2
                WHERE rk2.module_id = h.module_id AND rk2.version = h.version
                  AND rk2.exported) AS exported_kinds,
               -- The other half of the public surface: ready-made singleton
               -- instances an importer references as `!ref <Alias>.<name>`.
               (SELECT COALESCE(json_agg(mr.name ORDER BY mr.name), '[]'::json)
                FROM module_resources mr
                WHERE mr.module_id = h.module_id AND mr.version = h.version)
                 AS exported_resources
        FROM hits h
        GROUP BY h.module_id, h.ref, h.version, h.module_description,
                 h.module_repository, h.module_license
        ORDER BY MAX(h.score) DESC
        LIMIT 20
      bindings:
        - !cel "inputs.q"
        - !cel "'match' in steps ? json(steps.match.result.matches) : '[]'"
outputs:
  hits: !cel "steps.query.result.rows.map(r, {'module': {'ref': r.ref, 'version': r.version, 'description': r.module_description, 'repository': r.module_repository, 'license': r.module_license}, 'score': r.score, 'matchedKinds': r.matched_kinds, 'exportedKinds': r.exported_kinds, 'exportedResources': r.exported_resources})"
---
# ── Manifest read (MCP get_module_manifest) ──────────────────────────────────
# Re-keyed off the location ref (an OCI module has no namespace/name). Reads
# the cached telo.yaml from the manifest bucket; a missing row falls back to a
# sentinel key that 404s into the Module-not-found catch.
kind: Run.Sequence
metadata:
  name: GetModuleManifest
inputs:
  ref: { type: string }
  version: { type: string }
steps:
  - name: resolve
    invoke: !ref Query
    inputs:
      sql: >-
        SELECT mv.manifest_key FROM module_versions mv
        JOIN modules m ON m.id = mv.module_id
        WHERE m.ref = $1
          AND (($2 = 'latest' AND mv.version = m.latest_version) OR mv.version = $2)
        LIMIT 1
      bindings:
        - !cel "inputs.ref"
        - !cel "inputs.version"
  - name: fetch
    invoke: !ref GetManifest
    inputs:
      key: !cel "steps.resolve.result.rows.size() > 0 ? steps.resolve.result.rows[0].manifest_key : '__not_found__'"
  - name: decode
    invoke: { kind: PlainText.Decoder }
    inputs:
      input: !cel "steps.fetch.result.output"
outputs:
  text: !cel "steps.decode.result.text"
---
# ── HTTP surface (telo.sh) ────────────────────────────────────────────────────
# The cloud CLI: the generic read verbs plus discovery as HTTP paths. Dynamic
# reads only — the static manifest read lives on the bucket domain, and
# install/run stay origin-direct and never touch this app.

kind: Http.Server
metadata:
  name: HubServer
host: "0.0.0.0"
port: !cel "ports.http"
logger: true
cors:
  origin: "*"
  methods: "GET,POST,OPTIONS"
openapi:
  info:
    title: Telo Hub
    # The HTTP API's own version, not the app version (which changie owns) —
    # deliberately outside the release replacement, like the registry's.
    version: 1.0.0
    description: >-
      Federated discovery over Telo modules: per-resource search, ref
      autocomplete, and version enumeration for registered modules.
mounts:
  - path: /health
    mount: !ref Health
  - path: /mcp
    mount: !ref McpHttp
  - path: /
    mount: !ref PublicApi
---
kind: Http.Api
metadata:
  name: Health
routes:
  - request:
      path: /readiness
      method: GET
    returns:
      - status: 200
        content:
          application/json:
            body:
              status: "ok"
  - request:
      path: /liveness
      method: GET
    returns:
      - status: 200
        content:
          application/json:
            body:
              status: "ok"
---
kind: Http.Api
metadata:
  name: PublicApi
routes:
  - request:
      path: /search/resources
      method: GET
      schema:
        query:
          type: object
          properties:
            q: { type: string, default: "", description: "Search query over resource kinds." }
    handler: !ref SearchResources
    inputs:
      q: !cel "request.query.q"
    returns:
      - status: 200
        content:
          application/json:
            body:
              query: !cel "request.query.q"
              hits: !cel "result.hits"

  - request:
      path: /search/modules
      method: GET
      schema:
        query:
          type: object
          properties:
            q: { type: string, default: "", description: "Search query, results grouped by module." }
    handler: !ref SearchModules
    inputs:
      q: !cel "request.query.q"
    returns:
      - status: 200
        content:
          application/json:
            body:
              query: !cel "request.query.q"
              hits: !cel "result.hits"

  # Lexical ref typeahead (pg_trgm): completes a ref whose name the author
  # already knows — the memorable token at an OCI path's tail matches without
  # the scheme/host boilerplate, and a typo still hits. Not the semantic
  # /search/* — no embedder in this path, ever.
  - request:
      path: /refs
      method: GET
      schema:
        query:
          type: object
          properties:
            q: { type: string, default: "", description: "Fuzzy substring over registered refs." }
    handler:
      kind: Sql.Query
      connection: !ref Db
    inputs:
      sql: >-
        SELECT m.ref,
               COALESCE(m.latest_version, '') AS "latestVersion",
               COALESCE(mv.description, '') AS description,
               COALESCE(mv.repository, '') AS repository,
               COALESCE(mv.license, '') AS license
        FROM modules m
        LEFT JOIN module_versions mv
          ON mv.module_id = m.id AND mv.version = m.latest_version
        WHERE m.ref % $1 OR m.ref ILIKE '%' || $1 || '%'
        ORDER BY (CASE WHEN regexp_replace(m.ref, '.*/', '') ILIKE '%' || $1 || '%' THEN 1 ELSE 0 END) DESC,
                 similarity(m.ref, $1) DESC, m.ref
        LIMIT 20
      bindings:
        - !cel "request.query.q"
    returns:
      - status: 200
        content:
          application/json:
            body:
              query: !cel "request.query.q"
              refs: !cel "result.rows"

  - request:
      path: /module/versions
      method: GET
      schema:
        query:
          type: object
          properties:
            ref: { type: string, description: "Module ref exactly as registered." }
          required: [ref]
    handler:
      kind: Sql.Query
      connection: !ref Db
    inputs:
      # Newest-first, matching the `telo module versions` CLI verb this HTTP path
      # mirrors (one contract, three front-ends): valid dotted-numeric versions
      # sort by numeric precedence descending, then any non-numeric tags
      # (digests, `latest`) fall to the end in lexical order — the same shape as
      # the CLI's sortVersionsDesc. Consumers (IDE version completion) rely on
      # index 0 being the latest version.
      sql: >-
        SELECT mv.version FROM module_versions mv
        JOIN modules m ON m.id = mv.module_id
        WHERE m.ref = $1
        ORDER BY (CASE WHEN mv.version ~ '^[0-9]+(\.[0-9]+)*$'
                       THEN string_to_array(mv.version, '.')::int[] END) DESC NULLS LAST,
                 mv.version ASC
      bindings:
        - !cel "request.query.ref"
    returns:
      - status: 200
        when: !cel "result.rows.size() > 0"
        content:
          application/json:
            body:
              ref: !cel "request.query.ref"
              versions: !cel "result.rows.map(r, r.version)"
      - status: 404
        content:
          application/json:
            body:
              error: Module not tracked

  # Open, unauthenticated self-service registration (the apps/hub-web SPA on
  # hub.telo.run POSTs here cross-origin). Validates the ref resolves to a real
  # Telo module and, on success, inserts it for the tracker to ingest; a bad ref
  # returns 400 with the inline reason. No moderation queue.
  - request:
      path: /register
      method: POST
      schema:
        body:
          type: object
          additionalProperties: false
          properties:
            ref:
              type: string
              minLength: 1
              description: "Module ref to register (e.g. oci://ghcr.io/acme/telo-s3 or std/console)."
          required: [ref]
    handler: !ref RegisterAndValidate
    inputs:
      ref: !cel "request.body.ref"
      clientIp: !cel "request.ip"
    returns:
      - status: 429
        when: !cel "result.rateLimited"
        headers:
          Retry-After: !cel "string(result.retryAfter)"
        content:
          application/json:
            body:
              error: !cel "result.error"
              retryAfter: !cel "result.retryAfter"
      - status: 200
        when: !cel "result.ok"
        content:
          application/json:
            body:
              registered: true
              ref: !cel "result.ref"
      - status: 400
        content:
          application/json:
            body:
              error: !cel "result.error"
    catches:
      # The CLI emits JSON on a clean exit, but a malformed payload would surface
      # as ERR_PARSE_FAILED — treat that as an unreadable module (400). Any other
      # throw is a server-side fault: return only the error CODE, never the
      # message, since this endpoint is anonymous and a raw message can carry
      # host paths or upstream detail. The full cause is logged server-side by
      # the handler's catch, and the periodic loop records it on the module row.
      - status: 400
        when: !cel "error.code == 'ERR_PARSE_FAILED'"
        content:
          application/json:
            body:
              error: could not read module metadata
      - status: 500
        content:
          application/json:
            body:
              code: !cel "error.code"
              error: registration failed while indexing the module

  - request:
      path: /health
      method: GET
    handler:
      kind: Run.Value
      value:
        status: ok
    returns:
      - status: 200
        content:
          application/json:
            body:
              status: !cel "result.status"
---
# ── MCP surface ───────────────────────────────────────────────────────────────

kind: Mcp.Tools
metadata:
  name: HubTools
entries:
  # search_resources — the unit an LLM composes with is a resource kind it can
  # import, not a package. Each hit carries the kind suffix and the exact
  # module location ref to import it under a chosen alias.
  - name: search_resources
    description: |
      Search resource kinds across every registered Telo module, on any host or
      transport. Each hit carries the kind suffix (e.g. `Bucket` — the prefix
      is YOUR import alias), its capability and description, and the owning
      module's exact location ref + version. Follow up with
      `get_module_manifest(ref)` to read the full schemas.
    argumentsSchema:
      type: object
      properties:
        query: { type: string, description: "What the resource should do (name or description)." }
      required: [query]
      additionalProperties: false
    handler: !ref SearchResources
    inputs:
      q: !cel "request.arguments.query"
    result:
      content:
        - type: text
          text: !cel "json({'query': request.arguments.query, 'hits': result.hits})"

  # get_module_manifest — keyed off the module's location ref (an OCI module
  # has no namespace/name), serving the tracker-cached telo.yaml.
  - name: get_module_manifest
    description: |
      Fetch the raw `telo.yaml` for a tracked module by its location ref
      (e.g. `oci://ghcr.io/acme/telo-s3` or `std/console`). The response
      contains the `Telo.Library` and `Telo.Definition` docs that fully
      describe the module's public surface. `version` defaults to `latest`
      (the latest tracked version).
    argumentsSchema:
      type: object
      properties:
        ref: { type: string, description: "Module location ref exactly as returned by search_resources." }
        version:
          type: string
          default: latest
          description: Exact version to fetch, or `latest` (default).
      required: [ref]
      additionalProperties: false
    handler: !ref GetModuleManifest
    inputs:
      ref: !cel "request.arguments.ref"
      version: !cel "request.arguments.?version.orValue('latest')"
    result:
      content:
        - type: text
          text: !cel "result.text"
    catches:
      - when: !cel "error.code == 'ERR_NOT_FOUND'"
        error:
          code: -32004
          message: Module not found
      - when: !cel "error.code == 'ERR_INVALID_REFERENCE' || error.code == 'ERR_INVALID_RESPONSE'"
        error:
          code: -32603
          message: !cel "error.message"
---
kind: Mcp.HttpEndpoint
metadata:
  name: McpHttp
serverInfo:
  name: telo-hub
  version: 0.3.0
instructions: !literal |
  This MCP server is the **Telo hub** — federated discovery over Telo modules
  hosted on any registry or OCI host. Telo is a declarative runtime: YAML
  manifests describe desired state; the kernel resolves resources and runs a
  controller per kind. CEL expressions are written as `!cel "..."` tags.

  Fetch these for full context:
  - https://telo.run/llms.txt — guide & kind reference.
  - https://telo.run/examples.md — working example manifests.
  - https://telo.run/cel.md — CEL function reference.

  ## Tools
  - `search_resources(query)` — find resource KINDS by what they do. Each hit
    carries the kind suffix (`Bucket`), its capability/description, and the
    owning module's exact location ref + version.
  - `get_module_manifest(ref, version?)` — read a tracked module's `telo.yaml`
    by location ref. Its `Telo.Definition` docs are JSON Schemas: the EXACT
    field shapes you must produce. `version` defaults to `latest`.

  ## Composing an application
  1. `search_resources` for each capability you need.
  2. `get_module_manifest` on each hit's `module.ref`; read the
     `Telo.Definition` schemas — never guess fields from a kind name.
  3. Write one `Telo.Application`. Declare dependencies in the `imports` map
     (PascalCase alias → the hit's `ref@version`, e.g.
     `S3: oci://ghcr.io/acme/telo-s3@1.2.0`). A hit's kind suffix is written as
     `<YourAlias>.<suffix>` — the prefix is the alias you chose, never a fixed
     name. `targets` lists the runnables/services to start.

  ## Must-know
  - No `spec:` wrapper — resource fields sit at the doc top level.
  - `variables:` / `secrets:` entries each need an `env:` var name and a
    JSON-Schema `type:`.
  - Tag dynamic leaves with `!cel`, not whole inline collections.
  - Install/run resolve against the module's own host — the hub only stores
    discovery metadata and cached manifests, never artifact payloads.
tools:
  - !ref HubTools
