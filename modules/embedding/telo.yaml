kind: Telo.Library
metadata:
  name: embedding
  namespace: std
  version: 0.4.0
  description: |
    The Embedding.Model abstract — a backend-pluggable text embedding model —
    plus the Query / Passage invocables that turn text into vectors. Asymmetric
    retrieval models embed a search query differently from a stored passage;
    the two kinds make that intent structural. Backend implementations
    (embedding-openai, …) live in their own modules and extend Model, mirroring
    the cache / cache-memory family.
exports:
  kinds:
    - Model
    - Query
    - Passage
---
# Embedding.Model — the abstract model every embedding backend implements. A
# Telo.Provider: a configured model, NOT an operation you invoke. Consumers
# (Embedding.Query / Embedding.Passage) reference it via
# `x-telo-ref: "std/embedding#Model"`; a concrete implementation
# (EmbeddingOpenai.Model, …) satisfies the ref.
#
# The prompt templates live here, on the model, because they are a property of
# the checkpoint — embeddinggemma, E5 and BGE each mandate their own fixed
# wrapper per retrieval intent. Declaring them once means the query and passage
# sides can never drift apart: indexing with one wrapper and searching with
# another silently destroys recall, and that failure is invisible at every layer
# above. Backends inherit these fields via `extends` (merge(parent, own)).
kind: Telo.Abstract
metadata:
  name: Model
capability: Telo.Provider
schema:
  type: object
  properties:
    queryPrompt:
      title: Query Prompt
      description: >-
        Template wrapping each text embedded with the `query` intent. Must
        contain the `{text}` placeholder, replaced with the input. Omit for
        symmetric models that take raw text.
      type: string
      x-telo-eval: compile
      examples:
        - "task: search result | query: {text}"
    passagePrompt:
      title: Passage Prompt
      description: >-
        Template wrapping each text embedded with the `passage` intent. Must
        contain the `{text}` placeholder, replaced with the input. Omit for
        symmetric models that take raw text.
      type: string
      x-telo-eval: compile
      examples:
        - "title: none | text: {text}"
---
# Embedding.Query — embeds search queries. The controller passes the retrieval
# intent `query` to the backend (mapped to the vendor's search_query /
# RETRIEVAL_QUERY parameter); symmetric backends ignore it. Identical in shape
# to Embedding.Passage — only the baked-in intent differs.
kind: Telo.Definition
metadata:
  name: Query
  description: Embed one or more search queries into vectors for retrieval using any Embedding.Model.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/embedding@0.3.0?local_path=./nodejs#query
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    required: [input]
    additionalProperties: false
    properties:
      input:
        description: A single query, or a batch of queries, to embed.
        oneOf:
          - type: string
          - type: array
            minItems: 1
            items: { type: string }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    required: [embeddings, dimensions, usage]
    additionalProperties: false
    properties:
      embeddings:
        description: One vector per input, in input order.
        type: array
        items: { type: array, items: { type: number } }
      dimensions:
        type: integer
        minimum: 1
      usage:
        type: object
        required: [promptTokens, totalTokens]
        additionalProperties: false
        properties:
          promptTokens: { type: integer, minimum: 0 }
          totalTokens: { type: integer, minimum: 0 }
schema:
  type: object
  required: [model]
  additionalProperties: false
  properties:
    model:
      title: Model
      description: Reference to any Embedding.Model implementation.
      x-telo-ref: "std/embedding#Model"
    options:
      title: Options
      description: Provider-specific per-call options.
      type: object
      additionalProperties: true
  examples:
    - model: !ref textEmbedding
---
# Embedding.Passage — embeds stored passages (the chunks you index).
# Structurally identical to Embedding.Query; the controller passes the intent
# `passage` (mapped to the vendor's search_document / RETRIEVAL_DOCUMENT).
kind: Telo.Definition
metadata:
  name: Passage
  description: Embed one or more stored passages into vectors for indexing using any Embedding.Model.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/embedding@0.3.0?local_path=./nodejs#passage
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    required: [input]
    additionalProperties: false
    properties:
      input:
        description: A single passage, or a batch of passages, to embed.
        oneOf:
          - type: string
          - type: array
            minItems: 1
            items: { type: string }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    required: [embeddings, dimensions, usage]
    additionalProperties: false
    properties:
      embeddings:
        description: One vector per input, in input order.
        type: array
        items: { type: array, items: { type: number } }
      dimensions:
        type: integer
        minimum: 1
      usage:
        type: object
        required: [promptTokens, totalTokens]
        additionalProperties: false
        properties:
          promptTokens: { type: integer, minimum: 0 }
          totalTokens: { type: integer, minimum: 0 }
schema:
  type: object
  required: [model]
  additionalProperties: false
  properties:
    model:
      title: Model
      description: Reference to any Embedding.Model implementation.
      x-telo-ref: "std/embedding#Model"
    options:
      title: Options
      description: Provider-specific per-call options.
      type: object
      additionalProperties: true
  examples:
    - model: !ref textEmbedding
