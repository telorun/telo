{{- if .Values.registry.enabled }}
# Optional in-cluster container registry the build pushes to and sessions pull
# from. CAVEAT: the kubelet pulls session images directly and does NOT use
# cluster DNS, so nodes must be configured to trust this registry (e.g.
# containerd registries.conf for {{ include "telo-k8s-runner.registryHost" . }})
# for pulls to succeed. For most clusters an external registry is simpler.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "telo-k8s-runner.name" . }}-registry
  namespace: {{ .Values.runnerNamespace }}
  labels:
    {{- include "telo-k8s-runner.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.registry.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "telo-k8s-runner.name" . }}-registry
  namespace: {{ .Values.runnerNamespace }}
  labels:
    {{- include "telo-k8s-runner.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "telo-k8s-runner.name" . }}-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "telo-k8s-runner.name" . }}-registry
    spec:
      containers:
        - name: registry
          image: {{ .Values.registry.image | quote }}
          ports:
            - containerPort: {{ .Values.registry.port }}
          env:
            - name: REGISTRY_HTTP_ADDR
              value: ":{{ .Values.registry.port }}"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "telo-k8s-runner.name" . }}-registry
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "telo-k8s-runner.name" . }}-registry
  namespace: {{ .Values.runnerNamespace }}
  labels:
    {{- include "telo-k8s-runner.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "telo-k8s-runner.name" . }}-registry
  ports:
    - name: registry
      port: {{ .Values.registry.port }}
      targetPort: {{ .Values.registry.port }}
{{- end }}
