kind: Telo.Application
metadata:
  name: PipelineWithResourcesBasic
  version: 1.0.0
imports:
  Run: ../modules/run
  Assert: ../modules/assert
---
kind: Run.Sequence
metadata:
  name: TestWithResources
with:
  - kind: Run.Value
    metadata:
      name: SharedHelper
    inputs:
      value: { type: number }
    value:
      doubled: !cel "inputs.value * 2"
steps:
  - name: UseHelper
    inputs:
      value: 5
    invoke: !ref SharedHelper

  - name: VerifyResult
    inputs:
      doubled: "${{ steps.UseHelper.result.doubled }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          doubled:
            type: number
            const: 10
        required:
          - doubled
