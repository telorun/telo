kind: Telo.Application
metadata:
  name: CanInsertAndSelect
  version: 1.0.0
imports:
  Sql: ../
  Run: ../../run
  Assert: ../../assert
targets:
  - TestInsertAndSelect
---
kind: Sql.SqliteConnection
metadata:
  name: Db
file: ":memory:"
---
kind: Run.Sequence
metadata:
  name: TestInsertAndSelect
steps:
  - name: CreateTable
    inputs:
      sql: "CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT NOT NULL, age INTEGER NOT NULL)"
    invoke:
      kind: Sql.Exec
      connection:
        kind: Sql.SqliteConnection
        name: Db

  - name: InsertRow
    inputs:
      sql: "INSERT INTO users (id, name, age) VALUES (1, 'Alice', 30)"
    invoke:
      kind: Sql.Exec
      connection:
        kind: Sql.SqliteConnection
        name: Db

  - name: SelectRow
    inputs:
      sql: "SELECT id, name, age FROM users WHERE id = 1"
    invoke:
      kind: Sql.Query
      connection:
        kind: Sql.SqliteConnection
        name: Db

  - name: AssertResult
    inputs:
      rows: "${{ steps.SelectRow.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            minItems: 1
            maxItems: 1
            items:
              type: object
              properties:
                id:
                  const: 1
                name:
                  const: Alice
                age:
                  const: 30
