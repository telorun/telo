kind: Telo.Library
metadata:
  name: http-client
  namespace: std
  version: 0.8.0
  description: HTTP request client for testing and orchestration
---
kind: "Telo.Definition"
metadata:
  name: "Client"
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/http-client@0.7.0?local_path=./nodejs#http-client
schema:
  type: "object"
  examples:
    - baseUrl: https://jsonplaceholder.typicode.com
      headers:
        Authorization: Bearer token
      timeout: 10000
  properties:
    baseUrl:
      title: Base URL
      type: "string"
      description: "Base URL for all requests using this client"
    headers:
      title: Headers
      type: "object"
      additionalProperties:
        type: "string"
      description: "Default headers applied to all requests (e.g., Authorization)"
    timeout:
      title: Timeout
      type: "integer"
      minimum: 1
      default: 10000
      description: "Default timeout in milliseconds"
    followRedirects:
      title: Follow Redirects
      type: "boolean"
      default: true
      description: "Whether redirects should be followed automatically."
---
kind: "Telo.Definition"
metadata:
  name: "Request"
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/http-client@0.7.0?local_path=./nodejs#http-request
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    additionalProperties: false
    required: [status, headers, body]
    properties:
      status:
        type: integer
        description: HTTP response status code.
      headers:
        type: object
        additionalProperties: { type: string }
        description: Response headers, normalized to lowercase keys (per §2 of the Response Contract).
      body:
        description: |
          Parsed JSON when content-type is application/json (or null on an empty body
          with a JSON content-type); raw string otherwise. Open shape — per-call
          narrowing is the manifest author's concern (use CEL or downstream
          Type kinds).
schema:
  type: "object"
  examples:
    - client: !ref PlaceholderApi
      throwOnHttpError: true
  properties:
    client:
      title: Client
      x-telo-ref: "std/http-client#Client"
      description: "Reference to an Http.Client resource. Injected as a live instance at runtime; its baseUrl, headers, and timeout supply per-request defaults."
    timeout:
      title: Timeout
      type: "integer"
      minimum: 1
      description: "Overrides the client or default timeout (in ms)"
    throwOnHttpError:
      title: Throw On HTTP Error
      type: "boolean"
      default: false
      description: "If true, HTTP 4xx and 5xx responses will throw a runtime error. If false, they return gracefully."
    retries:
      title: Retries
      type: "integer"
      minimum: 0
      default: 0
      description: "Number of times to retry on Network Errors (not HTTP errors)"
    mode:
      title: Mode
      type: "string"
      enum: ["buffer", "stream"]
      default: "buffer"
      description: "buffer (default): read and deserialize the full response body. stream: return body as a readable stream without buffering."
    inputs:
      title: Inputs
      type: "object"
      description: "Request parameters, resolved dynamically on each invocation"
      examples:
        - url: https://jsonplaceholder.typicode.com/todos/1
          method: GET
        - url: https://jsonplaceholder.typicode.com/posts
          method: POST
          body:
            title: Hello
            body: World
            userId: 1
      properties:
        url:
          title: URL
          type: "string"
          description: "Absolute URL, or relative path if 'client' is provided"
        method:
          title: Method
          type: "string"
          default: "GET"
          description: "HTTP method to use for the request."
        query:
          title: Query
          type: "object"
          description: "Query parameters to be appended to the URL"
          additionalProperties:
            type: "string"
        headers:
          title: Headers
          type: "object"
          description: "Request-specific headers (merges with client headers)"
          additionalProperties:
            type: "string"
        body:
          title: Body
          oneOf:
            - type: "string"
            - type: "object"
          description: "Payload to send. Objects are automatically stringified to JSON."
      required: ["url"]
