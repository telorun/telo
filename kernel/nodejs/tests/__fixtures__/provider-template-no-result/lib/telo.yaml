kind: Telo.Library
metadata:
  name: provider-template-raw-lib
  version: 1.0.0
exports:
  kinds:
    - RawProvider
imports:
  Run: ../../../../../../modules/run
---
kind: Telo.Definition
metadata:
  name: RawProvider
  description: >-
    Test fixture: a template-form provider with NO top-level `result:` mapping,
    so `provide()` returns the child resource's value verbatim.
capability: Telo.Provider
schema:
  type: object
  required: [ value ]
  additionalProperties: true
  properties:
    value: { type: string }
resources:
  - kind: Run.Value
    metadata:
      name: !cel "self.name + '-source'"
    value:
      raw: !cel "self.value"
provide:
  kind: Run.Value
  name: !cel "self.name + '-source'"
