kind: Telo.Library
metadata:
  name: "javascript"
  namespace: std
  version: "0.7.0"
  repository: https://github.com/telorun/telo
  license: LicenseRef-SustainableUse
  description: >-
    Run JavaScript inside a manifest. `JavaScript.Script` executes a
    `main(input)` function with optional typed inputs / outputs. A last
    resort — prefer a declarative resource kind where one exists.
exports:
  kinds:
    - Script
---
kind: "Telo.Definition"
metadata:
  name: "Script"
  description: >-
    Runs inline JavaScript source on the Node.js runtime as an invocable
    resource: the `code` field must define a `main(input)` function whose
    return value becomes the invocation result, validated against the
    optional `inputType` / `outputType` type references. Intended as a last
    resort for one-off glue — prefer a declarative resource kind whenever one
    exists.
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/javascript@0.4.1?local_path=./nodejs#script
schema:
  type: "object"
  properties:
    code:
      title: Code
      description: JavaScript source code executed by this resource.
      type: "string"
      contentMediaType: "application/javascript"
      x-telo-widget: "code"
    inputType:
      title: Input Type
      description: Named type reference or inline type definition for invocation inputs.
      x-telo-ref: "telo#Type"
    outputType:
      title: Output Type
      description: Named type reference or inline type definition for invocation outputs.
      x-telo-ref: "telo#Type"
  required: ["metadata", "code"]
  additionalProperties: false
  examples:
    - "code": |
        function main(input) {
          return { sum: input.a + input.b }
        }
    - "inputType":
        "kind": "Type.JsonSchema"
        "schema":
          "type": "object"
          "required": ["name"]
          "properties":
            "name": { "type": "string" }
      "outputType":
        "kind": "Type.JsonSchema"
        "schema":
          "type": "object"
          "required": ["message"]
          "properties":
            "message": { "type": "string" }
      "code": |
        function main({ name }) {
          return { message: `Hello ${name}!` }
        }
