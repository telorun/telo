kind: Telo.Library
metadata:
  name: sql-sqlite
  namespace: std
  version: 0.4.0
  repository: https://github.com/telorun/telo
  license: LicenseRef-SustainableUse
  description: |
    SqlSqlite.Connection — a SQLite backend for the Sql.Connection abstract.
    Opens a file-backed or in-memory database (better-sqlite3 on Node,
    bun:sqlite on Bun) with transactional DDL. Operations
    (Sql.Query / Sql.Command / Sql.Selection / Sql.Transaction / Sql.Migrations)
    in the `sql` core run against it; the core itself depends on no driver.
imports:
  Sql: ../sql
exports:
  kinds:
    - Connection
---
kind: Telo.Definition
metadata:
  name: Connection
  description: Provides a file-backed or in-memory SQLite connection for Sql.Connection operations.
capability: Telo.Provider
extends: Sql.Connection
controllers:
  - pkg:npm/@telorun/sql-sqlite@0.2.1?local_path=./nodejs#connection
schema:
  type: object
  examples:
    - file: ./data.db
    - file: ":memory:"
  properties:
    file:
      title: File
      type: string
      description: >-
        Path to the SQLite database file (e.g. `./data.db`). The parent
        directory is created if missing. Omit, or use `:memory:`, for an
        in-memory database.
