{{- if .Values.networkPolicy.enabled }}
# Session-pod network policy. HONEST SCOPE: this is NOT default-deny egress.
# Until the trusted content-addressed build Job exists, session pods resolve
# their own dependencies (telo run fetches modules in-pod), so they need broad
# egress. This policy therefore allows egress to the public internet EXCEPT the
# blocked CIDRs (cloud metadata + RFC1918), and isolates pod-to-pod traffic on
# ingress. It does NOT confine exfiltration to a registry allowlist — core
# NetworkPolicy is CIDR-only and cannot express FQDN allows; that requires a CNI
# with FQDN policy (Cilium) or an egress proxy, and is only meaningful once the
# build Job moves installation out of the session pod. Enforced only if the
# cluster CNI supports NetworkPolicy at all.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "telo-k8s-runner.name" . }}-sessions
  namespace: {{ .Values.sessionNamespace }}
  labels:
    {{- include "telo-k8s-runner.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: telo-k8s-runner
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # The runner reaches session pods; deny pod-to-pod traffic between sessions
    # (no podSelector peer is allowed).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.runnerNamespace }}
    {{- if and .Values.sessionIngress.baseDomain .Values.sessionIngress.controllerNamespace }}
    # Per-session ingress traffic enters via the ingress controller, usually in
    # its own namespace — without this peer the controller's requests are dropped
    # and the per-session ingress feature breaks.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.sessionIngress.controllerNamespace }}
    {{- end }}
  egress:
    # DNS — scoped to the cluster DNS namespace (default kube-system) rather than
    # every namespace, so port 53 isn't a hole in the cluster-internal block.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # The runner Service (bundle fetch) — explicit carve-out of the
    # cluster-internal block.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.runnerNamespace }}
    # Everything else EXCEPT the blocked CIDRs (metadata, RFC1918).
    - to:
        - ipBlock:
            cidr: "0.0.0.0/0"
            except:
              {{- range .Values.networkPolicy.blockedCidrs }}
              - {{ . | quote }}
              {{- end }}
{{- end }}
