kind: Run.Sequence
metadata:
  name: TestTaggedInInclude
steps:
  # Tagged values inside an included partial must round-trip through
  # loadPartialFile's parseAllDocuments call site (the second of the five
  # wired sites). Both !cel and !literal must reach the controller correctly.
  - name: CelInPartial
    inputs:
      computed: !cel "20.0 + 22.0"
      raw: !literal "literal-${{ untouched }}"
    invoke:
      kind: Run.Value
      inputs:
        computed: { type: number }
        raw: { type: string }
      value:
        computed: !cel "inputs.computed"
        raw: !cel "inputs.raw"
  - name: AssertPartial
    inputs:
      computed: "${{ steps.CelInPartial.result.computed }}"
      raw: "${{ steps.CelInPartial.result.raw }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          computed:
            type: number
            const: 42
          raw:
            type: string
            const: !literal "literal-${{ untouched }}"
        required: [computed, raw]
