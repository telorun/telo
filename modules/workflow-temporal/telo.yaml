kind: Telo.Library
metadata:
  name: workflow-temporal
  namespace: std
  version: 0.2.1
  description: Temporal backend provider for Workflow.Graph
imports:
  # Import the workflow module so `Workflow.Backend` resolves from `extends` below.
  # Required regardless of whether a consuming application also imports workflow —
  # aliases in `extends` are resolved against this file's own imports.
  Workflow: ../workflow
exports:
  kinds:
    - Backend
---
kind: Telo.Definition
metadata:
  name: Backend
capability: Telo.Provider
extends: Workflow.Backend
controllers:
  - pkg:npm/@telorun/workflow-temporal@0.2.1?local_path=./nodejs#backend
schema:
  type: object
  properties:
    namespace:
      title: Namespace
      description: Temporal namespace used for workflow execution.
      type: string
    address:
      title: Address
      type: string
      description: Temporal server address (e.g. localhost:7233)
  $defs:
    NodeOptions:
      type: object
      properties:
        scheduleToCloseTimeout:
          title: Schedule To Close Timeout
          type: string
          description: Maximum time for the entire activity (e.g. 10m)
        retryPolicy:
          title: Retry Policy
          description: Retry behavior for failed activity executions.
          type: object
          properties:
            maxAttempts:
              title: Max Attempts
              description: Maximum number of activity retry attempts.
              type: integer
            initialInterval:
              title: Initial Interval
              description: Initial delay between retry attempts.
              type: string
