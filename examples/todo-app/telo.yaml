kind: Telo.Application
metadata:
  name: todo-app
  version: 1.0.0
  description: |
    A complete app served as one unit: the REST todo API and the vanilla HTML/JS
    frontend that consumes it (Http.Static), on a single port. The whole REST
    surface is one declarative Crud.Resource — list / read / create / update /
    delete over the `todos` table — mounted alongside the static frontend.
imports:
  Http: std/http-server@0.19.1#sha256-MkMefY1OtI0KMFV4VwvTaHJntTcnS3qEm53uoqyU7R4
  Sql: std/sql@0.13.0#sha256-ARE0QGUj8CtyNKTgIwiBFnHq1YbH-3B6nK4TLmvg_aE
  SqlSqlite: std/sql-sqlite@0.4.0#sha256-FisczE66geWlyRA9s-x2L8Qv32kv_INZNmfmufpZVPM
  Crud: std/crud@0.5.0#sha256-B1EbNgs28SYUW0IUagvMqB85H2EcALL2L3NR3mED9Pg
  Type: std/type@0.8.0#sha256-z56gxs4HbdWHlUWWvLRFFHPy5wX52SU5A1Fo61s20-g
targets:
  - !ref Migrate
  - !ref Server
# Ship the frontend into the published module artifact so `Http.Static root:
# ./public` resolves after `telo publish` / install, not just locally.
files:
  - public/app.js
  - public/index.html
  - public/style.css
ports:
  http:
    env: PORT
    protocol: tcp
    default: 8077
---
kind: SqlSqlite.Connection
metadata:
  name: Db
file: ":memory:"
---
kind: Sql.Migrations
metadata:
  name: Migrate
connection: !ref Db
migrations:
  0001_create_todos:
    statement: |
      CREATE TABLE IF NOT EXISTS todos (
        id         INTEGER PRIMARY KEY AUTOINCREMENT,
        text       TEXT    NOT NULL,
        is_done    BOOLEAN NOT NULL DEFAULT FALSE,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      )
---
kind: Http.Server
metadata:
  name: Server
host: 127.0.0.1
port: !cel "ports.http"
logger: true
openapi:
  info:
    title: Todo API
    version: 1.0.0
mounts:
  - path: /api/todos
    mount:
      # The entire REST API: CRUD over the `todos` table. Mounted at /api/todos, it
      # serves GET / (list), GET /{id}, POST /, PUT /{id}, DELETE /{id}.
      kind: Crud.Resource
      connection: !ref Db
      plural: todos
      singular: todo
      model:
        kind: Type.JsonSchema
        schema:
          type: object
          properties:
            text: { type: string }
            isDone: { type: boolean }

  - path: /
    mount: !ref Ui
---
kind: Http.Static
metadata:
  name: Ui
root: ./public
