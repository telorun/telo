kind: Telo.Application
metadata:
  name: TestStarlarkBasic
  version: 1.0.0
  description: Test for starlark-basic example
imports:
  Type: ../modules/type
  Run: ../modules/run
  Starlark: ../modules/starlark
  Console: ../modules/console
  Assert: ../modules/assert
targets:
  - RunScriptOnEvent
  - VerifyStarlarkBasicEvents
---
kind: Type.JsonSchema
metadata:
  name: ScriptInput
schema:
  type: object
  properties:
    value:
      type: number
  required: [ value ]
---
kind: Type.JsonSchema
metadata:
  name: ScriptOutput
schema:
  type: object
  properties:
    result:
      type: number
  required: [ result ]
---
kind: Starlark.Script
metadata:
  name: ExampleStarlarkScript
code: |
  def run(input):
    result = input["value"] * 2
    return {"result": result}
inputType: ScriptInput
outputType: ScriptOutput
---
kind: Run.Sequence
metadata:
  name: RunScriptOnEvent
steps:
  - name: Step1
    inputs:
      value: 42
    invoke:
      kind: Starlark.Script
      name: ExampleStarlarkScript
  - name: Step2
    invoke: { kind: Console.WriteLine }
    inputs:
      output: |
        Evaluated starlark code.
        Result is: ${{ steps.Step1.result.result }}
---
kind: Assert.Events
metadata:
  name: VerifyStarlarkBasicEvents
filter:
  - type: "*"
expect:
  - event: Starlark.Script.*.Invoked
    payload:
      outputs:
        result: 84
  - event: Console.WriteLine.*.Invoked
    payload: {}
