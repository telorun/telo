kind: Telo.Application
metadata:
  name: ExtendsUnknownTargetTest
  version: 1.0.0
targets:
  - TestExtendsUnknownTarget
---
kind: Telo.Import
metadata:
  name: Assert
source: ../modules/assert
---
# Asserts the analyzer emits EXTENDS_UNKNOWN_TARGET when the identity resolves but
# no registered definition with that name exists.
kind: Assert.Manifest
metadata:
  name: TestExtendsUnknownTarget
source: ./__fixtures__/extends-unknown-target.yaml
expect:
  errors:
    - code: EXTENDS_UNKNOWN_TARGET
