kind: Kernel.Module
metadata:
  name: templated-server
  version: 1.0.0
exports:
  kinds:
    - HelloApi
---
kind: Kernel.Import
metadata:
  name: Http
source: ../modules/http-server
---
kind: Kernel.Import
metadata:
  name: JavaScript
source: ../modules/javascript
---
kind: Http.Api
metadata:
  name: HelloApi
routes:
  - request:
      path: /hello
      method: GET
      schema:
        query:
          type: object
          properties:
            name:
              type: string
          required: ["name"]
    handler:
      kind: JavaScript.Script
      name: SayHello
      inputs:
        name: "${{ request.query.name }}" # CEL expression
    response:
      - status: 200
        schema:
          body:
            type: object
            properties:
              greeting:
                type: string
              nice:
                type: string
            required: ["greeting", "nice"]
            additionalProperties: false
        headers:
          Content-Type: application/json
        body:
          greeting: "${{ result.message }}!"
          nice: "WOW"
---
kind: JavaScript.Script
metadata:
  name: SayHello
code: |
  function main({ name }) {
    return {
      message: `Hello ${name}!`,
    }
  };
inputSchema:
  name:
    type: string
outputSchema:
  message:
    type: string
---
