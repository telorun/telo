kind: Telo.Application
metadata:
  name: SseCodecSmokeTest
  version: 1.0.0
  description: |
    Smoke test for sse-codec. Pipes a small AsyncIterable of typed records through
    Sse.Encoder and asserts the byte-exact SSE wire output. Byte→string conversion
    happens in a JS.Script Drain — keeps the test self-contained, no cross-module
    decoder dependency.
imports:
  Sse: ../
  JS: ../../javascript
  Stream: ../../stream
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestEncode
  - !ref TestResumeEnvelope
---
kind: Stream.Of
metadata: { name: Source }
items:
  - { type: "text-delta", delta: "h" }
  - { type: "text-delta", delta: "i" }
  - { type: "finish", usage: { promptTokens: 0, completionTokens: 0, totalTokens: 0 }, finishReason: "stop" }
---
kind: JS.Script
metadata: { name: Drain }
code: |
  async function main({ bytes }) {
    const chunks = [];
    for await (const chunk of bytes) chunks.push(Buffer.from(chunk));
    return { text: Buffer.concat(chunks).toString("utf8") };
  }
---
kind: Sse.Encoder
metadata: { name: Encoder }
---
kind: Run.Sequence
metadata: { name: TestEncode }
steps:
  - name: Source
    invoke: !ref Source
  - name: Encode
    inputs:
      input: "${{ steps.Source.result.output }}"
    invoke: !ref Encoder
  - name: Drain
    inputs:
      bytes: "${{ steps.Encode.result.output }}"
    invoke: !ref Drain
  - name: Assert
    inputs:
      text: "${{ steps.Drain.result.text }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text:
            const: "event: text-delta\ndata: {\"delta\":\"h\"}\n\nevent: text-delta\ndata: {\"delta\":\"i\"}\n\nevent: finish\ndata: {\"usage\":{\"promptTokens\":0,\"completionTokens\":0,\"totalTokens\":0},\"finishReason\":\"stop\"}\n\n"
        required: [ text ]
---
# Resumable-envelope framing: a typeless `{ id, data }` item (a replay-journal
# entry) frames as a `message` event carrying an `id:` line, so a client can
# checkpoint and reconnect. The `id` becomes the SSE id line; the rest is data.
kind: Stream.Of
metadata: { name: ResumeSource }
items:
  - { id: 1, data: { type: "text-delta", delta: "h" } }
  - { id: 2, data: { type: "finish" } }
---
kind: Run.Sequence
metadata: { name: TestResumeEnvelope }
steps:
  - name: Source
    invoke: !ref ResumeSource
  - name: Encode
    inputs:
      input: !cel "steps.Source.result.output"
    invoke: !ref Encoder
  - name: Drain
    inputs:
      bytes: !cel "steps.Encode.result.output"
    invoke: !ref Drain
  - name: Assert
    inputs:
      text: !cel "steps.Drain.result.text"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text:
            const: "id: 1\nevent: message\ndata: {\"data\":{\"type\":\"text-delta\",\"delta\":\"h\"}}\n\nid: 2\nevent: message\ndata: {\"data\":{\"type\":\"finish\"}}\n\n"
        required: [ text ]
