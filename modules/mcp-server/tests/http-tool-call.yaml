kind: Telo.Application
metadata: { name: McpHttpToolCallTest, version: 1.0.0 }
imports:
  Mcp: ../
  McpClient: ../../mcp-client
  Http: ../../http-server
  Run: ../../run
  Assert: ../../assert
targets: [ !ref TestRun ]
---
kind: Run.Value
metadata: { name: GetWeatherImpl }
inputs:
  city: { type: string }
value:
  summary: !cel "'Sunny in ' + inputs.city"
---
kind: Mcp.Tools
metadata: { name: WeatherTools }
entries:
  - name: get_weather
    description: Get current weather for a city.
    argumentsSchema:
      type: object
      properties:
        city: { type: string }
      required: [ city ]
    handler: !ref GetWeatherImpl
    inputs:
      city: "${{ request.arguments.city }}"
    result:
      content:
        - type: text
          text: "${{ result.summary }}"
---
kind: Mcp.HttpEndpoint
metadata: { name: McpHttp }
serverInfo: { name: telo-test-mcp, version: 1.0.0 }
tools: [ !ref WeatherTools ]
---
# Client-side: the new typed Mcp.HttpClient + Mcp.ToolsCall replace the
# hand-rolled JS.Script McpFetch. With no sessionProvider declared, the client
# self-handshakes lazily and reuses the cached session for the lifetime of the
# test. The server is stateless here, so no session header is echoed.
kind: McpClient.HttpClient
metadata: { name: WeatherMcpClient }
url: http://127.0.0.1:8951/mcp
clientInfo: { name: telo-test, version: 1.0.0 }
---
kind: McpClient.ToolsCall
metadata: { name: CallGetWeather }
client: !ref WeatherMcpClient
---
kind: Run.Sequence
metadata: { name: TestRun }
with:
  - kind: Http.Server
    metadata: { name: Server }
    host: 127.0.0.1
    port: 8951
    baseUrl: http://127.0.0.1:8951
    logger: false
    mounts:
      - { path: /mcp, mount: !ref McpHttp }
targets: [ !ref Server ]
steps:
  - name: CallGetWeather
    inputs:
      name: get_weather
      arguments: { city: Atlantis }
    invoke: !ref CallGetWeather
  - name: AssertResponse
    inputs:
      contentText: "${{ steps.CallGetWeather.result.content[0].text }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          contentText: { const: "Sunny in Atlantis" }
        required: [ contentText ]
