kind: Telo.Library
metadata:
  name: s3
  namespace: std
  version: 1.2.0
secrets:
  accessKeyId:
    type: string
    description: S3 access key ID
  secretAccessKey:
    type: string
    description: S3 secret access key
exports:
  kinds:
    - Bucket
    - List
    - Put
    - Get
---
kind: Telo.Definition
metadata:
  name: Bucket
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/s3@1.2.0?local_path=./nodejs#s3-bucket
schema:
  type: object
  properties:
    bucketName:
      title: Bucket Name
      type: string
      description: Bucket name
    endpoint:
      title: Endpoint
      type: string
      description: S3-compatible endpoint URL (e.g. https://<accountId>.r2.cloudflarestorage.com)
    forcePathStyle:
      title: Force Path Style
      type: boolean
      description: Use path-style URLs (required for MinIO, RustFS, and other self-hosted S3)
    createIfMissing:
      title: Create If Missing
      type: boolean
      description: Create the bucket during init if it does not already exist. Intended for self-hosted/dev backends; leave false for managed clouds where the app lacks CreateBucket permission.
    publicRead:
      title: Public Read
      type: boolean
      description: When true, apply a bucket policy during init that grants anonymous s3:GetObject on all keys. Portable across AWS S3, MinIO, and RustFS via PutBucketPolicy. Not effective on Cloudflare R2 (configure public access through the Cloudflare dashboard instead).
  required:
    - bucketName
    - endpoint
---
kind: Telo.Definition
metadata:
  name: List
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/s3@1.2.0?local_path=./nodejs#s3-list
schema:
  type: object
  properties:
    bucketRef:
      title: Bucket Reference
      type: object
      description: Reference to an S3.Bucket resource by name
      properties:
        name:
          title: Name
          description: Name of the referenced bucket resource.
          type: string
      required:
        - name
  required:
    - bucketRef
---
kind: Telo.Definition
metadata:
  name: Put
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/s3@1.2.0?local_path=./nodejs#s3-put
schema:
  type: object
  properties:
    bucketRef:
      title: Bucket Reference
      type: object
      description: Reference to an S3.Bucket resource by name
      properties:
        name:
          title: Name
          description: Name of the referenced bucket resource.
          type: string
      required:
        - name
    inputs:
      title: Inputs
      description: Object key and content written to the bucket.
      type: object
      properties:
        key:
          title: Key
          description: Object key path inside the bucket.
          type: string
        body:
          title: Body
          description: Object content to upload.
          type: string
        contentType:
          title: Content Type
          description: MIME type set on the uploaded object.
          type: string
      required:
        - key
        - body
  required:
    - bucketRef
---
# Get: streams an object's bytes from the bucket.
#
# Pair the `output` stream with an Encoder (e.g. Octet.Encoder for raw bytes,
# PlainText.Encoder if you want UTF-8-decoded chunks) when wiring through an
# Http.Api response — manifests stay byte-streaming end-to-end and never
# buffer the body in memory.
kind: Telo.Definition
metadata:
  name: Get
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/s3@1.2.0?local_path=./nodejs#s3-get
throws:
  codes:
    ERR_NOT_FOUND:
      description: No object exists at the requested key in the referenced bucket.
    ERR_INVALID_REFERENCE:
      description: bucketRef.name does not resolve to a live S3.Bucket resource at invoke time.
    ERR_INVALID_RESPONSE:
      description: The storage backend returned a successful response with no iterable body.
schema:
  type: object
  properties:
    bucketRef:
      title: Bucket Reference
      type: object
      description: Reference to an S3.Bucket resource by name.
      properties:
        name:
          title: Name
          description: Name of the referenced bucket resource.
          type: string
      required:
        - name
  required:
    - bucketRef
  additionalProperties: false
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      key:
        title: Key
        description: Object key path inside the bucket.
        type: string
    required:
      - key
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      output:
        x-telo-stream: true
        description: Async iterable of Uint8Array chunks streamed from the storage backend.
      contentType:
        type: string
        description: Content-Type header reported by the storage backend, when available.
    required:
      - output
    additionalProperties: false
