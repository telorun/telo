kind: Telo.Library
metadata:
  name: type
  namespace: std
  version: "0.8.0"
  repository: https://github.com/telorun/telo
  license: LicenseRef-SustainableUse
  description: >-
    Reusable JSON Schema type definitions. `Type.JsonSchema` declares a named
    data shape — usable as an `inputType` / `outputType` on any invocable — and
    supports `extends` inheritance plus CEL `rules` for business invariants.
exports:
  kinds:
    - JsonSchema
---
kind: Telo.Definition
metadata:
  name: JsonSchema
  description: Declares a named JSON Schema data shape with extends inheritance and CEL validation rules.
capability: Telo.Type
controllers:
  - pkg:npm/@telorun/type@0.5.0?local_path=./nodejs#type
schema:
  type: object
  properties:
    schema:
      title: Schema
      description: JSON Schema definition for the declared data type.
      type: object
    extends:
      title: Extends
      description: Parent type name or list of parent type names to inherit from.
      oneOf:
        - type: string
        - type: array
          items:
            type: string
    rules:
      title: Rules
      description: CEL-based business invariant rules. Each rule's condition must return true for valid data.
      type: array
      items:
        type: object
        properties:
          condition:
            type: string
            description: CEL expression evaluated with 'this' bound to the data. Must return true for valid data.
          code:
            type: string
            description: Machine-readable error code surfaced on validation failure.
          message:
            type: string
            description: Optional human-readable hint for the validation failure.
        required: ["condition", "code"]
  required: ["schema"]
  additionalProperties: false
  examples:
    - schema:
        type: object
        required: [id]
        properties:
          id: { type: string }
    - extends: Entity
      schema:
        type: object
        required: [amount]
        properties:
          amount: { type: number }
      rules:
        - condition: "this.amount > 0"
          code: "ERR_NON_POSITIVE"
          message: "Amount must be positive"
