# Telo Module Registry
#
# A module registry for the Telo declarative runtime — analogous to NPM,
# but for Kernel modules. Backed entirely by Cloudflare R2.
#
# The R2 bucket must be configured as public. Tarballs and version metadata
# are served directly from R2. The registry server is read-only — publishing
# is done by the CLI directly against R2 using separate credentials.
#
# New modules required (do not exist yet):
#   - ../../cloudflare-r2  →  R2.Bucket                (object storage provider)
#                           R2.Get                   (executable step kind)
#   - ../../http-server    →  Http.Server, Http.Api    (HTTP server + routing)
#                           Http.Fetch               (executable step kind)
#   - ../../config         →  Config.EnvironmentVariableStore, Config.Variables, Config.Secrets

kind: Kernel.Module
metadata:
  name: telo-registry
  version: 1.0.0
targets:
  - InitSchema
  - RegistryServer
---
# ── Imports ──────────────────────────────────────────────────────────────────

kind: Kernel.Import
metadata:
  name: Http
  module: telo-registry
source: ../../modules/http-server
---
kind: Kernel.Import
metadata:
  name: HttpClient
  module: telo-registry
source: ../../modules/http-client

---
kind: Kernel.Import
metadata:
  name: Config
  module: telo-registry
source: ../../modules/config

---
kind: Kernel.Import
metadata:
  name: S3
  module: telo-registry
source: ../../modules/s3
secrets:
  accessKeyId: "${{ resources.S3Secrets.accessKeyId }}"
  secretAccessKey: "${{ resources.S3Secrets.secretAccessKey }}"
---
kind: Kernel.Import
metadata:
  name: Sql
  module: telo-registry
source: ../../modules/sql
---
kind: Kernel.Import
metadata:
  name: Run
  module: telo-registry
source: ../../modules/run

---
# ── Configuration ─────────────────────────────────────────────────────────────

kind: Config.EnvironmentVariableStore
metadata:
  name: Env
  module: telo-registry
schema:
  PORT:
    type: string
    default: "3000"
  S3_BUCKET_NAME:
    type: string
  S3_ENDPOINT:
    type: string
  S3_BUCKET_URL:
    type: string
  S3_ACCESS_KEY_ID:
    type: string
  S3_SECRET_ACCESS_KEY:
    type: string
  DB_FILE:
    type: string
    default: "./registry.db"

---
kind: Config.Variables
metadata:
  name: AppConfig
  module: telo-registry
storeRef:
  name: Env
keys:
  bucketName: S3_BUCKET_NAME
  s3Endpoint: S3_ENDPOINT
  bucketUrl: S3_BUCKET_URL
  port: PORT
  dbFile: DB_FILE

---
kind: Config.Secrets
metadata:
  name: S3Secrets
  module: telo-registry
storeRef:
  name: Env
keys:
  accessKeyId: S3_ACCESS_KEY_ID
  secretAccessKey: S3_SECRET_ACCESS_KEY

---
# ── Storage ───────────────────────────────────────────────────────────────────

kind: S3.Bucket
metadata:
  name: ModuleStore
  module: telo-registry
bucketName: "${{ resources.AppConfig.bucketName }}"
endpoint: "${{ resources.AppConfig.s3Endpoint }}"
accessKeyId: "${{ resources.S3Secrets.accessKeyId }}"
secretAccessKey: "${{ resources.S3Secrets.secretAccessKey }}"

---
# ── Database ──────────────────────────────────────────────────────────────────

kind: Sql.Connection
metadata:
  name: Db
  module: telo-registry
driver: sqlite
file: "${{ resources.AppConfig.dbFile }}"
---
kind: Sql.Exec
metadata:
  name: CreateSchema
  module: telo-registry
connection: Db
inputs:
  sql: |
    CREATE TABLE IF NOT EXISTS modules (
      namespace    TEXT NOT NULL,
      name         TEXT NOT NULL,
      version      TEXT NOT NULL,
      file_key     TEXT NOT NULL,
      description  TEXT,
      published_at TEXT NOT NULL DEFAULT (datetime('now')),
      PRIMARY KEY (namespace, name, version)
    )

---
kind: Run.Sequence
metadata:
  name: InitSchema
  module: telo-registry
steps:
  - name: create_tables
    invoke:
      kind: Sql.Exec
      name: CreateSchema

---
# ── HTTP Server ───────────────────────────────────────────────────────────────

kind: Http.Server
metadata:
  name: RegistryServer
  module: telo-registry
host: "0.0.0.0"
port: "${{ resources.AppConfig.port }}"
logger: true
openapi:
  info:
    title: Telo Module Registry
    version: 1.0.0
    description: |
      Resolve and browse Telo Kernel modules.
      Compatible with the Telo CLI and kind: Kernel.Import source resolution.
mounts:
  - path: /
    type: Http.Api.PublicApi
notFoundHandler:
  invoke:
    kind: HttpClient.Request
    metadata:
      name: NotFoundHandler
      module: telo-registry
    mode: stream
    inputs:
      method: "${{ request.method }}"
      url: "${{ resources.AppConfig.bucketUrl }}/${{ request.path }}"
  response:
    - status: 200
      mode: stream

---
# Public API — unauthenticated.
# GET /{namespace}/{name}          lists all versions from the SQL index.
# PUT /{namespace}/{name}/{version} publishes a module.yaml (body) to S3 and records it in SQL.
# Everything else falls through to the server fallback (ForwardToR2).

kind: Http.Api
metadata:
  name: PublicApi
  module: telo-registry
routes:
  - request:
      path: /{namespace}/{name}
      method: GET
    handler:
      kind: Sql.Query
      connection: Db
      inputs:
        sql: >-
          SELECT version, published_at FROM modules
          WHERE namespace = ? AND name = ?
          ORDER BY published_at ASC
        bindings:
          - "${{ request.params.namespace }}"
          - "${{ request.params.name }}"
    response:
      - status: 200
        when: "${{ result.rows.size() > 0 }}"
        body:
          name: "${{ request.params.namespace + '/' + request.params.name }}"
          version: "${{ result.rows[result.rows.size() - 1].version }}"
          versions: "${{ result.rows.map(r, r.version) }}"
      - status: 404
        body:
          error: "Module not found"

  - request:
      path: /{namespace}/{name}/{version}
      method: PUT
    handler:
      kind: Run.Sequence
      steps:
        - name: upload
          invoke:
            kind: S3.Put
            bucketRef:
              name: ModuleStore
          inputs:
            namespace: "${{ request.params.namespace }}"
            key: "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/module.yaml' }}"
            body: "${{ request.body }}"
            contentType: "text/yaml"
        - name: record
          invoke:
            kind: Sql.Exec
            connection: Db
          inputs:
            sql: >-
              INSERT OR REPLACE INTO modules (namespace, name, version, file_key)
              VALUES (?, ?, ?, ?)
            bindings:
              - "${{ request.params.namespace }}"
              - "${{ request.params.name }}"
              - "${{ request.params.version }}"
              - "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/module.yaml' }}"
      outputs:
        published: "${{ request.params.namespace + '/' + request.params.name + '@' + request.params.version }}"
    response:
      - status: 201
        body:
          published: "${{ result.published }}"
      - status: 500
        body:
          error: "Publish failed"
