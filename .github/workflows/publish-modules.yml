name: Publish Standard Modules

on:
  push:
    branches: [main]
    paths:
      - "modules/*/module.yaml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Configure AWS CLI for Cloudflare R2
        run: |
          aws configure set aws_access_key_id "${{ secrets.R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region auto

      - name: Publish module.yaml files
        shell: bash
        env:
          R2_ENDPOINT: "${{ secrets.R2_ENDPOINT }}"
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -uo pipefail

          failed=0

          for module_file in modules/*/module.yaml; do
            module_dir=$(dirname "$module_file")
            module_name=$(basename "$module_dir")

            # Extract version from first YAML document only (some files have multiple --- docs)
            version=$(yq 'select(di == 0) | .metadata.version' "$module_file")

            if [[ -z "$version" || "$version" == "null" ]]; then
              echo "WARNING: Missing metadata.version in $module_file, skipping"
              continue
            fi

            # Fail if any file already exists before uploading anything
            conflict=0
            for yaml_file in "$module_dir"/*.yaml; do
              filename=$(basename "$yaml_file")
              target_key="std/${module_name}/${version}/${filename}"
              if aws s3api head-object \
                  --endpoint-url "$R2_ENDPOINT" \
                  --bucket "$R2_BUCKET" \
                  --key "$target_key" \
                  2>/dev/null; then
                echo "ERROR: $target_key already exists in R2. Refusing to overwrite."
                conflict=1
              fi
            done
            if [[ "$conflict" -ne 0 ]]; then
              failed=1
              continue
            fi

            # Upload all yaml files
            for yaml_file in "$module_dir"/*.yaml; do
              filename=$(basename "$yaml_file")
              target_key="std/${module_name}/${version}/${filename}"
              echo "Uploading: $yaml_file → s3://${R2_BUCKET}/${target_key}"
              if aws s3api put-object \
                  --endpoint-url "$R2_ENDPOINT" \
                  --bucket "$R2_BUCKET" \
                  --key "$target_key" \
                  --body "$yaml_file"; then
                echo "Uploaded: $target_key"
              else
                echo "ERROR: Failed to upload $target_key"
                failed=1
              fi
            done
          done

          if [[ "$failed" -ne 0 ]]; then
            echo "One or more modules failed to publish."
            exit 1
          fi
          echo "All modules published successfully."
