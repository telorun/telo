kind: Kernel.Module
metadata:
  name: "http-server"
  namespace: std
  version: "1.1.0"
exports:
  kinds:
    - Server
    - Api
---
kind: "Kernel.Definition"
metadata:
  name: "Server"
capability: Kernel.Service
controllers:
  - pkg:npm/@telorun/http-server@0.1.5?local_path=./nodejs#http-server
schema:
  type: "object"
  properties:
    host:
      type: "string"
      x-telo-eval: compile
      default: "localhost"
    port:
      type: "integer"
      x-telo-eval: compile
      minimum: 1
      maximum: 65535
    baseUrl:
      type: "string"
      x-telo-eval: compile
    logger:
      type: "boolean"
      x-telo-eval: compile
    openapi:
      type: "object"
      x-telo-eval: compile
      properties:
        info:
          type: "object"
          properties:
            title: { type: "string" }
            version: { type: "string" }
          required: ["title", "version"]
      required: ["info"]
    mounts:
      type: "array"
      x-telo-eval: compile
      items:
        type: "object"
        properties:
          path:
            type: "string"
          type:
            type: "string"
    contentTypeParsers:
      type: "array"
      x-telo-eval: compile
      items:
        type: "object"
        additionalProperties: false
        properties:
          contentType:
            type: "string"
          parser:
            x-telo-ref: "kernel#Invocable"
            oneOf:
              - type: "string"
              - type: "object"
                properties:
                  kind: { type: "string" }
                required: ["kind"]
                additionalProperties: true
        required: ["contentType"]
    notFoundHandler:
      type: "object"
      properties:
        invoke:
          type: "object"
          properties:
            kind:
              type: "string"
          required: ["kind"]
          additionalProperties: true
        response:
          type: "array"
          items:
            type: "object"
            properties:
              status:
                type: "integer"
                minimum: 100
                maximum: 599
              when:
                type: "boolean"
              mode:
                type: "string"
                enum: ["buffer", "stream"]
              headers:
                type: "object"
                additionalProperties:
                  type: "string"
              body:
                description: "CEL expression or object mapping for response body"
            required: ["status"]
      required: ["invoke"]
  required: ["port", "mounts"]
---
kind: "Kernel.Definition"
metadata:
  name: "Api"
capability: Kernel.Mount
controllers:
  - pkg:npm/@telorun/http-server@0.1.5?local_path=./nodejs#http-server-api
schema:
  type: "object"
  properties:
    routes:
      type: "array"
      items:
        type: "object"
        additionalProperties: false
        properties:
          request:
            type: "object"
            properties:
              path:
                type: "string"
              method:
                type: "string"
                enum: ["GET", "POST", "PUT", "DELETE", "PATCH", "HEAD", "OPTIONS"]
              query:
                type: "object"
              body:
                type: "object"
              headers:
                type: "object"
            required: ["path", "method"]
          inputs:
            type: "object"
            additionalProperties: true
            description: "CEL expressions evaluated against the request context; result is passed to handler.invoke()"
            x-telo-context:
              type: object
              additionalProperties: false
              properties:
                request:
                  x-telo-context-from: "request/schema"
                  type: object
                  properties:
                    path: { type: string }
                    method: { type: string }
          handler:
            x-telo-ref: "kernel#Invocable"
            x-telo-context:
              type: object
              properties:
                request:
                  x-telo-context-from: "request/schema"
                  type: object
                  properties:
                    query: { type: object, additionalProperties: true }
                    body: { type: object, additionalProperties: true }
                    headers: { type: object, additionalProperties: true }
                    params: { type: object, additionalProperties: true }
                    path: { type: string }
                    method: { type: string }
                result:
                  type: object
                  additionalProperties: true
              additionalProperties: false
            oneOf:
              - type: "string"
              - type: "object"
                properties:
                  kind:
                    type: "string"
                  type:
                    type: "string"
          response:
            type: "array"
            x-telo-context:
              type: object
              additionalProperties: false
              properties:
                request:
                  x-telo-context-from: "request/schema"
                  type: object
                  properties:
                    path: { type: string }
                    method: { type: string }
                result:
                  x-telo-context-ref-from: "handler/outputSchema"
                  type: object
                  additionalProperties: true
            items:
              type: "object"
              additionalProperties: false
              properties:
                status:
                  type: "integer"
                  minimum: 100
                  maximum: 599
                when:
                  type: "boolean"
                  description: "CEL expression; entry is selected if this evaluates to true"
                mode:
                  type: "string"
                  enum: ["buffer", "stream"]
                  description: "buffer (default): CEL body expansion + schema validation. stream: pipe result directly, skipping both"
                schema:
                  type: "object"
                headers:
                  type: "object"
                  additionalProperties:
                    type: "string"
                body:
                  description: "CEL expression or object mapping for response body"
              required: ["status"]
  required: ["routes"]
