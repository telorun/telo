kind: Telo.Application
metadata:
  name: ExtendsMalformedTest
  version: 1.0.0
targets:
  - TestExtendsMalformed
---
kind: Telo.Import
metadata:
  name: Assert
source: ../modules/assert
---
# Asserts the analyzer emits EXTENDS_MALFORMED when `extends` is not in identity form.
kind: Assert.Manifest
metadata:
  name: TestExtendsMalformed
source: ./__fixtures__/extends-malformed.yaml
expect:
  errors:
    - code: EXTENDS_MALFORMED
