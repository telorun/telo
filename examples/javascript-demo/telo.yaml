kind: Telo.Application
metadata:
  name: JavaScriptDemo
  version: 1.0.0
  description: A demo showcasing a JavaScript script run from flat `targets`.
imports:
  Type: std/type@0.8.0#sha256-z56gxs4HbdWHlUWWvLRFFHPy5wX52SU5A1Fo61s20-g
  JavaScript: std/javascript@0.7.0#sha256-aKzlX_nloiYROA85sfZEidy4irQCugNk-MvtyDyqYoY
  Console: std/console@0.12.0#sha256-Ac-5GQaSaOs5uH4jEELH1MLOACS5g0IFK0w21YeBmXY
targets:
  - name: Step1
    invoke: !ref MultiplyBy2
    inputs:
      value: 42
  - name: PrintResult
    invoke: !ref Console.writeLine
    inputs:
      output: |
        Evaluated JavaScript code.
        Result is: ${{ steps.Step1.result.result }}
---
kind: JavaScript.Script
metadata:
  name: MultiplyBy2
code: |
  function main({ value }) {
    return { result: value * 2 }
  }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      value: { type: number }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      result: { type: number }
