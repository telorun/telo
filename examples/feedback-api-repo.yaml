kind: Telo.Application
metadata:
  name: FeedbackApiRepo
  version: 1.0.0
  description: |
    Feedback REST API using SqlRepository — no SQL beyond the schema migration.
imports:
  Http: std/http-server@0.11.0
  Sql: std/sql@0.9.1
  SqlRepository: std/sql-repository@0.3.0
  Run: std/run@0.10.0
targets:
  - !ref SetupDb
  - !ref Server
ports:
  http:
    env: PORT
    default: 8844
---
kind: Sql.SqliteConnection
metadata:
  name: Db
connectionString: sqlite:./tmp/feedback-repo.db
---
kind: SqlRepository.Create
metadata:
  name: InsertFeedback
connection: !ref Db
table: feedback
---
kind: SqlRepository.Read
metadata:
  name: ListFeedback
connection: !ref Db
table: feedback
---
kind: SqlRepository.Read
metadata:
  name: GetFeedback
connection: !ref Db
table: feedback
---
kind: Run.Sequence
metadata:
  name: SetupDb
steps:
  - name: CreateTable
    invoke:
      kind: Sql.Exec
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      sql: |
        CREATE TABLE IF NOT EXISTS feedback (
          id        INTEGER PRIMARY KEY AUTOINCREMENT,
          text      TEXT    NOT NULL,
          source    TEXT,
          score     INTEGER NOT NULL DEFAULT 0,
          created_at DATETIME DEFAULT CURRENT_TIMESTAMP
        )
---
kind: Http.Server
metadata:
  name: Server
baseUrl: http://localhost:8844
port: !cel "ports.http"
logger: true
openapi:
  info:
    title: Feedback API (Repository)
    version: 1.0.0
mounts:
  - path: /v1
    mount: !ref FeedbackRoutes
---
kind: Http.Api
metadata:
  name: FeedbackRoutes
routes:
  # POST /v1/feedback — insert a new entry
  - request:
      path: /feedback
      method: POST
      schema:
        body:
          type: object
          properties:
            text:
              type: string
              minLength: 1
            source:
              type: string
          required: [ text ]
    handler: !ref InsertFeedback
    inputs:
      data:
        text: "${{ request.body.text }}"
        source: "${{ request.body.source }}"
        score: "${{ size(request.body.text) }}"
    returns:
      - status: 201
        content:
          application/json:
            body:
              ok: true
              message: Feedback received

  # GET /v1/feedback — list all entries
  - request:
      path: /feedback
      method: GET
    handler: !ref ListFeedback
    inputs:
      filters: {}
    returns:
      - status: 200
        content:
          application/json:
            body: "${{ result.rows }}"

  # GET /v1/feedback/{id} — fetch a single entry by id
  - request:
      path: /feedback/{id}
      method: GET
      schema:
        params:
          type: object
          properties:
            id:
              type: integer
          required: [ id ]
    handler: !ref GetFeedback
    inputs:
      filters:
        id: "${{ request.params.id }}"
    returns:
      - status: 200
        when: "${{ size(result.rows) > 0 }}"
        content:
          application/json:
            body: "${{ result.rows[0] }}"
      - status: 404
        content:
          application/json:
            body:
              ok: false
              message: Not found
