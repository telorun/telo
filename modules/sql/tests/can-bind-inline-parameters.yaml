kind: Telo.Application
metadata:
  name: CanBindInlineParameters
  version: 1.0.0
imports:
  Sql: ../
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestInlineBinding
  - !ref TestSqlPlusBindingsRejected
---
kind: Sql.SqliteConnection
metadata:
  name: Db
file: ":memory:"
---
kind: Run.Sequence
metadata:
  name: TestInlineBinding
steps:
  - name: CreateTable
    inputs:
      sql: "CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT NOT NULL)"
    invoke:
      kind: Sql.Exec
      connection: !ref Db

  # Inline interpolation: the apostrophe in the value would break the statement
  # if it were spliced into the SQL text. It must be bound as a parameter.
  - name: InsertInline
    inputs:
      sql: !sql "INSERT INTO users (id, name) VALUES (${{ 1 }}, ${{ \"O'Brien\" }})"
    invoke:
      kind: Sql.Exec
      connection: !ref Db

  - name: SelectInline
    inputs:
      sql: !sql "SELECT name FROM users WHERE id = ${{ 1 }}"
    invoke:
      kind: Sql.Query
      connection: !ref Db

  - name: AssertInline
    inputs:
      rows: "${{ steps.SelectInline.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            minItems: 1
            maxItems: 1
            items:
              type: object
              properties:
                name:
                  const: "O'Brien"

  # Escape hatch: hand-written placeholder + explicit bindings still works.
  - name: InsertBindings
    inputs:
      sql: "INSERT INTO users (id, name) VALUES (?, ?)"
      bindings:
        - !cel "2"
        - !cel "'Alice'"
    invoke:
      kind: Sql.Exec
      connection: !ref Db

  - name: SelectBindings
    inputs:
      sql: "SELECT name FROM users WHERE id = ?"
      bindings: [!cel "2"]
    invoke:
      kind: Sql.Query
      connection: !ref Db

  - name: AssertBindings
    inputs:
      rows: "${{ steps.SelectBindings.result.rows }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          rows:
            type: array
            minItems: 1
            maxItems: 1
            items:
              type: object
              properties:
                name:
                  const: Alice
---
# Combining a !sql template with an explicit bindings array is rejected.
kind: Run.Sequence
metadata:
  name: TestSqlPlusBindingsRejected
steps:
  - name: Try
    try:
      - name: Invoke
        inputs:
          sql: !sql "SELECT name FROM users WHERE id = ${{ 1 }}"
          bindings: [!cel "1"]
        invoke:
          kind: Sql.Query
          connection: !ref Db
      - name: NotReached
        inputs: { note: "should not get here" }
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties: { note: { const: "UNREACHABLE" } }
            required: [note]
    catch:
      - name: AssertCaught
        inputs:
          code: "${{ error.code }}"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              code: { const: ERR_INVALID_INPUT }
            required: [code]
