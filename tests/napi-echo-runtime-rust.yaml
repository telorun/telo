kind: Telo.Application
metadata:
  name: NapiEchoRuntimeRust
  version: 1.0.0
  description: "Verifies that an explicit `runtime: rust` on the Telo.Import resolves to pkg:cargo and loads the addon successfully."
imports:
  NapiTest:
    source: ./__fixtures__/napi-test/telo.yaml
    runtime: rust
  Assert: ../modules/assert
targets:
  - !ref VerifyKernelStarted
---
kind: NapiTest.Echo
metadata:
  name: TheEcho
---
kind: Assert.Events
metadata:
  name: VerifyKernelStarted
filter:
  - type: "Kernel.*"
expect:
  - event: Kernel.Initialized
