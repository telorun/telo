kind: Kernel.Application
metadata:
  name: ValidTypeAccess
  version: 1.0.0
targets:
  - TestValidAccess
---
kind: Kernel.Import
metadata:
  name: Type
source: ../..
---
kind: Kernel.Import
metadata:
  name: Run
source: ../../../run
---
kind: Kernel.Import
metadata:
  name: JavaScript
source: ../../../javascript
---
kind: Type.JsonSchema
metadata:
  name: SumOutput
schema:
  type: object
  required: [sum]
  properties:
    sum: { type: number }
  additionalProperties: false
---
kind: JavaScript.Script
metadata:
  name: AddNumbers
outputType: SumOutput
code: |
  function main({ a, b }) {
    return { sum: a + b }
  }
---
kind: Run.Sequence
metadata:
  name: TestValidAccess
steps:
  - name: Add
    inputs:
      a: 1
      b: 2
    invoke:
      kind: JavaScript.Script
      name: AddNumbers
  - name: UseResult
    inputs:
      value: "${{ steps.Add.result.sum }}"
    invoke:
      kind: JavaScript.Script
      code: |
        function main(input) { return input }
