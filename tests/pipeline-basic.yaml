kind: Kernel.Module
metadata:
  name: PipelineBasic
  version: 1.0.0
targets:
  - TestBasicAddition
---
kind: Kernel.Import
metadata:
  name: Pipeline
  module: PipelineBasic
source: ../modules/pipeline
---
kind: Kernel.Import
metadata:
  name: JavaScript
  module: PipelineBasic
source: ../modules/javascript
---
kind: Kernel.Import
metadata:
  name: Assert
  module: PipelineBasic
source: ../modules/assert
---
kind: Pipeline.Job
metadata:
  name: TestBasicAddition
  description: Test basic JavaScript addition
  module: PipelineBasic
steps:
  - name: AddTwoNumbers
    inputs:
      a: 5
      b: 3
    invoke:
      kind: JavaScript.Script
      outputSchema:
        sum:
          type: number
      code: |
        function main({ a, b }) {
          return {
            sum: a + b
          }
        }

  - name: VerifyResult
    inputs:
      sum: "${{ AddTwoNumbers.outputs.sum }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          sum:
            type: number
            const: 8
---
kind: Assert.Events
metadata:
  name: ExpectEvents
  module: PipelineBasic
filter:
  - type: "*"
expect:
  - event: JavaScript.Script.*.Invoked
    payload:
      outputs:
        sum: 8
  - event: Assert.Schema.*.Invoked
    payload:
      outputs: true
