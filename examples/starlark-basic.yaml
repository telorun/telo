kind: Telo.Application
metadata:
  name: StarlarkDemo
  version: 1.0.0
  description: A demo module showcasing Starlark scripts
targets:
  - RunScriptOnEvent
---
kind: Telo.Import
metadata:
  name: Type
source: ../modules/type
---
kind: Telo.Import
metadata:
  name: Run
source: ../modules/run
---
kind: Telo.Import
metadata:
  name: Starlark
source: ../modules/starlark
---
kind: Telo.Import
metadata:
  name: Console
source: ../modules/console
---
kind: Starlark.Script
metadata:
  name: ExampleStarlarkScript
code: |
  def run(input):
    result = input["value"] * 2
    return {"result": result}
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      value: { type: number }
    required: [value]
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      result: { type: number }
    required: [result]
---
kind: Run.Sequence
metadata:
  name: RunScriptOnEvent
steps:
  - name: Step1
    inputs:
      value: 42
    invoke:
      kind: Starlark.Script
      name: ExampleStarlarkScript
  - name: Step2
    invoke: { kind: Console.WriteLine }
    inputs:
      output: |
        Evaluated starlark code.
        Result is: ${{ steps.Step1.result.result }}
