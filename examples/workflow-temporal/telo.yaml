kind: Telo.Application
metadata:
  name: WorkflowTemporalExample
  version: 1.0.0
  description: |
    Two-step durable workflow (fetch → transform) executed on a Temporal
    backend. Shows how `Workflow.Graph` declares activity nodes that
    dispatch to ordinary handler resources, with per-node timeout and
    retry policy.

    Requires a running Temporal server at `localhost:7233`. The quickest
    way to bring one up locally is:
        docker run --rm -p 7233:7233 -p 8233:8233 \
          temporalio/auto-setup:latest
    Then run this manifest. The Temporal Web UI is available at
    http://localhost:8233 to inspect the workflow execution.
imports:
  Type: std/type@0.8.0#sha256-z56gxs4HbdWHlUWWvLRFFHPy5wX52SU5A1Fo61s20-g
  Workflow: std/workflow@0.3.0#sha256-Q4ECLxg9lb4WGjBwE0yjH6OmFU-gUqXFWNxz2RSAM6s
  Temporal: std/workflow-temporal@0.4.0#sha256-ffKlS8XeCBbpIO92SoMzocMHWKBeTvbnYL7e1V2b6Zg
  JS: std/javascript@0.7.0#sha256-aKzlX_nloiYROA85sfZEidy4irQCugNk-MvtyDyqYoY
  Run: std/run@0.13.0#sha256-s5raonayIOI78D9YjhAG_TB_KV7wILexhfEOpygFauc
targets:
  - !ref DataSyncWorkflow
---
kind: Temporal.Backend
metadata:
  name: TemporalProd
address: localhost:7233
namespace: default
---
kind: JS.Script
metadata:
  name: FetchData
code: |
  async function main({ url }) {
    const res = await fetch(url);
    return { data: await res.json() };
  }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      url: { type: string }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      data: { type: object }
---
kind: Run.Value
metadata:
  name: TransformData
inputs:
  data: { type: object }
value:
  result: !cel "inputs.data.items.map(i, i.id)"
---
kind: Workflow.Graph
metadata:
  name: DataSyncWorkflow
backend: !ref TemporalProd
nodes:
  - name: Fetch
    invoke: !ref FetchData
    options:
      scheduleToCloseTimeout: 30s
      retryPolicy:
        maxAttempts: 3
  - name: Transform
    invoke: !ref TransformData
    options:
      scheduleToCloseTimeout: 10s
