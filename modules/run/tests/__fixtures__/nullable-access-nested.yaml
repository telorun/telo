kind: Telo.Library
metadata:
  name: NullableAccessNestedFixture
  version: 1.0.0
imports:
  Run: ../..
---
# A finally nested inside a catch: the innermost branch governs, so error is
# nullable there — unguarded error.code must still be flagged even though the
# catch (non-null) branch encloses it.
kind: Run.Sequence
metadata:
  name: NestedFinally
steps:
  - name: outer
    try:
      - name: work
        invoke:
          kind: Run.Value
          value: 1
    catch:
      - name: inner
        try:
          - name: more
            invoke:
              kind: Run.Value
              value: 1
        finally:
          - name: cleanup
            throw:
              code: "${{ error.code }}"
              message: "done"
