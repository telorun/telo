kind: Kernel.Module
metadata:
  name: sql
  namespace: std
  version: 0.1.0
  description: SQL database access — PostgreSQL and SQLite
---
kind: Kernel.Definition
metadata:
  name: Connection
capability: Kernel.Provider
controllers:
  - pkg:npm/@telorun/sql@>=1.0.0?local_path=./nodejs#sql-connection
schema:
  type: object
  required:
    - driver
  properties:
    driver:
      type: string
      enum: [postgres, sqlite]
      description: Database driver
    connectionString:
      type: string
      description: PostgreSQL connection URL (e.g. postgres://user:pass@host/db)
    host:
      type: string
      description: PostgreSQL host
    port:
      type: integer
      default: 5432
      description: PostgreSQL port
    database:
      type: string
      description: PostgreSQL database name
    user:
      type: string
      description: PostgreSQL user
    password:
      type: string
      description: PostgreSQL password
    ssl:
      type: boolean
      default: false
      description: Enable SSL for PostgreSQL
    file:
      type: string
      description: SQLite file path or ':memory:'
    pool:
      type: object
      properties:
        min:
          type: integer
          default: 1
        max:
          type: integer
          default: 10
        idleTimeoutMs:
          type: integer
        connectionTimeoutMs:
          type: integer
---
kind: Kernel.Definition
metadata:
  name: Query
capability: Kernel.Invocable
controllers:
  - pkg:npm/@telorun/sql@>=1.0.0?local_path=./nodejs#sql-query
schema:
  type: object
  properties:
    connection:
      x-telo-ref: "std/sql#Connection"
    transaction:
      x-telo-ref: "std/sql#Transaction"
    inputs:
      type: object
      properties:
        sql:
          type: string
          description: SQL query text; may contain CEL template expressions
        bindings:
          type: array
          description: Positional parameters bound to ? placeholders in the SQL string
      required: [sql]
---
kind: Kernel.Definition
metadata:
  name: Exec
capability: Kernel.Invocable
controllers:
  - pkg:npm/@telorun/sql@>=1.0.0?local_path=./nodejs#sql-exec
schema:
  type: object
  properties:
    connection:
      x-telo-ref: "std/sql#Connection"
    transaction:
      x-telo-ref: "std/sql#Transaction"
    inputs:
      type: object
      properties:
        sql:
          type: string
          description: SQL statement text; may contain CEL template expressions
        bindings:
          type: array
          description: Positional parameters bound to ? placeholders in the SQL string
      required: [sql]
---
kind: Kernel.Definition
metadata:
  name: Transaction
capability: Kernel.Invocable
controllers:
  - pkg:npm/@telorun/sql@>=1.0.0?local_path=./nodejs#sql-transaction
schema:
  type: object
  required:
    - connection
    - steps
  properties:
    connection:
      x-telo-ref: "std/sql#Connection"
    steps:
      x-telo-ref: "kernel#Invocable"
    bindings:
      type: object
      description: Forwarded to the steps resource at invoke time; may contain CEL template expressions
---
kind: Kernel.Definition
metadata:
  name: Migration
capability: Kernel.Provider
controllers:
  - pkg:npm/@telorun/sql@>=1.0.0?local_path=./nodejs#sql-migration
schema:
  type: object
  required: [sql]
  properties:
    sql:
      type: string
      description: SQL statement(s) to execute for this migration
---
kind: Kernel.Definition
metadata:
  name: Migrations
capability: Kernel.Runnable
controllers:
  - pkg:npm/@telorun/sql@>=1.0.0?local_path=./nodejs#sql-migrations
schema:
  type: object
  required: [connection]
  properties:
    connection:
      x-telo-ref: "std/sql#Connection"
