kind: Kernel.Module
metadata:
  name: "javascript"
  namespace: std
  version: "0.2.0"
---
kind: "Kernel.Definition"
metadata:
  name: "Script"
extends: Kernel.Runnable
controllers:
  - pkg:npm/@telorun/javascript@>=0.2.0?local_path=./nodejs#script
schema:
  type: "object"
  properties:
    metadata:
      type: "object"
      properties:
        name:
          type: "string"
      required: ["name"]
    code:
      type: "string"
    inputSchema:
      type: "object"
    outputSchema:
      type: "object"
  required: ["metadata", "code"]
