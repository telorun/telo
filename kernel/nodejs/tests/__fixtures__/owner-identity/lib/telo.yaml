kind: Telo.Library
metadata:
  name: owner-identity-lib
  version: 1.0.0
exports:
  kinds:
    - Boxed
imports:
  Run: ../../../../../../modules/run
---
kind: Telo.Definition
metadata:
  name: Boxed
  description: >-
    Test fixture: a provider template whose child resource has a FIXED name, so
    two instances both spawn a child called `inner` — exercises owner-identity
    resolution of the resulting name collision.
capability: Telo.Provider
schema:
  type: object
  required: [ value ]
  additionalProperties: true
  # A `{kind, name}`-shaped value in a schema example is documentation data, not a
  # `!ref` — the dependency-edge collector must not treat it as a real dependency.
  examples:
    - value: a
      ref:
        kind: Demo.Thing
        name: phantom
  properties:
    value: { type: string }
resources:
  # A fixed child name (not derived from self.name), so two Boxed instances both
  # spawn a child called `inner` — the collision the owner identity must resolve.
  - kind: Run.Value
    metadata:
      name: inner
    value:
      echoed: !cel "self.value"
provide:
  kind: Run.Value
  name: inner
