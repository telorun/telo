kind: Kernel.Module
metadata:
  name: ConsoleConfigExample
targets:
  - ConsoleConfigExampleFlow
---
kind: Kernel.Import
metadata:
  name: Config
source: ../modules/config
---
kind: Kernel.Import
metadata:
  name: Console
source: ../modules/console
---
kind: Kernel.Import
metadata:
  name: Run
source: ../modules/run
---
kind: Run.Sequence
metadata:
  name: ConsoleConfigExampleFlow
steps:
  - name: ReadUsername
    invoke:
      kind: Console.ReadLine
      metadata:
        name: ReadUsername
      prompt: Username
  - name: ReadPassword
    invoke:
      kind: Console.ReadLine
      metadata:
        name: ReadPassword
      prompt: Password
  - name: WriteResult
    invoke:
      kind: Console.WriteLine
      metadata:
        name: Result
      output: "Username: ${{ steps.ReadUsername.result.value }}, Password: ${{ steps.ReadPassword.result.value }}"
