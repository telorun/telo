kind: Telo.Application
metadata:
  name: HelloApiExample
  version: 1.0.0
  description: |
    Simplest possible HTTP API: a single `GET /v1/hello?name=…` route backed
    by a typed `JS.Script`. Shows how `Http.Server` mounts an `Http.Api`, how
    the request schema feeds a CEL expression on `inputs`, and how the
    script's output flows into the response body via `result.*`.

    Run, then:
        curl 'http://localhost:8845/v1/hello?name=World'
imports:
  Type: ../modules/type
  Http: ../modules/http-server
  JS: ../modules/javascript
targets:
  - ExampleServer
ports:
  http:
    env: PORT
    protocol: tcp
    default: 8845
---
kind: Http.Server
metadata:
  name: ExampleServer
baseUrl: http://localhost:${{ ports.http }}
port: !cel "ports.http"
logger: true
openapi:
  info:
    title: Hello server
    version: 1.0.0
mounts:
  - path: /v1
    type: Http.Api.HelloApi
---
kind: Http.Api
metadata:
  name: HelloApi
routes:
  - request:
      path: /hello
      method: GET
      schema:
        query:
          type: object
          properties:
            name:
              type: string
          required: [ "name" ]
    handler:
      kind: JS.Script
      name: SayHello
    inputs:
      name: "${{ request.query.name }}" # CEL expression
    returns:
      - status: 200
        content:
          application/json:
            schema:
              type: object
              properties:
                greeting: { type: string }
                nice: { type: string }
              required: [ greeting, nice ]
              additionalProperties: false
            body:
              greeting: "${{ result.message }}!"
              nice: "WOW"
---
kind: JS.Script
metadata:
  name: SayHello
code: |
  function main({ name }) {
    return {
      message: `Hello ${name}!`,
    }
  };
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      name: { type: string }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      message: { type: string }
