kind: Telo.Application
metadata:
  name: FeedbackApi
  version: 1.0.0
  description: |
    A complete feedback collection REST API — no code, pure YAML.
    Persists entries to SQLite and serves them over HTTP.
targets:
  - SetupDb
  - Server
---
kind: Telo.Import
metadata:
  name: Http
source: ../../modules/http-server
---
kind: Telo.Import
metadata:
  name: Sql
source: ../../modules/sql
---
kind: Telo.Import
metadata:
  name: Run
source: ../../modules/run
---
# SQLite database — swap driver/host/database for PostgreSQL with zero YAML changes
kind: Sql.Connection
metadata:
  name: Db
  module: FeedbackApi
driver: sqlite
file: /tmp/feedback.db
---
# Startup migration: runs once before the server accepts requests
kind: Run.Sequence
metadata:
  name: SetupDb
  module: FeedbackApi
steps:
  - name: CreateTable
    invoke:
      kind: Sql.Exec
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      sql: |
        CREATE TABLE IF NOT EXISTS feedback (
          id        INTEGER PRIMARY KEY AUTOINCREMENT,
          text      TEXT    NOT NULL,
          source    TEXT,
          score     INTEGER NOT NULL DEFAULT 0,
          created_at DATETIME DEFAULT CURRENT_TIMESTAMP
        )
---
kind: Http.Server
metadata:
  name: Server
  module: FeedbackApi
baseUrl: http://localhost:8844
port: 8844
logger: false
openapi:
  info:
    title: Feedback API
    version: 1.0.0
mounts:
  - path: /v1
    type: Http.Api.FeedbackRoutes
---
kind: Http.Api
metadata:
  name: FeedbackRoutes
  module: FeedbackApi
routes:
  # POST /v1/feedback — insert a new entry, score derived from body length heuristic
  - request:
      path: /feedback
      method: POST
      schema:
        body:
          type: object
          properties:
            text:
              type: string
              minLength: 1
            source:
              type: string
          required: [text]
    handler:
      kind: Sql.Exec
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      sql: "INSERT INTO feedback (text, source, score) VALUES (?, ?, ?)"
      bindings:
        - "${{ request.body.text }}"
        - "${{ request.body.source }}"
        - "${{ size(request.body.text) }}"
    returns:
      - status: 201
        headers:
          Content-Type: application/json
        body:
          ok: true
          message: Feedback received

  # GET /v1/feedback — list all entries, newest first
  - request:
      path: /feedback
      method: GET
    handler:
      kind: Sql.Query
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      sql: "SELECT id, text, source, score, created_at FROM feedback ORDER BY created_at DESC"
    returns:
      - status: 200
        headers:
          Content-Type: application/json
        body: "${{ result.rows }}"

  # GET /v1/feedback/{id} — fetch a single entry
  - request:
      path: /feedback/{id}
      method: GET
      schema:
        params:
          type: object
          properties:
            id:
              type: integer
          required: [id]
    handler:
      kind: Sql.Query
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      sql: "SELECT id, text, source, score, created_at FROM feedback WHERE id = ?"
      bindings:
        - "${{ request.params.id }}"
    returns:
      - status: 200
        when: "${{ size(result.rows) > 0 }}"
        headers:
          Content-Type: application/json
        body: "${{ result.rows[0] }}"
      - status: 404
        headers:
          Content-Type: application/json
        body:
          ok: false
          message: Not found
