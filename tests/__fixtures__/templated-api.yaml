kind: Telo.Library
metadata:
  name: templated-server
  version: 1.0.0
imports:
  Http: ../../modules/http-server
  Run: ../../modules/run
exports:
  # `HelloApi` is a resource instance (`kind: Http.Api`), not a kind — it belongs in
  # `resources:`, as its non-fixture twin (examples/templated-api/library.yaml) has it.
  # Under `kinds:` it declared a gate exporting zero real kinds.
  resources:
    - HelloApi
---
kind: Http.Api
metadata:
  name: HelloApi
routes:
  - request:
      path: /hello
      method: GET
      schema:
        query:
          type: object
          properties:
            name:
              type: string
          required: [ "name" ]
    handler: !ref SayHello
    inputs:
      name: "${{ request.query.name }}" # CEL expression
    returns:
      - status: 200
        content:
          application/json:
            schema:
              type: object
              properties:
                greeting: { type: string }
                nice: { type: string }
              required: [ greeting, nice ]
              additionalProperties: false
            body:
              greeting: "${{ result.message }}!"
              nice: "WOW"
---
kind: Run.Value
metadata:
  name: SayHello
inputs:
  name: { type: string }
value:
  message: !cel "'Hello ' + inputs.name + '!'"
---
