apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "telo-k8s-runner.name" . }}
  namespace: {{ .Values.runnerNamespace }}
  labels:
    {{- include "telo-k8s-runner.labels" . | nindent 4 }}
spec:
  # Single replica is REQUIRED — the session registry is in-memory and the
  # runner reaps orphaned pods on boot; two replicas would double-manage pods.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "telo-k8s-runner.name" . }}
  template:
    metadata:
      labels:
        {{- include "telo-k8s-runner.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "telo-k8s-runner.name" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: runner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The runner holds the cluster API credentials — it is the highest-value
          # target, so it gets the same container hardening as session pods.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.runner.terms.enabled }}
            - name: terms
              mountPath: /etc/telo/terms
              readOnly: true
            {{- end }}
          ports:
            - containerPort: {{ .Values.runner.port }}
          env:
            - name: PORT
              value: "{{ .Values.runner.port }}"
            - name: LOG_LEVEL
              value: "{{ .Values.runner.logLevel }}"
            {{- if .Values.runner.displayName }}
            - name: RUNNER_DISPLAY_NAME
              value: {{ .Values.runner.displayName | quote }}
            {{- end }}
            {{- if .Values.runner.description }}
            - name: RUNNER_DESCRIPTION
              value: {{ .Values.runner.description | quote }}
            {{- end }}
            {{- if .Values.apps.catalogSecret }}
            - name: RUNNER_APPS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apps.catalogSecret | quote }}
                  key: {{ .Values.apps.catalogSecretKey | quote }}
            {{- else if .Values.apps.catalog }}
            - name: RUNNER_APPS
              value: {{ .Values.apps.catalog | quote }}
            {{- end }}
            - name: RUNNER_MAX_SESSIONS
              value: "{{ .Values.runner.maxSessions }}"
            - name: RUNNER_SELF_URL
              value: {{ include "telo-k8s-runner.selfUrl" . | quote }}
            - name: RUNNER_SESSION_NAMESPACE
              value: {{ .Values.sessionNamespace | quote }}
            - name: RUNNER_IMAGE
              value: {{ .Values.session.image | quote }}
            - name: RUNNER_INIT_IMAGE
              value: {{ .Values.session.initImage | quote }}
            - name: RUNNER_BASE_IMAGE_CATALOG_ENABLED
              value: "{{ .Values.session.baseImages.enabled }}"
            {{- if .Values.session.baseImages.enabled }}
            - name: RUNNER_BASE_IMAGE_REPO
              value: {{ .Values.session.baseImages.repository | quote }}
            - name: RUNNER_BASE_IMAGE_PINNED_ONLY
              value: "{{ .Values.session.baseImages.pinnedOnly }}"
            - name: RUNNER_BASE_IMAGE_EXCLUDE_SHA
              value: "{{ .Values.session.baseImages.excludeSha }}"
            - name: RUNNER_BASE_IMAGE_EXCLUDE_PRERELEASE
              value: "{{ .Values.session.baseImages.excludePrerelease }}"
            {{- if .Values.session.baseImages.include }}
            - name: RUNNER_BASE_IMAGE_INCLUDE
              value: {{ .Values.session.baseImages.include | quote }}
            {{- end }}
            {{- if .Values.session.baseImages.exclude }}
            - name: RUNNER_BASE_IMAGE_EXCLUDE
              value: {{ .Values.session.baseImages.exclude | quote }}
            {{- end }}
            - name: RUNNER_BASE_IMAGE_LIMIT
              value: "{{ .Values.session.baseImages.limit }}"
            - name: RUNNER_BASE_IMAGE_REFRESH_SECONDS
              value: "{{ .Values.session.baseImages.refreshSeconds }}"
            {{- end }}
            {{- $repo := include "telo-k8s-runner.imageRepository" . }}
            {{- if not $repo }}
            {{- fail "set build.repository or registry.enabled — the runner prebuilds session images and requires an image registry" }}
            {{- end }}
            - name: RUNNER_IMAGE_REPOSITORY
              value: {{ $repo | quote }}
            - name: RUNNER_BUILD_NAMESPACE
              value: {{ .Values.build.namespace | quote }}
            - name: RUNNER_BUILDER_IMAGE
              value: {{ .Values.build.builderImage | quote }}
            - name: RUNNER_BUILD_TIMEOUT_SECONDS
              value: "{{ .Values.build.timeoutSeconds }}"
            - name: RUNNER_REGISTRY_INSECURE
              value: "{{ .Values.build.insecureRegistry }}"
            - name: TELO_REGISTRY_URL
              value: {{ .Values.build.teloRegistryUrl | quote }}
            {{- $apiUrl := include "telo-k8s-runner.registryApiUrl" . }}
            {{- if $apiUrl }}
            - name: RUNNER_REGISTRY_API_URL
              value: {{ $apiUrl | quote }}
            {{- end }}
            {{- $push := include "telo-k8s-runner.pushSecretName" . }}
            {{- if $push }}
            - name: RUNNER_REGISTRY_PUSH_SECRET
              value: {{ $push | quote }}
            {{- end }}
            {{- $pull := include "telo-k8s-runner.pullSecretName" . }}
            {{- if $pull }}
            - name: RUNNER_IMAGE_PULL_SECRET
              value: {{ $pull | quote }}
            {{- end }}
            {{- if .Values.session.runtimeClass }}
            - name: RUNNER_RUNTIME_CLASS
              value: {{ .Values.session.runtimeClass | quote }}
            {{- end }}
            {{- if .Values.sessionIngress.baseDomain }}
            - name: SESSION_INGRESS_BASE_DOMAIN
              value: {{ .Values.sessionIngress.baseDomain | quote }}
            {{- end }}
            {{- if .Values.sessionIngress.className }}
            - name: SESSION_INGRESS_CLASS
              value: {{ .Values.sessionIngress.className | quote }}
            {{- end }}
            {{- $sessionIngressTls := include "telo-k8s-runner.sessionIngressTlsSecretName" . }}
            {{- if $sessionIngressTls }}
            - name: SESSION_INGRESS_TLS_SECRET
              value: {{ $sessionIngressTls | quote }}
            {{- end }}
            - name: RUNNER_MAX_CPU
              value: {{ .Values.limits.maxCpu | quote }}
            - name: RUNNER_MAX_MEMORY
              value: {{ .Values.limits.maxMemory | quote }}
            - name: RUNNER_MAX_TTL_SECONDS
              value: "{{ .Values.limits.maxTtlSeconds }}"
            - name: RUNNER_MAX_EPHEMERAL_STORAGE
              value: {{ .Values.limits.maxEphemeralStorage | quote }}
            {{- if .Values.runner.terms.enabled }}
            - name: RUNNER_TERMS_FILE
              value: /etc/telo/terms/terms.md
            - name: RUNNER_TERMS_TITLE
              value: {{ .Values.runner.terms.title | quote }}
            {{- if .Values.runner.terms.version }}
            - name: RUNNER_TERMS_VERSION
              value: {{ .Values.runner.terms.version | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.runner.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.runner.port }}
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.runner.port }}
            initialDelaySeconds: 5
            periodSeconds: 20
      volumes:
        # Writable scratch so readOnlyRootFilesystem doesn't break the runtime.
        - name: tmp
          emptyDir: {}
        {{- if .Values.runner.terms.enabled }}
        - name: terms
          configMap:
            name: {{ include "telo-k8s-runner.name" . }}-terms
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "telo-k8s-runner.name" . }}
  namespace: {{ .Values.runnerNamespace }}
  labels:
    {{- include "telo-k8s-runner.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "telo-k8s-runner.name" . }}
  ports:
    - name: http
      port: {{ .Values.runner.port }}
      targetPort: {{ .Values.runner.port }}
