kind: Telo.Application
metadata:
  name: PdfRasterizerSmokeTest
  version: 1.0.0
  description: |
    Smoke test for Pdf.Rasterizer — renders page 1 of the hermetic two-page
    fixture PDF at scale 2 and asserts the rendered dimensions (300×200 pt →
    600×400 px), the page count, the reported scale, and the PNG magic bytes.
    Further sequences assert that out-of-range pages — above the page count
    and below 1 — raise ERR_INVALID_INPUT.
imports:
  Pdf: ../
  Fixture: ./__fixtures__/sample-form.yaml
  JS: ../../javascript
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestRenderPage
  - !ref TestJpegFormat
  - !ref TestPageOutOfRange
  - !ref TestPageBelowOne
---
kind: Pdf.Rasterizer
metadata: { name: Render }
scale: 2
---
kind: JS.Script
metadata: { name: DetectFormat }
code: |
  async function main(input) {
    const b = input.image;
    const png = b[0] === 0x89 && b[1] === 0x50 && b[2] === 0x4e && b[3] === 0x47;
    const jpeg = b[0] === 0xff && b[1] === 0xd8;
    return { magic: png ? "png" : jpeg ? "jpeg" : "other" };
  }
---
kind: Run.Sequence
metadata: { name: TestRenderPage }
steps:
  - name: Fixture
    invoke: !ref Fixture.SampleFormPdf
  - name: Render
    inputs:
      data: "${{ steps.Fixture.result.data }}"
      page: 1
    invoke: !ref Render
  - name: AssertDimensions
    inputs:
      width: "${{ steps.Render.result.width }}"
      height: "${{ steps.Render.result.height }}"
      pageCount: "${{ steps.Render.result.pageCount }}"
      scale: "${{ steps.Render.result.scale }}"
      mediaType: "${{ steps.Render.result.mediaType }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          width: { const: 600 }
          height: { const: 400 }
          pageCount: { const: 2 }
          scale: { const: 2 }
          mediaType: { const: image/png }
        required: [ width, height, pageCount, scale, mediaType ]
  - name: Detect
    inputs:
      image: "${{ steps.Render.result.image }}"
    invoke: !ref DetectFormat
  - name: AssertPng
    inputs:
      magic: "${{ steps.Detect.result.magic }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          magic: { const: png }
        required: [ magic ]
---
kind: Run.Sequence
metadata: { name: TestJpegFormat }
steps:
  - name: Fixture
    invoke: !ref Fixture.SampleFormPdf
  - name: Render
    inputs:
      data: "${{ steps.Fixture.result.data }}"
      page: 1
      format: jpeg
      quality: 70
    invoke: !ref Render
  - name: Detect
    inputs:
      image: "${{ steps.Render.result.image }}"
    invoke: !ref DetectFormat
  - name: AssertJpeg
    inputs:
      mediaType: "${{ steps.Render.result.mediaType }}"
      magic: "${{ steps.Detect.result.magic }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          mediaType: { const: image/jpeg }
          magic: { const: jpeg }
        required: [ mediaType, magic ]
---
kind: Run.Sequence
metadata: { name: TestPageOutOfRange }
steps:
  - name: Fixture
    invoke: !ref Fixture.SampleFormPdf
  - name: TryRender
    try:
      - name: Render
        inputs:
          data: "${{ steps.Fixture.result.data }}"
          page: 9
        invoke: !ref Render
    catch:
      - name: Caught
        inputs:
          code: "${{ error.code }}"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              code: { const: ERR_INVALID_INPUT }
            required: [ code ]
---
kind: Run.Sequence
metadata: { name: TestPageBelowOne }
steps:
  - name: Fixture
    invoke: !ref Fixture.SampleFormPdf
  - name: TryRender
    try:
      - name: Render
        inputs:
          data: "${{ steps.Fixture.result.data }}"
          page: 0
        invoke: !ref Render
    catch:
      - name: Caught
        inputs:
          code: "${{ error.code }}"
        invoke:
          kind: Assert.Schema
          schema:
            type: object
            properties:
              code: { const: ERR_INVALID_INPUT }
            required: [ code ]
