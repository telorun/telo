kind: Kernel.Module
metadata:
  name: ExampleConsole
  version: 1.0.0
variables:
  product:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      price:
        type: number
      inStock:
        type: boolean
    required: ["id", "name", "price", "inStock"]
secrets:
  password:
    type: string
---
kind: Kernel.Import
metadata:
  name: Flow
  module: ExampleConsole
source: ../modules/flow
---
kind: Kernel.Import
metadata:
  name: Console
  module: ExampleConsole
source: ../modules/console
---
kind: Flow.Steps
metadata:
  name: Main
  module: ExampleConsole
trigger:
  event: Kernel.Started
steps:
  - invoke:
      name: Result
      kind: Console.WriteLine
      metadata:
        name: Result
        module: ExampleConsole
      output: "Product name: ${{ variables.product.name }}, Password: ${{ secrets.password }}"
