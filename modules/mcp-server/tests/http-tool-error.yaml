kind: Telo.Application
metadata: { name: McpHttpToolErrorTest, version: 1.0.0 }
targets: [TestRun]
---
kind: Telo.Import
metadata: { name: Mcp }
source: ../
---
kind: Telo.Import
metadata: { name: Http }
source: ../../http-server
---
kind: Telo.Import
metadata: { name: JS }
source: ../../javascript
---
kind: Telo.Import
metadata: { name: Type }
source: ../../type
---
kind: Telo.Import
metadata: { name: Run }
source: ../../run
---
kind: Telo.Import
metadata: { name: Assert }
source: ../../assert
---
# Same hand-rolled MCP client as http-tool-call.yaml. Inlined because
# resources defined in an imported library aren't visible to the parent
# module — only kinds are exported.
kind: JS.Script
metadata: { name: McpFetch }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      url:    { type: string }
      method: { type: string }
      params: { type: object, additionalProperties: true }
    required: [url, method]
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      status:    { type: integer }
      result:    { type: object, additionalProperties: true }
      error:     { type: object, additionalProperties: true }
      hasError:  { type: boolean }
    required: [status, hasError]
code: |
  async function main({ url, method, params }) {
    const initResp = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json, text/event-stream",
      },
      body: JSON.stringify({
        jsonrpc: "2.0", id: 1, method: "initialize",
        params: { protocolVersion: "2024-11-05", capabilities: {}, clientInfo: { name: "telo-test", version: "1.0.0" } },
      }),
    });
    // Stateful endpoints return an Mcp-Session-Id; stateless ones don't.
    const sessionId = initResp.headers.get("mcp-session-id");
    const sessionHeader = sessionId ? { "Mcp-Session-Id": sessionId } : {};
    await initResp.text();
    await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json, text/event-stream", ...sessionHeader },
      body: JSON.stringify({ jsonrpc: "2.0", method: "notifications/initialized" }),
    }).then((r) => r.text());
    const callResp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json, text/event-stream", ...sessionHeader },
      body: JSON.stringify({ jsonrpc: "2.0", id: 2, method, params: params || {} }),
    });
    const ct = (callResp.headers.get("content-type") || "").toLowerCase();
    const raw = await callResp.text();
    let payload;
    if (ct.startsWith("application/json")) {
      payload = JSON.parse(raw);
    } else {
      const dataLines = raw.split(/\r?\n/).filter((l) => l.startsWith("data:")).map((l) => l.slice(5).trimStart());
      if (!dataLines.length) throw new Error(`MCP no data lines: ${raw}`);
      payload = JSON.parse(dataLines[0]);
    }
    return {
      status: callResp.status,
      hasError: !!payload.error,
      result: payload.result || {},
      error: payload.error || {},
    };
  }
---
# Handler unconditionally throws an InvokeError. The catches: entry maps the
# `not_found` Telo error code to JSON-RPC error -32001.
kind: Run.Sequence
metadata: { name: ThrowsNotFoundImpl }
throws:
  - code: not_found
steps:
  - name: bail
    throw:
      code: not_found
      message: "city is unknown"
---
kind: Mcp.Tools
metadata: { name: WeatherTools }
entries:
  - name: get_weather
    description: Throws not_found for any city.
    argumentsSchema:
      type: object
      properties:
        city: { type: string }
      required: [city]
    handler: { kind: Run.Sequence, name: ThrowsNotFoundImpl }
    inputs:
      city: "${{ request.arguments.city }}"
    result:
      content:
        - type: text
          text: unreachable
    catches:
      - code: not_found
        error:
          code: -32001
          message: "${{ error.message }}"
---
kind: Mcp.HttpEndpoint
metadata: { name: McpHttp }
serverInfo: { name: telo-test-mcp, version: 1.0.0 }
tools: [WeatherTools]
---
kind: Run.Sequence
metadata: { name: TestRun }
with:
  - kind: Http.Server
    metadata: { name: Server }
    host: 127.0.0.1
    port: 8952
    baseUrl: http://127.0.0.1:8952
    logger: false
    mounts:
      - { path: /mcp, type: McpHttpToolErrorTest.McpHttp }
targets: [Server]
steps:
  - name: CallGetWeather
    inputs:
      url: http://127.0.0.1:8952/mcp
      method: tools/call
      params: { name: get_weather, arguments: { city: Atlantis } }
    invoke: { kind: JS.Script, name: McpFetch }
  - name: AssertResponse
    inputs:
      hasError: "${{ steps.CallGetWeather.result.hasError }}"
      errorCode: "${{ steps.CallGetWeather.result.error.code }}"
      errorMessage: "${{ steps.CallGetWeather.result.error.message }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          hasError: { const: true }
          errorCode: { const: -32001 }
          errorMessage: { const: "city is unknown" }
        required: [hasError, errorCode, errorMessage]
