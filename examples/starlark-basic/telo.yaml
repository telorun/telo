kind: Telo.Application
metadata:
  name: StarlarkDemo
  version: 1.0.0
  description: A demo showcasing a Starlark script run from flat `targets`.
imports:
  Type: oci://ghcr.io/telorun/type@0.8.0#sha256-z56gxs4HbdWHlUWWvLRFFHPy5wX52SU5A1Fo61s20-g
  Starlark: oci://ghcr.io/telorun/starlark@0.8.0#sha256-wzyRBWgGIZsLLCMkAlaBiKV8p_akXPkGoZhs6g9knAY
  Console: oci://ghcr.io/telorun/console@0.12.0#sha256-Ac-5GQaSaOs5uH4jEELH1MLOACS5g0IFK0w21YeBmXY
targets:
  - name: Step1
    invoke: !ref ExampleStarlarkScript
    inputs:
      value: 42
  - name: Step2
    invoke: !ref Console.writeLine
    inputs:
      output: |
        Evaluated starlark code.
        Result is: ${{ steps.Step1.result.result }}
---
kind: Starlark.Script
metadata:
  name: ExampleStarlarkScript
code: |
  def run(input):
    result = input["value"] * 2
    return {"result": result}
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      value: { type: number }
    required: [ value ]
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      result: { type: number }
    required: [ result ]
