kind: Telo.Application
metadata:
  name: TextStreamStreamingContractTest
  version: 1.0.0
  description: |
    Layer 1 hermetic streaming-contract test — exercises Ai.TextStream paired
    with each shipped format-codec encoder, asserts byte-exact wire output for
    a deterministic prompt. No HTTP, no live provider; the AiEcho fixture echoes
    the prompt one character at a time. Three sub-targets, one per encoder
    (NDJSON / SSE / PlainText). Step names unique across sequences so the
    inline-resource synthetic naming doesn't collide.
imports:
  Ai: ../
  AiEcho: ./__fixtures__/ai-echo.yaml
  Ndjson: ../../ndjson-codec
  Sse: ../../sse-codec
  PlainText: ../../plain-text-codec
  Run: ../../run
  Assert: ../../assert
targets:
  - !ref TestNdjson
  - !ref TestSse
  - !ref TestPlain
---
kind: AiEcho.EchoModel
metadata: { name: Echo }
---
kind: Ai.TextStream
metadata: { name: ChatStream }
model: !ref Echo
---
kind: Ndjson.Encoder
metadata: { name: NdjsonEnc }
---
kind: Sse.Encoder
metadata: { name: SseEnc }
---
kind: PlainText.Encoder
metadata: { name: PlainEnc }
---
kind: PlainText.Decoder
metadata: { name: TextDec }
---
kind: Run.Sequence
metadata: { name: TestNdjson }
steps:
  - name: NdjsonStream
    inputs: { prompt: "hi" }
    invoke: !ref ChatStream
  - name: NdjsonEncode
    inputs:
      input: "${{ steps.NdjsonStream.result.output }}"
    invoke: !ref NdjsonEnc
  - name: NdjsonDecode
    inputs:
      input: "${{ steps.NdjsonEncode.result.output }}"
    invoke: !ref TextDec
  - name: NdjsonAssert
    inputs:
      text: "${{ steps.NdjsonDecode.result.text }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text:
            const: |
              {"type":"text-delta","delta":"h"}
              {"type":"text-delta","delta":"i"}
              {"type":"finish","usage":{"promptTokens":0,"completionTokens":0,"totalTokens":0},"finishReason":"stop"}
        required: [ text ]
---
kind: Run.Sequence
metadata: { name: TestSse }
steps:
  - name: SseStream
    inputs: { prompt: "hi" }
    invoke: !ref ChatStream
  - name: SseEncode
    inputs:
      input: "${{ steps.SseStream.result.output }}"
    invoke: !ref SseEnc
  - name: SseDecode
    inputs:
      input: "${{ steps.SseEncode.result.output }}"
    invoke: !ref TextDec
  - name: SseAssert
    inputs:
      text: "${{ steps.SseDecode.result.text }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          text:
            const: "event: text-delta\ndata: {\"delta\":\"h\"}\n\nevent: text-delta\ndata: {\"delta\":\"i\"}\n\nevent: finish\ndata: {\"usage\":{\"promptTokens\":0,\"completionTokens\":0,\"totalTokens\":0},\"finishReason\":\"stop\"}\n\n"
        required: [ text ]
---
kind: Run.Sequence
metadata: { name: TestPlain }
steps:
  - name: PlainStream
    inputs: { prompt: "hi" }
    invoke: !ref ChatStream
  - name: PlainEncode
    inputs:
      input: "${{ steps.PlainStream.result.output }}"
    invoke: !ref PlainEnc
  - name: PlainDecode
    inputs:
      input: "${{ steps.PlainEncode.result.output }}"
    invoke: !ref TextDec
  - name: PlainAssert
    inputs:
      text: "${{ steps.PlainDecode.result.text }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          # PlainText.Encoder takes {delta} from text-delta parts and drops
          # finish parts; output is the echoed text only.
          text: { const: "hi" }
        required: [ text ]
