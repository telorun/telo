kind: Telo.Application
metadata:
  name: CanImportModuleWithAlias
  version: 1.0.0
imports:
  MyTiny:
    source: ./__fixtures__/tiny-module.yaml
    variables:
      product:
        id: "123e4567-e89b-12d3-a456-426614174000"
        name: "Test Product"
        price: 19.99
        inStock: true
    secrets:
      password: "supersecret"
  MyAssert: ../modules/assert
targets:
  - VerifyTinyModuleContext
---
kind: MyAssert.ModuleContext
metadata:
  name: VerifyTinyModuleContext
resources:
  MyTiny:
    variables:
      product:
        id: "123e4567-e89b-12d3-a456-426614174000"
        name: "Test Product"
        price: 19.99
        inStock: true
    secrets:
      password: "supersecret"
