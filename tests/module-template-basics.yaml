kind: Telo.Application
metadata:
  name: Test
imports:
  Http: ../modules/http-server
  TemplatingBasics:
    source: ./__fixtures__/templated-api.yaml
    variables:
      port: 4444
      title: "Templating Basics"
      version: "1.0.0"
      mount:
        - path: /status
          type: Http.Api.StatusApi
---
kind: Http.Api
metadata:
  name: StatusApi
routes:
  - request:
      path: /status
      method: GET
    returns:
      - status: 200
        content:
          application/json:
            body:
              status: "ok"
