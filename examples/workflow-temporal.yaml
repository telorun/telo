kind: Kernel.Module
metadata:
  name: example
  version: 1.0.0
targets:
  - DataSyncWorkflow
---
kind: Kernel.Import
metadata:
  name: Type
source: ../modules/type
---
kind: Kernel.Import
metadata:
  name: Workflow
source: ../modules/workflow
---
kind: Kernel.Import
metadata:
  name: Temporal
source: ../modules/workflow-temporal
---
kind: Kernel.Import
metadata:
  name: JS
source: ../modules/javascript
---
kind: Temporal.Backend
metadata:
  name: TemporalProd
address: localhost:7233
namespace: default
---
kind: JS.Script
metadata:
  name: FetchData
code: |
  async function main({ url }) {
    const res = await fetch(url);
    return { data: await res.json() };
  }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      url: { type: string }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      data: { type: object }
---
kind: JS.Script
metadata:
  name: TransformData
code: |
  function main({ data }) {
    return { result: data.items.map(i => i.id) };
  }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      data: { type: object }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      result: { type: array }
---
kind: Workflow.Graph
metadata:
  name: DataSyncWorkflow
backend:
  kind: Temporal.Backend
  name: TemporalProd
nodes:
  - name: Fetch
    invoke:
      kind: JS.Script
      name: FetchData
    options:
      scheduleToCloseTimeout: 30s
      retryPolicy:
        maxAttempts: 3
  - name: Transform
    invoke:
      kind: JS.Script
      name: TransformData
    options:
      scheduleToCloseTimeout: 10s
