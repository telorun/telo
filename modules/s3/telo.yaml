kind: Telo.Library
metadata:
  name: s3
  namespace: std
  version: 0.6.1
  description: >-
    S3-compatible object storage (AWS S3, Cloudflare R2, MinIO, RustFS).
    `S3.Bucket` configures a bucket handle; `S3.Put`, `S3.Get` (streams object
    bytes), `S3.List`, `S3.Delete`, and `S3.PresignedUrl` (time-limited
    download/upload links) operate on it.
exports:
  kinds:
    - Bucket
    - List
    - Put
    - Get
    - Delete
    - PresignedUrl
---
kind: Telo.Definition
metadata:
  name: Bucket
capability: Telo.Provider
controllers:
  - pkg:npm/@telorun/s3@0.5.1?local_path=./nodejs#s3-bucket
schema:
  type: object
  examples:
    - bucketName: my-bucket
      endpoint: https://s3.us-east-1.amazonaws.com
      accessKeyId: "${{ secrets.accessKeyId }}"
      secretAccessKey: "${{ secrets.secretAccessKey }}"
      forcePathStyle: false
      createIfMissing: false
  properties:
    bucketName:
      title: Bucket Name
      type: string
      description: Bucket name
    endpoint:
      title: Endpoint
      type: string
      description: S3-compatible endpoint URL (e.g. https://<accountId>.r2.cloudflarestorage.com)
    forcePathStyle:
      title: Force Path Style
      type: boolean
      description: Use path-style URLs (required for MinIO, RustFS, and other self-hosted S3)
    createIfMissing:
      title: Create If Missing
      type: boolean
      description: Create the bucket during init if it does not already exist. Intended for self-hosted/dev backends; leave false for managed clouds where the app lacks CreateBucket permission.
    publicRead:
      title: Public Read
      type: boolean
      description: When true, apply a bucket policy during init that grants anonymous s3:GetObject on all keys. Portable across AWS S3, MinIO, and RustFS via PutBucketPolicy. Not effective on Cloudflare R2 (configure public access through the Cloudflare dashboard instead).
  required:
    - bucketName
    - endpoint
---
kind: Telo.Definition
metadata:
  name: List
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/s3@0.5.1?local_path=./nodejs#s3-list
schema:
  type: object
  examples:
    - bucketRef: !ref Store
  properties:
    bucketRef:
      title: Bucket
      description: Reference to an S3.Bucket resource (local, or imported via `!ref Alias.name`).
      x-telo-ref: "std/s3#Bucket"
  required:
    - bucketRef
---
kind: Telo.Definition
metadata:
  name: Put
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/s3@0.5.1?local_path=./nodejs#s3-put
throws:
  codes:
    ERR_INVALID_INPUT:
      description: body is neither a string nor a Uint8Array.
    ERR_INVALID_REFERENCE:
      description: bucketRef does not resolve to a live S3.Bucket resource at invoke time.
schema:
  type: object
  examples:
    - bucketRef: !ref Store
  properties:
    bucketRef:
      title: Bucket
      description: Reference to an S3.Bucket resource (local, or imported via `!ref Alias.name`).
      x-telo-ref: "std/s3#Bucket"
    inputs:
      title: Inputs
      description: Object key and content written to the bucket.
      type: object
      examples:
        - key: reports/2026-06.txt
          body: hello world
          contentType: text/plain
      properties:
        key:
          title: Key
          description: Object key path inside the bucket.
          type: string
        body:
          title: Body
          description: |
            Object content to upload — a UTF-8 string, or buffered binary
            (a Uint8Array, e.g. the `bytes` produced by Octet.Decoder).
          oneOf:
            - type: string
            - type: object
        contentType:
          title: Content Type
          description: MIME type set on the uploaded object.
          type: string
      required:
        - key
        - body
  required:
    - bucketRef
---
# Get: streams an object's bytes from the bucket.
#
# Pair the `output` stream with an Encoder (e.g. Octet.Encoder for raw bytes,
# PlainText.Encoder if you want UTF-8-decoded chunks) when wiring through an
# Http.Api response — manifests stay byte-streaming end-to-end and never
# buffer the body in memory.
kind: Telo.Definition
metadata:
  name: Get
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/s3@0.5.1?local_path=./nodejs#s3-get
throws:
  codes:
    ERR_NOT_FOUND:
      description: No object exists at the requested key in the referenced bucket.
    ERR_INVALID_REFERENCE:
      description: bucketRef does not resolve to a live S3.Bucket resource at invoke time.
    ERR_INVALID_RESPONSE:
      description: The storage backend returned a successful response with no iterable body.
schema:
  type: object
  examples:
    - bucketRef: !ref Store
  properties:
    bucketRef:
      title: Bucket
      description: Reference to an S3.Bucket resource (local, or imported via `!ref Alias.name`).
      x-telo-ref: "std/s3#Bucket"
  required:
    - bucketRef
  additionalProperties: false
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    examples:
      - key: reports/2026-06.txt
    properties:
      key:
        title: Key
        description: Object key path inside the bucket.
        type: string
    required:
      - key
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      output:
        x-telo-stream: true
        description: Async iterable of Uint8Array chunks streamed from the storage backend.
      contentType:
        type: string
        description: Content-Type header reported by the storage backend, when available.
    required:
      - output
    additionalProperties: false
---
# Delete: removes an object from the bucket by key.
#
# Idempotent — deleting a key that does not exist succeeds — so the only error
# is an unresolvable bucketRef.
kind: Telo.Definition
metadata:
  name: Delete
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/s3@0.5.1?local_path=./nodejs#s3-delete
throws:
  codes:
    ERR_INVALID_REFERENCE:
      description: bucketRef does not resolve to a live S3.Bucket resource at invoke time.
schema:
  type: object
  examples:
    - bucketRef: !ref Store
  properties:
    bucketRef:
      title: Bucket
      description: Reference to an S3.Bucket resource (local, or imported via `!ref Alias.name`).
      x-telo-ref: "std/s3#Bucket"
  required:
    - bucketRef
  additionalProperties: false
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    examples:
      - key: reports/2026-06.txt
    properties:
      key:
        title: Key
        description: Object key path inside the bucket.
        type: string
    required:
      - key
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      key:
        title: Key
        description: The deleted object's key (echoed back).
        type: string
    required:
      - key
    additionalProperties: false
---
# PresignedUrl: a time-limited link for an object, via SigV4 query presigning
# — GET for downloads, PUT for browser-direct uploads.
#
# Pure local crypto — no request leaves the process, and the object's
# existence is not checked: a GET URL for a missing key simply 404s when
# used. Anyone holding the URL can use it until it expires.
kind: Telo.Definition
metadata:
  name: PresignedUrl
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/s3@0.5.1?local_path=./nodejs#s3-presigned-url
throws:
  codes:
    ERR_INVALID_INPUT:
      description: >-
        key is empty, expiresIn is not an integer between 1 and 604800
        seconds, or contentType is supplied for a get operation.
    ERR_INVALID_REFERENCE:
      description: bucketRef does not resolve to a live S3.Bucket resource at invoke time.
schema:
  type: object
  examples:
    - bucketRef: !ref Store
      expiresIn: 3600
  properties:
    bucketRef:
      title: Bucket
      description: Reference to an S3.Bucket resource (local, or imported via `!ref Alias.name`).
      x-telo-ref: "std/s3#Bucket"
    operation:
      title: Operation
      type: string
      enum: [ get, put ]
      default: get
      description: >-
        What the link authorizes — get (download) or put (browser-direct
        upload). Runtime inputs.operation takes precedence when set.
    expiresIn:
      title: Expires In
      type: integer
      minimum: 1
      maximum: 604800
      default: 900
      description: >-
        Link lifetime in seconds (SigV4 caps presigned URLs at 7 days =
        604800). Runtime inputs.expiresIn takes precedence when set.
  required:
    - bucketRef
  additionalProperties: false
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    examples:
      - key: reports/2026-06.pdf
    properties:
      key:
        title: Key
        description: Object key path inside the bucket.
        type: string
        minLength: 1
      operation:
        title: Operation
        type: string
        enum: [ get, put ]
        description: What the link authorizes. Takes precedence over the resource-level operation.
      expiresIn:
        title: Expires In
        type: integer
        minimum: 1
        maximum: 604800
        description: Link lifetime in seconds. Takes precedence over the resource-level expiresIn.
      contentType:
        title: Content Type
        type: string
        description: >-
          put only — bakes the Content-Type into the signature, so the
          uploader must send exactly this header. Rejected for get.
    required:
      - key
    additionalProperties: false
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      url:
        type: string
        description: Time-limited URL authorizing the requested operation on the object.
      expiresAt:
        type: string
        description: ISO 8601 timestamp the URL stops working at.
    required:
      - url
      - expiresAt
    additionalProperties: false
