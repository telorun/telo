kind: Telo.Application
metadata:
  name: AppTraceSpanApp
  version: 1.0.0
imports:
  Run: ../../../../../modules/run
targets:
  - !ref Seq
---
kind: Run.Sequence
metadata:
  name: Seq
steps:
  - name: DoEcho
    invoke: !ref Echo
    inputs: { value: 7 }
---
kind: Run.Value
metadata:
  name: Echo
inputs:
  value: { type: integer }
value:
  echoed: !cel "inputs.value"
