kind: Telo.Application
metadata:
  name: OpenaiSnapshotRedactsSecretsTest
  version: 1.0.0
imports:
  AiOpenai: ../
  JS: ../../javascript
  Run: ../../run
  Assert: ../../assert
targets:
  - TestSnapshotRedactsApiKey
---
# Boot an OpenaiModel with a sentinel apiKey. The provider's `snapshot()` must omit
# `apiKey` so the CEL-visible `resources.Probe` record never leaks the secret.
# This is offline — the model instance is just config, no API call.
kind: AiOpenai.OpenaiModel
metadata: { name: Probe }
model: gpt-4o-mini
apiKey: "sk-sentinel-DO-NOT-LEAK"
options:
  temperature: 0.5
---
kind: Run.Sequence
metadata:
  name: TestSnapshotRedactsApiKey
steps:
  - name: Inspect
    inputs:
      probe: "${{ resources.Probe }}"
    invoke:
      kind: JS.Script
      code: |
        function main({ probe }) {
          const keys = Object.keys(probe || {});
          return {
            hasApiKey: keys.includes('apiKey'),
            apiKey: probe && Object.prototype.hasOwnProperty.call(probe, 'apiKey') ? probe.apiKey : null,
            modelKey: probe?.model ?? null,
            optionsKey: probe?.options ?? null,
          };
        }
  - name: AssertRedacted
    inputs:
      hasApiKey: "${{ steps.Inspect.result.hasApiKey }}"
      apiKey: "${{ steps.Inspect.result.apiKey }}"
      modelKey: "${{ steps.Inspect.result.modelKey }}"
    invoke:
      kind: Assert.Schema
      schema:
        type: object
        properties:
          # apiKey must be absent from the snapshot.
          hasApiKey: { const: false }
          apiKey: { type: "null" }
          # Non-secret fields like `model` SHOULD remain visible — proves the redaction
          # is targeted, not a wholesale `snapshot() => {}`.
          modelKey: { const: "gpt-4o-mini" }
        required: [ hasApiKey, apiKey, modelKey ]
