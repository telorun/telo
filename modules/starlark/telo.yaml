kind: Kernel.Module
metadata:
  version: 0.2.1
  name: starlark
  namespace: std
  description: Execute Starlark code within workflows
---
kind: Kernel.Definition
metadata:
  name: Script
capability: Kernel.Runnable
controllers:
  - pkg:npm/@telorun/starlark@0.1.9?local_path=./nodejs#script
schema:
  type: object
  properties:
    metadata:
      type: object
      properties:
        name:
          type: string
      required: [name]
    code:
      title: Code
      description: Starlark source code to execute.
      type: string
    inputType:
      title: Input Type
      description: Named type reference or inline type definition for script inputs.
      x-telo-ref: "kernel#Type"
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
    outputType:
      title: Output Type
      description: Named type reference or inline type definition for script outputs.
      x-telo-ref: "kernel#Type"
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
  required: [metadata, code]
