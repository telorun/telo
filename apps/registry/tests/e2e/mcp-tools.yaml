kind: Telo.Application
metadata:
  name: RegistryE2EMcpTools
  version: 1.0.0
  description: |
    End-to-end tests for the registry's MCP endpoint at /mcp, run against the
    docker-compose Caddy proxy. Reproduces the `get_module_manifest` failure
    where `${{ steps.fetch.result.output }}` rejected an S3.Get Stream value
    at runtime ("Unsupported type: Stream"); locks in that the tool returns
    the published telo.yaml verbatim.

    Self-seeding: publishes a synthetic `std/e2e-mcp-fixture@1.0.0` module via
    PUT first, then fetches it back through MCP. Avoids depending on whatever
    happens to be in the local catalog so the test runs reliably in CI.
    Requires `TELO_REGISTRY_TOKEN` in the environment matching the registry's
    `TELO_PUBLISH_TOKEN`.
targets:
  - GetModuleManifest_ReturnsYaml
---
kind: Telo.Import
metadata: { name: HttpClient }
source: ../../../../modules/http-client
---
kind: Telo.Import
metadata: { name: Config }
source: ../../../../modules/config
---
kind: Telo.Import
metadata: { name: JS }
source: ../../../../modules/javascript
---
kind: Telo.Import
metadata: { name: Type }
source: ../../../../modules/type
---
kind: Telo.Import
metadata: { name: Run }
source: ../../../../modules/run
---
kind: Telo.Import
metadata: { name: Assert }
source: ../../../../modules/assert
---
# Reads the publish bearer from the test runner's environment so the test can
# seed a fixture before reading it back. CI exports the same token the
# registry container booted with; locally it comes from apps/registry/.env*.
kind: Config.Env
metadata: { name: TestEnv }
secrets:
  registryToken:
    env: TELO_REGISTRY_TOKEN
    type: string
---
# Hand-rolled MCP Streamable-HTTP client (initialize → notifications/initialized
# → tools/call). Same pattern as modules/mcp-server/tests/http-tool-call.yaml's
# McpFetch — duplicated rather than shared because the e2e suite must run
# against a real registry process and we want this file to be self-contained.
kind: JS.Script
metadata: { name: McpFetch }
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      url: { type: string }
      method: { type: string }
      params: { type: object, additionalProperties: true }
    required: [url, method]
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      status: { type: integer }
      result: { type: object, additionalProperties: true }
      error: { type: object, additionalProperties: true }
      hasError: { type: boolean }
    required: [status, hasError]
# FIXME: Create MCP client module
code: |
  async function main({ url, method, params }) {
    const initBody = {
      jsonrpc: "2.0",
      id: 1,
      method: "initialize",
      params: {
        protocolVersion: "2024-11-05",
        capabilities: {},
        clientInfo: { name: "telo-test", version: "1.0.0" },
      },
    };
    const initResp = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json, text/event-stream",
      },
      body: JSON.stringify(initBody),
    });
    if (initResp.status >= 400) {
      const text = await initResp.text();
      throw new Error(`MCP initialize failed: ${initResp.status} ${text}`);
    }
    // Stateful endpoints mint an Mcp-Session-Id and require it on subsequent
    // requests; stateless endpoints (the new default) omit the header — both
    // protocol modes are exercised by other tests, this fetch supports either.
    const sessionId = initResp.headers.get("mcp-session-id");
    await initResp.text();

    const sessionHeaders = sessionId ? { "Mcp-Session-Id": sessionId } : {};

    if (sessionId) {
      await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json, text/event-stream",
          ...sessionHeaders,
        },
        body: JSON.stringify({ jsonrpc: "2.0", method: "notifications/initialized" }),
      }).then((r) => r.text());
    }

    const callResp = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json, text/event-stream",
        ...sessionHeaders,
      },
      body: JSON.stringify({ jsonrpc: "2.0", id: 2, method, params: params || {} }),
    });
    const status = callResp.status;
    const ct = (callResp.headers.get("content-type") || "").toLowerCase();
    const raw = await callResp.text();

    let payload;
    if (ct.startsWith("application/json")) {
      payload = JSON.parse(raw);
    } else if (ct.startsWith("text/event-stream")) {
      const dataLines = raw
        .split(/\r?\n/)
        .filter((l) => l.startsWith("data:"))
        .map((l) => l.slice(5).trimStart());
      if (dataLines.length === 0) throw new Error(`MCP SSE body had no data lines. Raw: ${raw}`);
      payload = JSON.parse(dataLines[0]);
    } else {
      throw new Error(`MCP unexpected Content-Type '${ct}'. Body: ${raw}`);
    }

    // Surface JSON-RPC errors as thrown errors so the test failure line carries
    // the actual code/message. Otherwise the downstream assert trips on
    // `result.content[0].type` and the underlying MCP error is invisible.
    if (payload.error) {
      throw new Error(
        `MCP ${method} returned error ${payload.error.code}: ${payload.error.message}`,
      );
    }

    return {
      status,
      hasError: false,
      result: payload.result || {},
      error: {},
    };
  }
---
# Reproduces the failure: GetModuleManifest pipes S3.Get's stream-typed
# `output` through `${{ steps.fetch.result.output }}` into PlainText.Decoder.
# At runtime CEL was rejecting the Stream class with "Unsupported type: Stream".
# Publishes a synthetic module first so the test is self-seeding — independent
# of whatever happens to live in the catalog. The assertion verifies that the
# fetched body matches the published source byte-for-byte.
kind: Run.Sequence
metadata: { name: GetModuleManifest_ReturnsYaml }
steps:
  - name: publish
    invoke:
      kind: HttpClient.Request
      metadata: { name: SeedMcpFixture }
      url: http://registry.telo.localhost:8060/std/e2e-mcp-fixture/1.0.0
      method: PUT
      headers:
        content-type: text/yaml
        authorization: "Bearer ${{ resources.TestEnv.registryToken }}"
      body: |
        kind: Telo.Library
        metadata:
          name: e2e-mcp-fixture
          version: 1.0.0
          description: e2e test fixture for MCP get_module_manifest
  - name: assertPublished
    inputs:
      status: "${{ steps.publish.result.status }}"
    invoke:
      kind: Assert.Schema
      metadata: { name: AssertMcpFixturePublished }
      schema:
        type: object
        properties:
          status: { const: 201 }
        required: [status]
  - name: call
    inputs:
      url: http://registry.telo.localhost:8060/mcp
      method: tools/call
      params:
        name: get_module_manifest
        arguments: { namespace: std, name: e2e-mcp-fixture, version: 1.0.0 }
    invoke: { kind: JS.Script, name: McpFetch }
  - name: assert
    inputs:
      hasError: "${{ steps.call.result.hasError }}"
      contentType: "${{ steps.call.result.result.content[0].type }}"
      contentText: "${{ steps.call.result.result.content[0].text }}"
    invoke:
      kind: Assert.Schema
      metadata: { name: AssertGetModuleManifest }
      schema:
        type: object
        properties:
          hasError: { const: false }
          contentType: { const: text }
          contentText:
            type: string
            # The S3 round-trip preserves bytes exactly; we just assert the
            # decoded body still contains the description we just published.
            pattern: "e2e test fixture for MCP get_module_manifest"
        required: [hasError, contentType, contentText]
