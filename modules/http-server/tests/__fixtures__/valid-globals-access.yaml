kind: Telo.Library
metadata:
  name: ValidGlobalsAccess
  version: 1.0.0
imports:
  Http: ../..
  JavaScript: ../../../javascript
  Type: ../../../type
variables:
  apiKey:
    type: string
---
kind: JavaScript.Script
metadata:
  name: Handler
code: |
  function main(input) { return { ok: true } }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      ok: { type: boolean }
---
kind: Http.Api
metadata:
  name: TestApi
routes:
  - request:
      path: /test
      method: GET
    handler: !ref Handler
    inputs:
      key: "${{ variables.apiKey }}"
    returns:
      - status: 200
        content:
          application/json:
            body:
              ok: "${{ result.ok }}"
