# Telo Module Registry

kind: Telo.Application
metadata:
  name: telo-registry
  version: 0.4.0
imports:
  Type: std/type@0.2.1
  Http: std/http-server@0.9.0
  HttpClient: std/http-client@0.6.0
  S3: std/s3@0.3.0
  Sql: std/sql@0.8.0
  Run: std/run@0.7.0
  Octet: std/octet-codec@0.4.1
  PlainText: std/plain-text-codec@0.4.1
  Gzip: std/gzip@0.2.0
  Tar: std/tar@0.2.0
  Yaml: std/yaml@0.4.1
  Mcp: std/mcp-server@0.6.1
variables:
  port:
    env: PORT
    type: integer
    default: 3000
  bucketName:
    env: S3_BUCKET_NAME
    type: string
  s3Endpoint:
    env: S3_ENDPOINT
    type: string
  s3ForcePathStyle:
    env: S3_FORCE_PATH_STYLE
    type: boolean
    default: false
  dbConnection:
    env: DB_CONNECTION
    type: string
secrets:
  accessKeyId:
    env: S3_ACCESS_KEY_ID
    type: string
  secretAccessKey:
    env: S3_SECRET_ACCESS_KEY
    type: string
  publishToken:
    env: TELO_PUBLISH_TOKEN
    type: string
targets:
  - Migrations
  - SeedRootPublishToken
  - RegistryServer
---
# ── Storage ───────────────────────────────────────────────────────────────────

kind: S3.Bucket
metadata:
  name: ModuleStore
bucketName: "${{ variables.bucketName }}"
endpoint: "${{ variables.s3Endpoint }}"
forcePathStyle: "${{ variables.s3ForcePathStyle }}"
accessKeyId: "${{ secrets.accessKeyId }}"
secretAccessKey: "${{ secrets.secretAccessKey }}"
createIfMissing: true
publicRead: true
---
# ── Database ──────────────────────────────────────────────────────────────────

kind: Sql.PostgresConnection
metadata:
  name: Db
driver: postgres
connectionString: "${{ variables.dbConnection }}"
---
kind: Sql.Migrations
metadata:
  name: Migrations
connection: !ref Db
---
kind: Sql.Migration
metadata:
  name: Migration_20260331143022_CreateModules
version: 20260331143022_CreateModules
sql: |
  CREATE TABLE modules (
    namespace    TEXT NOT NULL,
    name         TEXT NOT NULL,
    version      TEXT NOT NULL,
    file_key     TEXT NOT NULL,
    description  TEXT,
    published_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
    PRIMARY KEY (namespace, name, version)
  )
---
kind: Sql.Migration
metadata:
  name: Migration_20260419100000_CreateUsers
version: 20260419100000_CreateUsers
sql: |
  CREATE TABLE users (
    id         UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
    username   TEXT        UNIQUE NOT NULL,
    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
  )
---
kind: Sql.Migration
metadata:
  name: Migration_20260419100100_CreateNamespaces
version: 20260419100100_CreateNamespaces
sql: |
  CREATE TABLE namespaces (
    name       TEXT        PRIMARY KEY,
    owner_id   UUID        NOT NULL REFERENCES users(id) ON DELETE RESTRICT,
    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
  )
---
kind: Sql.Migration
metadata:
  name: Migration_20260419100200_CreateTokens
version: 20260419100200_CreateTokens
sql: |
  CREATE TABLE tokens (
    id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id       UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
    token_hash    TEXT        UNIQUE NOT NULL,
    label         TEXT,
    created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
    last_used_at  TIMESTAMPTZ,
    expires_at    TIMESTAMPTZ,
    UNIQUE (user_id, label)
  )
---
kind: Sql.Migration
metadata:
  name: Migration_20260419100300_SeedRootUserAndStdNamespace
version: 20260419100300_SeedRootUserAndStdNamespace
sql: |
  INSERT INTO users (username) VALUES ('root') ON CONFLICT (username) DO NOTHING;
  INSERT INTO namespaces (name, owner_id)
    SELECT 'std', id FROM users WHERE username = 'root'
    ON CONFLICT (name) DO NOTHING
---
# Boot-time token seed. Single atomic UPSERT keyed on (user_id, label): on
# rotation the existing 'root-publish-token' row has its token_hash overwritten
# in place. Atomicity matters — a delete-then-insert pair could leave the
# registry with zero valid tokens if the insert fails between steps. Wrapped in
# a Run.Sequence so it can be an Application target (Sql.Exec is Invocable only).
kind: Run.Sequence
metadata:
  name: SeedRootPublishToken
steps:
  - name: upsert
    invoke:
      kind: Sql.Exec
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      sql: >-
        INSERT INTO tokens (user_id, token_hash, label) SELECT id, $1, 'root-publish-token' FROM users WHERE username = 'root' ON CONFLICT (user_id, label) DO UPDATE SET token_hash = EXCLUDED.token_hash
      bindings:
        - "${{ sha256(secrets.publishToken) }}"
---
kind: Http.Server
metadata:
  name: RegistryServer
host: "0.0.0.0"
port: "${{ variables.port }}"
logger: true
contentTypeParsers:
  - contentType: text/yaml
  # Bundle uploads arrive as binary tar.gz; deliver the raw stream to the
  # handler (route declares an x-telo-stream body) instead of parsing.
  - contentType: application/gzip
    stream: true
baseUrl: http://registry.telo.localhost:8060
cors:
  origin: "*"
  methods: "GET,PUT,POST,DELETE,OPTIONS"
  allowedHeaders: "Content-Type, Authorization"
openapi:
  info:
    title: Telo Module Registry
    version: 1.0.0
    description: |
      Resolve and browse Telo Kernel modules.
      Compatible with the Telo CLI and module import source resolution.
mounts:
  - path: /mcp
    type: Mcp.HttpEndpoint.McpHttp
  - path: /
    type: Http.Api.PublicApi
  - path: /health
    type: Http.Api.Health
notFoundHandler:
  invoke:
    kind: HttpClient.Request
    metadata:
      name: NotFoundHandler
      module: telo-registry
    mode: stream
  inputs:
    method: "${{ request.method }}"
    url: "${{ variables.s3Endpoint + '/' + variables.bucketName + request.path }}"
  returns:
    - status: 200
      mode: stream
      content:
        application/octet-stream:
          encoder: { kind: Octet.Encoder }
---
kind: Sql.Select
metadata:
  name: SearchModules
connection: !ref Db
from: modules
distinctOn: [ namespace, name ]
columns:
  - namespace
  - name
  - version
  - description
  - { column: published_at, as: publishedAt }
  - { expr: "namespace || '/' || name || '@' || version", as: id }
where:
  - when: "${{ inputs.q != '' }}"
    or:
      - { column: name, op: ilike, value: "${{ '%' + inputs.q + '%' }}" }
      - { column: namespace, op: ilike, value: "${{ '%' + inputs.q + '%' }}" }
      - { column: description, op: ilike, value: "${{ '%' + inputs.q + '%' }}" }
  - when: "${{ inputs.id != '' }}"
    sql: "(namespace || '/' || name || '@' || version) ILIKE $1"
    bindings: [ "${{ '%' + inputs.id + '%' }}" ]
orderBy:
  - { column: namespace }
  - { column: name }
  - { column: published_at, direction: desc }
limit: "${{ inputs.limit }}"
offset: "${{ inputs.offset }}"
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      q: { type: string, default: "" }
      id: { type: string, default: "" }
      limit: { type: integer, default: 20 }
      offset: { type: integer, default: 0 }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      rows: { type: array }
      rowCount: { type: integer }
---
# Authorize a publish: validate the Bearer header and that the token owns the
# target namespace. Throws UNAUTHORIZED on failure; returns normally on success.
# Shared by the yaml (PublishHandler) and bundle (PublishBundleHandler) routes so
# the token CTE and its semantics live in exactly one place — authorized once per
# request, never twice.
kind: Run.Sequence
metadata:
  name: AuthorizeNamespace
steps:
  - name: checkHeader
    if: "${{ !inputs.authorization.startsWith('Bearer ') }}"
    then:
      - name: rejectHeader
        throw:
          code: UNAUTHORIZED
          message: Missing or malformed Authorization header

  - name: verifyToken
    invoke:
      kind: Sql.Query
      connection:
        kind: Sql.Connection
        name: Db
    inputs:
      # Data-modifying CTE: match the token, touch last_used_at, and return the
      # owning user in a single atomic statement. No match → matched is empty →
      # update is a no-op → zero rows returned → checkToken rejects.
      sql: >-
        WITH matched AS (
          SELECT t.id AS token_id, u.id AS user_id, u.username
          FROM tokens t
          JOIN users u ON u.id = t.user_id
          JOIN namespaces n ON n.owner_id = u.id
          WHERE t.token_hash = $1 AND n.name = $2
            AND (t.expires_at IS NULL OR t.expires_at > NOW())
          LIMIT 1
        ), touched AS (
          UPDATE tokens SET last_used_at = NOW()
          WHERE id IN (SELECT token_id FROM matched)
        ) SELECT user_id, username FROM matched
      bindings:
        - "${{ sha256(inputs.authorization.substring(7)) }}"
        - "${{ inputs.namespace }}"

  - name: checkToken
    if: "${{ steps.verifyToken.result.rows.size() == 0 }}"
    then:
      - name: rejectToken
        throw:
          code: UNAUTHORIZED
          message: Invalid token or namespace not owned
---
# Core publish: parse + validate the manifest, store telo.yaml, index the row.
# Auth-free — callers (PublishHandler, PublishBundleHandler) authorize first.
# Top-level Run.Sequence so its CEL context isn't constrained by a route
# handler field's x-telo-context (which would hide `error` inside catch blocks).
kind: Run.Sequence
metadata:
  name: RecordManifest
steps:
  # Parse the YAML body so we can index `metadata.description` server-side
  # (npm-style: the registry reads metadata from the manifest, the publisher
  # doesn't ship it out-of-band). Caught errors map to MANIFEST_PARSE_FAILED.
  - name: tryParse
    try:
      - name: parseManifest
        invoke: { kind: Yaml.Parse }
        inputs:
          text: "${{ inputs.body }}"
    catch:
      - name: rethrowParse
        throw:
          code: MANIFEST_PARSE_FAILED
          message: "${{ error.message }}"

  # Per CLAUDE.md, every module file MUST start with exactly one Telo.Library or
  # Telo.Application doc. Reject anything else up front so the index never holds
  # rows for malformed manifests. Optional access (`[?0].?kind`) keeps the check
  # safe against empty docs / missing kind without throwing a different error.
  - name: validateRootDoc
    if: "${{ !(steps.parseManifest.result.docs[?0].?kind.orValue('') in ['Telo.Library', 'Telo.Application']) }}"
    then:
      - name: rejectRootDoc
        throw:
          code: INVALID_MANIFEST
          message: First document must be a Telo.Library or Telo.Application

  - name: upload
    try:
      - name: doUpload
        invoke:
          kind: S3.Put
          bucketRef:
            name: ModuleStore
        inputs:
          key: "${{ inputs.fileKey }}"
          body: "${{ inputs.body }}"
          contentType: "text/yaml"
    catch:
      - name: rethrowUpload
        throw:
          code: UPLOAD_FAILED
          message: "${{ error.message }}"

  - name: record
    try:
      - name: doRecord
        invoke:
          kind: Sql.Exec
          connection:
            kind: Sql.Connection
            name: Db
        inputs:
          # CEL's optional access (`[?0]`, `.?field`) safely traverses missing
          # intermediates; `.orValue(null)` lands on SQL NULL when any segment
          # is absent. NULL (not '') keeps "no description" distinct from "empty
          # string" and matches the column's existing semantics for legacy rows.
          # The `type(...) == string` guard catches publishers who accidentally
          # supply a non-string description (e.g. a YAML mapping) — those bind
          # as NULL rather than corrupting the row with a JSON-stringified blob.
          sql: >-
            INSERT INTO modules (namespace, name, version, file_key, description) VALUES ($1, $2, $3, $4, $5) ON CONFLICT (namespace, name, version) DO UPDATE
              SET file_key = EXCLUDED.file_key,
                  description = EXCLUDED.description
          bindings:
            - "${{ inputs.namespace }}"
            - "${{ inputs.name }}"
            - "${{ inputs.version }}"
            - "${{ inputs.fileKey }}"
            - "${{ type(steps.parseManifest.result.docs[?0].?metadata.?description.orValue('')) == string ? steps.parseManifest.result.docs[?0].?metadata.?description.orValue(null) : null }}"
    catch:
      - name: rethrowRecord
        throw:
          code: RECORD_FAILED
          message: "${{ error.message }}"
outputs:
  published: "${{ inputs.published }}"
---
# Publish handler (text/yaml route) — authorize once, then record.
kind: Run.Sequence
metadata:
  name: PublishHandler
steps:
  - name: authorize
    invoke:
      kind: Run.Sequence
      name: AuthorizeNamespace
    inputs:
      authorization: "${{ inputs.authorization }}"
      namespace: "${{ inputs.namespace }}"
  - name: recordManifest
    invoke:
      kind: Run.Sequence
      name: RecordManifest
    inputs:
      namespace: "${{ inputs.namespace }}"
      name: "${{ inputs.name }}"
      version: "${{ inputs.version }}"
      body: "${{ inputs.body }}"
      fileKey: "${{ inputs.fileKey }}"
      published: "${{ inputs.published }}"
outputs:
  published: "${{ steps.recordManifest.result.published }}"
---
# Bundle publish handler — accepts a binary tar.gz upload (telo.yaml + bundled
# controller .js). Authorizes once (shared AuthorizeNamespace), stores the
# tarball, extracts telo.yaml out of it, then delegates parse/validate/index/
# store to the shared RecordManifest. The upload streams in (request.body), is
# buffered to bytes (Octet), stored to S3, then read back as a stream and
# gunzip→untar'd — S3.Get is the tee that lets the same bytes be both stored and
# extracted.
#
# Tradeoff: the tarball is stored before the manifest is validated (the S3.Get
# read-back is the only available bytes→stream tee), so a structurally-invalid
# upload leaves an orphaned module.tar.gz — unindexed, deterministically keyed,
# overwritten on retry. Low impact; a bytes→Stream primitive would let us
# validate before storing.
kind: Run.Sequence
metadata:
  name: PublishBundleHandler
steps:
  - name: authorize
    invoke:
      kind: Run.Sequence
      name: AuthorizeNamespace
    inputs:
      authorization: "${{ inputs.authorization }}"
      namespace: "${{ inputs.namespace }}"

  # Buffer the streamed upload to bytes so it can be both stored and re-read.
  - name: buffer
    invoke: { kind: Octet.Decoder }
    inputs:
      input: "${{ inputs.body }}"

  - name: storeTar
    try:
      - name: doStoreTar
        invoke:
          kind: S3.Put
          bucketRef:
            name: ModuleStore
        inputs:
          key: "${{ inputs.tarKey }}"
          body: "${{ steps.buffer.result.bytes }}"
          contentType: "application/gzip"
    catch:
      - name: rethrowStoreTar
        throw:
          code: UPLOAD_FAILED
          message: "${{ error.message }}"

  # Read the stored tarball back as a stream (the tee), then gunzip + untar to
  # pull telo.yaml out of it.
  - name: readTar
    try:
      - name: getTar
        invoke:
          kind: S3.Get
          bucketRef:
            name: ModuleStore
        inputs:
          key: "${{ inputs.tarKey }}"
    catch:
      - name: rethrowReadTar
        throw:
          code: UPLOAD_FAILED
          message: "Stored bundle could not be read back: ${{ error.message }}"
  - name: extractManifest
    try:
      - name: gunzip
        invoke: { kind: Gzip.Decoder }
        inputs:
          input: "${{ steps.getTar.result.output }}"
      - name: doExtract
        invoke: { kind: Tar.Extract }
        inputs:
          input: "${{ steps.gunzip.result.output }}"
          path: "telo.yaml"
    catch:
      - name: rethrowExtract
        throw:
          code: INVALID_MANIFEST
          message: "Invalid bundle (gunzip/untar failed or telo.yaml missing): ${{ error.message }}"
  - name: manifestText
    invoke: { kind: PlainText.Decoder }
    inputs:
      input: "${{ steps.doExtract.result.output }}"

  # Reuse the shared core for parse → validate → store telo.yaml → index.
  - name: recordManifest
    invoke:
      kind: Run.Sequence
      name: RecordManifest
    inputs:
      namespace: "${{ inputs.namespace }}"
      name: "${{ inputs.name }}"
      version: "${{ inputs.version }}"
      body: "${{ steps.manifestText.result.text }}"
      fileKey: "${{ inputs.yamlKey }}"
      published: "${{ inputs.published }}"
outputs:
  published: "${{ steps.recordManifest.result.published }}"
---
kind: Http.Api
metadata:
  name: Health
routes:
  - request:
      path: /readiness
      method: GET
    returns:
      - status: 200
        content:
          application/json:
            body:
              status: "ok"
  - request:
      path: /liveness
      method: GET
    returns:
      - status: 200
        content:
          application/json:
            body:
              status: "ok"
---
# Public API — unauthenticated.
# GET /search                       full-text search across modules.
# GET /{namespace}/{name}           module overview with latest version.
# GET /{namespace}/{name}/versions  lists all versions from the SQL index.
# GET /{namespace}/{name}/{version} returns module metadata from the SQL index.
# GET /{namespace}/{name}/{version}/telo.yaml streams the telo.yaml from S3.
# PUT /{namespace}/{name}/{version} publishes a telo.yaml (body) to S3 and records it in SQL.
# Everything else falls through to the server fallback (ForwardToR2).
kind: Http.Api
metadata:
  name: PublicApi
routes:
  - request:
      path: /search
      method: GET
      schema:
        query:
          type: object
          properties:
            q:
              type: string
              default: ""
              description: "Search query for name, namespace, and description."
            id:
              type: string
              default: ""
              description: "Filter by module id (e.g. 'namespace/name@version')."
            limit: { type: integer, default: 50, description: "Number of results to return." }
            offset:
              type: integer
              default: 0
              description: "Number of results to skip for pagination."
    handler: !ref SearchModules
    inputs:
      q: "${{ request.query.q }}"
      id: "${{ request.query.id }}"
      limit: "${{ request.query.limit }}"
      offset: "${{ request.query.offset }}"
    returns:
      - status: 200
        content:
          application/json:
            body:
              results: "${{ result.rows }}"
              count: "${{ result.rowCount }}"

  - request:
      path: /{namespace}/{name}
      method: GET
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
          required: [ "namespace", "name" ]
    handler:
      kind: Sql.Query
      connection: !ref Db
    inputs:
      sql: >-
        SELECT version, published_at FROM modules WHERE namespace = $1 AND name = $2 ORDER BY published_at ASC
      bindings:
        - "${{ request.params.namespace }}"
        - "${{ request.params.name }}"
    returns:
      - status: 200
        when: "${{ result.rows.size() > 0 }}"
        content:
          application/json:
            body:
              name: "${{ request.params.namespace + '/' + request.params.name }}"
              version: "${{ result.rows[result.rows.size() - 1].version }}"
              versions: "${{ result.rows.map(r, r.version) }}"
      - status: 404
        content:
          application/json:
            body:
              error: "Module not found"

  - request:
      path: /{namespace}/{name}/versions
      method: GET
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
          required: [ "namespace", "name" ]
    handler:
      kind: Sql.Query
      connection: !ref Db
    inputs:
      sql: >-
        SELECT version, published_at as publishedAt FROM modules WHERE namespace = $1 AND name = $2 ORDER BY published_at DESC
      bindings:
        - "${{ request.params.namespace }}"
        - "${{ request.params.name }}"
    returns:
      - status: 200
        when: "${{ result.rows.size() > 0 }}"
        content:
          application/json:
            body:
              items: "${{ result.rows }}"
      - status: 404
        content:
          application/json:
            body:
              error: "Module not found"

  - request:
      path: /{namespace}/{name}/{version}
      method: GET
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
            version: { type: string }
          required: [ "namespace", "name", "version" ]
    handler:
      kind: Sql.Query
      connection: !ref Db
    inputs:
      sql: >-
        SELECT namespace, name, version, description, published_at FROM modules WHERE namespace = $1 AND name = $2 AND version = $3
      bindings:
        - "${{ request.params.namespace }}"
        - "${{ request.params.name }}"
        - "${{ request.params.version }}"
    returns:
      - status: 200
        when: "${{ result.rows.size() > 0 }}"
        content:
          application/json:
            body:
              id: "${{ result.rows[0].namespace + '/' + result.rows[0].name + '@' + result.rows[0].version }}"
              namespace: "${{ result.rows[0].namespace }}"
              name: "${{ result.rows[0].name }}"
              version: "${{ result.rows[0].version }}"
              description: "${{ result.rows[0].description }}"
              publishedAt: "${{ result.rows[0].published_at }}"
      - status: 404
        content:
          application/json:
            body:
              error: "Module not found"

  - request:
      path: /{namespace}/{name}/{version}/telo.yaml
      method: GET
      schema:
        params:
          type: object
          properties:
            namespace: { type: string, default: "std" }
            name: { type: string, default: "http-server" }
            version: { type: string, default: "1.1.0" }
          required: [ "namespace", "name", "version" ]
    handler:
      kind: S3.Get
      bucketRef:
        name: ModuleStore
    inputs:
      key: "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/telo.yaml' }}"
    returns:
      - status: 200
        mode: stream
        content:
          text/yaml:
            encoder: { kind: Octet.Encoder }
    catches:
      - when: "${{ error.code == 'ERR_NOT_FOUND' }}"
        status: 404
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
      - when: "${{ error.code == 'ERR_INVALID_REFERENCE' || error.code == 'ERR_INVALID_RESPONSE' }}"
        status: 500
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"

  - request:
      path: /{namespace}/{name}/{version}
      method: PUT
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
            version: { type: string }
          required: [ "namespace", "name", "version" ]
        body:
          type: string
    handler:
      kind: Run.Sequence
      name: PublishHandler
    inputs:
      authorization: "${{ has(request.headers.authorization) ? request.headers.authorization : '' }}"
      namespace: "${{ request.params.namespace }}"
      name: "${{ request.params.name }}"
      version: "${{ request.params.version }}"
      body: "${{ request.body }}"
      fileKey: "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/telo.yaml' }}"
      published: "${{ request.params.namespace + '/' + request.params.name + '@' + request.params.version }}"
    returns:
      - status: 201
        content:
          application/json:
            body:
              published: "${{ result.published }}"
    catches:
      - when: "${{ error.code == 'UNAUTHORIZED' }}"
        status: 401
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
      - when: "${{ error.code == 'MANIFEST_PARSE_FAILED' || error.code == 'INVALID_MANIFEST' }}"
        status: 400
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
      - when: "${{ error.code == 'UPLOAD_FAILED' || error.code == 'RECORD_FAILED' }}"
        status: 500
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"

  # ── Bundle artifact (tar.gz: telo.yaml + bundled controllers) ──────────────
  - request:
      path: /{namespace}/{name}/{version}/module.tar.gz
      method: GET
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
            version: { type: string }
          required: [ "namespace", "name", "version" ]
    handler:
      kind: S3.Get
      bucketRef:
        name: ModuleStore
    inputs:
      key: "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/module.tar.gz' }}"
    returns:
      - status: 200
        mode: stream
        content:
          application/gzip:
            encoder: { kind: Octet.Encoder }
    catches:
      - when: "${{ error.code == 'ERR_NOT_FOUND' }}"
        status: 404
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
      - when: "${{ error.code == 'ERR_INVALID_REFERENCE' || error.code == 'ERR_INVALID_RESPONSE' }}"
        status: 500
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"

  - request:
      path: /{namespace}/{name}/{version}/module.tar.gz
      method: PUT
      schema:
        params:
          type: object
          properties:
            namespace: { type: string }
            name: { type: string }
            version: { type: string }
          required: [ "namespace", "name", "version" ]
        body:
          x-telo-stream: true
    handler:
      kind: Run.Sequence
      name: PublishBundleHandler
    inputs:
      authorization: "${{ has(request.headers.authorization) ? request.headers.authorization : '' }}"
      namespace: "${{ request.params.namespace }}"
      name: "${{ request.params.name }}"
      version: "${{ request.params.version }}"
      body: "${{ request.body }}"
      tarKey: "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/module.tar.gz' }}"
      yamlKey: "${{ request.params.namespace + '/' + request.params.name + '/' + request.params.version + '/telo.yaml' }}"
      published: "${{ request.params.namespace + '/' + request.params.name + '@' + request.params.version }}"
    returns:
      - status: 201
        content:
          application/json:
            body:
              published: "${{ result.published }}"
    catches:
      - when: "${{ error.code == 'UNAUTHORIZED' }}"
        status: 401
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
      - when: "${{ error.code == 'MANIFEST_PARSE_FAILED' || error.code == 'INVALID_MANIFEST' }}"
        status: 400
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
      - when: "${{ error.code == 'UPLOAD_FAILED' || error.code == 'RECORD_FAILED' }}"
        status: 500
        content:
          application/json:
            body:
              error:
                code: "${{ error.code }}"
                message: "${{ error.message }}"
---
# ── MCP Server ────────────────────────────────────────────────────────────────
# Exposes the registry over MCP (Model Context Protocol) at /mcp on the same
# Http.Server. AI agents discover available modules and pull their manifests
# without needing to know the registry's REST surface.

# get_module_manifest handler — resolves the requested version (the literal
# `latest` maps to the most recently published version), fetches the YAML
# bytes from S3 and drains the byte stream into a single UTF-8 string so the
# MCP tool can return it as a `text` content block. PlainText.Decoder accepts
# the stream-typed S3 output directly (`steps.fetch.result.output` is the
# stream-marked property; only member access *past* it is forbidden by the
# analyzer). When the lookup finds no row, the S3 key falls back to a sentinel
# that 404s, surfacing as the `Module not found` catch below.
kind: Run.Sequence
metadata:
  name: GetModuleManifest
steps:
  - name: resolve
    invoke:
      kind: Sql.Query
      connection: { kind: Sql.Connection, name: Db }
    inputs:
      sql: >-
        SELECT version FROM modules
        WHERE namespace = $1 AND name = $2
          AND ($3 = 'latest' OR version = $3)
        ORDER BY published_at DESC LIMIT 1
      bindings:
        - "${{ inputs.namespace }}"
        - "${{ inputs.name }}"
        - "${{ inputs.version }}"
  - name: fetch
    invoke:
      kind: S3.Get
      bucketRef:
        name: ModuleStore
    inputs:
      key: "${{ inputs.namespace + '/' + inputs.name + '/' + (steps.resolve.result.rows.size() > 0 ? steps.resolve.result.rows[0].version : '__not_found__') + '/telo.yaml' }}"
  - name: decode
    invoke: { kind: PlainText.Decoder }
    inputs:
      input: "${{ steps.fetch.result.output }}"
outputs:
  text: "${{ steps.decode.result.text }}"
---
kind: Mcp.Tools
metadata:
  name: RegistryTools
entries:
  # search_modules — wraps SearchModules' Sql.Select with empty filters and a
  # high cap to expose the whole catalog. Filter / pagination args land when
  # the catalog scales; until then the tool is argument-free.
  - name: search_modules
    description: |
      List modules in the registry. Each result includes `id`, `namespace`,
      `name`, `version`, `description`, and `publishedAt`. Pick one and call
      `get_module_manifest` to read its `telo.yaml`.
    argumentsSchema:
      type: object
      properties: {}
      additionalProperties: false
    handler:
      kind: Sql.Select
      name: SearchModules
    inputs:
      q: ""
      id: ""
      limit: 1000
      offset: 0
    result:
      content:
        - type: text
          text: !cel "json({'results': result.rows, 'count': result.rowCount})"

  # get_module_manifest — returns the raw `telo.yaml` for a specific version
  # so the LLM can read its `Telo.Definition` schemas to compose a manifest
  # against it.
  - name: get_module_manifest
    description: |
      Fetch the raw `telo.yaml` for a module. The response contains
      `Telo.Library` and `Telo.Definition` docs that fully describe the
      module's public surface (kinds, schemas,
      capabilities). `version` is optional and defaults to `latest` (the most
      recently published version); pass an explicit version to fetch that one.
    argumentsSchema:
      type: object
      properties:
        namespace: { type: string }
        name: { type: string }
        version:
          type: string
          default: latest
          description: Exact version to fetch, or `latest` (default).
      required: [ namespace, name ]
      additionalProperties: false
    handler:
      kind: Run.Sequence
      name: GetModuleManifest
    inputs:
      namespace: "${{ request.arguments.namespace }}"
      name: "${{ request.arguments.name }}"
      version: "${{ request.arguments.?version.orValue('latest') }}"
    result:
      content:
        - type: text
          text: "${{ result.text }}"
    catches:
      - when: "${{ error.code == 'ERR_NOT_FOUND' }}"
        error:
          code: -32004
          message: "Module not found"
      - when: "${{ error.code == 'ERR_INVALID_REFERENCE' || error.code == 'ERR_INVALID_RESPONSE' }}"
        error:
          code: -32603
          message: "${{ error.message }}"
---
kind: Mcp.HttpEndpoint
metadata:
  name: McpHttp
serverInfo:
  name: telo-registry
  version: 0.4.0
# Telo primer surfaced to the client on `initialize`. Compatible MCP clients
# pass this to their LLM as system context, so a model with no prior Telo
# knowledge knows what these tools mean and how to compose a manifest from
# what they return.
instructions: !literal |
  This MCP server is the **Telo module registry**. Telo is a declarative runtime:
  YAML manifests describe desired state; the kernel resolves resources and runs a
  controller per kind. CEL expressions are written as `!cel "..."` tags.

  Fetch these for full context:
  - https://telo.run/llms.txt — guide & kind reference.
  - https://telo.run/examples.md — working example manifests.
  - https://telo.run/cel.md — CEL function reference (or run `telo cel functions`
    / `telo cel eval "<expr>"`).

  ## Tools
  - `search_modules` — find modules by description.
  - `get_module_manifest(namespace, name, version?)` — read a module's `telo.yaml`.
    Its `Telo.Definition` docs are JSON Schemas: the EXACT field shapes you must
    produce. `version` defaults to `latest`.

  ## Composing an application
  1. `search_modules` for what you need.
  2. `get_module_manifest` on each candidate; read the `Telo.Definition` schemas —
     never guess fields from a kind name.
  3. Write one `Telo.Application` (`metadata.name` kebab-case + `metadata.version`).
     Declare dependencies in the `imports` map (PascalCase alias →
     `namespace/name@VERSION`; the version must be exact — `@latest`/ranges are
     invalid). Add resources of `kind: <Alias>.<KindName>` using the schemas you
     read. `targets` lists the runnables/services to start.

  ## Must-know
  - No `spec:` wrapper — resource fields sit at the doc top level, beside `kind`
    and `metadata`.
  - `variables:` / `secrets:` entries each need an `env:` var name and a
    JSON-Schema `type:`.
  - Write object fields as YAML maps, not JSON strings (the runtime serializes
    them); tag dynamic leaves with `!cel`, not whole inline collections.
  - Split a large app into `Telo.Library` directories imported by relative path;
    the app stays a thin root that wires libraries via `imports` + `targets`.

tools: [ RegistryTools ]
