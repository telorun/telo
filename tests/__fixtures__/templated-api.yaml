kind: Telo.Library
metadata:
  name: templated-server
  version: 1.0.0
imports:
  Type: ../../modules/type
  Http: ../../modules/http-server
  JavaScript: ../../modules/javascript
exports:
  kinds:
    - HelloApi
---
kind: Http.Api
metadata:
  name: HelloApi
routes:
  - request:
      path: /hello
      method: GET
      schema:
        query:
          type: object
          properties:
            name:
              type: string
          required: [ "name" ]
    handler:
      kind: JavaScript.Script
      name: SayHello
    inputs:
      name: "${{ request.query.name }}" # CEL expression
    returns:
      - status: 200
        content:
          application/json:
            schema:
              type: object
              properties:
                greeting: { type: string }
                nice: { type: string }
              required: [ greeting, nice ]
              additionalProperties: false
            body:
              greeting: "${{ result.message }}!"
              nice: "WOW"
---
kind: JavaScript.Script
metadata:
  name: SayHello
code: |
  function main({ name }) {
    return {
      message: `Hello ${name}!`,
    }
  };
inputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      name: { type: string }
outputType:
  kind: Type.JsonSchema
  schema:
    type: object
    properties:
      message: { type: string }
---
