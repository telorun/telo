kind: Telo.Library
metadata:
  name: "javascript"
  namespace: std
  version: "0.3.0"
---
kind: "Telo.Definition"
metadata:
  name: "Script"
capability: Telo.Invocable
controllers:
  - pkg:npm/@telorun/javascript@0.2.0?local_path=./nodejs#script
schema:
  type: "object"
  properties:
    code:
      title: Code
      description: JavaScript source code executed by this resource.
      type: "string"
      contentMediaType: "application/javascript"
      x-telo-widget: "code"
    inputType:
      title: Input Type
      description: Named type reference or inline type definition for invocation inputs.
      x-telo-ref: "telo#Type"
      oneOf:
        - type: "string"
        - type: "object"
          additionalProperties: true
    outputType:
      title: Output Type
      description: Named type reference or inline type definition for invocation outputs.
      x-telo-ref: "telo#Type"
      oneOf:
        - type: "string"
        - type: "object"
          additionalProperties: true
  required: ["metadata", "code"]
  additionalProperties: false
