kind: Telo.Library
metadata:
  name: test
  namespace: std
  version: 0.3.0
  description: Test discovery and execution
exports:
  kinds:
    - Suite
---
kind: Telo.Definition
metadata:
  name: Suite
capability: Telo.Runnable
controllers:
  - pkg:npm/@telorun/test@0.3.0?local_path=./nodejs#suite
schema:
  type: object
  properties:
    metadata:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    include:
      type: array
      items:
        type: string
      description: >
        Glob patterns to discover test manifests, resolved relative to this
        manifest's directory.
    exclude:
      type: array
      items:
        type: string
      description: >
        Glob patterns to exclude from discovery. Defaults to ["**/__fixtures__/**"].
    filter:
      type: string
      description: >
        Optional substring filter applied to each discovered path. Only matching
        tests are executed.
    concurrency:
      type: integer
      minimum: 1
      description: >
        Maximum number of tests to run in parallel. Defaults to 3. Set to 1
        to force sequential execution.
  required:
    - metadata
